<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>Tour n Travel</title>
<script src="https://sdk.minepi.com/pi-sdk.js"></script>
<style>
:root{--biru:#0A1F44;--ungu:#4B0082;--emas:#DAA520;--hitam:#000;}
body,html{margin:0;background:#1A0033;color:#fff;font-family:'Segoe UI';}
.header{padding:12px 15px;display:flex;align-items:center;background:var(--biru);border-bottom:3px solid var(--emas);position:sticky;top:0;z-index:10;}
.back{font-size:2em;color:var(--emas);text-decoration:none;margin-right:10px;}
.logo{font-size:1.5em;font-weight:900;color:var(--emas);text-align:center;flex-grow:1;}
.main{padding:15px;max-width:600px;margin:0 auto;padding-bottom:80px;}
.tabs{display:flex;background:var(--ungu);border-radius:10px;overflow:hidden;margin-bottom:15px;border:2px solid var(--emas);}
.tab{flex:1;padding:12px;text-align:center;font-weight:700;cursor:pointer;background:var(--ungu);}
.tab.active{background:var(--biru);color:var(--emas);}
.tab-content{display:none;}
.tab-content.active{display:block;}
.form-box,.card{background:var(--ungu);border:2px solid var(--emas);border-radius:12px;padding:15px;margin-bottom:15px;}
.form-box h3{margin:0 0 15px 0;color:var(--emas);text-align:center;}
.form-box input, .form-box textarea, .form-box select{width:100%;background:#1A0033;border:1px solid var(--emas);color:#fff;border-radius:8px;padding:12px;margin-bottom:10px;font-size:1em;box-sizing:border-box;}
.btn{width:100%;background:var(--emas);color:var(--hitam);border:none;border-radius:10px;padding:14px;font-weight:900;font-size:1em;cursor:pointer;margin-top:5px;}
.btn:disabled{background:#555;color:#aaa;}
.grid{display:grid;grid-template-columns:1fr;gap:15px;}
.card img{width:100%;height:180px;object-fit:cover;background:#333;border-radius:8px;margin-bottom:10px;}
.card .judul{font-weight:900;font-size:1.1em;color:var(--emas);}
.card .agen{font-size:0.8em;color:#aaa;}
.card .harga{font-weight:900;font-size:1.2em;color:var(--emas);margin:8px 0;}
.footer{position:fixed;bottom:0;width:100%;padding:15px;background:var(--biru);border-top:3px solid var(--emas);text-align:center;font-size:0.9em;color:#aaa;box-sizing:border-box;}
</style>
</head>
<body>
<header class="header">
  <a href="menu.html" class="back">←</a>
  <div class="logo">6. Tour n Travel</div>
  <div style="width:2em"></div>
</header>

<main class="main">
  <div class="tabs">
    <div class="tab active" onclick="openTab('paket')">✈️ Paket Wisata</div>
    <div class="tab" onclick="openTab('agen')">🏢 Daftar Agen</div>
  </div>

  <!-- TAB 1: PAKET WISATA MERCHANT -->
  <div id="paket" class="tab-content active">
    <div class="form-box" id="formMerchant" style="display:none;">
      <h3>Post Paket Baru - 2 Pi</h3>
      <input type="text" id="namaPaket" placeholder="Nama Paket Wisata">
      <select id="kategori"><option>Bali</option><option>Lombok</option><option>Umroh</option><option>Hotel</option></select>
      <input type="number" id="hargaPaket" placeholder="Harga dalam Pi">
      <input type="url" id="gambarPaket" placeholder="Link Gambar">
      <button class="btn" id="postPaketBtn">Bayar 2 Pi & Post</button>
    </div>
    
    <div class="grid" id="paketGrid">
      <div class="card">
        <img src="https://placehold.co/600x400/DAA520/000?text=BALI">
        <div class="judul">Paket Bali 3H2M</div>
        <div class="agen">Agen: @BaliTour | Merchant Terverifikasi</div>
        <div class="harga">25.00 Pi</div>
        <button class="btn btn-beli-paket" data-nama="Paket Bali 3H2M" data-harga="25">Booking Sekarang</button>
      </div>
    </div>
  </div>

  <!-- TAB 2: DAFTAR JADI AGEN -->
  <div id="agen" class="tab-content">
    <div class="form-box">
      <h3>Daftar Jadi Agen/Merchant - 10 Pi</h3>
      <p style="font-size:0.85em;color:#aaa;text-align:center;margin-top:-10px;margin-bottom:15px;">Bayar 1x, bisa post paket seumur hidup. Dapat badge Merchant Terverifikasi.</p>
      <input type="text" id="namaAgen" placeholder="Nama Agen/Toko">
      <input type="text" id="waAgen" placeholder="No WhatsApp 62xxx">
      <textarea id="alamatAgen" placeholder="Alamat Kantor" rows="2"></textarea>
      <button class="btn" id="daftarAgenBtn">Bayar 10 Pi & Daftar</button>
    </div>
  </div>
</main>

<footer class="footer">
  My Track V=43 © 2026 | Khusus Agen & Merchant
</footer>

<script src="menu.js"></script>
<script>
Pi.init({ version: "2.0", sandbox: false }); // GANTI TRUE BUAT TEST

let username = 'Tamu';
let isAgen = localStorage.getItem('is_agen') === 'true'; // V=44 CEK DARI DB
let userData = localStorage.getItem('pi_user');
if(userData){ username = JSON.parse(userData).username; } 

if(isAgen){ document.getElementById('formMerchant').style.display = 'block'; }

function openTab(tabName){
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(tabName).classList.add('active');
  event.currentTarget.classList.add('active');
}

// 1. DAFTAR AGEN 10 PI
document.getElementById('daftarAgenBtn').onclick = async () => {
  let nama = document.getElementById('namaAgen').value.trim();
  let wa = document.getElementById('waAgen').value.trim();
  if(!nama || !wa){ alert('Isi semua data agen dulu'); return; }
  let btn = document.getElementById('daftarAgenBtn');
  btn.disabled = true; btn.textContent = 'Bayar 10 Pi...';
  Pi.createPayment({amount:10,memo:`Daftar Agen: ${nama}`,metadata:{type:'agen_register',nama,wa,user:username}},
  {onReadyForServerCompletion:(p,t)=>{alert(`SELAMAT 🔥\n@${username} Sekarang Agen Terverifikasi`);localStorage.setItem('is_agen','true');location.reload();},
   onCancel:()=>{btn.disabled=false;btn.textContent='Bayar 10 Pi & Daftar';},
   onError:(e)=>{alert(e);btn.disabled=false;btn.textContent='Bayar 10 Pi & Daftar';}});
};

// 2. POST PAKET BARU 2 PI KHUS AGEN
document.getElementById('postPaketBtn').onclick = async () => {
  if(!isAgen){ alert('Daftar jadi Agen dulu bang'); return; }
  let nama = document.getElementById('namaPaket').value.trim();
  let harga = parseFloat(document.getElementById('hargaPaket').value);
  if(!nama || !harga){ alert('Isi nama & harga paket'); return; }
  let btn = document.getElementById('postPaketBtn');
  btn.disabled = true; btn.textContent = 'Bayar 2 Pi...';
  Pi.createPayment({amount:2,memo:`Post Paket: ${nama}`,metadata:{type:'paket_post',nama,harga,user:username}},
  {onReadyForServerCompletion:(p,t)=>{alert(`PAKET TAYANG 🔥`);location.reload();},
   onCancel:()=>{btn.disabled=false;btn.textContent='Bayar 2 Pi & Post';},
   onError:(e)=>{alert(e);btn.disabled=false;btn.textContent='Bayar 2 Pi & Post';}});
};

// 3. BOOKING PAKET
document.querySelectorAll('.btn-beli-paket').forEach(btn => {
  if(!userData) btn.disabled = true;
  btn.onclick = async (e) => {
    let nama = e.target.dataset.nama; let harga = parseFloat(e.target.dataset.harga);
    btn.disabled = true; btn.textContent = 'Booking...';
    Pi.createPayment({amount:harga,memo:`Booking: ${nama}`,metadata:{type:'paket_booking',nama,user:username}},
    {onReadyForServerCompletion:(p,t)=>{alert(`BOOKING SUKSES 🔥\n${nama}\nAdmin Agen akan WA lu`);btn.textContent='Booking Sekarang';btn.disabled=false;},
     onCancel:()=>{btn.textContent='Booking Sekarang';btn.disabled=false;},
     onError:(e)=>{alert(e);btn.textContent='Booking Sekarang';btn.disabled=false;}});
  };
});
</script>
</body>
          </html>
