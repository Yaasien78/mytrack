<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Tracker</title>
<script src="https://sdk.minepi.com/pi-sdk.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:Arial, sans-serif; }
body { background: #ffffff; height:100vh; display:flex; flex-direction:column; color:#000; } /* LATAR PUTIH */

/* HEADER BIRU */
.header {
  background: #0057d9;
  padding: 12px 15px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 2px solid #ffcc00;
}
.header h1 { font-size: 20px; color: white; font-weight: bold; }
.upload-btn { font-size: 22px; color: white; background: none; border: none; cursor: pointer; }

/* CHAT AREA PUTIH */
.chat-box {
  flex: 1;
  padding: 15px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 10px;
  border: 2px solid #ffcc00; /* BORDER GOLD */
  margin: 10px;
  border-radius: 15px;
  background: #ffffff; /* BOX PUTIH */
}
.message { max-width: 75%; padding: 10px 14px; border-radius: 18px; font-size: 15px; line-height: 1.4; }
.ai-msg { background: #0057d9; color: white; align-self: flex-start; border-bottom-left-radius: 4px; } /* BIRU */
.user-msg { background: #ffcc00; color: #000; align-self: flex-end; border-bottom-right-radius: 4px; font-weight: bold; } /* KUNING */

/* INPUT AREA 1/4 LAYAR PUTIH */
.input-area {
  height: 25vh; /* 1/4 LAYAR */
  background: #ffffff; /* PUTIH */
  border-top: 2px solid #0057d9;
  padding: 10px;
  display: flex;
  align-items: flex-end;
  gap: 8px;
}
.input-area textarea {
  flex: 1; height: 90%; background: #f1f1f1; /* ABU MUDA */
  border: 2px solid #0057d9; /* BORDER BIRU 2PX */
  border-radius: 15px; padding: 12px; color: #000; font-size: 16px; resize: none; outline: none;
}
.input-area textarea::placeholder { color: #777; }
.send-btn {
  width: 50px; height: 50px; border-radius: 50%; background: #0057d9; /* BIRU */
  border: none; color: white; font-size: 24px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; margin-bottom: 8px;
}
</style>
</head>
<body>

<div class="header">
  <h1>AI Tracker</h1>
  <button class="upload-btn" onclick="alert('Fitur upload coming soon')">📎</button>
</div>

<div class="chat-box" id="chatBox">
  <div class="message ai-msg">Hai Pioneer! Ada yang bisa saya bantu hari ini?</div>
</div>

<div class="input-area">
  <textarea id="userInput" placeholder="Tanya AI Tracker..."></textarea>
  <button class="send-btn" onclick="sendMessage()">✈️</button>
</div>

<script>
function sendMessage(){
  const input = document.getElementById('userInput');
  const chatBox = document.getElementById('chatBox');
  const text = input.value.trim();
  if(text === '') return;
  const userMsg = document.createElement('div');
  userMsg.className = 'message user-msg';
  userMsg.innerText = text;
  chatBox.appendChild(userMsg);
  setTimeout(()=>{
    const aiMsg = document.createElement('div');
    aiMsg.className = 'message ai-msg';
    aiMsg.innerText = "Oke " + text + ". AI Tracker masih belajar ya bro 😅";
    chatBox.appendChild(aiMsg);
    chatBox.scrollTop = chatBox.scrollHeight;
  }, 500);
  input.value = '';
  chatBox.scrollTop = chatBox.scrollHeight;
}
document.getElementById('userInput').addEventListener('keypress', function(e){
  if(e.key === 'Enter' && !e.shiftKey){ e.preventDefault(); sendMessage(); }
});
</script>

</body>
</html>
