<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Tracker Pioneer</title>
<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#fff;
  padding-bottom:90px; /* BIAR CHAT GA KETUTUP FOOTER */
}

header{
  background:#0057FF;
  color:#fff;
  padding:12px;
  font-size:20px;
  font-weight:bold;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:2px solid #FFD700; /* GARIS EMAS HEADER */
}

#uploadBtn{font-size:18px;cursor:pointer;color:#fff;}

#chatBox{
  height:calc(100vh - 180px); /* HITUNG TINGGI BIAR PAS */
  overflow-y:auto;
  padding:15px;
  border:none;
  background:transparent;
}

.bot{
  color:#0057FF;
  border:2px solid #FFD700; /* BORDER EMAS CHAT AI */
  border-radius:20px;
  padding:12px;
  margin:10px 0;
  max-width:80%;
  background:#fff;
}

.user{
  color:#000;
  padding:12px;
  margin:10px 0;
  margin-left:auto;
  max-width:80%;
  text-align:right;
}

/* FOOTER LURUS + GARIS EMAS 2PX */
#inputArea{
  display:flex;
  padding:10px 15px;
  gap:10px;
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#fff;
  border-top:2px solid #FFD700; /* INI GARIS EMAS 2PX */
  align-items:center;
}

#btnCol{
  display:flex;
  flex-direction:column;
  gap:8px;
}

#btnCol button{
  width:50px;
  height:50px;
  border:none;
  border-radius:50%;
  font-size:24px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
}

#sendBtn{background:#0057FF;} /* PESAWAT BIRU */
#mic{background:#FF0000;} /* MIC MERAH */

#q{
  flex:1;
  padding:12px;
  border:2px solid #0057FF; /* BORDER BIRU INPUT */
  border-radius:15px;
  font-size:16px;
  height:70px;
  resize:none;
  background:#fff;
  color:#000;
}
#fileInput{display:none;}
</style>
</head>
<body>

<header>
  AI Tracker
  <label for="fileInput" id="uploadBtn">📎</label>
  <input type="file" id="fileInput">
</header>

<div id="chatBox">
  <div class="bot">Hai Pioneer! Ada yang bisa saya bantu hari ini?</div>
</div>

<div id="inputArea">
  <div id="btnCol">
    <button id="sendBtn" onclick="jawab()">✈️</button>
    <button id="mic">🎤</button>
  </div>
  <textarea id="q" placeholder="Tanya AI Tracker..."></textarea>
</div>

  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
<script>
const chatBox = document.getElementById('chatBox');
const input = document.getElementById('q');
let hargaTerbaru = {usd: "...", idr: "..."};

// BIKIN BISA BUAT UMUM
const username = localStorage.getItem("piUsername") || "Pioneer";
chatBox.innerHTML = `<div class="bot">Hai ${username} 👋 Ada yang bisa saya bantu?</div>`
chatBox.innerHTML = `<div class="bot">Hai ${username} 👋 Ada yang bisa saya bantu?</div>`

// 1. UPDATE HARGA
async function updateHarga() {
  try {
    let res = await fetch("https://api.coingecko.com/api/v3/simple/price?ids=pi-network&vs_currencies=usd,idr");
    let data = await res.json();
    hargaTerbaru.usd = data["pi-network"].usd;
    hargaTerbaru.idr = data["pi-network"].idr.toLocaleString("id-ID");
  } catch(e) {}
}
updateHarga();
setInterval(updateHarga, 10000);

// 2. FUNGSI TAMBAH CHAT - INI YANG KURANG
function tambahChat(role, teks){
  if(role === "user"){
    chatBox.innerHTML += `<div class="user">${teks}</div>`;
  } else {
    chatBox.innerHTML += `<div class="bot">${teks}</div>`;
  }
}

// 3. FUNGSI LAMA: AI NGOMONG LANGSUNG
function ngomong(teks) {
    const ucapan = new SpeechSynthesisUtterance(teks);
    ucapan.lang = "id-ID";
    speechSynthesis.speak(ucapan);
  }

// 4. FUNGSI KIRIM - INI YG BIKIN TOMBOL ✈️ HIDUP
async function jawab(){
  let q = input.value;
  if(q.trim()==="") return;
  
  tambahChat("user", q); // Pake fungsi baru
  input.value = "";
  chatBox.scrollTop = chatBox.scrollHeight;

  if(q.toLowerCase().includes("harga") && q.toLowerCase().includes("pi")) {
    let jawaban = `Harga Pi Network saat ini: \nUSD: $${hargaTerbaru.usd} \nRp: Rp${hargaTerbaru.idr}`;
tambahChat("ai", jawaban); // hapus aiJawab
//ngomong(jawaban);          // balikin ngomong
    chatBox.scrollTop = chatBox.scrollHeight;
    return;
  }

  tambahChat("bot", "AI Tracker lagi mikir...");
  chatBox.scrollTop = chatBox.scrollHeight;

  try {
    const res = await fetch("/api/chat", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({message: q}) });
    const data = await res.json();
    
    document.querySelector(".bot:last-child").remove(); // hapus "lagi mikir"
    if(data.error) throw new Error(data.error);

    let jawaban = data.reply;
tambahChat("ai", jawaban); // hapus aiJawab
//ngomong(jawaban);          // balikin ngomong
    chatBox.scrollTop = chatBox.scrollHeight;

  } catch(e) {
    document.querySelector(".bot:last-child").remove();
    tambahChat("bot", `Gagal jawab bro. Cek /api/chat. Error: ${e.message}`);
  }
} 
  
const btnMic = document.getElementById("micBtn");
const inputUser = document.getElementById("userInput");

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

if (SpeechRecognition) {
    const recognition = new SpeechRecognition();
    recognition.lang = "id-ID";
    recognition.interimResults = false;

    btnMic.onclick = () => {
        recognition.start();
        btnMic.style.background = "orange";
    }

    recognition.onresult = (event) => {
        const suara = event.results[0][0].transcript;
        inputUser.value = suara;
        btnMic.style.background = "red";
        jawab(); // langsung kirim
    }

    recognition.onerror = () => {
        btnMic.style.background = "red";
    }
    
    recognition.onend = () => {
        btnMic.style.background = "red";
    }

} else {
    btnMic.style.display = "none"; // kalau ga support sembunyiin aja
  }
    </script>
</body>
</html>
