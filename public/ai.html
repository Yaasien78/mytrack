<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Tracker Pioneer</title>
<style>
body{margin:0;font-family:sans-serif;background:#fff;}
header{background:#0057FF;color:#fff;padding:15px;font-size:20px;font-weight:bold;display:flex;justify-content:space-between;align-items:center;}

#uploadBtn{font-size:24px;cursor:pointer;} /* TOMBOL UPLOAD */

#chatBox{
  height:55vh; /* DIKECILIN BIAR GA KETUTUP */
  overflow-y:auto;
  padding:15px;
  border:2px solid #FFD700; /* BORDER GOLD 2PX */
  margin:15px;
  border-radius:20px;
  background:#fff;
}

.bot{
  color:#0057FF; /* TULISAN BIRU */
  border:2px solid #FFD700; /* BOX BORDER GOLD */
  padding:12px;
  border-radius:15px;
  margin:10px 0;
  max-width:80%;
  background:transparent;
}

.user{
  color:#000; /* TULISAN HITAM */
  padding:12px;
  border-radius:15px;
  margin:10px 0;
  margin-left:auto;
  max-width:80%;
  text-align:right;
  background:transparent;
}

#inputArea{display:flex;padding:15px;gap:10px;position:fixed;bottom:0;left:0;right:0;background:#fff;} /* FIXED DI BAWAH */
#q{flex:1;padding:12px;border:2px solid #0057FF;border-radius:15px;font-size:16px;}
button{padding:12px;border:none;border-radius:50%;background:#0057FF;color:#fff;font-size:20px;cursor:pointer;width:50px;height:50px;flex-shrink:0;}
#mic{background:#FF0000;}
#fileInput{display:none;} /* INPUT FILE DISEMBUNYIKAN */
</style>
</head>
<body>

<header>
  AI Tracker
  <label for="fileInput" id="uploadBtn">📎</label> <!-- TOMBOL UPLOAD DI ATAS KANAN -->
  <input type="file" id="fileInput">
</header>

<div id="chatBox">
  <div class="bot">Hai Pioneer! Ada yang bisa saya bantu hari ini?</div>
</div>

<div id="inputArea">
  <button id="mic">🎤</button>
  <input id="q" placeholder="Tanya AI Tracker...">
  <button onclick="jawab()">✈️</button>
</div>

<script>
const chatBox = document.getElementById('chatBox');
const input = document.getElementById('q');

const jawabanAI = {
  "gcv":"GCV adalah Global Consensus Value. Nilai yang kita perjuangkan 1 Pi = 314159 USD",
  "314159":"Itu adalah harga GCV yang kita perjuangkan bersama Pioneer!",
  "petir":"Ingat klik petir setiap 24 jam sekali biar mining tidak berhenti ya",
  "mainnet":"Mainnet Terbuka adalah saat Pi bisa ditukar dan digunakan di ekosistem",
  "yaasien":"Kode referral kamu YAASIEN. Ajak teman biar mining makin cepat",
  "default":"Maaf AI masih belajar. Coba tanya: GCV, Petir, Mainnet, atau Kode Reff"
}

function ngomong(teks){
  const ucapan = new SpeechSynthesisUtterance(teks);
  ucapan.lang = 'id-ID';
  speechSynthesis.speak(ucapan);
}

function jawab(){
  let q = input.value;
  if(q.trim() === "") return;
  chatBox.innerHTML += `<div class="user">${q}</div>`;
  let qLower = q.toLowerCase();
  let jawaban = jawabanAI.default;
  for(let key in jawabanAI){
    if(qLower.includes(key)){ jawaban = jawabanAI[key]; break; }
  }
  setTimeout(()=>{
    chatBox.innerHTML += `<div class="bot">${jawaban}</div>`;
    ngomong(jawaban);
    chatBox.scrollTop = chatBox.scrollHeight;
  }, 500);
  input.value = "";
  chatBox.scrollTop = chatBox.scrollHeight;
}

// FITUR UPLOAD FILE
document.getElementById('fileInput').onchange = function(e){
  let file = e.target.files[0];
  if(file){
    chatBox.innerHTML += `<div class="user">📎 Mengirim file: ${file.name}</div>`;
    chatBox.innerHTML += `<div class="bot">File ${file.name} diterima. AI masih belajar baca file ya Pioneer</div>`;
  }
}

// FITUR MIC
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const recognition = new SpeechRecognition();
recognition.lang = 'id-ID';
document.getElementById('mic').onclick = function(){
  recognition.start();
  this.style.background = "#00FF00";
}
recognition.onresult = function(event){
  let ucapan = event.results[0][0].transcript;
  input.value = ucapan;
  document.getElementById('mic').style.background = "#FF0000";
  jawab();
}
recognition.onend = function(){
  document.getElementById('mic').style.background = "#FF0000";
}

input.addEventListener("keypress", function(e){
  if(e.key === "Enter") jawab();
});
</script>
</body></html>
