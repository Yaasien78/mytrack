<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Tracker Pioneer</title>
<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#fff;
  padding-bottom:90px; /* BIAR CHAT GA KETUTUP FOOTER */
}

header{
  background:#0057FF;
  color:#fff;
  padding:12px;
  font-size:20px;
  font-weight:bold;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:2px solid #FFD700; /* GARIS EMAS HEADER */
}

#uploadBtn{font-size:18px;cursor:pointer;color:#fff;}

#chatBox{
  height:calc(100vh - 180px); /* HITUNG TINGGI BIAR PAS */
  overflow-y:auto;
  padding:15px;
  border:none;
  background:transparent;
}

.bot{
  color:#0057FF;
  border:2px solid #FFD700; /* BORDER EMAS CHAT AI */
  border-radius:20px;
  padding:12px;
  margin:10px 0;
  max-width:80%;
  background:#fff;
}

.user{
  color:#000;
  padding:12px;
  margin:10px 0;
  margin-left:auto;
  max-width:80%;
  text-align:right;
}

/* FOOTER LURUS + GARIS EMAS 2PX */
#inputArea{
  display:flex;
  padding:10px 15px;
  gap:10px;
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#fff;
  border-top:2px solid #FFD700; /* INI GARIS EMAS 2PX */
  align-items:center;
}

#btnCol{
  display:flex;
  flex-direction:column;
  gap:8px;
}

#btnCol button{
  width:50px;
  height:50px;
  border:none;
  border-radius:50%;
  font-size:24px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
}

#sendBtn{background:#0057FF;} /* PESAWAT BIRU */
#mic{background:#FF0000;} /* MIC MERAH */

#q{
  flex:1;
  padding:12px;
  border:2px solid #0057FF; /* BORDER BIRU INPUT */
  border-radius:15px;
  font-size:16px;
  height:70px;
  resize:none;
  background:#fff;
  color:#000;
}
#fileInput{display:none;}
</style>
</head>
<body>

<header>
  AI Tracker
  <label for="fileInput" id="uploadBtn">📎</label>
  <input type="file" id="fileInput">
</header>

<div id="chatBox">
  <div class="bot">Hai Pioneer! Ada yang bisa saya bantu hari ini?</div>
</div>

<div id="inputArea">
  <div id="btnCol">
    <button id="sendBtn" onclick="jawab()">✈️</button>
    <button id="mic">🎤</button>
  </div>
  <textarea id="q" placeholder="Tanya AI Tracker..."></textarea>
</div>
<script src="https://sdk.minepi.com/pi-sdk.js"></script>
<script>
const chatBox = document.getElementById('chatBox');
const input = document.getElementById('q');
let hargaTerbaru = {usd: "...", idr: "..."};

// 1. UPDATE HARGA
async function updateHarga() {
  try {
    let res = await fetch("https://api.coingecko.com/api/v3/simple/price?ids=pi-network&vs_currencies=usd,idr");
    let data = await res.json();
    hargaTerbaru.usd = data["pi-network"].usd;
    hargaTerbaru.idr = data["pi-network"].idr.toLocaleString("id-ID");
  } catch(e) {}
}
updateHarga();
setInterval(updateHarga, 10000);

// 2. LOGIN PI - DIAMANKAN
try{
  Pi.init({ version: "2.0", sandbox: false });
  Pi.authenticate(['username'], {onIncompletePayment: ()=>{}});
}catch(e){ console.log("Buka di Pi Browser buat login") }

// 3. FUNGSI NGOMONG
function ngomong(teks){
  const ucapan = new SpeechSynthesisUtterance(teks);
  ucapan.lang = 'id-ID';
  speechSynthesis.speak(ucapan);
}

// 4. FUNGSI KIRIM PESAN
async function jawab(){
  let q = input.value;
  if(q.trim()==="") return;
  chatBox.innerHTML += `<div class="user">${q}</div>`;
  input.value = "";
  chatBox.scrollTop = chatBox.scrollHeight;

  if(q.toLowerCase().includes("harga") && q.toLowerCase().includes("pi")) {
    let jawaban = `Harga Pi Network saat ini:\nPi = $${hargaTerbaru.usd}\nRp${hargaTerbaru.idr}`;
    chatBox.innerHTML += `<div class="bot">${jawaban.replace(/\n/g,"<br>")}</div>`;
    ngomong(jawaban); return;
  }

  chatBox.innerHTML += `<div class="bot" id="loading">AI Tracker lagi mikir...</div>`;
  try{
    const res = await fetch("/api/chat", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ message: q })});
    const data = await res.json();
    document.getElementById("loading").remove();
    let jawaban = data.choices[0].message.content;
    chatBox.innerHTML += `<div class="bot">${jawaban}</div>`;
    ngomong(jawaban);
  } catch(e) {
    document.getElementById("loading").remove();
    chatBox.innerHTML += `<div class="bot">Gagal jawab bro. Error: ${e.message}</div>`;
  }
}

// 5. FUNGSI MIC
if(window.SpeechRecognition || window.webkitSpeechRecognition){
  const btnMic = document.getElementById("mic");
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  const recognition = new SpeechRecognition();
  recognition.lang = 'id-ID';

  btnMic.onclick = () => { recognition.start(); btnMic.style.background = "lime"; }
  recognition.onresult = (event) => { input.value = event.results[0][0].transcript; jawab(); }
  recognition.onend = () => { btnMic.style.background = "#FF0000"; }
  recognition.onerror = () => { btnMic.style.background = "#FF0000"; alert("Mic gagal. Cek izin mikrofon"); }
}else{
  document.getElementById("mic").style.display = "none";
}

// ENTER BUAT KIRIM
input.addEventListener("keypress", e => { if(e.key === "Enter") jawab() })
</script>
</body></html>
