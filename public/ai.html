<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Tracker Pioneer</title>
<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#fff;
  padding-bottom:90px; /* BIAR CHAT GA KETUTUP FOOTER */
}

header{
  background:#0057FF;
  color:#fff;
  padding:12px;
  font-size:20px;
  font-weight:bold;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:2px solid #FFD700; /* GARIS EMAS HEADER */
}

#uploadBtn{font-size:18px;cursor:pointer;color:#fff;}

#chatBox{
  height:calc(100vh - 180px); /* HITUNG TINGGI BIAR PAS */
  overflow-y:auto;
  padding:15px;
  border:none;
  background:transparent;
}

.bot{
  color:#0057FF;
  border:2px solid #FFD700; /* BORDER EMAS CHAT AI */
  border-radius:20px;
  padding:12px;
  margin:10px 0;
  max-width:80%;
  background:#fff;
}

.user{
  color:#000;
  padding:12px;
  margin:10px 0;
  margin-left:auto;
  max-width:80%;
  text-align:right;
}

/* FOOTER LURUS + GARIS EMAS 2PX */
#inputArea{
  display:flex;
  padding:10px 15px;
  gap:10px;
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#fff;
  border-top:2px solid #FFD700; /* INI GARIS EMAS 2PX */
  align-items:center;
}

#btnCol{
  display:flex;
  flex-direction:column;
  gap:8px;
}

#btnCol button{
  width:50px;
  height:50px;
  border:none;
  border-radius:50%;
  font-size:24px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
}

#sendBtn{background:#0057FF;} /* PESAWAT BIRU */
#mic{background:#FF0000;} /* MIC MERAH */

#q{
  flex:1;
  padding:12px;
  border:2px solid #0057FF; /* BORDER BIRU INPUT */
  border-radius:15px;
  font-size:16px;
  height:70px;
  resize:none;
  background:#fff;
  color:#000;
}
#fileInput{display:none;}
</style>
</head>
<body>

<header>
  AI Tracker
  <label for="fileInput" id="uploadBtn">📎</label>
  <input type="file" id="fileInput">
</header>

<div id="chatBox">
  <div class="bot">Hai Pioneer! Ada yang bisa saya bantu hari ini?</div>
</div>

<div id="inputArea">
  <div id="btnCol">
    <button id="sendBtn" onclick="jawab()">✈️</button>
    <button id="mic">🎤</button>
  </div>
  <textarea id="q" placeholder="Tanya AI Tracker..."></textarea>
</div>
  
<script src="https://sdk.minepi.com/pi-sdk.js"></script>
<script>
const chatBox = document.getElementById('chatBox');
const input = document.getElementById('q');
const GROQ_API_KEY = "later"; // KEY KAMU
let currentUser = null;

// LOGIN PI
Pi.init({ version: "2.0", sandbox: false });
Pi.authenticate(['username','payments'], 
function(payment){console.log(payment)}, 
function(auth){
  currentUser=auth.user; 
  chatBox.innerHTML += `<div class="bot">Hai ${auth.user.username} 👋</div>`
})

function ngomong(teks){
  const ucapan = new SpeechSynthesisUtterance(teks);
  ucapan.lang = 'id-ID';
  speechSynthesis.speak(ucapan);
}

async function jawab(){
  let q = input.value;
  if(q.trim()==="") return;
  chatBox.innerHTML += `<div class="user">${q}</div>`;
  input.value = "";
  chatBox.scrollTop = chatBox.scrollHeight;

  try{
    chatBox.innerHTML += `<div class="bot" id="loading">AI Tracker lagi mikir...</div>`;
    
    const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${GROQ_API_KEY}`
      },
      body: JSON.stringify({
        model: "llama-3.1-70b-versatile",
        messages: [
          {role: "system", content: `Kamu adalah AI Tracker untuk Pioneer Pi Network. Sapa user: ${currentUser?.username}. Jawab singkat bahasa Indonesia. Fokus Pi, GCV, Mainnet.`},
          {role: "user", content: q}
        ]
      })
    });
    const data = await res.json();
    document.getElementById("loading").remove();
    
    let answer = data.choices[0].message.content;
    chatBox.innerHTML += `<div class="bot">${answer}</div>`;
    ngomong(answer);
  }catch(err){
    document.getElementById("loading").remove();
    chatBox.innerHTML += `<div class="bot">Server AI error. Coba lagi ya</div>`;
  }
  chatBox.scrollTop = chatBox.scrollHeight;
}

// FILE UPLOAD
document.getElementById('fileInput').onchange = function(e){
  let file = e.target.files[0];
  if(file){
    chatBox.innerHTML += `<div class="user">📎 ${file.name}</div>`;
    chatBox.innerHTML += `<div class="bot">File diterima Pioneer</div>`;
    chatBox.scrollTop = chatBox.scrollHeight;
  }
};

// VOICE MIC
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const recognition = new SpeechRecognition();
recognition.lang = 'id-ID';
document.getElementById('mic').onclick = function(){
  recognition.start();
  this.style.background = "#00FF00";
};
recognition.onresult = function(event){
  input.value = event.results[0][0].transcript;
  document.getElementById('mic').style.background = "#FF0000";
  jawab();
};
recognition.onend = function(){
  document.getElementById('mic').style.background = "#FF0000";
};
  <script>
let hargaTerbaru = {usd: "...", idr: "..."};

// 1. AMBIL HARGA DARI COINGECKO TIAP 10 DETIK
async function updateHarga() {
  try {
    let res = await fetch("https://api.coingecko.com/api/v3/simple/price?ids=pi-network&vs_currencies=usd,idr");
    let data = await res.json();
    hargaTerbaru.usd = data["pi-network"].usd;
    hargaTerbaru.idr = data["pi-network"].idr.toLocaleString("id-ID");
  } catch(e) { console.log("Gagal ambil harga") }
}
updateHarga();
setInterval(updateHarga, 10000);


// 2. FUNGSI KIRIM PESAN + AI JAWAB
function kirimPesan() {
  let input = document.getElementById("inputPesan"); // ganti sesuai id input kamu
  let pesan = input.value;
  if(pesan == "") return;
  
  addChat("Kamu", pesan);
  input.value = "";

  let jawaban = "Aku belum ngerti bro 😅 Coba tanya 'harga pi berapa'";
  
  if(pesan.toLowerCase().includes("harga") && pesan.toLowerCase().includes("pi")) {
    jawaban = `📊 Harga Pi Network saat ini:\n1 Pi = $${hargaTerbaru.usd}\nRp${hargaTerbaru.idr}`;
  }
  if(pesan.toLowerCase().includes("halo")) {
    jawaban = "Halo juga bro! Ada yg bisa aku bantu?";
  }

  setTimeout(() => addChat("AI MyTrack", jawaban), 600);
}

// 3. FUNGSI TAMPILIN CHAT
function addChat(nama, teks) {
  let chatBox = document.getElementById("chatBox"); // ganti sesuai id chat kamu
  chatBox.innerHTML += `<div><b>${nama}:</b> ${teks.replace(/\n/g,"<br>")}</div><br>`;
  chatBox.scrollTop = chatBox.scrollHeight;
}

// Enter buat kirim
document.getElementById("inputPesan").addEventListener("keypress", function(e){
  if(e.key === "Enter") kirimPesan();
})

</script> 
</body></html>
