<!DOCTYPE html>
<html>
<head>
  <title>NFT Social</title>
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>
<body>
  <h1>Pi App is running</h1>
  <p id="status">Click button to sign in</p>
  <button id="loginBtn" style="padding:10px 20px; font-size:16px;">Sign in with Pi</button>

  <script>
  Pi.init({ version: "2.0", sandbox: true });

document.getElementById("loginBtn").onclick = function() {
  Pi.authenticate(['username'], function(auth) {}, function(err){
    alert("Pi Login Error: " + JSON.stringify(err));
    document.getElementById("status").innerText = "Error: " + err;
  })
  .then(function(auth) {
    return fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        accessToken: auth.accessToken,
        username: auth.user.username,
        uid: auth.user.uid
      })
    })
  })
  .then(res => res.json())
  .then(data => {
    document.getElementById("status").innerText = "Signed in as " + data.user.username;
    document.getElementById("loginBtn").style.display = "none";
  })
  .catch(function(error) {
    document.getElementById("status").innerText = "Error: " + error;
  });
};
    };
  </script>
</body>
</html>
