<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login My Track</title>
<script src="https://sdk.minepi.com/pi-sdk.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0A0082] flex items-center justify-center h-screen">
  <div class="text-center">
    <h1 class="text-3xl font-bold text-yellow-400 mb-6">My Track Pi/USD</h1>
    <button id="btnLogin" class="bg-yellow-400 text-black font-bold text-xl p-4 rounded-2xl active:scale-95">
      Login with Pi
    </button>
  </div>
<script>
Pi.init({ version: "2.0", sandbox: true });
const btnLogin = document.getElementById('btnLogin');

btnLogin.onclick = async () => {
  try{
    btnLogin.innerText = 'Login...';
    const auth = await Pi.authenticate({ scopes: ['username', 'payments'] });
    localStorage.setItem('pi_username', auth.user.username); // SIMPAN BUAT HALAMAN LAIN
    window.location.href = '/dashboard.html'; // LEMPAR KE DASHBOARD GRATIS
  }catch(e){
    btnLogin.innerText = 'Login Gagal, Coba Lagi';
    alert('Login Gagal: '+e.message);
  }
}
</script>
</body>
</html>
