<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Track</title>
<script src="https://sdk.minepi.com/pi-sdk.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }
html, body { height: 100%; background:#000; overflow:hidden; }
.app { display: flex; flex-direction: column; height: 100vh; position:relative; z-index:10; }
#space{position:fixed; top:0; left:0; width:100%; height:100%; z-index:1; cursor:pointer;}

header {
  background: #0057d9; border-bottom: 2px solid #ffcc00;
  color: white; padding: 6px 15px; display: flex;
  justify-content: space-between; align-items: center;
}
.logo {
  width: 45px; height: 45px; border-radius: 50%;
  border: 2px solid #ffcc00; background: #0057d9;
  display: flex; align-items: center; justify-content: center;
  font-weight: bold; font-size: 10px; color: white;
  text-align: center; line-height: 1.1; text-decoration: none;
}
.harga { text-align: center; font-weight: bold; font-size: 14px; line-height: 1.4; }
.pi-logo {
  width: 45px; height: 45px; border-radius: 50%;
  border: 2px solid #ffcc00; background: #0057d9;
  font-weight: bold; font-size: 22px; color: white;
  display: flex; align-items: center; justify-content: center;
  text-decoration: none; line-height: 1;
}

footer {
  background: #0057d9; border-top: 2px solid #ffcc00;
  padding: 6px 15px; display: flex;
  justify-content: space-between; align-items: center;
  margin-top:auto;
}
.footer-left {
  width: 45px; height: 45px; border-radius: 50%;
  border: 2px solid #0057d9; background: white;
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; text-decoration: none;
}
.login-btn {
  background: #0057d9; color: white; border: none;
  padding: 10px 24px; border-radius: 22px;
  font-weight: bold; font-size: 18px; cursor: pointer;
}
.footer-right {
  width: 45px; height: 45px; border-radius: 50%;
  border: 2px solid #0057d9; background: white;
  display: flex; align-items: center; justify-content: center;
  font-size: 28px; color: #0057d9; font-weight: bold;
  text-decoration: none;
}
</style>
</head>
<body>
<canvas id="space"></canvas>

<div class="app">
  <header>
    <a href="upload.html" class="logo">My<br>Track</a>
    <div class="harga">1 Pi = $0.112869 <br>Rp2,032.77</div>
    <a href="market.html" class="pi-logo">π</a>
  </header>
  <footer>
    <a href="avatar.html" class="footer-left">🎨</a>
    <button class="login-btn" onclick="login()">Login</button>
    <a href="ai.html" class="footer-right">+</a>
  </footer>
</div>

<script>
Pi.init({ version: "2.0", sandbox: true });
function login() {
  Pi.authenticate('username')
  .then(function(auth) {
    const btn = document.querySelector('.login-btn');
    btn.innerText = 'Hi ' + auth.user.username;
  })
  .catch(function(error) { alert("Login gagal: " + error); });
}

// SCRIPT HYPERSPACE V3
const canvas = document.getElementById('space');
const ctx = canvas.getContext('2d');
let w = canvas.width = window.innerWidth;
let h = canvas.height = window.innerHeight;
let cx = w/2; // titik tengah
let cy = h/2;
let audioOn = false;
const clickSound = new Audio("https://cdn.pixabay.com/audio/2022/03/24/audio_d1714d0c0b.mp3");
clickSound.volume = 0.6;

let stars = [];
let ripples = [];
let colors = ['#ffcc00','#00ccff','#ff00ff','#00ff88','#ff4444','#ffffff'];

// BUAT 400 BINTANG DARI TITIK TENGAH
for(let i=0; i<400; i++){
  stars.push({
    x: cx + (Math.random()-0.5)*20,
    y: cy + (Math.random()-0.5)*20,
    z: Math.random()*w, // kedalaman
    pz: 0 // posisi z sebelumnya buat bikin ekor
  })
}

function animate(){
  ctx.fillStyle = 'rgba(0,0,0,0.2)'; // efek blur biar ada trail
  ctx.fillRect(0,0,w,h);
  
  // GAMBAR BINTANG MAJU
  stars.forEach(s=>{ 
    s.z -= 8; // kecepatan maju
    if(s.z <= 0){
      s.z = w;
      s.x = cx + (Math.random()-0.5)*20;
      s.y = cy + (Math.random()-0.5)*20;
      s.pz = w;
    }
    
    let x = (s.x - cx) * (w / s.z) + cx;
    let y = (s.y - cy) * (w / s.z) + cy;
    let px = (s.x - cx) * (w / s.pz) + cx;
    let py = (s.y - cy) * (w / s.pz) + cy;
    
    let size = (1 - s.z/w) * 4; // makin dekat makin gede
    
    // Gambar ekor
    ctx.strokeStyle = 'white';
    ctx.lineWidth = size;
    ctx.beginPath();
    ctx.moveTo(px, py);
    ctx.lineTo(x, y);
    ctx.stroke();
    
    // Gambar bintang
    ctx.fillStyle = 'white';
    ctx.beginPath();
    ctx.arc(x, y, size, 0, Math.PI*2);
    ctx.fill();
    
    s.pz = s.z;
  });
  
  // GAMBAR RIPPLE KLIK
  ripples.forEach((r,i)=>{ 
    r.radius += 15; // membesar cepat
    r.alpha -= 0.04; 
    ctx.strokeStyle = `rgba(${r.r},${r.g},${r.b},${r.alpha})`; 
    ctx.lineWidth = 5; 
    ctx.beginPath(); 
    ctx.arc(r.x, r.y, r.radius, 0, Math.PI*2); 
    ctx.stroke(); 
    
    // BIAS CAHAYA
    ctx.strokeStyle = `rgba(${r.r},${r.g},${r.b},${r.alpha*0.5})`;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(r.x, r.y, r.radius*1.5, 0, Math.PI*2);
    ctx.stroke();
    
    if(r.alpha <= 0) ripples.splice(i,1); 
  });
  
  requestAnimationFrame(animate);
}
animate();

canvas.addEventListener('click', (e)=>{
  if(!audioOn){ clickSound.play().catch(()=>{}); audioOn=true; } 
  else{ clickSound.currentTime = 0; clickSound.play(); }
  
  let color = colors[Math.floor(Math.random()*colors.length)];
  let rgb = {r:parseInt(color.slice(1,3),16), g:parseInt(color.slice(3,5),16), b:parseInt(color.slice(5,7),16)};
  ripples.push({x:e.clientX, y:e.clientY, radius:0, alpha:1, r:rgb.r, g:rgb.g, b:rgb.b});
});

window.addEventListener('resize', ()=>{ 
  w = canvas.width = window.innerWidth; 
  h = canvas.height = window.innerHeight;
  cx = w/2; cy = h/2;
});
</script>
</body>
</html>
