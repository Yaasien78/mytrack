<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Track</title>
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { background-color: #ffffff; } /* BODY PUTIH SESUAI MINTA */
 .border-gold-2 { border: 2px solid #fbbf24; } /* GARIS EMAS 2PX */
 .bg-dongker { background-color: #0f1a2e; }
 .bg-ungu { background-color: #6d28d9; } /* CUMA KOTAK AJA UNGU */
  </style>
</head>
<body class="font-sans">

  <!-- WRAPPER PUTIH + PADDING BAWAH BIAR GAK KETUTUP FOOT -->
  <div class="w-full min-h-screen flex-col bg-white overflow-y-auto pb-24">

    <!-- HEAD BIRU DONGKER -->
    <header class="bg-dongker p-3 border-b-2 border-yellow-400 flex items-center justify-between sticky top-0 z-10">
      <button id="btnMenu" class="text-3xl text-yellow-400 active:scale-90">≡</button>
      <h1 class="text-2xl font-extrabold text-white tracking-wide">My Track</h1>
      <img src="https://minepi.com/favicon.ico" alt="Pi" class="w-8 h-8 rounded-full border-2 border-yellow-400">
    </header>

    <main class="p-3 flex-1 flex-col gap-3">
      <!-- KOTAK UNGU DOANG -->
      <div class="bg-ungu border-gold-2 rounded-2xl p-3 text-center">
        <h2 class="text-lg text-white">Harga Pi/USD Live</h2>
        <p id="hargaUSD" class="text-5xl font-extrabold text-yellow-400 my-1">$0.0000</p>
        <p id="hargaIDR" class="text-xl text-yellow-400">Harga /pi = Rp 0</p>
        <p id="persen" class="text-2xl font-bold">0.00%</p>
        <p class="text-xs text-purple-200 mt-1">Kurs: 1 USD = Rp 17934.50 | Update <span id="jam"></span></p>
      </div>

      <!-- KOTAK CHART UNGU DOANG -->
      <div class="bg-ungu border-gold-2 rounded-2xl p-2 h-64">
        <canvas id="priceChart"></canvas>
      </div>
    </main>

    <!-- FOOT FIXED BAWAH -->
    <footer class="bg-dongker p-3 border-t-2 border-yellow-400 text-center fixed bottom-0 w-full left-0">
      <button id="btnLogin" class="text-xl font-bold text-yellow-400 active:scale-95 w-full">Loading...</button>
    </footer>

  </div>

  <script>
    let chart;
    let dataPoints = [];

    // MENU & LOGIN HIDUP
    document.getElementById('btnMenu').onclick = () => alert('Menu dibuka bro ≡');
    document.getElementById('btnLogin').onclick = () => {
      if(document.getElementById('btnLogin').innerText.includes('Welcome')){
        alert('Peringatan: Anda sudah login otomatis di Pi Browser ✅');
      } else {
        alert('Silahkan buka dari Pi Browser untuk Login Otomatis ⚠️');
      }
    }

    // AUTO LOGIN PI
    Pi.init({ version: "2.0", sandbox: false });
    Pi.authenticate(['username']).then(auth => {
      document.getElementById('btnLogin').innerText = `Welcome ${auth.user.username}`;
    }).catch(() => {
      document.getElementById('btnLogin').innerText = 'Login Pi';
    });

    // DATA COINGECKO + UPDATE 15 DETIK
    async function updateData() {
      try {
        const res = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=pi-network&vs_currencies=usd,idr&include_24hr_change=true');
        const data = await res.json();
        const pi = data['pi-network'];

        let hargaUSD = pi.usd;
        let hargaIDR = pi.idr;
        let persen = pi.usd_24h_change;

        document.getElementById('hargaUSD').innerText = `$${hargaUSD.toFixed(4)}`;
        document.getElementById('hargaIDR').innerText = `Harga /pi = Rp ${hargaIDR.toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g, ".")}`;

        const persenEl = document.getElementById('persen');
        persenEl.innerText = `${persen.toFixed(2)}%`;
        if (persen >= 0) {
          persenEl.className = 'text-2xl font-bold text-green-400';
          persenEl.innerText = `+${persen.toFixed(2)}%`;
        } else {
          persenEl.className = 'text-2xl font-bold text-red-500';
        }

        dataPoints.push(hargaUSD);
        if(dataPoints.length > 20) dataPoints.shift();
        updateChart();

        document.getElementById('jam').innerText = new Date().toLocaleTimeString('id-ID', {hour: '2-digit', minute:'2-digit'});
      } catch (e) {
        console.error('Gagal fetch:', e);
      }
    }

    // CHART PUTIH
    function initChart() {
      const ctx = document.getElementById('priceChart');
      chart = new Chart(ctx, {
        type: 'line',
        data: {
          labels: Array(20).fill(''),
          datasets: [{
            data: dataPoints,
            borderColor: '#ffffff',
            borderWidth: 2,
            backgroundColor: 'rgba(255, 255, 255, 0.1)',
            fill: true,
            tension: 0.3,
            pointRadius: 0
        }]},
        options: {
          maintainAspectRatio: false,
          animation: false,
          scales: {
            y: { display: true, ticks: { color: 'white', callback: (val) => val.toFixed(4).replace('.', ',') }, grid: { color: 'rgba(255,255,255,0.1)' } },
            x: { display: false }
          },
          plugins: { legend: { display: false } }
        }
      });
    }

    function updateChart() {
      if(chart) {
        chart.data.datasets[0].data = dataPoints;
        chart.update();
      }
    }

    initChart();
    updateData();
    setInterval(updateData, 15000); // 15 DETIK

  </script>
</body>
</html>
