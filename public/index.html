<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Track - Beranda</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script>Pi.init({ version: "2.0", sandbox: true });</script>
    <style>
        :root {
            --blue: #0066cc;
            --gold: #ffcc00;
        }

        body { margin: 0; font-family: Arial; background: #f0f2f5; }

        .header { 
            background: var(--blue);
            color: white; 
            padding: 10px 15px;
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            border-bottom: 3px solid var(--gold); 
            position: relative; 
            z-index: 10; 
        }
        
        .logo-left, .pi-logo-right { 
            height:38px !important; 
            width:38px !important;
            min-width: 38px !important;
            min-height: 38px !important;
            aspect-ratio: 1 / 1;
            box-sizing: border-box;
            cursor:pointer; 
            background: var(--blue); 
            border-radius: 50%; 
            border: 3px solid var(--gold);
            box-shadow: 0 0 0 1px white;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            flex-shrink: 0;
        }
        .pi-logo-right { 
            background: var(--blue);
        }
        .logo-left span { 
            font-size: 10px; 
            font-weight: bold; 
            color: white; 
            line-height: 1.1; 
            text-align: center;
        }
        .pi-logo-right span { 
            font-size: 24px; 
            font-weight: bold; 
            color: white;                
            line-height: 1;
        }
        .price-center { color: var(--gold); font-weight: bold; font-size: 14px; }
        .feed { padding: 15px; }
        footer { background: linear-gradient(#0066cc, #004499); color: white; text-align: center; padding: 15px; }
        .login-btn { color: var(--gold); font-size: 1.2rem; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-container">
            <!-- LOGO KIRI: KLIK KE UPLOAD -->
            <a href="upload.html" class="logo-left">
                <span>My<br>Track</span>
            </a>

            <div class="price-center">PI/USDT = <span id="price-value">0.11988</span></div>

            <!-- LOGO PI KAN: KLIK KE MARKET -->
            <a href="market.html" class="pi-logo-right">
                <span>π</span>
            </a>
        </div>
    </header>

    <div class="feed">
        <h2 style="text-align:center; margin:15px 0; color:#0066cc;">Postingan Terbaru</h2>
        <div id="feed-posts"></div>
    </div>

    <footer>
        <span id="loginBtn" class="login-btn">LOGIN</span>
    </footer>

    <script>
        // script kamu taruh sini
    </script>
</body>
</html>
