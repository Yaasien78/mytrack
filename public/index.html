<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Track</title>
<script src="https://sdk.minepi.com/pi-sdk.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }
html, body { height: 100%; background:#000; overflow:hidden; } /* HITAM BUAT LANGIT */
.app { display: flex; flex-direction: column; height: 100vh; position:relative; z-index:10; }

/* WALLPAPER ANGkASA */
#space{position:fixed; top:0; left:0; width:100%; height:100%; z-index:1;}

/* HEADER BIRU BORDER GOLD */
header {
  background: #0057d9;
  border-bottom: 2px solid #ffcc00;
  color: white;
  padding: 6px 15px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.logo {
  width: 45px; height: 45px; border-radius: 50%;
  border: 2px solid #ffcc00; background: #0057d9;
  display: flex; align-items: center; justify-content: center;
  font-weight: bold; font-size: 10px; color: white;
  text-align: center; line-height: 1.1; text-decoration: none;
}
.harga { text-align: center; font-weight: bold; font-size: 14px; line-height: 1.4; }
.pi-logo {
  width: 45px; height: 45px; border-radius: 50%;
  border: 2px solid #ffcc00; background: #0057d9;
  font-weight: bold; font-size: 22px; color: white;
  display: flex; align-items: center; justify-content: center;
  text-decoration: none; line-height: 1;
}

/* FOOTER BIRU BORDER GOLD */
footer {
  background: #0057d9;
  border-top: 2px solid #ffcc00;
  padding: 6px 15px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top:auto; /* Biar dorong ke bawah */
}
.footer-left {
  width: 45px; height: 45px; border-radius: 50%;
  border: 2px solid #0057d9; background: white;
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; text-decoration: none;
}
.login-btn {
  background: #0057d9; color: white; border: none;
  padding: 10px 24px; border-radius: 22px;
  font-weight: bold; font-size: 18px; cursor: pointer;
  transition: 0.3s;
}
.login-btn.logged { background: none; color: white; }
.footer-right {
  width: 45px; height: 45px; border-radius: 50%;
  border: 2px solid #0057d9; background: white;
  display: flex; align-items: center; justify-content: center;
  font-size: 28px; color: #0057d9; font-weight: bold;
  text-decoration: none;
}
</style>
</head>
<body>
<canvas id="space"></canvas>

<div class="app">
  <!-- HEADER -->
  <header>
    <a href="upload.html" class="logo">My<br>Track</a>
    <div class="harga">1 Pi = $0.112869 <br>Rp2,032.77</div>
    <a href="market.html" class="pi-logo">π</a>
  </header>

  <!-- ISI KOSONG BIAR LANGIT KELIATAN -->

  <!-- FOOTER -->
  <footer>
    <a href="avatar.html" class="footer-left">🎨</a>
    <button class="login-btn" onclick="login()">Login</button>
    <a href="ai.html" class="footer-right">+</a>
  </footer>
</div>

<script>
Pi.init({ version: "2.0", sandbox: true });

function login() {
  Pi.authenticate('username')
  .then(function(auth) {
    const btn = document.querySelector('.login-btn');
    btn.innerText = 'Hi ' + auth.user.username;
    btn.classList.add('logged');
  })
  .catch(function(error) {
    alert("Login gagal: " + error);
    console.error(error);
  });
}

// SCRIPT ANGkASA MALAM
const canvas = document.getElementById('space');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
const clickSound = new Audio("https://cdn.pixabay.com/audio/2022/03/24/audio_d1714d0c0b.mp3");
clickSound.volume = 0.3;

let stars = [];
let asteroids = [];
let ripples = [];
let colors = ['#ffcc00','#00ccff','#ff00ff','#00ff88','#ff4444','#ffffff'];

for(let i=0; i<200; i++){ stars.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, size: Math.random()*2, speed: Math.random()*0.5 + 0.2}) }
for(let i=0; i<15; i++){ asteroids.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, size: Math.random()*3 + 1, speedX: Math.random()*0.8 - 0.4, speedY: Math.random()*0.8 - 0.4}) }

function animate(){
  ctx.fillStyle = 'rgba(0,0,20,0.3)';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  stars.forEach(s=>{ s.y += s.speed; if(s.y > canvas.height) s.y = 0; ctx.fillStyle = 'white'; ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI*2); ctx.fill(); });
  asteroids.forEach(a=>{ a.x += a.speedX; a.y += a.speedY; if(a.x<0 || a.x>canvas.width) a.speedX*=-1; if(a.y<0 || a.y>canvas.height) a.speedY*=-1; ctx.fillStyle = '#aaa'; ctx.beginPath(); ctx.arc(a.x, a.y, a.size, 0, Math.PI*2); ctx.fill(); });
  ripples.forEach((r,i)=>{ r.radius += 5; r.alpha -= 0.02; ctx.strokeStyle = `rgba(${r.r},${r.g},${r.b},${r.alpha})`; ctx.lineWidth = 3; ctx.beginPath(); ctx.arc(r.x, r.y, r.radius, 0, Math.PI*2); ctx.stroke(); if(r.alpha <= 0) ripples.splice(i,1); });
  requestAnimationFrame(animate);
}
animate();

canvas.addEventListener('click', (e)=>{
  clickSound.currentTime = 0; clickSound.play();
  let color = colors[Math.floor(Math.random()*colors.length)];
  let rgb = {r:parseInt(color.slice(1,3),16), g:parseInt(color.slice(3,5),16), b:parseInt(color.slice(5,7),16)};
  ripples.push({x:e.clientX, y:e.clientY, radius:0, alpha:1, r:rgb.r, g:rgb.g, b:rgb.b});
});
window.addEventListener('resize', ()=>{ canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
</script>
</body>
</html>
