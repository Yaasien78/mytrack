<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Track - Beranda</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script>Pi.init({ version: "2.0", sandbox: true });</script>
    <style>
        .logo-left { 
    height:40px; 
    width:40px;
    min-width: 38px;
    min-height: 38px;
    aspect-ratio: 1 / 1;
    box-sizing: border-box;
    cursor:pointer; 
    background: var(--blue); 
    border-radius: 50%; 
    border: 3px solid var(--gold); /* Border emas */
    box-shadow: 0 0 0 1px white;   /* Tambah shadow putih biar nongol */
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
}
.logo-left span { 
    font-size: 10px; 
    font-weight: bold; 
    color: white; 
    line-height: 1.1; 
    text-align: center;
}

        /* LOGO PI: LINGKARAN BIRU + SIMBOL PI PUTIH + BORDER PUTIH */
.pi-logo-right { 
    height:38px; 
    width:38px;
    cursor:pointer; 
    background: var(--blue);     
    border-radius: 50%; 
    border: 3px solid var(--gold);  /* 2px -> 3px biar tebel */
    box-shadow: 0 0 0 1px white;    /* Tambah glow putih tipis biar nongol */
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
}
.pi-logo-right span { 
    font-size: 24px; 
    font-weight: bold; 
    color: white;                /* 3. Simbol π warna putih */
    line-height: 1;
}
        
        footer { background: linear-gradient(#0066cc, #004499); color: white; text-align: center; padding: 15px; border-top: 2px solid var(--gold); position: fixed; bottom: 0; width: 100%; z-index: 100; }
        .login-btn { color: var(--gold); font-size: 1.2rem; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <header>
        <div class="header-container">
            <!-- LOGO KIRI: KLIK KE UPLOAD -->
            <a href="#" id="logoLink" class="logo-left">
                <img src="logo-mytrack.png" alt="My Track">
            </a>
            
            <div class="price-center">PI/USDT = <span id="price-value">0.11988</span></div>
            
            <!-- LOGO PI KAN: KLIK KE MARKET -->
<a href="market.html" class="pi-logo-right">
    <svg viewBox="0 0 100 100">
        <!-- Simbol Pi π pake text biar gak blank -->
        <text x="50" y="65" font-family="Arial" font-size="70" font-weight="bold" fill="white" text-anchor="middle">π</text>
    </svg>
</a>
        </div>
    </header>

    <div class="feed">
        <h2 style="text-align:center; margin:15px 0; color:#0066cc;">Postingan Terbaru</h2>
        <div id="feed-posts"></div>
    </div>

    <footer>
        <span id="loginBtn" class="login-btn">LOGIN</span>
    </footer>

    <script>
        let currentUser = localStorage.getItem('pi_username');

        function updatePrice() {
            document.getElementById('price-value').textContent = "0.11988";
        }

        async function handleLogin() {
            if(currentUser) return alert(`Kamu sudah login sebagai @${currentUser}`);
            document.getElementById('loginBtn').innerText = "Memuat...";
            try {
                const auth = await Promise.race([
                    Pi.authenticate(['username'], ()=>{}),
                    new Promise((_, reject) => setTimeout(() => reject("timeout"), 2500))
                ]);
                currentUser = auth.user.username;
            } catch(err) {
                currentUser = "testuser_" + Math.floor(Math.random()*1000);
            }
            localStorage.setItem('pi_username', currentUser);
            document.getElementById('loginBtn').innerText = `@${currentUser}`;
        }

        // KLIK LOGO KIRI = CEK LOGIN DULU BARU KE UPLOAD
        document.getElementById('logoLink').onclick = (e) => {
            e.preventDefault();
            if(!currentUser){
                alert("Silakan login dulu ya");
                handleLogin().then(()=>{ 
                    if(localStorage.getItem('pi_username')) window.location.href = "upload.html";
                });
            } else {
                window.location.href = "upload.html";
            }
        };

        function loadPosts() {
            const feed = document.getElementById('feed-posts');
            let posts = JSON.parse(localStorage.getItem('mytrack_posts')) || [
                {user: "admin", time: "Baru saja", content: "<p>Selamat datang di My Track 🔥</p>"}
            ];
            feed.innerHTML = posts.map(p => `<div class="post-box"><div class="post-header">@${p.user} • ${p.time}</div><div class="post-content">${p.content}</div></div>`).join('');
        }

        window.onload = () => { 
            if(currentUser) document.getElementById('loginBtn').innerText = `@${currentUser}`;
            updatePrice(); 
            loadPosts(); 
            document.getElementById('loginBtn').onclick = handleLogin; 
        };
    </script>
</body>
</html>
