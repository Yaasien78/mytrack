<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>body{background:#0f172a;color:#fff;text-align:center;padding-top:100px} button{padding:14px 24px;background:#fbbf24;border:none;border-radius:12px;font-weight:bold}</style>
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>
<body>
  <h1>My Track 1.0</h1>
  <button id="btn">Masuk dengan Pi</button>

  <script>
    let piReady = false;

    // INIT HANYA PAS DIKLIK PERTAMA KALI
    document.getElementById('btn').onclick = async () => {
      const btn = document.getElementById('btn');
      
      if(!piReady){
        btn.innerText = "Loading SDK...";
        Pi.init({ version: "1.0" }); // INIT DI SINI
        await new Promise(r => setTimeout(r, 500)); // Kasih jeda 0.5 detik
        piReady = true;
      }

      btn.innerText = "Login...";
      try {
        const auth = await Pi.authenticate(['username']);
        alert("SUKSES: " + auth.user.username); // Kalo nongol ini = MENANG
      } catch(e) {
        alert("ERROR: " + e.message);
        btn.innerText = "Masuk dengan Pi";
      }
    }
  </script>
</body>
</html>
