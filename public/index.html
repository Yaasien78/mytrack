<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>My Track</title>
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background-color: #ffffff; margin:0; }
    .bg-dongker { background-color: #1e293b; } 
    .bg-ungu { background-color: #a855f7; }
    .border-kuning-b { border-bottom: 2px solid #facc15; }
    .border-kuning-t { border-top: 2px solid #facc15; }
    .border-kuning { border: 2px solid #facc15; }
    header { height: 56px; }
    footer { height: 56px; }
    main { padding-top: 56px; padding-bottom: 56px; }
    .text-ss {
      font-family: 'Impact', 'Arial Black', sans-serif;
      font-weight: 900;
      text-shadow: 0 3px 6px rgba(0,0,0,0.9);
      line-height: 1; 
    }
  </style>
</head>
<body class="font-sans bg-white">
  <header class="bg-dongker px-2 border-kuning-b flex items-center justify-between fixed top-0 w-full">
    <a href="menu.html" class="text-2xl text-yellow-400">≡</a>
    <h1 class="text-2xl font-black text-white text-ss">My Track</h1>
    <div class="w-10 h-10 rounded-full bg-ungu border-kuning flex items-center justify-center">
      <span class="text-yellow-400 text-2xl font-black">π</span>
    </div>
  </header>

  <main class="px-2">
    <div class="bg-ungu border-kuning rounded-3xl px-2 pt-2 pb-0 m-1 h-[calc(100vh-112px-8px)] flex-col justify-end"> 
      <div class="text-center mb-1">
        <p class="text-lg text-ss text-white">Harga Pi/USDT</p>
        <p id="hargaUSDT" class="text-lg text-ss text-white">$0.1151</p>
        <p class="text-lg text-ss text-sky-300">Pi/Rupiah</p>
        <p id="hargaIDR" class="text-lg text-ss text-white">Rp 2.070</p>
        <p class="text-lg text-ss text-green-300">Dollar/Rupiah</p>
        <p id="kursUSDIDR" class="text-lg text-ss text-white">Rp 16.848,58</p>
        <p id="tanggal" class="text-lg text-ss text-yellow-400">Kamis, 2 Juli 2026</p>
        <div class="bg-blue-500 w-12 h-12 rounded-lg border-kuning ring-2 ring-blue-300 flex items-center justify-center mx-auto mt-1">
          <p class="text-base text-ss text-white leading-none">My<br>Track</p>
        </div>
        <p class="text-base text-ss text-white mt-0.5 mb-0">Welcome to Pioneer<br>at My Track app @2026</p>
      </div>
    </div>
  </main>

  <footer class="bg-dongker px-3 border-kuning-t flex items-center justify-center fixed bottom-0 w-full">
    <button id="btnBayar" class="text-lg text-ss text-yellow-400 w-full">Login Pi</button>
  </footer>

  <script>
    let currentUser = null;
    Pi.init({ version: "2.0", sandbox: true }); 
    const btnBayar = document.getElementById('btnBayar');

    function updateTanggal() {
      document.getElementById('tanggal').innerText = new Date().toLocaleDateString('id-ID', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', timeZone: 'Asia/Jakarta' });
    }
    updateTanggal(); 

    async function loginPi() {
      try {
        btnBayar.innerText = 'Login...';
        // FIX: HAPUS 'payments' DULU BIAR GAK ERROR e.every
        const auth = await Pi.authenticate({ 
          scopes: ['username'], 
          onIncompletePaymentFound: () => {} 
        });
        currentUser = auth.user;
        btnBayar.innerText = `Halo ${currentUser.username}`; // Test login sukses
      } catch (err) {
        btnBayar.innerText = 'Login Pi';
        alert('Login Gagal: ' + err.message); 
      }
    }

    btnBayar.onclick = loginPi; // DULUIN LOGIN AJA

    async function updateData() {
      try {
        const res = await fetch('https://api.allorigins.win/raw?url=' + encodeURIComponent('https://api.coingecko.com/api/v3/simple/price?ids=pi-network,usd&vs_currencies=usd,idr'));
        const data = await res.json();
        if(data['pi-network']) {
          document.getElementById('hargaUSDT').innerText = `$${data['pi-network'].usd.toFixed(4)}`;
          document.getElementById('hargaIDR').innerText = `Rp ${data['pi-network'].idr.toLocaleString('id-ID')}`;
        }
        if(data['usd']) {
          document.getElementById('kursUSDIDR').innerText = `Rp ${data['usd'].idr.toLocaleString('id-ID', {minimumFractionDigits: 2})}`;
        }
      } catch (e) {}
    }
    updateData(); 
    setInterval(updateData, 3000);
  </script>
</body>
</html>
