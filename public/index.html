<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Track</title>
<script src="https://sdk.minepi.com/pi-sdk.js"></script>
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }
  html, body { height: 100%; background: #ffffff; }
  .app { display: flex; flex-direction: column; height: 100vh; }

  /* HEADER BIRU BORDER GOLD */
  header {
    background: #0057d9;
    border-bottom: 2px solid #ffcc00;
    color: white;
    padding: 6px 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .logo {
  width: 45px; height: 45px; border-radius: 50%;
  border: 2px solid #ffcc00; background: #0057d9;
  display: flex; align-items: center; justify-content: center;
  font-weight: bold; font-size: 10px; color: white; 
  text-align: center; /* TAMBAH INI */
  line-height: 1.1; /* KECILIN DIKIT */
  text-decoration: none;
  }
  .harga {
    text-align: center; font-weight: bold; font-size: 14px; line-height: 1.4;
  }
  .pi-logo {
  width: 45px; height: 45px; border-radius: 50%;
  border: 2px solid #ffcc00; background: #0057d9;
  font-weight: bold; font-size: 22px; color: white;
  display: flex;
  align-items: center;     /* tengah atas-bawah */
  justify-content: center; /* tengah kiri-kanan */
  line-height: 1;          /* TAMBAH INI biar gak ketarik ke bawah */
  text-decoration: none;
     }

  /* FOOTER BIRU BORDER GOLD */
  footer {
    background: #0057d9;
    border-top: 2px solid #ffcc00;
    padding: 6px 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .footer-left {
    width: 45px; height: 45px; border-radius: 50%;
    border: 2px solid #0057d9; background: white;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; text-decoration: none;
  }
  /* TOMBOL LOGIN TENGAH */
  .login-btn {
    background: #0057d9;
    color: white;
    border: none;
    padding: 10px 24px;
    border-radius: 22px;
    font-weight: bold;
    font-size: 18px;
    cursor: pointer;
    transition: 0.3s;
  }
  .login-btn.logged {
    background: none;
    color: white;
  }
  .footer-right {
    width: 45px; height: 45px; border-radius: 50%;
    border: 2px; background: white;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; color: #0057d9; font-weight: bold;
    text-decoration: none;
  }
                                     <style>
  body{margin:0; background:#000; overflow:hidden;}
  #space{position:fixed; top:0; left:0; width:100%; height:100%; z-index:1;}
  header, footer{z-index:10;}
</style>
   
    <!-- HEADER -->
    <header>
      <a href="upload.html" class="logo">My<br>Track</a>
      <div class="harga">1 Pi = $0.112869 |<br>Rp2.032,77</div>
      <a href="market.html" class="pi-logo">π</a>
    </header>

    
    <!-- FOOTER -->
    <footer>
      <a href="avatar.html" class="footer-left">🎨</a>
      <button class="login-btn" onclick="login()">Login</button>
      <a href="ai.html" class="footer-right">+</a>
    </footer>
  </div>

<script>
  Pi.init({ version: "2.0", sandbox: true });

  function login() {
    Pi.authenticate(['username'])
    .then(function(auth) {
      const btn = document.querySelector('.login-btn');
      btn.innerText = `@${auth.user.username}`;
      btn.classList.add('logged'); // jadi hijau
    })
    .catch(function(error) {
      alert("Login gagal: " + error);
      console.error(error);
    });
  }
</script>
</body>
</html>
