<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Track 1.0</title>
<script src="https://sdk.minepi.com/pi-sdk.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  body { font-family: Arial; background: #0f172a; color: #fff; margin:0; padding:0; }
  header { display:flex; justify-content:space-between; align-items:center; padding:12px 20px; background:#1e293b; border-bottom:1px solid #334155; position:sticky; top:0; z-index:10; }
  header.logo { display:flex; align-items:center; gap:10px; font-weight:bold; font-size:18px; }
  header.logo img { height:28px; }
 .menu-icon { font-size:24px; cursor:pointer; text-decoration:none; color:#fff; }
 .container { padding:20px; max-width:600px; margin:auto; }
 .card { background:#1e293b; padding:16px; border-radius:16px; margin-bottom:16px; text-align:center; }
 .harga-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
 .harga-item { background:#334155; padding:12px; border-radius:12px; font-size:14px; }
 .harga-item b { font-size:18px; color:#fbbf24; }
  #chart { max-height:220px; background:transparent; }
  footer { text-align:center; padding:20px; color:#94a3b8; font-size:13px; border-top:1px solid #334155; margin-top:20px; }
  #username { color: #38bdf8; font-weight: bold; }
  #loading { text-align:center; padding:100px 20px; font-size:18px; }
 .hidden { display: none; }
</style>
</head>
<body>

<div id="loading">Auto Login ke My Track 1.0...</div>

<div id="dashboard" class="hidden">
  <!-- HEADER -->
  <header>
    <div class="logo">
      <img src="https://minepi.com/static/logo.png" alt="Pi Logo">
      <span>My Track 1.0</span>
    </div>
    <a href="menu.html" class="menu-icon">☰</a>
  </header>

  <!-- BODY -->
  <div class="container">
    <div class="card">
      <div id="tanggal" style="color:#94a3b8; font-size:14px; margin-bottom:8px;"></div>
      <h2 style="margin:0;">Welcome Pioneer <span id="username">...</span> 👋</h2>
      <p style="margin:4px 0 0; color:#94a3b8;">to My Track App @2026</p>
    </div>

    <div class="card harga-grid">
      <div class="harga-item">Pi/USDT<br><b id="piUsdt">Loading...</b></div>
      <div class="harga-item">Pi/IDR<br><b id="piIdr">Loading...</b></div>
      <div class="harga-item">USDT/IDR<br><b id="usdtIdr">Loading...</b></div>
      <div class="harga-item">Update<br><b id="lastUpdate">-</b></div>
    </div>

    <div class="card">
      <canvas id="chart"></canvas>
    </div>

    <div class="card">
      <img src="https://i.imgur.com/8y0YwBw.png" alt="My Track Logo" style="width:120px; opacity:0.9;">
      <p style="margin-top:10px;">Logo My Track 1.0</p>
    </div>
  </div>

  <!-- FOOTER AUTO USERNAME -->
  <footer>
    Auto Login: <span id="footerUser">...</span> | My Track 1.0 @2026
  </footer>
</div>

<script>
  // 1. JANGAN INIT DULUAN. TUNGGU SDK NYA SIAP
  function onPiSDKLoaded() {
    Pi.init({ version: "1.0" }); // V1 = Gak ada appId

    let user = "";
    let chart;

    window.onload = async function() {
      try {
        const auth = await Pi.authenticate(['username']);
        user = auth.user.username;

        document.getElementById('username').innerText = user;
        document.getElementById('footerUser').innerText = user;
        setTanggal();
        initChart();
        getHarga();
        setInterval(getHarga, 15000);

        document.getElementById('loading').classList.add('hidden');
        document.getElementById('dashboard').classList.remove('hidden');

      } catch (err) {
        document.getElementById('loading').innerText = "Gagal Auto Login. Error: " + err;
      }
    }

    function setTanggal() {
      const d = new Date();
      const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
      document.getElementById('tanggal').innerText = d.toLocaleDateString('id-ID', options);
    }

    async function getHarga() {
      try {
        const res = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=pi-network,tether&vs_currencies=usd,id');
        const data = await res.json();
        const piUsd = data['pi-network']?.usd || 0.0;
        const usdtIdr = data['tether']?.idr || 16500;
        const piIdr = piUsd * usdtIdr;
        document.getElementById('piUsdt').innerText = `$${piUsd.toFixed(4)}`;
        document.getElementById('usdtIdr').innerText = `Rp${usdtIdr.toLocaleString('id-ID')}`;
        document.getElementById('piIdr').innerText = `Rp${piIdr.toLocaleString('id-ID')}`;
        document.getElementById('lastUpdate').innerText = new Date().toLocaleTimeString('id-ID');
        updateChart(piUsd);
      } catch(e) { document.getElementById('piUsdt').innerText = "Gagal Load"; }
    }

    function initChart() {
      const ctx = document.getElementById('chart').getContext('2d');
      chart = new Chart(ctx, {
        type: 'line',
        data: { labels: [], datasets: [{ label: 'Pi/USD', data: [], borderColor: '#fbbf24', tension: 0.3 }] },
        options: { plugins:{legend:{display:false}}, scales:{x:{display:false}, y:{ticks:{color:'#fff'}}} }
      });
    }
    function updateChart(harga) {
      const now = new Date().toLocaleTimeString('id-ID', {minute:'2-digit', second:'2-digit'});
      if(chart.data.labels.length > 20) { chart.data.labels.shift(); chart.data.datasets[0].data.shift(); }
      chart.data.labels.push(now);
      chart.data.datasets[0].data.push(harga);
      chart.update();
    }
  }

  // 2. INI KUNCINYA BRO. PI BROWSER WAJIB PAKE INI
  if(window.Pi){ 
    onPiSDKLoaded(); // Kalau SDK udah load duluan
  } else { 
    document.addEventListener('pi-sdk-loaded', onPiSDKLoaded); // Kalau SDK telat load
  }
          </script>

</body>
</html>
