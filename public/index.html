<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Track</title>
<script src="https://sdk.minepi.com/pi-sdk.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }
html, body { height: 100%; background:#000; overflow:hidden; }
.app { display: flex; flex-direction: column; height: 100vh; position:relative; z-index:10; }

/* WALLPAPER ANGkASA */
#space{position:fixed; top:0; left:0; width:100%; height:100%; z-index:1; cursor:pointer;}

/* HEADER BIRU BORDER GOLD */
header {
  background: #0057d9; border-bottom: 2px solid #ffcc00;
  color: white; padding: 6px 15px; display: flex;
  justify-content: space-between; align-items: center;
}
.logo {
  width: 45px; height: 45px; border-radius: 50%;
  border: 2px solid #ffcc00; background: #0057d9;
  display: flex; align-items: center; justify-content: center;
  font-weight: bold; font-size: 10px; color: white;
  text-align: center; line-height: 1.1; text-decoration: none;
}
.harga { text-align: center; font-weight: bold; font-size: 14px; line-height: 1.4; }
.pi-logo {
  width: 45px; height: 45px; border-radius: 50%;
  border: 2px solid #ffcc00; background: #0057d9;
  font-weight: bold; font-size: 22px; color: white;
  display: flex; align-items: center; justify-content: center;
  text-decoration: none; line-height: 1;
}

/* FOOTER BIRU BORDER GOLD */
footer {
  background: #0057d9; border-top: 2px solid #ffcc00;
  padding: 6px 15px; display: flex;
  justify-content: space-between; align-items: center;
  margin-top:auto;
}
.footer-left {
  width: 45px; height: 45px; border-radius: 50%;
  border: 2px solid #0057d9; background: white;
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; text-decoration: none;
}
.login-btn {
  background: #0057d9; color: white; border: none;
  padding: 10px 24px; border-radius: 22px;
  font-weight: bold; font-size: 18px; cursor: pointer;
}
.footer-right {
  width: 45px; height: 45px; border-radius: 50%;
  border: 2px solid #0057d9; background: white;
  display: flex; align-items: center; justify-content: center;
  font-size: 28px; color: #0057d9; font-weight: bold;
  text-decoration: none;
}
</style>
</head>
<body>
<canvas id="space"></canvas>

<div class="app">
  <header>
    <a href="upload.html" class="logo">My<br>Track</a>
    <div class="harga">1 Pi = $0.112869 <br>Rp2,032.77</div>
    <a href="market.html" class="pi-logo">π</a>
  </header>
  <footer>
    <a href="avatar.html" class="footer-left">🎨</a>
    <button class="login-btn" onclick="login()">Login</button>
    <a href="ai.html" class="footer-right">+</a>
  </footer>
</div>

<script>
Pi.init({ version: "2.0", sandbox: true });
function login() {
  Pi.authenticate('username')
  .then(function(auth) {
    const btn = document.querySelector('.login-btn');
    btn.innerText = 'Hi ' + auth.user.username;
    btn.classList.add('logged');
  })
  .catch(function(error) { alert("Login gagal: " + error); });
}

// SCRIPT ANGkASA MALAM V2 - LEBIH HIDUP
const canvas = document.getElementById('space');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
let audioOn = false; // trik biar suara bisa bunyi di HP
const clickSound = new Audio("https://cdn.pixabay.com/audio/2022/03/24/audio_d1714d0c0b.mp3");
clickSound.volume = 0.5;

let stars = [];
let asteroids = [];
let ripples = [];
let colors = ['#ffcc00','#00ccff','#ff00ff','#00ff88','#ff4444','#ffffff'];

// Bintang lebih banyak + jatuh lebih cepat
for(let i=0; i<300; i++){ stars.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, size: Math.random()*2.5, speed: Math.random()*1 + 0.5}) }
// Asteroid lebih gede + terang + lebih banyak
for(let i=0; i<25; i++){ asteroids.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, size: Math.random()*4 + 2, speedX: Math.random()*1.5 - 0.75, speedY: Math.random()*1.5 - 0.75}) }

function animate(){
  ctx.fillStyle = 'rgba(0,0,20,0.1)'; // INI KUNCINYA. 0.1 biar trail panjang = efek maju
  ctx.fillRect(0,0,canvas.width,canvas.height);
  
  // BINTANG JATUH
  stars.forEach(s=>{ 
    s.y += s.speed; 
    if(s.y > canvas.height) {s.y = 0; s.x = Math.random()*canvas.width;} 
    ctx.fillStyle = 'white'; 
    ctx.beginPath(); 
    ctx.arc(s.x, s.y, s.size, 0, Math.PI*2); 
    ctx.fill(); 
  });
  
  // ASTEROID TERBANG
  asteroids.forEach(a=>{ 
    a.x += a.speedX; a.y += a.speedY; 
    if(a.x<0 || a.x>canvas.width) a.speedX*=-1; 
    if(a.y<0 || a.y>canvas.height) a.speedY*=-1; 
    ctx.fillStyle = '#ccccff'; // lebih terang
    ctx.shadowColor = '#fff';
    ctx.shadowBlur = 8;
    ctx.beginPath(); 
    ctx.arc(a.x, a.y, a.size, 0, Math.PI*2); 
    ctx.fill(); 
    ctx.shadowBlur = 0;
  });
  
  // RIPPLE KLIK WARNA
  ripples.forEach((r,i)=>{ 
    r.radius += 8; // lebih cepat membesar
    r.alpha -= 0.03; 
    ctx.strokeStyle = `rgba(${r.r},${r.g},${r.b},${r.alpha})`; 
    ctx.lineWidth = 4; 
    ctx.beginPath(); 
    ctx.arc(r.x, r.y, r.radius, 0, Math.PI*2); 
    ctx.stroke(); 
    if(r.alpha <= 0) ripples.splice(i,1); 
  });
  requestAnimationFrame(animate);
}
animate();

canvas.addEventListener('click', (e)=>{
  if(!audioOn){ clickSound.play().catch(()=>{}); audioOn=true; } // buka kunci suara
  else{ clickSound.currentTime = 0; clickSound.play(); }
  
  let color = colors[Math.floor(Math.random()*colors.length)];
  let rgb = {r:parseInt(color.slice(1,3),16), g:parseInt(color.slice(3,5),16), b:parseInt(color.slice(5,7),16)};
  ripples.push({x:e.clientX, y:e.clientY, radius:0, alpha:1, r:rgb.r, g:rgb.g, b:rgb.b});
});
window.addEventListener('resize', ()=>{ canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
</script>
</body>
</html>
