<!-- HEADER KAMU TETAP DI ATAS -->
<header style="background:#0066cc; border-bottom:3px solid #ffd700; width:100%; padding:8px 0; position:sticky; top:0; z-index:10;">
  <div style="display:flex; justify-content:space-between; align-items:center; width:100%; padding:0 15px;">

<!-- FOOTER KAMU TETAP DI BAWAH -->

<script>
const canvas = document.getElementById('space');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];
let asteroids = [];
let ripples = [];
let colors = ['#ffcc00','#00ccff','#ff00ff','#00ff88','#ff4444','#ffffff'];

// Bikin 200 bintang
for(let i=0; i<200; i++){
  stars.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    size: Math.random()*2,
    speed: Math.random()*0.5 + 0.2
  })
}

// Bikin 15 asteroid
for(let i=0; i<15; i++){
  asteroids.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    size: Math.random()*3 + 1,
    speedX: Math.random()*0.8 - 0.4,
    speedY: Math.random()*0.8 - 0.4
  })
}

// Animasi
function animate(){
  ctx.fillStyle = 'rgba(0,0,20,0.3)'; // jejak biar ada efek gerak
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // Gambar bintang
  stars.forEach(s=>{
    s.y += s.speed;
    if(s.y > canvas.height) s.y = 0;
    ctx.fillStyle = 'white';
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.size, 0, Math.PI*2);
    ctx.fill();
  });

  // Gambar asteroid
  asteroids.forEach(a=>{
    a.x += a.speedX;
    a.y += a.speedY;
    if(a.x<0 || a.x>canvas.width) a.speedX*=-1;
    if(a.y<0 || a.y>canvas.height) a.speedY*=-1;
    ctx.fillStyle = '#aaa';
    ctx.beginPath();
    ctx.arc(a.x, a.y, a.size, 0, Math.PI*2);
    ctx.fill();
  });

  // Efek ripple klik
  ripples.forEach((r,i)=>{
    r.radius += 5;
    r.alpha -= 0.02;
    ctx.strokeStyle = `rgba(${r.r},${r.g},${r.b},${r.alpha})`;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(r.x, r.y, r.radius, 0, Math.PI*2);
    ctx.stroke();
    if(r.alpha <= 0) ripples.splice(i,1);
  });

  requestAnimationFrame(animate);
}
animate();

// Klik = keluar cahaya warna random
canvas.addEventListener('click', (e)=>{
  let color = colors[Math.floor(Math.random()*colors.length)];
  let rgb = hexToRgb(color);
  ripples.push({
    x:e.clientX, y:e.clientY, radius:0, alpha:1,
    r:rgb.r, g:rgb.g, b:rgb.b
  });
});

function hexToRgb(hex){
  let r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return {r,g,b};
}

window.addEventListener('resize', ()=>{
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});
</script>
