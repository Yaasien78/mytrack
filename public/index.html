<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>My Track</title>
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
  <style>
   *{margin:0;padding:0;box-sizing:border-box}
   body{background:#000;color:#fff;font-family:Impact,'Arial Black',sans-serif;overflow:hidden}
   .glow{ text-shadow: 0 0 12px rgba(255,255,255,0.9)}
   .glow-gold{ box-shadow: 0 0 15px rgba(250,204,21,0.6)}
   header,footer{position:fixed;width:100%;height:56px;background:#000;display:flex;align-items:center;justify-content:space-between;padding:0 8px;border-bottom:2px solid #facc15;z-index:99}
   footer{bottom:0;border-top:2px solid #facc15;border-bottom:0;justify-content:center}
   .box{border:2px solid #facc15;border-radius:24px;margin:8px;padding:12px 8px;height:calc(100vh - 120px);display:flex;flex-direction:column;justify-content:center;align-items:center;gap:8px;background:#000;overflow:hidden}
   .text{font-size:28px;font-weight:900;line-height:1.3;text-align:center}
   .logo{width:40px;height:40px;border:2px solid #facc15;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#facc15;font-size:24px;font-weight:900}
   .badge{width:56px;height:56px;background:#2563eb;border:2px solid #facc15;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;line-height:1}
  </style>
</head>
<body>
  <header>
    <div style="width:24px;display:flex;flex-direction:column;gap:4px"><span style="height:3px;background:#facc15;display:block"></span><span style="height:3px;background:#facc15;display:block"></span><span style="height:3px;background:#facc15;display:block"></span></div>
    <h1 class="text glow" style="font-size:26px">My Track</h1>
    <div class="logo glow-gold">π</div>
  </header>

  <main style="padding-top:56px;padding-bottom:56px">
    <div class="box glow-gold">
      <p id="tgl" class="text glow"></p>
      <p id="usd" class="text glow">$0.1150</p>
      <p id="idr" class="text glow">Rp 2.069</p>
      <p id="kurs" class="text glow">Rp 17,994</p>
      <div class="badge glow-gold">My<br>Track</div>
      <p class="text glow" style="font-size:13px;line-height:1.2">Welcome to Pioneer<br>At My Track App<br>@2026</p>
    </div>
  </main>

  <footer><button id="btn" class="text glow" style="font-size:20px;background:0;border:0;color:#fff">Login Pi</button></footer>

  <script>
    Pi.init({version:"2.0",sandbox:true});
    document.getElementById('tgl').innerText=new Date().toLocaleDateString('id-ID',{weekday:'long',year:'numeric',month:'long',day:'numeric',timeZone:'Asia/Jakarta'});
    document.getElementById('btn').onclick=async()=>{try{document.getElementById('btn').innerText='Login...';const a=await Pi.authenticate({scopes:['username']});document.getElementById('btn').innerText=`Halo ${a.user.username}`}catch(e){document.getElementById('btn').innerText='Login Pi'}};
    fetch('https://api.allorigins.win/raw?url='+encodeURIComponent('https://api.coingecko.com/api/v3/simple/price?ids=pi-network&vs_currencies=usd,idr')).then(r=>r.json()).then(d=>{if(d['pi-network']){const u=d['pi-network'].usd,i=d['pi-network'].idr;document.getElementById('usd').innerText=`$${u.toFixed(4)}`;document.getElementById('idr').innerText=`Rp ${i.toLocaleString('id-ID')}`;document.getElementById('kurs').innerText=`Rp ${(i/u).toLocaleString('id-ID',{minimumFractionDigits:2})}`}}).catch(()=>{});
  </script>
</body>
            </html>
