<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Track</title>
<script src="https://sdk.minepi.com/pi-sdk.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }
html, body { height: 100%; background:#000; overflow:hidden; }
.app { display: flex; flex-direction: column; height: 100vh; position:relative; z-index:10; pointer-events:none; } /* Biar klik tembus ke canvas */

#bg-space{
  position:fixed; top:0; left:0; width:100%; height:100%; 
  background: url('space.jpg') center / cover no-repeat;
  z-index:1; 
  filter: brightness(0.55) contrast(1.2) saturate(0.9);
}
#bg-space::before{
  content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  background: 
    linear-gradient(to bottom, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 25%),
    linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 25%);
  z-index: 2;
}
#space{position:fixed; top:0; left:0; width:100%; height:100%; z-index:3; cursor:pointer; touch-action: none;}

header, footer { pointer-events: auto; } /* Tapi header footer tetap bisa diklik */

header {
  background: #0057d9; border-bottom: 2px solid #ffcc00;
  color: white; padding: 6px 15px; display: flex;
  justify-content: space-between; align-items: center;
}
.logo {
  width: 45px; height: 45px; border-radius: 50%;
  border: 2px solid #ffcc00; background: #0057d9;
  display: flex; align-items: center; justify-content: center;
  font-weight: bold; font-size: 10px; color: white;
  text-align: center; line-height: 1.1; text-decoration: none;
}
.harga { text-align: center; font-weight: bold; font-size: 14px; line-height: 1.4; }
.pi-logo {
  width: 45px; height: 45px; border-radius: 50%;
  border: 2px solid #ffcc00; background: #0057d9;
  font-weight: bold; font-size: 22px; color: white;
  display: flex; align-items: center; justify-content: center;
  text-decoration: none; line-height: 1;
}

footer {
  background: #0057d9; border-top: 2px solid #ffcc00;
  padding: 6px 15px; display: flex;
  justify-content: space-between; align-items: center;
  margin-top:auto;
}
.footer-left {
  width: 45px; height: 45px; border-radius: 50%;
  border: 2px solid #0057d9; background: white;
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; text-decoration: none;
}
.login-btn {
  background: #0057d9; color: white; border: none;
  padding: 10px 24px; border-radius: 22px;
  font-weight: bold; font-size: 18px; cursor: pointer;
}
.footer-right {
  width: 45px; height: 45px; border-radius: 50%;
  border: 2px solid #0057d9; background: white;
  display: flex; align-items: center; justify-content: center;
  font-size: 28px; color: #0057d9; font-weight: bold;
  text-decoration: none;
}
</style>
</head>
<body>

<div id="bg-space"></div>
<canvas id="space"></canvas>

<!-- SUARA PAKE WEB AUDIO BIAR PASTI JALAN -->
<script>
let audioCtx;
function playSound() {
  if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const oscillator = audioCtx.createOscillator();
  const gainNode = audioCtx.createGain();
  oscillator.connect(gainNode);
  gainNode.connect(audioCtx.destination);
  oscillator.type = 'sine';
  oscillator.frequency.setValueAtTime(600, audioCtx.currentTime);
  oscillator.frequency.exponentialRampToValueAtTime(200, audioCtx.currentTime + 0.2);
  gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
  gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
  oscillator.start();
  oscillator.stop(audioCtx.currentTime + 0.2);
}
</script>

<div class="app">
  <header>
    <a href="upload.html" class="logo">My<br>Track</a>
    <div class="harga">1 Pi = $0.112869 <br>Rp2,032.77</div>
    <a href="market.html" class="pi-logo">π</a>
  </header>
  <footer>
    <a href="avatar.html" class="footer-left">🎨</a>
    <button class="login-btn" id="loginBtn">Login</button>
    <a href="ai.html" class="footer-right">+</a>
  </footer>
</div>

<script>
window.addEventListener('load', function(){
  Pi.init({ version: "2.0", sandbox: true });
  document.getElementById('loginBtn').onclick = function(){
    Pi.authenticate(['username','payments'])
   .then(function(auth) {
      document.getElementById('loginBtn').innerText = 'Hi ' + auth.user.username;
      document.getElementById('loginBtn').style.background = 'transparent';
    })
   .catch(function(error) { alert("Login gagal: " + error); });
  }
});

// EFEK BINTANG + KETUK
const canvas = document.getElementById('space');
const ctx = canvas.getContext('2d');
let w = canvas.width = window.innerWidth;
let h = canvas.height = window.innerHeight;
let cx = w/2;
let cy = h*0.35;

let stars = [];
let explosions = [];
const colors = ['255,0,0','0,255,0','0,255,255','255,255,0','255,0,255','255,136,0','0,136,255'];

for(let i=0; i<220; i++){
  stars.push({ x: (Math.random()-0.5)*w*2, y: (Math.random()-0.5)*h*2, z: Math.random()*w })
}

function animate(){
  ctx.clearRect(0,0,w,h);
  
  stars.forEach(s=>{ 
    s.z -= 2.5; 
    if(s.z <= 1){ s.z = w; s.x = (Math.random()-0.5)*w*2; s.y = (Math.random()-0.5)*h*2; }
    let x = (s.x * (w / s.z)) + cx;
    let y = (s.y * (w / s.z)) + cy;
    let size = (1 - s.z/w) * 2.5;
    ctx.fillStyle = 'white';
    ctx.beginPath();
    ctx.arc(x, y, size, 0, Math.PI*2);
    ctx.fill();
  });

  explosions.forEach((exp, i)=>{
    exp.r += 12;
    exp.a -= 0.04;
    ctx.strokeStyle = `rgba(${exp.color},${exp.a})`;
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.arc(exp.x, exp.y, exp.r, 0, Math.PI*2);
    ctx.stroke();
    if(exp.a <= 0) explosions.splice(i,1);
  });
  
  requestAnimationFrame(animate);
}
animate();

// KETIKA LAYAR DIKETUK / DISENTUH
function handleClick(e){
  e.preventDefault();
  let x = e.touches? e.touches[0].clientX : e.clientX;
  let y = e.touches? e.touches[0].clientY : e.clientY;
  
  let color = colors[Math.floor(Math.random()*colors.length)];
  explosions.push({x:x, y:y, r:10, a:1, color: color});
  
  playSound(); // mainkan suara web audio
}

canvas.addEventListener('click', handleClick);
canvas.addEventListener('touchstart', handleClick); // buat HP

window.addEventListener('resize', ()=>{ 
  w = canvas.width = window.innerWidth; 
  h = canvas.height = window.innerHeight;
  cx = w/2; cy = h*0.35;
});
</script>
</body>
</html>
