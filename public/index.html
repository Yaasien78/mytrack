<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>My Track</title>
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
  <style>
   *{margin:0;padding:0;box-sizing:border-box}
   body{background:#0a0a1f;color:#fff;font-family:Impact,'Arial Black',sans-serif;overflow:hidden} /* KUNCI: Ungu Neon Gelap */
   .glow{ text-shadow: 0 0 10px rgba(168,85,247,0.9), 0 0 20px rgba(168,85,247,0.5)} /* Glow Ungu */
   .glow-gold{ box-shadow: 0 0 12px rgba(250,204,21,0.6), inset 0 0 8px rgba(250,204,21,0.1)}
   header,footer{position:fixed;width:100%;height:56px;background:#0a0a1f;display:flex;align-items:center;justify-content:space-between;padding:0 8px;border-bottom:2px solid #facc15;z-index:99} /* Header Ungu */
   footer{bottom:0;border-top:2px solid #facc15;border-bottom:0;justify-content:center}
   .box{border:2px solid #facc15;border-radius:24px;margin:8px;padding:10px 8px;height:calc(100vh - 120px);display:flex;flex-direction:column;justify-content:center;align-items:center;gap:4px;background:#0a0a1f;overflow:hidden} /* Box Ungu */
   .angka{font-size:26px;font-weight:900;line-height:1.2;text-align:center}
   .label{font-size:14px;font-weight:900;color:#38bdf8;text-align:center;line-height:1;margin-top:2px} /* Label Biru */
   .logo{width:40px;height:40px;border:2px solid #facc15;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#facc15;font-size:24px;font-weight:900}
   .badge{width:56px;height:56px;background:#2563eb;border:2px solid #facc15;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;line-height:1}
  </style>
</head>
<body>
  <header>
    <div style="width:24px;display:flex;flex-direction:column;gap:4px"><span style="height:3px;background:#facc15;display:block"></span><span style="height:3px;background:#facc15;display:block"></span><span style="height:3px;background:#facc15;display:block"></span></div>
    <h1 class="angka glow" style="font-size:26px">My Track</h1>
    <div class="logo glow-gold">π</div>
  </header>

  <main style="padding-top:56px;padding-bottom:56px">
    <div class="box glow-gold">
      <p id="tgl" class="angka glow"></p>
      
      <p class="label">Harga Pi/USDT</p>
      <p id="usd" class="angka glow">$0.1150</p>

      <p class="label">Harga Pi/IDR</p>
      <p id="idr" class="angka glow">Rp 2.069,3</p>

      <p class="label">Kurs USD/IDR</p>
      <p id="kurs" class="angka glow">Rp 17.994,852</p>
      
      <div class="badge glow-gold" style="margin-top:6px">My<br>Track</div>
      <p class="angka glow" style="font-size:12px;line-height:1.2;margin-top:2px">Welcome to Pioneer<br>At My Track App<br>@2026</p>
    </div>
  </main>

  <footer><button id="btn" class="angka glow" style="font-size:20px;background:0;border:0;color:#fff">Login Pi</button></footer>

  <script>
    Pi.init({version:"2.0",sandbox:true});
    document.getElementById('tgl').innerText=new Date().toLocaleDateString('id-ID',{weekday:'long',year:'numeric',month:'long',day:'numeric',timeZone:'Asia/Jakarta'});
    document.getElementById('btn').onclick=async()=>{try{document.getElementById('btn').innerText='Login...';const a=await Pi.authenticate({scopes:['username']});document.getElementById('btn').innerText=`Halo ${a.user.username}`}catch(e){document.getElementById('btn').innerText='Login Pi'}};
    fetch('https://api.allorigins.win/raw?url='+encodeURIComponent('https://api.coingecko.com/api/v3/simple/price?ids=pi-network&vs_currencies=usd,idr')).then(r=>r.json()).then(d=>{if(d['pi-network']){const u=d['pi-network'].usd,i=d['pi-network'].idr;document.getElementById('usd').innerText=`$${u.toFixed(4)}`;document.getElementById('idr').innerText=`Rp ${i.toLocaleString('id-ID')}`;document.getElementById('kurs').innerText=`Rp ${(i/u).toLocaleString('id-ID',{minimumFractionDigits:2})}`}}).catch(()=>{document.getElementById('kurs').innerText='Error'});
  </script>
</body>
</html>
