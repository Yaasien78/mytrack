<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Mall Genesis</title>
<script src="https://sdk.minepi.com/pi-sdk.js"></script>
<script>Pi.init({ version: "2.0", sandbox: true });</script>
<style>
:root{
  --ungu:#4B0082; /* Ungu Gelap */
  --kuning:#FFD700; /* Kuning Neon */
  --ungu-card:#6A0DAD; /* Ungu Card */
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;height:100%;background:var(--ungu);color:#fff;font-family:Arial, sans-serif;overflow-x:hidden}
@keyframes float{0%{transform:translateY(0)} 50%{transform:translateY(-15px)} 100%{transform:translateY(0)}}

/* BACKGROUND NEBULA UNGU */
.warp{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-2;background: radial-gradient(ellipse at center, rgba(255,215,0,0.2) 0%, var(--ungu) 40%, #000 100%);animation: zoomIn 20s infinite linear;}
@keyframes zoomIn{0%{transform:scale(0.5)} 100%{transform:scale(3)}}
.stars{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1;background-image: radial-gradient(2px 2px at 20% 30%, var(--kuning), transparent);background-size: 400px 400px;animation: starfield 3s linear infinite;}
@keyframes starfield{0%{background-position: 0 0} 100%{background-position: 0 1000px}}

/* LAYOUT */
.header{position:fixed;top:0;left:0;width:100%;z-index:10;padding:15px 20px;display:flex;justify-content:space-between;align-items:center;background:var(--ungu);border-bottom:3px solid var(--kuning)}
.header .menu{font-size:1.8em;cursor:pointer;color:var(--kuning)}
.logo{font-size:1.5em;font-weight:900;color:var(--kuning)}

.main{padding:80px 20px 120px 20px;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
.char-pi{font-size:12em;animation:float 3s ease-in-out infinite;text-shadow:0 0 30px var(--kuning);margin-bottom:20px}
.main h2{margin:0;font-size:2em;color:var(--kuning)}
.main p{opacity:0.8}

.card{background:var(--ungu-card);border-radius:15px;padding:20px;margin:20px auto;width:90%;max-width:400px;border:2px solid var(--kuning);box-shadow:0 0 15px rgba(255,215,0,0.3)}
.card .harga{font-size:3em;font-weight:900;color:var(--kuning);margin:10px 0}

.footer{position:fixed;bottom:0;left:0;width:100%;z-index:10;padding:15px 20px;background:var(--ungu);border-top:3px solid var(--kuning);text-align:center}
.btn-login{width:90%;max-width:400px;background:var(--kuning);color:var(--ungu);border:none;padding:16px 30px;border-radius:12px;font-size:1.1em;font-weight:900;cursor:pointer;transition:0.3s;box-shadow:0 0 20px var(--kuning)}
.btn-login:active{transform:scale(0.97)}
</style>
</head>
<body>

<div class="warp"></div> 
<div class="stars"></div> 

<!-- HEADER -->
<header class="header">
  <div class="menu" onclick="alert('Menu coming soon')">☰</div>
  <div class="logo">Mall Genesis</div>
  <div style="width:30px"></div>
</header>

<!-- DASHBOARD -->
<main class="main">
  <div class="char-pi">🪙</div>
  <h2>Mall Genesis</h2>
  <p>Lihat gratis. Login untuk jualan & post.</p>
  
  <!-- CONTOH CARD CHART PI -->
  <div class="card">
    <div>📈 Chart Harga Pi Network</div>
    <div class="harga">$0.1258</div>
    <div style="color:#ff5555">-2.22%</div>
  </div>

</main>

<!-- FOOTER -->
<footer class="footer">
  <button id="btnLoginFooter" class="btn-login">Login Pi</button>
</footer>

<script>
let userLogin = null;
let btnLogin = document.getElementById('btnLoginFooter');

window.onload = function(){
  let u = localStorage.getItem('pi_user');
  if(u){
    userLogin = JSON.parse(u);
    btnLogin.textContent = 'Logout @' + userLogin.username;
  }
};

btnLogin.onclick = async function(){
  if(userLogin){ 
    localStorage.removeItem('pi_user'); 
    userLogin = null; 
    btnLogin.textContent = 'Login Pi';
    alert('Logout berhasil');
    return; 
  }
  
  this.textContent = 'Login...'; this.disabled = true;
  try{
    const auth = await Pi.authenticate(['username', 'payments']);
    userLogin = {username: auth.user.username};
    localStorage.setItem('pi_user', JSON.stringify(userLogin));
    btnLogin.textContent = 'Logout @' + userLogin.username;
  }catch(e){
    alert('Gagal login: ' + e.message);
    btnLogin.textContent = 'Login Pi'; 
  }
  this.disabled = false;
};
</script>
</body>
</html>
