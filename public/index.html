<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>My Track</title>
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: {
        colors: { 'emas': '#facc15', 'bg-gelap': '#000' }
      }
    }
  </script>
  <style>
   .glow-putih { text-shadow: 0 0 12px rgba(255,255,255,0.9), 0 0 20px rgba(255,255,255,0.5); }
   .glow-emas { box-shadow: 0 0 15px rgba(250, 204, 21, 0.6); }
   .text-neon {
     font-family: Impact, 'Arial Narrow', 'Arial Black', sans-serif;
     font-weight: 900;
     font-size: 32px;
     line-height: 1.4;
     letter-spacing: -1px;
   }
   .text-neon-kecil { 
     font-family: Impact, 'Arial Narrow', 'Arial Black', sans-serif;
     font-weight: 900;
     font-size: 14px;
     line-height: 1.1;
   }
   .border-emas { border: 2px solid #facc15; }
   .border-emas-b { border-bottom: 2px solid #facc15; }
   .border-emas-t { border-top: 2px solid #facc15; }
   body { background: #000; }
  </style>
</head>
<body>
  <header class="bg-bg-gelap px-2 border-emas-b flex items-center justify-between fixed top-0 w-full h-14">
    <a href="menu.html" class="flex flex-col justify-center space-y-1 w-6 h-6">
      <span class="w-full h-0.5 bg-emas"></span>
      <span class="w-full h-0.5 bg-emas"></span>
      <span class="w-full h-0.5 bg-emas"></span>
    </a>
    <h1 class="text-2xl font-black text-white text-neon glow-putih" style="font-size: 28px;">My Track</h1>
    <div class="w-10 h-10 rounded-full border-2 border-emas glow-emas"></div>
  </header>

  <main class="px-2 pt-14 pb-14">
    <div class="bg-bg-gelap border-emas glow-emas rounded-3xl px-2 py-4 m-1 flex-col justify-between" style="height: calc(100vh - 112px - 8px);">

        <div class="text-center space-y-4"> 
          <p id="tanggal" class="text-neon text-white glow-putih"></p>
          <p id="hargaUSDT" class="text-neon text-white glow-putih">$0.1154</p>
          <p id="hargaIDR" class="text-neon text-white glow-putih">Rp 2.076,48</p>
          <p id="kursUSDIDR" class="text-neon text-red-400 glow-putih">Error</p> <!-- KUNCI: Merah -->
        </div>

        <!-- KUNCI: mb-2 biar gak ketimpa footer -->
        <div class="text-center mb-2"> 
          <div class="w-14 h-14 rounded-xl border-emas ring-2 ring-emas mx-auto bg-blue-600 flex items-center justify-center glow-emas">
            <p class="text-lg text-neon-kecil text-white" style="line-height:1;">My<br>Track</p>
          </div>
          <p class="text-sm text-neon-kecil text-white mt-1 mb-0 leading-tight glow-putih">
            Welcome to Pioneer<br>
            At My Track App<br>
            @2026
          </p>
        </div>
    </div>
  </main>

  <!-- KUNCI: text-white glow-putih = Login Pi putih -->
  <footer class="bg-bg-gelap px-3 border-emas-t flex items-center justify-center fixed bottom-0 w-full h-14">
    <button id="btnBayar" class="text-lg text-neon text-white glow-putih w-full" style="font-size: 20px;">Login Pi</button>
  </footer>

  <script>
    let currentUser = null;
    const btn = document.getElementById('btnBayar');
    window.onload = function() { Pi.init({ version: "2.0", sandbox: true }); };

    function updateTanggal() {
      const now = new Date();
      const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', timeZone: 'Asia/Jakarta' };
      document.getElementById('tanggal').innerText = now.toLocaleDateString('id-ID', options);
    }
    updateTanggal();

    btn.onclick = async () => {
      try {
        btn.innerText = 'Login...';
        const auth = await Pi.authenticate({ scopes: ['username'] });
        btn.innerText = `Halo ${auth.user.username}`;
      } catch (err) {
        btn.innerText = 'Login Pi';
        alert('Login Gagal: ' + err);
      }
    };

    async function updateData() {
      try {
        const res = await fetch('https://api.allorigins.win/raw?url=' + encodeURIComponent('https://api.coingecko.com/api/v3/simple/price?ids=pi-network&vs_currencies=usd,idr'));
        const data = await res.json();
        if(data['pi-network']) {
          const usd = data['pi-network'].usd;
          const idr = data['pi-network'].idr;
          document.getElementById('hargaUSDT').innerText = `$${usd.toFixed(4)}`;
          document.getElementById('hargaIDR').innerText = `Rp ${idr.toLocaleString('id-ID')}`;
          const kurs = idr / usd;
          document.getElementById('kursUSDIDR').innerText = `Rp ${kurs.toLocaleString('id-ID', {minimumFractionDigits: 2})}`;
          document.getElementById('kursUSDIDR').classList.remove('text-red-400'); // Hapus merah kalau sukses
        }
      } catch (e) {
        document.getElementById('kursUSDIDR').innerText = 'Error';
        document.getElementById('kursUSDIDR').classList.add('text-red-400'); // Kasih merah kalau error
      }
    }
    updateData();
    setInterval(updateData, 5000);
  </script>
</body>
</html>
