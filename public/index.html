<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mall Genesis</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}
  body{
    min-height:100vh;
    background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);
    display:flex;justify-content:center;align-items:center;overflow:hidden;color:#fff
  }
  .stars{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none}
  .star{position:absolute;width:2px;height:2px;background:#fff;border-radius:50%;animation:twinkle 3s infinite}
  @keyframes twinkle{0%,100%{opacity:0}50%{opacity:1}}
  .container{
    background:rgba(255,255,255,0.05);backdrop-filter:blur(10px);
    border:1px solid rgba(255,255,255,0.1);border-radius:20px;
    padding:40px 30px;width:90%;max-width:400px;text-align:center;
    box-shadow:0 8px 32px rgba(0,0,0,0.3)
  }
  h1{font-size:28px;margin-bottom:10px;background:linear-gradient(90deg,#00d4ff,#ff00ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  p{opacity:0.7;margin-bottom:30px;font-size:14px}
  input{
    width:100%;padding:15px;margin-bottom:15px;border-radius:10px;
    border:1px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.05);
    color:#fff;font-size:16px;outline:none
  }
  input::placeholder{color:rgba(255,255,255,0.4)}
  button{
    width:100%;padding:15px;border:none;border-radius:10px;
    background:linear-gradient(90deg,#00d4ff,#ff00ff);color:#fff;
    font-size:16px;font-weight:600;cursor:pointer;transition:0.3s
  }
  button:hover{transform:translateY(-2px);box-shadow:0 5px 20px rgba(0,212,255,0.4)}
</style>
</head>
<body>
<div class="stars" id="stars"></div>
<div class="container">
  <h1>Mall Genesis</h1>
  <p>Login dengan Pi Network</p>
  <input type="text" placeholder="Username" id="user">
  <input type="password" placeholder="Password" id="pass">
  <button onclick="login()">Masuk</button>
</div>
<script>
  // Bikin bintang2
  const stars = document.getElementById('stars');
  for(let i=0; i<100; i++){
    const star = document.createElement('div');
    star.className = 'star';
    star.style.left = Math.random()*100 + '%';
    star.style.top = Math.random()*100 + '%';
    star.style.animationDelay = Math.random()*3 + 's';
    stars.appendChild(star);
  }
  function login(){
    alert('Login: ' + document.getElementById('user').value);
  }
</script>
</body>
    </html>
