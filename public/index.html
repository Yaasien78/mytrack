<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Track</title>
<script src="https://sdk.minepi.com/pi-sdk.js"></script>
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }
  html, body { height: 100%; background: #ffffff; }

  .app { display: flex; flex-direction: column; height: 100vh; position: relative; }

  /* HEADER TENGAH */
  header {
    background: #0057d9;
    color: white;
    padding: 10px;
    text-align: center;
    border-bottom: 3px solid #ffcc00;
  }
  .harga { font-weight: bold; font-size: 14px; line-height: 1.4; }

  /* CHAT AREA */
  .chat {
    flex: 1;
    background: #ffffff;
    padding: 15px;
    overflow-y: auto;
    padding-bottom: 80px; /* biar gak ketutup footer */
  }

  /* BUBBLE CHAT AI */
  .chat-ai { display: flex; gap: 10px; margin-top: 10px; }
  .avatar-ai {
    background: #0057d9; color: white; border-radius: 50%;
    width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
    font-weight: bold; flex-shrink: 0;
  }
  .bubble-ai {
    background: white; border: 2px solid #00bfff; border-radius: 15px;
    padding: 12px 15px; color: #0057d9; font-weight: bold; line-height: 1.6;
    box-shadow: 0 0 10px rgba(0,191,255,0.3); position: relative;
  }
  .bubble-ai::before {
    content: ''; position: absolute; left: -10px; top: 12px;
    border: 10px solid transparent; border-right-color: #00bfff;
  }

  /* 4 LOGO DI SUDUT - SAMA BESAR 45px */
  .logo-btn {
    position: absolute;
    width: 45px; height: 45px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: bold; text-decoration: none;
    border: 3px solid #ffcc00;
    background: #0057d9;
    color: white;
    font-size: 22px;
    z-index: 100;
  }

  /* 1. KIRI ATAS - MY TRACK > upload.html */
  .logo-tl { top: 10px; left: 10px; font-size: 10px; line-height: 1.2; }
  
  /* 2. KANAN ATAS - PI > market.html */
  .logo-tr { top: 10px; right: 10px; }

  /* 3. KIRI BAWAH - PALLET > avatar.html */
  .logo-bl { bottom: 70px; left: 10px; background: white; border-color: #0057d9; font-size: 24px; }
  
  /* 4. KAN BAWAH - PLUS > ai.html */
  .logo-br { bottom: 70px; right: 10px; background: white; color: #0057d9; }

</style>
</head>
<body>
  <div class="app">
    <!-- 4 LOGO DI SUDUT -->
    <a href="upload.html" class="logo-btn logo-tl">My<br>Track</a>
    <a href="market.html" class="logo-btn logo-tr">π</a>
    <a href="avatar.html" class="logo-btn logo-bl">🎨</a>
    <a href="ai.html" class="logo-btn logo-br">+</a>

    <!-- HEADER TENGAH -->
    <header>
      <div class="harga">1 Pi = $0.112869 |<br>Rp2.032,77</div>
    </header>

    <!-- CHAT -->
    <div class="chat">
      <div class="chat-ai">
        <div class="avatar-ai">AI</div>
        <div class="bubble-ai">
          AI Tracker Aktif!<br>
          Silahkan cek Harga Pi disini...<br><br>
          Ada yang bisa di bantu...<br>
          Silahkan klik tombol + untuk memulai percakapan.
        </div>
      </div>
    </div>

  </div>

<script>
  Pi.init({ version: "2.0", sandbox: true });
</script>
</body>
</html>
