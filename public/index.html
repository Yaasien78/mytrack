<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Mall Genesis</title>
<script src="https://sdk.minepi.com/pi-sdk.js"></script>
<script>Pi.init({ version: "2.0", sandbox: true });</script>
<style>
*{box-sizing:border-box}
html,body{margin:0;padding:0;height:100%;overflow:hidden;background:#000;color:#fff;font-family:Arial, sans-serif;text-align:center}
@keyframes fadeIn{from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)}}

/* 1. TEROWONGAN GALAKSI SPIRAL UNGU */
.warp{
  position:fixed;top:0;left:0;width:100%;height:100%;z-index:-2;
  background: radial-gradient(ellipse at center, rgba(255,255,255,1) 0%, rgba(255,180,255,0.6) 10%, rgba(138,43,226,0.5) 30%, rgba(75,0,130,0.8) 60%, #000 100%);
  animation: zoomIn 15s infinite linear;
}
@keyframes zoomIn{0%{transform:scale(0.5) rotate(0deg)} 100%{transform:scale(4) rotate(720deg)}}

/* 2. BINTANG NGEBUT HYPERSPACE */
.stars{
  position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1;
  background-image: radial-gradient(2px 2px at 20% 30%, #fff, transparent), radial-gradient(1px 1px at 60% 80%, #fff, transparent), radial-gradient(3px 3px at 90% 20%, #fff, transparent), radial-gradient(1px 1px at 40% 10%, #fff, transparent);
  background-repeat: repeat; background-size: 300px 300px;
  animation: starfield 1.5s linear infinite;
}
@keyframes starfield{0%{background-position: 0 0} 100%{background-position: 0 2000px}}

/* 3. CONTAINER TANPA KACA - CUMA TRANSPARAN */
.container{
  position:relative;z-index:1;
  background:transparent; /* HAPUS KACA, BIR TEMBUS LANGSUNG */
  padding:40px 20px;
  margin-top:15vh; /* TURUNIN DIKIT KE TENGAH */
  animation:fadeIn 1s ease;
}
h1{font-size:2.8em;margin:0 0 10px;font-weight:900;text-shadow:0 0 15px rgba(168,85,247,0.8)} /* KASIH GLOW BIAR NONGOL */
h1 span.mall{color:#fff}
h1 span.gen{background:linear-gradient(45deg,#a855f7,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sub{opacity:0.9;margin-bottom:30px;font-size:1.1em;text-shadow:0 0 10px #000}

.foto{border:2px dashed rgba(255,255,255,0.4);border-radius:15px;padding:25px;cursor:pointer;margin:0 auto 20px;transition:0.3s;width:250px;background:rgba(0,0,0,0.3)} /* AGAK TRANSPARAN AJA */
.foto:hover{background:rgba(138,43,226,0.3)}
.foto input{display:none}
.foto img{max-width:200px;max-height:280px;border-radius:12px;margin:10px auto;display:none;border:3px solid #a855f7;box-shadow:0 0 20px rgba(168,85,247,0.7)} /* RASIO 4x6 */

.btn{background:linear-gradient(45deg,#7c3aed,#db2777);color:#fff;border:none;padding:16px 30px;border-radius:12px;font-size:1.1em;font-weight:700;cursor:pointer;width:250px;opacity:0;pointer-events:none;transition:0.3s;box-shadow:0 0 20px rgba(219,39,119,0.5)}
.btn.show{opacity:1;pointer-events:auto}
.btn:disabled{opacity:0.5}
</style>
</head>
<body>

<div class="warp"></div> 
<div class="stars"></div> 

<div class="container">
  <h1><span class="mall">Mall</span> <span class="gen">Genesis</span></h1>
  <div class="sub">Marketplace dan NFT</div>

  <label class="foto" onclick="document.getElementById('file').click()">
    <img id="img" alt="Preview Foto">
    <span id="txtFoto">📸 Upload Foto 4x6cm</span> <!-- UDAH GANTI 4x6 -->
    <input type="file" id="file" accept="image/*" onchange="uploadFoto(this)">
  </label>

  <button id="btnMasuk" class="btn">Masuk ke Mall</button>
</div>

<script>
function uploadFoto(input){
  if(input.files && input.files[0]){
    let reader = new FileReader();
    reader.onload = function(e){
      localStorage.setItem('fotoMG', e.target.result);
      let img = document.getElementById('img');
      img.src = e.target.result;
      img.style.display = 'block';
      document.getElementById('txtFoto').style.display = 'none';
      document.getElementById('btnMasuk').classList.add('show');
    };
    reader.readAsDataURL(input.files[0]);
  }
}

window.onload = function(){
  let f = localStorage.getItem('fotoMG');
  if(f){
    let img = document.getElementById('img');
    img.src = f;
    img.style.display = 'block';
    document.getElementById('txtFoto').style.display = 'none';
    document.getElementById('btnMasuk').classList.add('show');
  }
};

document.getElementById('btnMasuk').onclick = async function(){
  let b = this; b.textContent = 'Login...'; b.disabled = true;
  try{
    const auth = await Pi.authenticate(['username', 'payments']);
    localStorage.setItem('pi_user', JSON.stringify({username: auth.user.username}));
    window.location.href = '/dashboard.html?user=' + auth.user.username;
  }catch(e){
    alert('Gagal login: ' + e.message);
    b.textContent = 'Masuk ke Mall'; b.disabled = false;
  }
};
</script>
</body>
</html>
