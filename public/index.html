<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mall Genesis - Login</title>
<script src="https://sdk.minepi.com/pi-sdk.js"></script>
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}
  body{
    min-height:100vh;background:#000814;color:#fff;overflow-x:hidden;
    display:flex;flex-direction:column;align-items:center;padding:30px 20px
  }

  /* Bintang2 langit malam */
  #stars{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0}
 .star{position:absolute;width:2px;height:2px;background:#fff;border-radius:50%;
    animation:twinkle 3s infinite;box-shadow:0 0 4px #4a9eff}
  @keyframes twinkle{0%,100%{opacity:0.2}50%{opacity:1}}

 .container{position:relative;z-index:1;width:100%;max-width:400px;display:flex;flex-direction:column;gap:25px}

  /* Head Mall Genesis - Emas ke Silver kanan ke kiri */
  h1{
    font-size:42px;font-weight:900;text-align:center;
    background:linear-gradient(270deg, #C0C0C0 0%, #FFD700 50%, #C0C0C0 100%);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;
    background-size:200% 200%;animation:gradient 4s ease infinite;
    text-shadow:0 0 30px rgba(255,215,0,0.4)
  }
  @keyframes gradient{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}

  /* Sub judul kuning */
 .subtitle{
    text-align:center;font-size:16px;color:#FFD700;font-weight:600;letter-spacing:1px
  }

  /* Kotak foto 4x6cm */
 .photo-box{
    width:4cm;height:6cm;border:3px dashed #FFD700;border-radius:12px;
    margin:0 auto;background:rgba(255,215,0,0.05);cursor:pointer;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    transition:0.3s;overflow:hidden
  }
 .photo-box:hover{border-color:#fff;background:rgba(255,215,0,0.1);transform:scale(1.05)}
 .photo-box img{width:100%;height:100%;object-fit:cover;display:none}
 .photo-box span{font-size:12px;color:#FFD700;text-align:center;padding:10px}

  /* Box login */
 .login-box{
    background:rgba(255,255,255,0.05);backdrop-filter:blur(10px);
    border:1px solid rgba(255,215,0,0.3);border-radius:20px;padding:25px
  }
 .login-box label{font-size:13px;color:#aaa;margin-bottom:8px;display:block}
 .login-box input{
    width:100%;padding:14px;border-radius:10px;border:1px solid rgba(255,215,0,0.3);
    background:rgba(0,0,0,0.4);color:#FFD700;font-size:15px;font-weight:600
  }
 .login-box input:focus{outline:none;border-color:#FFD700;box-shadow:0 0 10px rgba(255,215,0,0.3)}

 .btn{
    width:100%;padding:16px;margin-top:15px;border:none;border-radius:12px;
    background:linear-gradient(90deg,#FFD700,#C0C0C0);color:#000;font-size:16px;
    font-weight:800;cursor:pointer;transition:0.3s
  }
 .btn:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(255,215,0,0.4)}

  input[type=file]{display:none}
</style>
</head>
<body>
  <div id="stars"></div>

  <div class="container">
    <h1>Mall Genesis</h1>
    <p class="subtitle">Marketplace dan Galeri NFT</p>

    <!-- Kotak foto 4x6cm -->
    <label class="photo-box">
      <img id="preview">
      <span id="txt">📷 Klik untuk ambil<br>dari Kamera/Galeri</span>
      <input type="file" accept="image/*" capture="environment" onchange="loadFoto(event)">
    </label>

    <!-- Login box -->
    <div class="login-box">
      <label>Username Pi Network Otomatis</label>
      <input type="text" id="username" readonly placeholder="Klik Masuk untuk login Pi">
      <button class="btn" onclick="loginPi()">Masuk</button>
    </div>
  </div>

<script>
  // Bikin bintang2
  const stars = document.getElementById('stars');
  for(let i=0; i<120; i++){
    let s = document.createElement('div');
    s.className = 'star';
    s.style.top = Math.random()*100 + '%';
    s.style.left = Math.random()*100 + '%';
    s.style.animationDelay = Math.random()*3 + 's';
    stars.appendChild(s);
  }

  // Load foto dari kamera/galeri
  function loadFoto(e){
    const file = e.target.files[0];
    if(file){
      document.getElementById('preview').src = URL.createObjectURL(file);
      document.getElementById('preview').style.display = 'block';
      document.getElementById('txt').style.display = 'none';
    }
  }

  // Login Pi + auto isi username + redirect ke halaman 2
  async function loginPi(){
    try{
      Pi.init({ version: "2.0", sandbox: true }); // ganti false kalo udah live
      const auth = await Pi.authenticate(['username'], ()=>{});

      // Auto isi username
      document.getElementById('username').value = auth.user.username;

      // Auto masuk halaman 2 setelah 1 detik
      setTimeout(()=>{
        window.location.href = `/dashboard.html?user=${auth.user.username}&id=${auth.user.uid}`;
      }, 1000);

    } catch(err){
      alert('Login gagal: ' + err.message + '\n\nPastikan buka dari Pi Browser');
    }
  }
</script>
</body>
</html>
