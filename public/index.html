<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>My Track</title>
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background-color: #ffffff; margin:0; } /* BODY TETEP PUTIH */
 .border-kuning { border: 2px solid #facc15; }
 .bg-dongker { background-color: #1e293b; }
 .bg-ungu-ss { background-color: rgba(168, 85, 247, 0.85); } /* UNGU TRANSPARAN */
 .bg-biru-muda { background-color: #dbeafe; } /* BIRU MUDA DI DALAM */
 .bg-biru-logo { background-color: #3b82f6; }
    header { height: 52px; z-index: 30; }
    footer { height: 52px; z-index: 30; }
    main { padding-top: 52px; padding-bottom: 52px; }
    
    /* GLOSSY EFFECT */
    .glass {
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: inset 0 1px 0 0 rgba(255,255,255,.3);
    }
    
    .text-ss {
      font-family: 'Impact', 'Arial Black', sans-serif;
      font-weight: 900;
      text-shadow: 0 2px 4px rgba(0,0,0,0.8);
      letter-spacing: -1.5px; 
      line-height: 1; 
    }
    .text-ss-lg { font-size: 1.125rem; }
    .text-ss-md { font-size: 1rem; }
    .text-ss-sm { font-size: 0.875rem; }
  </style>
</head>
<body class="font-sans bg-white">
  <!-- HEAD DONGKER -->
  <header class="bg-dongker px-2 border-b-2 border-kuning flex items-center justify-between fixed top-0 w-full">
    <a href="menu.html" class="text-2xl text-yellow-400">≡</a>
    <h1 class="text-lg font-black text-white text-ss">My Track</h1>
    <div class="w-9 h-9 rounded-full bg-ungu-ss border-2 border-yellow-400 flex items-center justify-center">
      <span class="text-yellow-400 text-xl font-black">π</span>
    </div>
  </header>

  <!-- BOX 2 LAPISAN: BIRU MUDA DI BELAKANG UNGU -->
  <main class="px-1.5">
    <div class="bg-biru-muda border-kuning rounded-3xl p-1.5 m-0.5 h-[calc(100vh-104px-6px)] relative overflow-hidden"> 
      
      <!-- LAPISAN 2: UNGU TRANSPARAN GLOSSY DI ATAS BIRU MUDA -->
      <div class="bg-ungu-ss glass absolute inset-0 rounded-3xl flex-col justify-end text-center p-1.5">
      
        <!-- ATAS: HARGA DINAMIS -->
        <div class="flex-col gap-0 mt-auto">
          <p class="text-ss-lg text-ss text-white">Harga Pi/USDT</p>
          <p id="hargaUSDT" class="text-ss-lg text-ss text-white">$0.0000</p>

          <p class="text-ss-md text-ss text-sky-300">Pi/Rupiah</p>
          <p id="hargaIDR" class="text-ss-md text-ss text-white">Rp 0</p>

          <p class="text-ss-md text-ss text-green-300">Dollar/Rupiah</p>
          <p id="kursUSDIDR" class="text-ss-md text-ss text-white">Rp 17,934.50</p>

          <p id="tanggal" class="text-ss-md text-ss text-yellow-300">Kamis, 2 Juli 2026</p>

          <!-- BAWAH: LOGO + WELCOME MEPET FOOTER -->
          <div class="mt-2 mb-0">
            <div class="bg-biru-logo w-11 h-11 rounded-lg border-2 border-yellow-400 ring-2 ring-blue-200 flex items-center justify-center mx-auto">
              <p class="text-ss-md text-ss text-white leading-none">My<br>Track</p>
            </div>

            <p class="text-ss-sm text-ss text-white mt-0.5">Welcome to Pioneer<br>at My Track app @2026</p>
          </div>
        </div>
      </div>

    </div>
  </main>

  <!-- FOOT DONGKER -->
  <footer class="bg-dongker px-3 border-t-2 border-kuning flex items-center justify-center fixed bottom-0 w-full">
    <button id="btnLogin" class="text-ss-md text-ss text-yellow-400 w-full">Loading...</button>
  </footer>

  <script>
    let lastPiUSDT = 0; let lastPiIDR = 0; let lastKurs = 0;

    function updateTanggal() {
      const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', timeZone: 'Asia/Jakarta' };
      document.getElementById('tanggal').innerText = new Date().toLocaleDateString('id-ID', options);
    }
    updateTanggal(); 

    try {
      Pi.init({ version: "2.0", sandbox: true });
      Pi.authenticate({ scopes: ['username', 'payments'], onIncompletePaymentFound: () => {} })
 .then(auth => { document.getElementById('btnLogin').innerText = `Welcome ${auth.user.username}`; })
 .catch(() => { document.getElementById('btnLogin').innerText = 'Loading...'; });
    } catch(e) { document.getElementById('btnLogin').innerText = 'Loading...'; }

    function setColor(id, newVal, lastVal) {
      const el = document.getElementById(id);
      el.classList.remove('price-up', 'price-down');
      if(newVal > lastVal) el.classList.add('price-up');
      if(newVal < lastVal) el.classList.add('price-down');
    }

    async function updateData() {
      try {
        const apiUrl = 'https://api.coingecko.com/api/v3/simple/price?ids=pi-network,usd&vs_currencies=usd,idr';
        const proxyUrl = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(apiUrl);
        const res = await fetch(proxyUrl);
        const data = await res.json();
        
        const pi = data['pi-network'];
        const usd = data['usd'];

        if(pi) {
          const newUSDT = pi.usd || 0;
          const newIDR = pi.idr || 0;
          setColor('hargaUSDT', newUSDT, lastPiUSDT);
          setColor('hargaIDR', newIDR, lastPiIDR);
          document.getElementById('hargaUSDT').innerText = `$${newUSDT.toFixed(4)}`;
          document.getElementById('hargaIDR').innerText = `Rp ${newIDR.toLocaleString('id-ID', {maximumFractionDigits: 0})}`;
          lastPiUSDT = newUSDT; lastPiIDR = newIDR;
        }
        if(usd) {
          const newKurs = usd.idr;
          setColor('kursUSDIDR', newKurs, lastKurs);
          document.getElementById('kursUSDIDR').innerText = `Rp ${newKurs.toLocaleString('id-ID', {minimumFractionDigits: 2})}`;
          lastKurs = newKurs;
        }
      } catch (e) { console.log("API Gagal:", e); }
    }
    updateData(); 
    setInterval(updateData, 3000);
  </script>
</body>
</html>
