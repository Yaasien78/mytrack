<!DOCTYPE html>
<html>
<head>
  <title>My Track</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { margin:0; font-family: Arial; background: #fff; }
    
    /* HEAD - Biru 007 Metalik + Garis Emas 2px */
  .head {
      background: linear-gradient(145deg, #005f8a, #0077b6);
      color: white; display: flex; justify-content: space-between;
      align-items: center; padding: 8px 10px; border-bottom: 2px solid gold;
      position: sticky; top: 0; z-index: 10;
    }
  .logo-head { width: 45px; height: 45px; cursor:pointer; border-radius: 8px; }
  .head-center { font-size: 14px; font-weight: bold; }
  .pi-logo { width: 30px; height: 30px; }

    /* BODY */
  .body { padding: 5px; min-height: 70vh; }
    
    /* VIEW POST */
  .post { border: 1px solid #ddd; margin: 10px 0; padding: 10px; border-radius: 8px; background: #fafafa; }
  .post img,.post video { width: 100%; border-radius: 5px; margin-top: 5px; }

    /* VIEW UPLOAD - Box Putih */
  .upload-box {
      background: white; border: 2px solid #ccc; border-radius: 8px;
      margin: 5px; padding: 10px; position: relative;
    }
  .username-bar {
      border: none; border-bottom: 2px solid #0077b6; width: 100%;
      padding: 5px; font-size: 14px; outline: none; margin-bottom: 10px;
    }
  .content-area {
      width: 100%; height: 200px; border: none; resize: none; outline: none;
    }
  .upload-btn {
      position: absolute; bottom: 15px; right: 15px; font-size: 22px;
      cursor: pointer; color: #0077b6;
    }
    #fileInput { display: none; }

    /* FOOT - Biru Muda Metalik + Tulisan Emas */
  .foot {
      background: linear-gradient(145deg, #48cae4, #90e0ef);
      padding: 12px; text-align: center; position: sticky; bottom: 0;
    }
  .foot-btn {
      background: none; border: none; color: gold; font-weight: bold;
      font-size: 18px; cursor: pointer; width: 100%;
    }
  .foot-user { color: #0077b6; font-size: 12px; }
  </style>
</head>
<body>

  <div class="head">
    <img src="https://i.imgur.com/8QZ9XkP.png" class="logo-head" onclick="showView('upload')"> <!-- KLIK LOGO = KE UPLOAD -->
    <div class="head-center">Pi/USDT: 0.58</div>
    <img src="https://minepi.com/static/media/pi-logo.1b6a0a9c.svg" class="pi-logo">
  </div>

  <div class="body" id="appBody"></div>

  <div class="foot" id="footArea"></div>

<script src="https://sdk.minepi.com/pi-sdk.js"></script>
<script>
Pi.init({ version: "2.0", sandbox: true, clientId: "MU0h1YCvr5HMSJdt_iNaR7YPv0T4qV7MtUnv5uGUz48" });
let currentUser = localStorage.getItem("pi_user");
let currentView = 'post';
let uploadedFile = null;

function showView(view) {
  currentView = view;
  const body = document.getElementById("appBody");
  const foot = document.getElementById("footArea");

  // HALAMAN 1: FEED + LOGIN DI FOOT
  if(view === 'post') {
    body.innerHTML = `<h3>Feed Iklan</h3><div id="feed"></div>`;
    
    if(currentUser) {
      foot.innerHTML = `<div class="foot-user">Login sebagai: ${currentUser}</div>`; // Cuma nampilin username
    } else {
      foot.innerHTML = `<button class="foot-btn" onclick="login()">Login</button>`; // Cuma ada tombol login
    }
  }

  // HALAMAN 2: UPLOAD + SEND BAYAR DI FOOT
  if(view === 'upload') {
    if(!currentUser) {
      alert("Login dulu bro");
      showView('post');
      return;
    }
    body.innerHTML = `
      <div class="upload-box">
        <input class="username-bar" id="usernameBar" value="${currentUser}" readonly>
        <textarea class="content-area" id="caption" placeholder="Tulis caption..."></textarea>
        <label class="upload-btn" for="fileInput">📎</label>
        <input type="file" id="fileInput" accept="image/*,video/*" onchange="previewFile(event)">
        <div id="preview"></div>
      </div>
    `;
    foot.innerHTML = `<button class="foot-btn" onclick="handlePost()">Send 0.01 π to Post</button>`; // BARU ADA BAYAR DI SINI
  }
}

async function login() {
  try {
    const auth = await Pi.authenticate(['username', 'payments']);
    currentUser = auth.user.username;
    localStorage.setItem("pi_user", currentUser);
    showView('post');
  } catch(e) { alert("Login gagal: " + e) }
}

function handlePost() {
  const caption = document.getElementById("caption").value;
  if(!uploadedFile && caption.trim() === "") return alert("Silahkan upload in box");
  
  Pi.createPayment({amount: 0.01, memo: "Post MyTrack", metadata: {}}, {
    onReadyForServerApproval: () => alert("Nunggu server..."),
    onReadyForServerCompletion: () => {
      addPost(caption, uploadedFile);
      alert("Post Berhasil!");
      showView('post');
    },
    onError: (e) => alert("Batal: " + e)
  });
}

function previewFile(e) {
  uploadedFile = e.target.files[0];
  const preview = document.getElementById("preview");
  if(uploadedFile.type.startsWith('image')) {
    preview.innerHTML = `<img src="${URL.createObjectURL(uploadedFile)}" style="width:100px; margin-top:5px">`;
  } else {
    preview.innerHTML = `<video src="${URL.createObjectURL(uploadedFile)}" style="width:100px; margin-top:5px" controls></video>`;
  }
}

function addPost(caption, file) {
  const feed = document.getElementById("feed");
  let media = "";
  if(file) {
    if(file.type.startsWith('image')) media = `<img src="${URL.createObjectURL(file)}">`;
    else media = `<video src="${URL.createObjectURL(file)}" controls></video>`;
  }
  feed.innerHTML = `<div class="post"><b>${currentUser}</b><p>${caption}</p>${media}</div>` + feed.innerHTML;
}

// Auto load awal ke halaman post
showView('post');
</script>
</body>
</html>
