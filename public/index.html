<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Track - Login</title>
<script src="https://sdk.minepi.com/pi-sdk.js"></script>
<style>
body{background:#0b1220;color:#fff;font-family:system-ui;display:flex;justify-content:center;align-items:center;height:100vh;margin:0}
.card{background:#1a2333;padding:30px;border-radius:16px;width:90%;max-width:350px;text-align:center;box-shadow:0 8px 30px #000}
h1{margin:0 0 10px;font-size:24px}
p{color:#a8b3cf;margin:0 0 20px}
button{width:100%;padding:14px;border:0;border-radius:12px;background:#fbbf24;color:#0b1220;font-weight:800;font-size:16px;cursor:pointer}
button:active{transform:scale(.98)}
#warn{color:#f87171;font-size:13px;margin-top:10px;display:none}
</style>
</head>
<body>
<div class="card">
  <h1>My Track</h1>
  <p>Login pakai akun Pi lu</p>
  <button id="btnLogin">Login dengan Pi</button>
  <div id="warn"></div>
</div>

<script>
Pi.init({ version: "2.0", sandbox: true, clientId: "MU0h1YCvr5HMSJdt_iNaR7YPv0T4qV7MtUnv5uGUz48"});
const btn = document.getElementById('btnLogin');
const warn = document.getElementById('warn');

btn.onclick = async ()=>{
  warn.style.display='none';
  btn.disabled = true;
  btn.textContent = 'Nunggu Pi...';
  
  try{
    // INI KUNCINYA: PAKE ARRAY, BUKAN {SCOPES:}
    const auth = await Pi.authenticate(['username', 'payments']); 
    
    localStorage.setItem('pi_username', auth.user.username);
    localStorage.setItem('pi_accessToken', auth.accessToken);
    location.href = 'menu.html'; // langsung lempar ke menu

  }catch(e){
    warn.textContent = 'Login Gagal: ' + e.message;
    warn.style.display='block';
    btn.disabled = false;
    btn.textContent = 'Login dengan Pi';
  }
};
</script>
</body>
</html>
