<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Mall Genesis</title>
<script src="https://sdk.minepi.com/pi-sdk.js"></script>
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}
  html,body{height:100%;background:#000814;overflow:hidden}
  body{display:flex;align-items:center;justify-content:center;padding:5px}

  /* Bintang2 */
  #stars{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0}
.star{position:absolute;width:2px;height:2px;background:#fff;border-radius:50%;
    animation:twinkle 3s infinite}
  @keyframes twinkle{0%,100%{opacity:0.3}50%{opacity:1}}

.wrap{position:relative;z-index:1;width:100%;max-width:280px;text-align:center}

  /* Mall Genesis GEDE + emas silver kanan ke kiri */
.title{margin-bottom:6px}
.title h1{
    font-size:38px;font-weight:900;line-height:1.05;
    background:linear-gradient(270deg,#C0C0C0 0%,#FFD700 50%,#FFF 60%,#FFD700 80%,#C0C0C0 100%);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;
    background-size:300% 100%;animation:slide 3s linear infinite;
    filter:drop-shadow(0 0 15px rgba(255,215,0,0.6))
  }
  @keyframes slide{0%{background-position:300% 0}100%{background-position:-300% 0}}

.sub{font-size:12px;color:#FFD700;font-weight:600;margin-bottom:10px}

  /* Kotak foto 4x6cm - kamera aktif 100% */
.foto-wrap{width:4cm;height:6cm;margin:0 auto 8px;position:relative}
.foto-btn{
    width:100%;height:100%;border:2px dashed #FFD700;border-radius:8px;
    background:rgba(0,0,0,0.6);cursor:pointer;display:flex;
    align-items:center;justify-content:center;flex-direction:column;
    color:#FFD700;font-size:10px;overflow:hidden
  }
.foto-btn img{position:absolute;width:100%;height:100%;object-fit:cover;top:0;left:0;display:none}
  #file{position:absolute;width:100%;height:100%;top:0;left:0;opacity:0;cursor:pointer;z-index:2}

  /* Login box PENDEK + SEMPIT */
.login{
    width:100%;max-width:260px;margin:0 auto;
    background:rgba(255,255,255,0.05);border:1px solid rgba(255,215,0,0.4);
    border-radius:10px;padding:8px 10px
  }
.login p{font-size:10px;color:#ccc;margin-bottom:3px}
  #user{
    width:100%;padding:6px;border:1px solid #FFD700;border-radius:5px;
    background:#000;color:#FFD700;text-align:center;font-size:11px;font-weight:700
  }
.btn{
    width:100%;padding:8px;margin-top:5px;border:none;border-radius:6px;
    background:linear-gradient(90deg,#FFD700,#C0C0C0);color:#000;
    font-weight:800;font-size:12px;cursor:pointer
  }
.btn:active{transform:scale(0.96)}
</style>
</head>
<body>
  <div id="stars"></div>

  <div class="wrap">
    <div class="title">
      <h1>Mall</h1>
      <h1>Genesis</h1>
    </div>
    <p class="sub">Marketplace dan Galeri NFT</p>

    <!-- Kotak foto 4x6cm - capture environment buat kamera langsung -->
    <div class="foto-wrap">
      <button class="foto-btn" type="button">
        <img id="img">
        <span id="txt">📷 Klik untuk<br>Kamera/Galeri</span>
        <input type="file" id="file" accept="image/*" capture="environment">
      </button>
    </div>

    <div class="login">
      <p>Username Pi</p>
      <input id="user" readonly value="Auto login...">
      <button class="btn" onclick="redirect()">Masuk</button>
    </div>
  </div>

<script>
  // Bintang 40 biji
  for(let i=0;i<40;i++){
    let d=document.createElement('div');
    d.className='star';
    d.style.left=Math.random()*100+'%';
    d.style.top=Math.random()*100+'%';
    d.style.animationDelay=Math.random()*3+'s';
    document.getElementById('stars').appendChild(d);
  }

  let piUser = null;

  // Auto login Pi pas buka halaman
  window.onload = async () => {
    try{
      Pi.init({version:"2.0", sandbox:true});
      let auth = await Pi.authenticate(['username'], ()=>{});
      piUser = auth.user.username;
      document.getElementById('user').value = '@' + piUser;
      document.querySelector('.btn').textContent = 'Masuk Dashboard';
    }catch(err){
      document.getElementById('user').value = 'Error login';
      console.log(err);
    }
  }

  // Foto aktif
  document.getElementById('file').onchange = e => {
    let f = e.target.files[0];
    if(f){
      let r = new FileReader();
      r.onload = ev => {
        document.getElementById('img').src = ev.target.result;
        document.getElementById('img').style.display = 'block';
        document.getElementById('txt').style.display = 'none';
      }
      r.readAsDataURL(f);
    }
  }

  // Redirect ke halaman 2
  function redirect(){
    if(!piUser){
      alert('Tunggu login Pi selesai dulu bang');
      return;
    }
    window.location.href = `/dashboard.html?user=${piUser}`;
  }
</script>
</body>
</html>
