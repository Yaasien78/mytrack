<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Mall Genesis</title>
<script src="https://sdk.minepi.com/pi-sdk.js"></script>
<script>Pi.init({ version: "2.0", sandbox: true })</script>
<style>
  *{box-sizing:border-box}
  body{margin:0;padding:0;min-height:100vh;color:#fff;font-family:Arial;overflow:hidden;background:#000}
  @keyframes fadeIn{from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="stars"></div>
<div class="container">
  <h1><span class="mall">Mall</span><br><span class="gen">Genesis</span></h1>
  <div class="sub">Marketplace dan NFT</div>

  <label class="foto" onclick="document.getElementById('file').click()">
    <img id="img" />
    <span>Klik untuk<br>Kamera/Galeri</span>
    <input type="file" id="file" accept="image/*" onchange="uploadFoto(this)">
  </label>

  <button id="btnMasuk" class="btn">Masuk</button>
</div>

<script>
function uploadFoto(input){
  if(input.files && input.files[0]){
    let reader = new FileReader();
    reader.onload = function(e){
      localStorage.setItem('fotoMG', e.target.result);
      let img = document.getElementById('img');
      img.src = e.target.result;
      img.style.setProperty('display', 'block', 'important');
      document.querySelector('.foto span').style.setProperty('display', 'none', 'important');
      document.getElementById('btnMasuk').classList.add('show');
    };
    reader.readAsDataURL(input.files[0]);
  }
}

window.onload = function(){
  let f = localStorage.getItem('fotoMG');
  if(f){
    let img = document.getElementById('img');
    img.src = f;
    img.style.setProperty('display', 'block', 'important');
    document.querySelector('.foto span').style.setProperty('display', 'none', 'important');
    document.getElementById('btnMasuk').classList.add('show');
  }
};

document.getElementById('btnMasuk').onclick = async function(){
  let b = this;
  b.textContent = 'Login...';
  b.disabled = true;
  try{
    const auth = await Pi.authenticate(['username', 'payments']);
    localStorage.setItem('pi_user', JSON.stringify({username: auth.user.username}));
    window.location.href = '/dashboard.html?user=' + auth.user.username;
  }catch(e){
    alert('Gagal login: ' + e.message);
    b.textContent = 'Masuk';
    b.disabled = false;
  }
};
</script>
<script src="menu.js?v=2"></script>
<style>
/* Lapisan Nebula Ungu */
.nebula{
  position:fixed;top:0;left:0;width:100%;height:100%;z-index:-2;
  background: 
    radial-gradient(ellipse at 20% 30%, rgba(138,43,226,0.4) 0%, transparent 50%), /* Ungu */
    radial-gradient(ellipse at 80% 70%, rgba(75,0,130,0.3) 0%, transparent 50%),  /* Ungu Tua */
    radial-gradient(ellipse at 50% 50%, rgba(0,0,50,0.5) 0%, #000 100%);         /* Dasar gelap */
  animation: nebulaMove 60s infinite alternate ease-in-out;
  filter: blur(30px);
}
@keyframes nebulaMove{
 0%{transform:scale(1) rotate(0deg)}
 100%{transform:scale(1.3) rotate(10deg)}
}

/* Efek Supernova Meledak */
.supernova{
  position:fixed;top:50%;left:50%;width:0;height:0;z-index:-1;
  background: radial-gradient(circle, #fff 0%, #FFD700 20%, #FF00FF 40%, transparent 70%);
  border-radius:50%;
  animation: boom 8s infinite;
  box-shadow: 0 0 100px #FF00FF, 0 0 200px #FFD700;
}
@keyframes boom{
 0%{width:0;height:0;opacity:0}
 10%{width:100vw;height:100vh;opacity:1} /* Meledak */
 100%{width:200vw;height:200vh;opacity:0} /* Menghilang */
}
</style>

<div class="nebula"></div>
<div class="supernova"></div>
</body>
</html>
