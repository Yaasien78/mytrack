<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Mall Genesis</title>
<script src="https://sdk.minepi.com/pi-sdk.js"></script>
<script>Pi.init({ version: "2.0", sandbox: true })</script>
<style>
  *{box-sizing:border-box}
  body{margin:0;padding:0;min-height:100vh;color:#fff;font-family:Arial;overflow:hidden;background:#000}

  /* Background terowongan bintang jalan kedepan */
 .stars{position:fixed;top:0;left:0;width:100%;height:100%;background:#000;perspective:500px;z-index:0}
 .stars::before{content:'';position:absolute;width:100%;height:100%;background-image:radial-gradient(2px 2px at 20px 30px, #fff, transparent), radial-gradient(2px 2px at 40px 70px, #fff, transparent), radial-gradient(1px 1px at 90px 40px, #fff, transparent), radial-gradient(1px 1px at 130px 80px, #fff, transparent);background-size:200px 200px;animation:moveStars 10s linear infinite}
  @keyframes moveStars{0%{transform:translateZ(0px)} 100%{transform:translateZ(500px)}}

.container{position:relative;z-index:1;width:100%;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}

  /* Judul Mall gradient emas ke perak */
  h1{font-size:46px;margin:0 0 5px 0;font-weight:900;line-height:1.1;text-align:center;letter-spacing:2px}
  h1.mall{background:linear-gradient(180deg,#FFD700 0%,#C0C0C0 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 15px rgba(255,215,0,0.6))}
  h1.gen{color:#fff;text-shadow:0 0 15px rgba(255,255,255,0.5)}

  /* Sub emas */
 .sub{font-size:16px;margin-bottom:40px;color:#FFD700;font-weight:800;text-align:center;text-shadow:0 0 10px rgba(255,215,0,0.5)}

  /* Kotak foto 4x6cm = 151x227px */
 .foto{width:151px;height:227px;border:3px dashed #FFD700;border-radius:12px;background:rgba(0,0,0,0.4);position:relative;cursor:pointer;margin-bottom:30px;overflow:hidden;transition:0.3s;box-shadow:0 0 20px rgba(255,215,0,0.2)}
 .foto:hover{border-color:#fff;box-shadow:0 0 30px rgba(255,215,0,0.5)}
 .foto img{width:100%!important;height:100%!important;object-fit:cover;border-radius:9px;display:none!important}
 .foto span{position:absolute;width:100%;height:100%;top:0;left:0;display:flex!important;align-items:center;justify-content:center;text-align:center;font-size:13px;font-weight:800;color:#FFD700;text-shadow:0 2px 8px rgba(0,0,0,1);line-height:1.4}
  input[type="file"]{display:none}

    /* Tombol Emas Batangan 3D Realistis */
  .btn{
    width:260px; /* Singkron, gak kepanjangan */
    height:62px; /* Tebal dikit biar berasa batangan */
    padding:0;
    border:none;
    border-radius:10px;
    background:linear-gradient(160deg, #FFF4B3 0%, #FFD700 30%, #DAA520 70%, #8B6914 100%); /* Emas dari atas-miring */
    color:#2a1a00;
    font-weight:900;
    font-size:20px;
    cursor:pointer;
    transition:0.1s;
    display:none;
    /* Efek 3D Lapisan: Bevel atas + Tonjolan bawah + Glow */
    box-shadow: 
      inset 0 3px 4px rgba(255,255,255,0.7),  /* Highlight atas = sisi kena lampu */
      inset 0 -3px 4px rgba(0,0,0,0.25),      /* Shadow bawah = sisi gelap */
      0 10px 0 #7A5A08,                       /* Tonjolan 3D tebal bawah */
      0 14px 20px rgba(255,215,0,0.4);        /* Glow emas */
    text-shadow:0 1px 1px rgba(255,255,255,0.6);
    letter-spacing:1.5px;
    border: 1px solid #F0E68C; /* Pinggiran emas terang */
  }
  .btn:active{
    transform:translateY(10px); /* Turun pas sama tonjolan 10px */
    box-shadow: 
      inset 0 2px 3px rgba(0,0,0,0.3), 
      inset 0 -1px 2px rgba(255,255,255,0.2),
      0 0px 0 #7A5A08, /* Tonjolan hilang = nempel ke bawah */
      0 4px 10px rgba(255,215,0,0.2);
  }
  .btn.show{display:block;animation:fadeIn 0.5s}

  @keyframes fadeIn{from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="stars"></div>
<div class="container">
  <h1><span class="mall">Mall</span><br><span class="gen">Genesis</span></h1>
  <div class="sub">Marketplace dan NFT</div>

  <label class="foto" onclick="document.getElementById('file').click()">
    <img id="img" />
    <span>Klik untuk<br>Kamera/Galeri</span>
    <input type="file" id="file" accept="image/*" onchange="uploadFoto(this)">
  </label>

  <button id="btnMasuk" class="btn">Masuk</button>
</div>

<script>
function uploadFoto(input){
  if(input.files && input.files[0]){
    let reader = new FileReader();
    reader.onload = function(e){
      localStorage.setItem('fotoMG', e.target.result);
      let img = document.getElementById('img');
      img.src = e.target.result;
      img.style.setProperty('display', 'block', 'important');
      document.querySelector('.foto span').style.setProperty('display', 'none', 'important');
      document.getElementById('btnMasuk').classList.add('show');
    };
    reader.readAsDataURL(input.files[0]);
  }
}

window.onload = function(){
  let f = localStorage.getItem('fotoMG');
  if(f){
    let img = document.getElementById('img');
    img.src = f;
    img.style.setProperty('display', 'block', 'important');
    document.querySelector('.foto span').style.setProperty('display', 'none', 'important');
    document.getElementById('btnMasuk').classList.add('show');
  }
};

document.getElementById('btnMasuk').onclick = async function(){
  let b = this;
  b.textContent = 'Login...';
  b.disabled = true;
  try{
    const auth = await Pi.authenticate(['username', 'payments']);
    localStorage.setItem('pi_user', JSON.stringify({username: auth.user.username}));
    window.location.href = '/dashboard.html?user=' + auth.user.username;
  }catch(e){
    alert('Gagal login: ' + e.message);
    b.textContent = 'Masuk';
    b.disabled = false;
  }
};
</script>
<script src="menu.js?v=2"></script>
</body>
</html>
