<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Login MyTrack</title>
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0A0082] flex items-center justify-center h-screen">
  <div class="bg-[#1A1A3D] p-8 rounded-2xl text-center">
    <h1 class="text-2xl font-bold text-yellow-400 mb-4">MyTrack Login</h1>
    <button id="btnLogin" class="bg-yellow-400 text-black font-bold px-8 py-3 rounded-xl">Login dengan Pi</button>
    <p id="status" class="mt-4 text-gray-300"></p>
  </div>

  <script>
    Pi.init({ version: "2.0", sandbox: true, clientId: "MU0h1YCvr5HMSJdt_iNaR7YPv0T4qV7MtUnv5uGUz48" }); // <-- GANTI

    document.getElementById('btnLogin').onclick = async () => {
      document.getElementById('status').innerText = "Membuka Pi...";
      try {
        const auth = await Pi.authenticate(['username', 'payments']);
        
        // KUNCI 1: SIMPEN SEMUA DATA KE HP
        localStorage.setItem('pi_user', JSON.stringify(auth.user)); 
        localStorage.setItem('pi_auth', 'true'); 

        window.location.href = "menu.html"; 
      } catch (err) {
        document.getElementById('status').innerText = "Login Gagal: " + err;
      }
    };
  </script>
</body>
</html>
