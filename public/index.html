<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Mall Genesis</title>
<script src="https://sdk.minepi.com/pi-sdk.js"></script>
<style>
*{box-sizing:border-box}
html,body{margin:0;padding:0;width:100%;min-height:100vh;color:#fff;font-family:Arial;overflow-x:hidden;background:#000814}
body::before{content:"";position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;background:#000814;background-image:radial-gradient(1px 1px at 30px 60px, #fff, transparent),radial-gradient(2px 2px at 90px 140px, #fff, transparent),radial-gradient(1px 1px at 160px 90px, #fff, transparent),radial-gradient(1px 1px at 70px 220px, #fff, transparent),radial-gradient(2px 2px at 180px 280px, #fff, transparent),radial-gradient(1px 1px at 40px 340px, #fff, transparent),radial-gradient(1px 1px at 200px 380px, #fff, transparent),radial-gradient(2px 2px at 110px 450px, #fff, transparent);background-repeat:repeat;background-size:220px 500px;opacity:1}
.container{position:relative;z-index:1;width:100%;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:60px 20px 40px;text-align:center;gap:20px}
h1{font-size:48px;margin:0;line-height:1.1;font-weight:900;background:linear-gradient(180deg,#FFD700 0%,#FFF 40%,#C0C0C0 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 2px #000) drop-shadow(0 0 4px rgba(0,0,0,0.8))}
.sub{color:#FFD700;font-size:14px;margin:0;font-weight:600;text-shadow:0 1px 3px rgba(0,0,0,0.9), 0 0 1px #000}
.foto{width:4cm;height:6cm;border:3px dashed #FFD700;border-radius:12px;background:rgba(0,0,0,0.3);position:relative;cursor:pointer;overflow:hidden;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.foto img{width:100%;height:100%;object-fit:cover;display:none}
.foto span{color:#FFD700;font-size:12px;text-align:center;line-height:1.4;font-weight:600;text-shadow:0 1px 2px #000}
.foto input{position:absolute;width:100%;height:100%;top:0;left:0;opacity:0;cursor:pointer}
.btn{width:100%;max-width:280px;padding:16px;border:none;border-radius:12px;background:#FFD700;color:#000;font-weight:900;font-size:16px;cursor:pointer}
.btn:active{transform:scale(0.97)}
.btn:disabled{opacity:0.6}
</style>
</head>
<body>
<div class="container">
<h1>Mall<br>Genesis</h1>
<div class="sub">Marketplace dan Galeri NFT</div>
<label class="foto">
<img id="img">
<span>📷 Klik untuk<br>Kamera/Galeri</span>
<input type="file" id="file" accept="image/*">
</label>
<button class="btn" onclick="masuk()">Masuk</button>
</div>
<script>
window.addEventListener('DOMContentLoaded',()=>{let f=localStorage.getItem('fotoMG');let i=document.getElementById('img');let s=document.querySelector('.foto span');if(f&&i){i.src=f;i.style.display='block';if(s)s.style.display='none'}let fi=document.getElementById('file');if(fi){fi.onchange=e=>{let fl=e.target.files[0];if(fl){let r=new FileReader();r.onload=ev=>{localStorage.setItem('fotoMG',ev.target.result);i.src=ev.target.result;i.style.display='block';if(s)s.style.display='none'};r.readAsDataURL(fl)}}}});
async function masuk(){let b=document.querySelector('.btn');b.textContent='Login...';b.disabled=true;try{Pi.init({version:"2.0",sandbox:false});let a=await Pi.authenticate(['username'],()=>{});localStorage.setItem('pi_username',a.user.username);window.location.href='/dashboard.html?user='+a.user.username}catch(e){alert('Buka dari Pi Browser ya bang');b.textContent='Masuk';b.disabled=false}}
</script>
</body>
</html>
