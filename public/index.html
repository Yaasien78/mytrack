<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>My Track</title>
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background-color: #ffffff; }
 .border-gold-2 { border: 2px solid #fbbf24; }
 .bg-dongker { background-color: #0f1a2e; }
 .bg-ungu { background-color: #6d28d9; }
 .bg-biru-logo { background-color: #2563eb; }
    header { height: 60px; z-index: 30; } /* HEADER DIKECILIN 4px */
    footer { height: 60px; z-index: 30; } /* FOOTER DIKECILIN 4px */
    main { padding-top: 60px; padding-bottom: 60px; }
    .price-up { color: #4ade80 !important; }
    .price-down { color: #f87171 !important; }
    
    /* KUNCI: SAMA BESAR + RAMPING + RAPET BANGET */
    .text-kurus {
      font-family: 'Arial Narrow', Arial, sans-serif;
      font-weight: 800;
      font-size: 1.125rem; /* text-lg = SAMA SEMUA */
      text-shadow: 0 1px 2px #000; 
      letter-spacing: -2px; /* RAMPING EKSTRIM */
      line-height: 0.9; /* RAPET KE ATAS EKSTRIM */
    }
  </style>
</head>
<body class="font-sans bg-white">
  <!-- HEAD FIXED KECIL -->
  <header class="bg-dongker px-2 border-b-2 border-yellow-400 flex items-center justify-between fixed top-0 w-full">
    <a href="menu.html" class="text-2xl text-yellow-400">≡</a>
    <h1 class="text-lg font-extrabold text-white">My Track</h1>
    <img src="https://minepi.com/favicon.ico" alt="Pi" class="w-8 h-8 rounded-full border-2 border-yellow-400">
  </header>

  <!-- BOX UNGU: PADDING MINIM -->
  <main class="px-1.5">
    <div class="bg-ungu border-gold-2 rounded-2xl p-1.5 m-0.5 h-[calc(100vh-120px-4px)] flex-col items-center justify-start text-center"> 
      
      <!-- SEMUA SAMA BESAR, RAPET GAP-0 -->
      <div class="flex-col gap-0">
        <p class="text-kurus text-white">Harga Pi/USDT</p>
        <p id="hargaUSDT" class="text-kurus text-white">$0.0000</p>

        <p class="text-kurus text-blue-400">Pi/Rupiah</p>
        <p id="hargaIDR" class="text-kurus text-white">Rp 0</p>

        <p class="text-kurus text-green-400">Dollar/Rupiah</p>
        <p id="kursUSDIDR" class="text-kurus text-white">Rp 17,934.50</p>

        <p id="tanggal" class="text-kurus text-yellow-400">Loading...</p>
      </div>

      <!-- LOGO + WELCOME RAPET KE ATAS -->
      <div class="mt-2"> <!-- Margin paling kecil -->
        <div class="bg-biru-logo w-14 h-14 rounded-xl border-2 border-yellow-400 flex items-center justify-center mx-auto"> <!-- w-14 = 56px -->
          <p class="text-kurus text-white leading-none">My<br>Track</p>
        </div>

        <p class="text-kurus text-white mt-0.5">Welcome to Pioneer<br>at My Track app @2026</p> <!-- mt-0.5 = 2px -->
      </div>

    </div>
  </main>

  <!-- FOOT FIXED KECIL -->
  <footer class="bg-dongker px-2 border-t-2 border-yellow-400 flex items-center justify-center fixed bottom-0 w-full">
    <button id="btnLogin" class="text-kurus text-yellow-400 w-full">Loading...</button>
  </footer>

  <script>
    let lastPiUSDT = 0; let lastPiIDR = 0; let lastKurs = 0;

    document.getElementById('tanggal').innerText = 'Loading...';

    try {
      Pi.init({ version: "2.0", sandbox: true });
      Pi.authenticate({ scopes: ['username', 'payments'], onIncompletePaymentFound: () => {} })
 .then(auth => { document.getElementById('btnLogin').innerText = `Welcome ${auth.user.username}`; })
 .catch(() => { document.getElementById('btnLogin').innerText = 'Loading...'; });
    } catch(e) { document.getElementById('btnLogin').innerText = 'Loading...'; }

    function setColor(id, newVal, lastVal) {
      const el = document.getElementById(id);
      el.classList.remove('price-up', 'price-down');
      if(newVal > lastVal) el.classList.add('price-up');
      if(newVal < lastVal) el.classList.add('price-down');
    }

    async function updateData() {
      try {
        const apiUrl = 'https://api.coingecko.com/api/v3/simple/price?ids=pi-network,usd&vs_currencies=usd,idr';
        const proxyUrl = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(apiUrl);
        const res = await fetch(proxyUrl);
        const data = await res.json();
        
        const pi = data['pi-network'];
        const usd = data['usd'];

        if(pi && pi.usd > 0) {
          const newUSDT = pi.usd;
          const newIDR = pi.idr;
          setColor('hargaUSDT', newUSDT, lastPiUSDT);
          setColor('hargaIDR', newIDR, lastPiIDR);
          document.getElementById('hargaUSDT').innerText = `$${newUSDT.toFixed(4)}`;
          document.getElementById('hargaIDR').innerText = `Rp ${newIDR.toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g, ".")}`;
          lastPiUSDT = newUSDT; lastPiIDR = newIDR;
        }
        if(usd) {
          const newKurs = usd.idr;
          setColor('kursUSDIDR', newKurs, lastKurs);
          document.getElementById('kursUSDIDR').innerText = `Rp ${newKurs.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ".")}`;
          lastKurs = newKurs;
        }
      } catch (e) { console.log("API Gagal:", e); }
    }
    updateData(); 
    setInterval(updateData, 3000);
  </script>
</body>
</html>
