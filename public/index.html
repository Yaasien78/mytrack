<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Track - Beranda</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script>Pi.init({ version: "2.0", sandbox: true });</script>
    <style>
        .header-container {
    display: flex !important;          /* 1. Kunci biar sejajar */
    justify-content: space-between;    /* 2. Kiri - Tengah - Kanan */
    align-items: center;               /* 3. Center vertikal */
    width: 100%;                       /* 4. Isi full header */
        }
        :root {
            --blue: #0066cc;
            --gold: #ffcc00;
        }

        body { margin: 0; font-family: Arial; background: white; }

        .header { 
            background: var(--blue);
            color: white; 
            padding: 10px 15px;
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            border-bottom: 3px solid var(--gold); 
            position: relative; 
            z-index: 10; 
        }
        
        .logo-left, .pi-logo-right { 
            height:38px !important; 
            width:38px !important;
            min-width: 38px !important;
            min-height: 38px !important;
            aspect-ratio: 1 / 1;
            box-sizing: border-box;
            cursor:pointer; 
            background: var(--blue); 
            border-radius: 50%; 
            border: 3px solid var(--gold);
            box-shadow: 0 0 0 1px white;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            flex-shrink: 0;
        }
        .pi-logo-right { 
            background: var(--blue);
        }
        .logo-left span { 
            font-size: 10px; 
            font-weight: bold; 
            color: white; 
            line-height: 1.1; 
            text-align: center;
        }
        .pi-logo-right span { 
            font-size: 24px; 
            font-weight: bold; 
            color: white;                
            line-height: 1;
        }
    
.price-center { 
    color:white; 
    font-weight: bold; 
    font-size: 16px; 
    text-align: center;
    line-height: 1.2;
}
        .feed { padding: 15px; }
        footer { 
    background: linear-gradient(var(--blue), #004499); 
    color: white; 
    text-align: center; 
    padding: 15px; 
    position: fixed;      /* 1. Paksa nempel di bawah */
    bottom: 0;            /* 2. Mentok bawah */
    left: 0;
    width: 100%;          /* 3. Lebar full */
    border-top: 3px solid var(--gold); /* 4. Border emas atas */
    box-sizing: border-box;
    z-index: 10;
}

.login-btn { 
    color: var(--gold); 
    font-size: 1.2rem; 
    font-weight: bold; 
    cursor: pointer;
    letter-spacing: 2px; /* Biar lebih keren */
}

/* TAMBAHAN: Kasih jarak biar konten gak ketutup footer */
.feed { 
    padding: 15px; 
    padding-bottom: 80px; /* 80px = tinggi footer + buffer */
            }
           </style>
</head>
<body>
    <header style="background:#0066cc; border-bottom:3px solid #ffd700; width:100%; padding:8px 0;">
    <div style="display:flex; justify-content:space-between; align-items:center; width:100%; padding:0 15px; box-sizing:border-box;">
        
        <!-- KIRI - KLIK KE UPLOAD -->
<a href="upload.html" style="height:42px; width:42px; background:#0066cc; border-radius:50%; border:3px solid #ffd700; box-shadow:0 0 0 2px white; display:flex; align-items:center; justify-content:center; text-decoration:none; flex-shrink:0;">
    <span style="font-size:9px; font-weight:bold; color:white; line-height:1.0; text-align:center;">My<br>Track</span>
</a>

        <!-- 2. TENGAH - 2 BARIS -->
<div id="harga-header" style="color:white; font-weight:bold; font-size:16px; text-align:center; flex:1; line-height:1.3;">
    <div>PI/USDT</div>
    <div>= 0.9876</div>
</div>

        <!-- 3. KAN - KLIK KE MARKET -->
        <a href="market.html" style="height:42px; width:42px; background:#0066cc; border-radius:50%; border:3px solid #ffd700; box-shadow:0 0 0 2px white; display:flex; align-items:center; justify-content:center; text-decoration:none; flex-shrink:0;">
            <span style="font-size:24px; font-weight:bold; color:white;">π</span>
        </a>

    </div>
    </header>

    <div class="feed">
        <h2 style="text-align:center; margin:15px 0; color:#0066cc;">Postingan Terbaru</h2>
        <div id="feed-posts"></div>
    </div>

    <footer>
        <span id="loginBtn" class="login-btn">LOGIN</span>
    </footer>

    <script>
        // script kamu taruh sini
    </script>
    <script>
    const loginBtn = document.getElementById('loginBtn');

    loginBtn.addEventListener('click', async () => {
        try {
            // 1. Minta izin login ke Pi
            const scopes = ['username', 'payments']; 
            const authResult = await Pi.authenticate(scopes, onIncompletePaymentFound);
            
            // 2. Kalau sukses
            console.log("Login Sukses:", authResult);
            loginBtn.innerText = authResult.user.username; // Ganti LOGIN jadi username
            loginBtn.style.color = 'white';
            alert("Selamat datang @" + authResult.user.username);

            // 3. Simpan data user biar gak login lagi
            localStorage.setItem('piUser', JSON.stringify(authResult.user));

        } catch (error) {
            // 4. Kalau gagal / cancel
            console.error("Login Gagal:", error);
            alert("Login dibatalkan");
        }
    });

    // Fungsi buat handle payment yg belum selesai
    function onIncompletePaymentFound(payment) {
        console.log("Ada payment belum selesai:", payment);
    }

    // CEK OTOMATIS: Kalau udah pernah login, langsung ganti jadi username
    window.onload = () => {
        const savedUser = localStorage.getItem('piUser');
        if(savedUser) {
            const user = JSON.parse(savedUser);
            loginBtn.innerText = user.username;
            loginBtn.style.color = 'white';
        }
    }
            </script>
</body>
</html>
