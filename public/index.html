<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Track</title>
<script src="https://sdk.minepi.com/pi-sdk.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }
html, body { height: 100%; background:#000; overflow:hidden; }
.app { display: flex; flex-direction: column; height: 100vh; position:relative; z-index:10; }
#space{position:fixed; top:0; left:0; width:100%; height:100%; z-index:1; cursor:pointer;}

header {
  background: #0057d9; border-bottom: 2px solid #ffcc00;
  color: white; padding: 6px 15px; display: flex;
  justify-content: space-between; align-items: center;
}
.logo {
  width: 45px; height: 45px; border-radius: 50%;
  border: 2px solid #ffcc00; background: #0057d9;
  display: flex; align-items: center; justify-content: center;
  font-weight: bold; font-size: 10px; color: white;
  text-align: center; line-height: 1.1; text-decoration: none;
}
.harga { text-align: center; font-weight: bold; font-size: 14px; line-height: 1.4; }
.pi-logo {
  width: 45px; height: 45px; border-radius: 50%;
  border: 2px solid #ffcc00; background: #0057d9;
  font-weight: bold; font-size: 22px; color: white;
  display: flex; align-items: center; justify-content: center;
  text-decoration: none; line-height: 1;
}

footer {
  background: #0057d9; border-top: 2px solid #ffcc00;
  padding: 6px 15px; display: flex;
  justify-content: space-between; align-items: center;
  margin-top:auto;
}
.footer-left {
  width: 45px; height: 45px; border-radius: 50%;
  border: 2px solid #0057d9; background: white;
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; text-decoration: none;
}
.login-btn {
  background: #0057d9; color: white; border: none;
  padding: 10px 24px; border-radius: 22px;
  font-weight: bold; font-size: 18px; cursor: pointer;
}
.footer-right {
  width: 45px; height: 45px; border-radius: 50%;
  border: 2px solid #0057d9; background: white;
  display: flex; align-items: center; justify-content: center;
  font-size: 28px; color: #0057d9; font-weight: bold;
  text-decoration: none;
}
</style>
</head>
<body>
<canvas id="space"></canvas>

<div class="app">
  <header>
    <a href="upload.html" class="logo">My<br>Track</a>
    <div class="harga">1 Pi = $0.112869 <br>Rp2,032.77</div>
    <a href="market.html" class="pi-logo">π</a>
  </header>
  <footer>
    <a href="avatar.html" class="footer-left">🎨</a>
    <button class="login-btn" id="loginBtn">Login</button>
    <a href="ai.html" class="footer-right">+</a>
  </footer>
</div>

<script>
// TUNGGU SDK PI KE LOAD DULU
window.addEventListener('load', function(){
  Pi.init({ version: "2.0", sandbox: true });
  
  document.getElementById('loginBtn').onclick = function(){
    Pi.authenticate(['username','payments'])
    .then(function(auth) {
      document.getElementById('loginBtn').innerText = 'Hi ' + auth.user.username;
      document.getElementById('loginBtn').style.background = 'transparent';
    })
    .catch(function(error) { 
      alert("Login gagal: " + error); 
      console.error(error);
    });
  }
});

// SCRIPT HYPERSPACE V4 - TITIK AJA
const canvas = document.getElementById('space');
const ctx = canvas.getContext('2d');
let w = canvas.width = window.innerWidth;
let h = canvas.height = window.innerHeight;
let cx = w/2;
let cy = h/2;

let audioUnlocked = false;
const clickSound = new Audio("https://cdn.pixabay.com/audio/2022/03/24/audio_d1714d0c0b.mp3");
clickSound.volume = 0.5;

let stars = [];
let ripples = [];
let colors = ['#ffcc00','#00ccff','#ff00ff','#00ff88','#ff4444','#ffffff'];

// BUAT 250 BINTANG
for(let i=0; i<250; i++){
  stars.push({
    x: (Math.random()-0.5)*w,
    y: (Math.random()-0.5)*h,
    z: Math.random()*w
  })
}

function animate(){
  ctx.fillStyle = 'rgba(0,0,0,0.3)'; // trail tipis
  ctx.fillRect(0,0,w,h);
  
  stars.forEach(s=>{ 
    s.z -= 3; // SPEED SEDANG. Dulu 8, sekarang 3
    
    if(s.z <= 1){
      s.z = w;
      s.x = (Math.random()-0.5)*w;
      s.y = (Math.random()-0.5)*h;
    }
    
    let x = (s.x * (w / s.z)) + cx;
    let y = (s.y * (w / s.z)) + cy;
    let size = (1 - s.z/w) * 3; // UKURAN SEDANG
    
    // HAPUS EKOR. CUMA TITIK
    ctx.fillStyle = 'white';
    ctx.beginPath();
    ctx.arc(x, y, size, 0, Math.PI*2);
    ctx.fill();
  });
  
  // RIPPLE KLIK WARNA
  ripples.forEach((r,i)=>{ 
    r.radius += 10; 
    r.alpha -= 0.03; 
    // BIAS WARNA
    ctx.strokeStyle = `rgba(${r.r},${r.g},${r.b},${r.alpha})`; 
    ctx.lineWidth = 6; 
    ctx.beginPath(); 
    ctx.arc(r.x, r.y, r.radius, 0, Math.PI*2); 
    ctx.stroke(); 
    
    ctx.strokeStyle = `rgba(${r.r},${r.g},${r.b},${r.alpha*0.4})`;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(r.x, r.y, r.radius*1.8, 0, Math.PI*2);
    ctx.stroke();
    
    if(r.alpha <= 0) ripples.splice(i,1); 
  });
  
  requestAnimationFrame(animate);
}
animate();

// KLIK UNTUK BUKA KUNCI SUARA + EFEK
canvas.addEventListener('click', (e)=>{
  // Buka kunci audio di HP
  if(!audioUnlocked){ 
    clickSound.play().catch(()=>{}); 
    audioUnlocked = true; 
  } else {
    clickSound.currentTime = 0; 
    clickSound.play().catch(()=>{});
  }
  
  let color = colors[Math.floor(Math.random()*colors.length)];
  let rgb = {r:parseInt(color.slice(1,3),16), g:parseInt(color.slice(3,5),16), b:parseInt(color.slice(5,7),16)};
  ripples.push({x:e.clientX, y:e.clientY, radius:5, alpha:1, r:rgb.r, g:rgb.g, b:rgb.b});
});

window.addEventListener('resize', ()=>{ 
  w = canvas.width = window.innerWidth; 
  h = canvas.height = window.innerHeight;
  cx = w/2; cy = h/2;
});
</script>
</body>
</html>
