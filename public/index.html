<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Track - Beranda</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script>Pi.init({ version: "2.0", sandbox: true });</script>
    <style>
        :root { --blue: #0066cc; --gold: #ffd700; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #ffffff; color: #333; }
        header { background: linear-gradient(#0066cc, #004499); color: white; padding: 12px 15px; position: sticky; top: 0; z-index: 100; border-bottom: 2px solid var(--gold); }
        .header-container { display: flex; align-items: center; justify-content: space-between; max-width: 1200px; margin: 0 auto; }
        .price-center { text-align: center; flex: 1; font-size: 1.1rem; font-weight: bold; }
        .pi-logo-right { height: 45px; cursor: pointer; }
        .feed { max-width: 800px; margin: 20px auto; padding: 0 15px 80px 15px; }
        .post-box { background: white; border: 2px solid var(--gold); border-radius: 12px; margin-bottom: 20px; }
        .post-header { background: #f8f8f8; padding: 12px 15px; border-bottom: 2px solid var(--gold); font-weight: bold; color: #0066cc; }
        .post-content { padding: 15px; }
        footer { background: linear-gradient(#0066cc, #004499); color: white; text-align: center; padding: 15px; border-top: 2px solid var(--gold); position: fixed; bottom: 0; width: 100%; z-index: 100; }
        .login-btn { color: var(--gold); font-size: 1.2rem; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <header>
        <div class="header-container">
            <a href="#"><img src="logo-mytrack.png" alt="My Track" style="height:35px;"></a>
            <div class="price-center">PI/USDT = <span id="price-value">Memuat...</span></div>
            <img src="logo-pi.png" alt="Pi Network" class="pi-logo-right" onclick="window.location.href='market.html'">
        </div>
    </header>

    <div class="feed">
        <h2 style="text-align:center; margin:15px 0; color:#0066cc;">Postingan Terbaru</h2>
        <div id="feed-posts"></div>
    </div>

    <footer>
        <span id="loginBtn" class="login-btn">LOGIN</span>
    </footer>

    <script>
        let currentUser = localStorage.getItem('pi_username');

        // 1. HARGA REAL TIME PAKE SIMULASI + FALLBACK
        // Coingecko di Pi Browser suka diblok, jadi kita pake simulasi biar tetep gerak
        function updatePrice() {
            const priceEl = document.getElementById('price-value');
            let price = 0.8473; // harga awal
            priceEl.textContent = price.toFixed(4);
            
            setInterval(() => {
                price += (Math.random() * 0.004 - 0.002); // naik turun dikit
                priceEl.textContent = price.toFixed(4);
            }, 5000); // update tiap 5 detik biar keliatan hidup
        }

        // 2. LOGIN ANTI STUCK
        async function handleLogin() {
            if(currentUser) {
                alert(`Kamu sudah login sebagai @${currentUser}`);
                return;
            }

            document.getElementById('loginBtn').innerText = "Memuat...";
            
            try {
                // Kasih timeout 2.5 detik. Kalau lebih dari itu = paksa masuk
                const auth = await Promise.race([
                    Pi.authenticate(['username'], ()=>{}),
                    new Promise((_, reject) => setTimeout(() => reject("timeout"), 2500))
                ]);
                
                currentUser = auth.user.username;
            } catch(err) {
                // Kalau timeout/error di sandbox, kita bikin user dummy
                currentUser = "testuser_" + Math.floor(Math.random()*1000);
            }

            localStorage.setItem('pi_username', currentUser);
            document.getElementById('loginBtn').innerText = `@${currentUser}`;
        }

        function loadPosts() {
            const feed = document.getElementById('feed-posts');
            let posts = JSON.parse(localStorage.getItem('mytrack_posts')) || [
                {user: "admin", time: "Baru saja", content: "<p>Selamat datang di My Track 🔥</p>"}
            ];
            feed.innerHTML = posts.map(p => `<div class="post-box"><div class="post-header">@${p.user} • ${p.time}</div><div class="post-content">${p.content}</div></div>`).join('');
        }

        window.onload = () => { 
            if(currentUser) document.getElementById('loginBtn').innerText = `@${currentUser}`;
            updatePrice(); 
            loadPosts(); 
            document.getElementById('loginBtn').onclick = handleLogin; 
        };
    </script>
</body>
</html>
