<!DOCTYPE html>
<html>
<head>
  <title>My Track - Feed</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { margin:0; font-family: Arial; background: #fff; }
   .head, .foot {
      background: linear-gradient(145deg, #005f8a, #0077b6);
      color: white; border-top: 2px solid gold; border-bottom: 2px solid gold; /* GARIS EMAS */
      position: sticky; z-index: 10;
    }
   .head { display: flex; justify-content: space-between; align-items: center; padding: 8px 10px; top: 0; }
   .foot { padding: 12px; text-align: center; bottom: 0; }
   .logo-head { width: 45px; height: 45px; cursor:pointer; border-radius: 8px; border: 2px solid gold; } /* LOGO GARIS EMAS */
   .head-center { font-size: 14px; font-weight: bold; color: gold; } /* TULISAN HARGA EMAS */
   .pi-logo { width: 30px; height: 30px; cursor:pointer; }
   .body { padding: 5px; min-height: 70vh; }
   .post { border: 2px solid gold; margin: 10px 0; padding: 10px; border-radius: 8px; background: #fafafa; } /* BOX FEED GARIS EMAS */
   .post img,.post video { width: 100%; border-radius: 5px; margin-top: 5px; border: 2px solid gold; } /* MEDIA GARIS EMAS */
   .foot-btn { background: none; border: none; color: gold; font-weight: bold; font-size: 18px; cursor: pointer; width: 100%; } /* TULISAN LOGIN EMAS */
   .foot-user { color: gold; font-size: 12px; font-weight: bold; } /* USERNAME EMAS */
   h3 { color: #0077b6; border-bottom: 2px solid gold; padding-bottom: 5px; } /* JUDUL GARIS EMAS */
  </style>
</head>
<body>
  <div class="head">
    <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAADwAAAA8CAYAAAA6/NlyAAAABHNCSVQICAgIfAhkiAAAAAlwSFlzAAAOxAAADsQBlSsOGwAA..." class="logo-head" onclick="window.location.href='upload.html'">
    <div class="head-center" id="piPrice">Pi/USDT: ...</div>
    <img src="https://minepi.com/static/media/pi-logo.1b6a0a9c.svg" class="pi-logo" onclick="window.location.href='market.html'">
  </div>

  <div class="body" id="appBody">
    <h3>Feed Iklan</h3><div id="feed"></div>
  </div>

  <div class="foot" id="footArea"></div>

<script src="https://sdk.minepi.com/pi-sdk.js"></script>
<script>
Pi.init({ version: "2.0", sandbox: true, clientId: "MU0h1YCvr5HMSJdt_iNaR7YPv0T4qV7MtUnv5uGUz48" });
let currentUser = localStorage.getItem("pi_user");

function loadFoot() {
  const foot = document.getElementById("footArea");
  if(currentUser) {
    foot.innerHTML = `<div class="foot-user">Login sebagai: ${currentUser}</div>`;
  } else {
    foot.innerHTML = `<button class="foot-btn" onclick="login()">Login</button>`;
  }
}

async function login() {
  try {
    const auth = await Pi.authenticate(['username', 'payments']);
    currentUser = auth.user.username;
    localStorage.setItem("pi_user", currentUser);
    loadFoot();
  } catch(e) { alert("Login gagal: " + e) }
}

function loadPosts() {
  const posts = JSON.parse(localStorage.getItem("mytrack_posts") || "[]");
  const feed = document.getElementById("feed");
  feed.innerHTML = posts.map(p => `
    <div class="post"><b style="color:gold">${p.user}</b><p>${p.caption}</p>${p.media}</div>
  `).join('');
}

async function getPiPrice() {
  try {
    const res = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=pi-network&vs_currencies=usdt');
    const data = await res.json();
    document.getElementById("piPrice").innerText = `Pi/USDT: ${data['pi-network'].usdt}`;
  } catch(e) { document.getElementById("piPrice").innerText = `Pi/USDT: 0.58`; }
}

loadFoot();
loadPosts();
getPiPrice();
setInterval(getPiPrice, 30000);
</script>
</body>
</html>
