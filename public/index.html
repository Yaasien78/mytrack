<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Track</title>
<style>
  body { margin: 0; font-family: Arial, sans-serif; background: #f5f5f5; }
  .page { display: none; height: 100vh; flex-direction: column; }
  .page.active { display: flex; }

  /* HEADER BIRU */
  .header { background: #004aad; padding: 10px 15px; border-bottom: 3px solid #ffcc00; display: flex; justify-content: space-between; align-items: center; color: white; }
  .circle { width: 50px; height: 50px; border-radius: 50%; background: #004aad; border: 3px solid #ffcc00; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; flex-shrink: 0; text-decoration: none; font-size: 22px; }
  .circle:first-child { font-size: 10px; line-height: 1.1; text-align: center; }
  #piPrice { font-size: 18px; font-weight: bold; flex: 1; text-align: center; }

  /* CHAT */
  .chat { flex: 1; overflow-y: auto; padding: 20px 15px; background: #f5f5f5; }
  .bubble-ai { background: white; border: 2px solid #00bfff; border-radius: 20px; padding: 15px 18px; color: #004aad; font-size: 16px; line-height: 1.8; box-shadow: 0 2px 8px rgba(0,0,0,0.1); max-width: 85%; }
  .avatar-ai { width: 45px; height: 45px; border-radius: 50%; background: linear-gradient(135deg, #004aad, #00bfff); color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; flex-shrink: 0; margin-right: 10px; font-size: 16px; }
  .msg-row { display: flex; align-items: flex-start; margin-bottom: 15px; }

  /* FOOTER BIRU */
  .footer { background: #004aad; padding: 8px 15px; border-top: 3px solid #ffcc00; display: flex; align-items: center; gap: 10px; color: white; }
  .avatar-user { width: 45px; height: 45px; border-radius: 50%; background: white; flex-shrink: 0; overflow: hidden; cursor: pointer; border: 2px solid white; }
  .avatar-user img { width: 100%; height: 100%; object-fit: cover; }
  .username { flex: 1; text-align: center; font-weight: bold; font-size: 16px; }
  .btn-plus { width: 45px; height: 45px; border-radius: 50%; background: white; color: #004aad; font-size: 30px; border: none; font-weight: bold; cursor: pointer; }
</style>
</head>
<body>

<!-- HALAMAN AI CHAT FULL -->
<div id="page-chat" class="page active">
  <div class="header">
    <div class="circle">My<br>Track</div>
    <div id="piPrice">Loading Pi Price...</div>
    <a href="market.html" class="circle">π</a>
  </div>
  
  <div class="chat">
    <div class="msg-row">
      <div class="avatar-ai">AI</div>
      <div class="bubble-ai">
        AI Tracker Aktif!<br>
        Silahkan cek Harga Pi disini...<br><br>
        Ada yang bisa di bantu...<br><br>
        Silahkan klik tombol <b>+</b> untuk memulai percakapan.
      </div>
    </div>
  </div>

  <div class="footer">
    <div class="avatar-user" id="btnBackAvatar">
      <img src="palette.png"> <!-- LOGO PALETTE -->
    </div>
    <div class="username">@Yaasien</div>
    <button class="btn-plus">+</button>
  </div>
</div>

<script src="https://sdk.minepi.com/pi-sdk.js"></script>
<script>
Pi.init({ version: "2.0", sandbox: true });

// AMBIL HARGA PI
async function updatePrice() {
  try {
    const res = await fetch('https://api.pi-blockchain.com/v1/price');
    const data = await res.json();
    const usd = parseFloat(data.usd).toFixed(6);
    const idr = (usd * 17880).toLocaleString('id-ID');
    document.getElementById('piPrice').innerHTML = `1 Pi = $${usd} | Rp${idr}`;
  } catch (e) {
    document.getElementById('piPrice').innerHTML = 'Gagal Load Harga';
  }
}
updatePrice();
setInterval(updatePrice, 30000);

// KLIK PALETTE BALIK KE HALAMAN AVATAR
document.getElementById('btnBackAvatar').onclick = () => {
  alert('Fitur balik ke avatar belum aktif di halaman ini');
}
</script>
</body>
</html>
