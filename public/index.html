<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market Pi</title>
    <link rel="stylesheet" href="page.css">
    
    <!-- 1. SDK PI WAJIB -->
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script>
        // Ganti sandbox: false kalau udah rilis beneran
        Pi.init({ version: "2.0", sandbox: true }); 
    </script>
</head>
<body>

    <!-- 2. HEAD -->
    <div class="app-head">
        <img src="https://i.imgur.com/8Km9tLL.png" alt="Logo" onclick="window.location='index.html'">
        <h1 id="judul-head">Market Pi</h1>
        <img src="https://pi.app/static/media/pi-logo.123.png" alt="Pi Logo">
    </div>

    <!-- 3. ISI KONTEN -->
    <div class="konten">
        <h2>Selamat Datang di Market Pi 💛</h2>
        <p>Jual Beli Barang Pakai Pi Coin</p>
        <p>Login dulu untuk mulai</p>
    </div>

    <!-- 4. FOOT -->
    <div class="app-foot">
        <button id="btn-login-pi" class="btn-primary">Login dengan Pi</button>
    </div>

    <!-- 5. SCRIPT LOGIN -->
    <script>
        const btnLogin = document.getElementById("btn-login-pi");
        const judulHead = document.getElementById("judul-head");

        // CEK UDAH LOGIN APA BELUM
        window.onload = function() {
            const username = localStorage.getItem("pi_username");
            if(username){
                btnLogin.innerText = "Halo " + username;
                btnLogin.disabled = true;
                judulHead.innerText = "Halo, " + username;
            }
        }

        // KLIK TOMBOL LOGIN
        btnLogin.onclick = function() {
            btnLogin.innerText = "Loading...";
            btnLogin.disabled = true;

            Pi.authenticate(['username', 'payments'], 
                // SUKSES
                function(auth) {
                    const username = auth.user.username;
                    localStorage.setItem("pi_username", username);
                    alert("Login Berhasil! Halo " + username);
                    // Langsung lempar ke upload
                    window.location.href = 'upload.html'; 
                }, 
                // GAGAL
                function(error) {
                    alert("Login Gagal: " + error);
                    btnLogin.innerText = "Login dengan Pi";
                    btnLogin.disabled = false;
                }
            );
        }
    </script>

</body>
  </html>
