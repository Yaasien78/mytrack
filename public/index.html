<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Track</title>
  
  <!-- 1. PI SDK WAJIB PALING ATAS -->
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  
  <style>
    body { background-color: #1a0033; } /* Ungu gelap kayak SS lu */
  </style>
</head>
<body class="text-yellow-400 flex items-center justify-center min-h-screen font-bold">
  
  <div id="app" class="text-center">
    <h1 class="text-5xl mb-6" style="text-shadow: 2px 2px 4px #000;">My Track</h1>
    
    <!-- Loading Dulu -->
    <div id="loading">
      <div class="w-16 h-16 border-4 border-yellow-400 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
      <p class="text-xl">Loading Pi SDK...</p>
    </div>

    <!-- Tombol Login, disembunyiin dulu -->
    <button id="loginBtn" class="hidden bg-purple-600 hover:bg-purple-700 p-4 rounded-xl text-xl text-white">
      Login with Pi
    </button>
  </div>

  <script>
    // TUNGGU SDK BENERAN KELOAD
    window.addEventListener('load', async () => {
      
      if (typeof Pi === 'undefined') {
        document.getElementById('loading').innerHTML = `<p class="text-red-500">Gagal load SDK. Buka pakai Pi Browser ya!</p>`;
        return;
      }

      // 2. INIT SDK - GANTI "mytrack" SAMA APP ID LU
      Pi.init({ app: "mytrack", version: "2.0", sandbox: false }); // FALSE = LIVE

      // Kalo SDK udah siap, sembunyiin loading, munculin tombol
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('loginBtn').classList.remove('hidden');

      // 3. LOGIC LOGIN
      document.getElementById('loginBtn').onclick = async () => {
        try {
          const scopes = ['username', 'payments', 'wallet_address'];
          const auth = await Pi.authenticate(scopes, (payment) => {});
          
          // Kalo berhasil login
          document.getElementById('app').innerHTML = `
            <h1 class="text-3xl mb-2">Halo, ${auth.user.username} ✅</h1>
            <p class="text-sm break-all">Wallet: ${auth.user.wallet_address}</p>
          `;
        } catch (err) {
          alert('Gagal login: ' + err);
        }
      };
    });
  </script>
</body>
</html>
