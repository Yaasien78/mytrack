<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Track 1.0</title>
<script src="https://sdk.minepi.com/pi-sdk.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  body { font-family: Arial; background: #0f172a; color: #fff; margin:0; padding:0; min-height:100vh; display:flex; flex-direction:column; }
  header { display:flex; justify-content:space-between; align-items:center; padding:12px 20px; background:#1e293b; border-bottom:1px solid #334155; position:sticky; top:0; }
 .container { padding:20px; max-width:600px; margin:auto; flex:1; }
 .card { background:#1e293b; padding:16px; border-radius:16px; margin-bottom:16px; text-align:center; }
 .harga-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
 .harga-item { background:#334155; padding:12px; border-radius:12px; font-size:14px; }
 .harga-item b { font-size:18px; color:#fbbf24; }
  footer { text-align:center; padding:20px; color:#94a3b8; font-size:13px; border-top:1px solid #334155; margin-top:auto; }
  #loading { text-align:center; padding:100px 20px; font-size:18px; }
 .hidden { display: none; }
  #username{color:#38bdf8}
  #loginBtn { background:#fbbf24; color:#000; border:none; padding:12px 20px; border-radius:12px; font-size:14px; font-weight:bold; cursor:pointer; margin-top:10px; width:100%; }
</style>
</head>
<body>

<div id="loading">Cek Login...</div>

<div id="dashboard" class="hidden">
  <!-- HEADER -->
  <header>
    <div><img src="https://minepi.com/static/logo.png" height="28"> My Track 1.0</div>
    <a href="menu.html" style="color:#fff;font-size:24px;text-decoration:none">☰</a>
  </header>

  <!-- BODY -->
  <div class="container">
    <div class="card">
      <div id="tanggal" style="color:#94a3b8; font-size:14px;"></div>
      <h2 style="margin:8px 0 0;">Welcome <span id="username">...</span> 👋</h2>
    </div>

    <div class="card harga-grid">
      <div class="harga-item">Pi/USDT<br><b id="piUsdt">-</b></div>
      <div class="harga-item">Pi/IDR<br><b id="piIdr">-</b></div>
      <div class="harga-item">USDT/IDR<br><b id="usdtIdr">-</b></div>
      <div class="harga-item">Update<br><b id="lastUpdate">-</b></div>
    </div>

    <div class="card">
      <canvas id="chart"></canvas>
    </div>
  </div>

  <!-- FOOTER + TOMBOL LOGIN DISINI -->
  <footer>
    <span id="footerText">Belum Login</span> <br>
    <button id="loginBtn" class="hidden">Masuk dengan Pi</button>
    <div style="margin-top:8px;">My Track 1.0 @2026</div>
  </footer>
</div>

<script>
  alert("1. SDK Kebaca"); // TES 1
  
  Pi.init({ version: "1.0" });
  alert("2. Init Sukses"); // TES 2

  window.onload = async function() {
    alert("3. Window Load"); // TES 3
    try {
      alert("4. Mau Auth"); // TES 4
      const auth = await Pi.authenticate(['username']);
      alert("5. Sukses: " + auth.user.username); // TES 5
    } catch (err) {
  alert("ERROR DI AUTH: " + JSON.stringify(err)); // Kirim SS ini bro
            }
    } catch (err) {
      alert("ERROR DI AUTH: " + JSON.stringify(err)); // INI KUNCI NYA
    }
  }
</script>

</body>
                                                          </html>
