<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Track</title>
<style>
  
  html, body {
  height: 100%;
  margin: 0;
  padding: 0;
  background: #000;
}

.app {
  display: flex;
  flex-direction: column;
  height: 100vh;
  background: #000;
}

.chat {
  flex: 1;
  position: relative;
  overflow: hidden;
  background: #090a0f; /* BASE LANGIT MALAM */
}

/* NEBULA UNGU BERGERAK */
.chat::before {
  content: '';
  position: absolute;
  top: -20%; left: -20%;
  width: 140%; height: 140%;
  background: radial-gradient(circle at 30% 40%, rgba(168,85,247,0.5) 0%, transparent 60%);
  animation: nebulaMove 20s infinite alternate ease-in-out;
  z-index: 0;
}

/* NEBULA BIRU BERGERAK */
.chat::after {
  content: '';
  position: absolute;
  top: -20%; left: -20%;
  width: 140%; height: 140%;
  background: radial-gradient(circle at 70% 60%, rgba(0,191,255,0.4) 0%, transparent 60%);
  animation: nebulaMove 25s infinite alternate-reverse ease-in-out;
  z-index: 0;
}

/* BINTANG */
.stars {
  position: absolute;
  width: 100%; height: 100%;
  background-image: 
    radial-gradient(2px 2px at 20px 30px, #fff, transparent),
    radial-gradient(2px 2px at 40px 70px, #fff, transparent),
    radial-gradient(1px 1px at 90px 40px, #fff, transparent);
  background-size: 200px 200px;
  animation: twinkle 4s infinite;
  z-index: 1;
}

@keyframes nebulaMove {
  from { transform: rotate(0deg) scale(1); }
  to { transform: rotate(180deg) scale(1.1); }
}
@keyframes twinkle {
  0%,100% { opacity: 0.3; }
 50% { opacity: 1; }
}

/* BIAR TOMBOL DI ATAS NEBULA */
.price-bar, footer { position: relative; z-index: 10; }
  /* HEADER SIMETRIS */
  .header { background: #004aad; padding: 6px 12px; border-bottom: 2px solid #ffcc00; display: flex; justify-content: space-between; align-items: center; color: white; flex-shrink: 0; }
  
  /* FOOTER SIMETRIS */
  .footer { background: #004aad; padding: 6px 12px; border-top: 2px solid #ffcc00; display: flex; justify-content: space-between; align-items: center; color: white; flex-shrink: 0; }
  
  /* SEMUA LOGO SAMA UKURAN 40px */
  .logo { 
    width: 40px; 
    height: 40px; 
    border-radius: 50%; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    text-decoration: none; 
    flex-shrink: 0; 
    box-sizing: border-box;
  }
  
  /* LOGO HEADER: BORDER KUNING BG BIRU TULISAN PUTIH */
  .logo-header { 
    background: #004aad; 
    border: 2px solid #ffcc00; 
    color: white; 
    font-weight: bold; 
  }
  .logo-header:first-of-type { font-size: 8px; line-height: 1.1; text-align: center; }
  .logo-header:last-of-type { font-size: 18px; margin-right: 4px; } /* DIGESER KE KIRI 4px */
  
  /* PRICE 2 BARIS DI TENGAH */
  .price-wrap { 
    flex: 1; 
    text-align: center; 
    display: flex; 
    flex-direction: column; 
    justify-content: center; 
    line-height: 1.3;
  }
  .price-usd { font-size: 14px; font-weight: 600; }
  .price-idr { font-size: 14px; font-weight: 600; }
  
  /* LOGO FOOTER: BG PUTIH */
  .logo-footer { 
    background: white; 
    border: 2px solid white; 
  }
  .logo-footer:first-of-type { font-size: 28px; } /* PALETTE */
  .logo-footer:last-of-type { font-size: 28px; color: #004aad; font-weight: bold; } /* + BIRU */
  
  /* LOGIN TENGAH FOOTER */
  .btn-login-footer { 
    padding: 8px 22px; 
    background: #004aad; 
    color: white; 
    text-align: center; 
    border-radius: 20px; 
    text-decoration: none; 
    font-weight: bold; 
    font-size: 15px; 
    border: 2px solid #ffcc00; 
  }
  html, body {
  height: 100%;
  margin: 0;
  padding: 0;
  background: #000;
}

.app {
  display: flex;
  flex-direction: column;
  height: 100vh;
}

.chat {
  flex: 1;
  position: relative;
  overflow: hidden;
  background: radial-gradient(ellipse at bottom, #1b2735 0%, #090a0f 100%); /* LANGIT MALAM */
  cursor: pointer;
}

/* LAPISAN NEBULA 1 - UNGU HIDUP */
.chat::before {
  content: '';
  position: absolute;
  top: -50%; left: -50%;
  width: 200%; height: 200%;
  background: radial-gradient(circle at 30% 40%, rgba(168,85,247,0.4) 0%, transparent 50%);
  animation: nebulaMove 20s infinite alternate ease-in-out;
}

/* LAPISAN NEBULA 2 - BIRU HIDUP */
.chat::after {
  content: '';
  position: absolute;
  top: -50%; left: -50%;
  width: 200%; height: 200%;
  background: radial-gradient(circle at 70% 60%, rgba(0,191,255,0.3) 0%, transparent 50%);
  animation: nebulaMove 25s infinite alternate-reverse ease-in-out;
}

/* BINTANG JATUH */
.stars {
  position: absolute;
  width: 100%; height: 100%;
  background: transparent;
  z-index: 1;
}
.stars::before {
  content: '';
  position: absolute;
  width: 2px; height: 2px;
  background: #fff;
  box-shadow: 
    50px 100px #fff, 200px 300px #fff, 400px 150px #fff,
    600px 400px #fff, 800px 200px #fff, 100px 500px #fff;
  animation: twinkle 3s infinite;
}

@keyframes nebulaMove {
  from { transform: rotate(0deg) scale(1); }
  to { transform: rotate(360deg) scale(1.2); }
}
@keyframes twinkle {
  0%,100% { opacity: 0.2; }
 50% { opacity: 1; }
           }

</style>
</head>
<body>

<div class="header">
  <a href="upload.html" class="logo logo-header">My<br>Track</a> <!-- KIRI ATAS -->
  
  <div class="price-wrap"> <!-- PRICE 2 BARIS -->
    <div class="price-usd">1 Pi = $0.111576</div>
    <div class="price-idr">Rp1,997.22</div>
  </div>
  
  <a href="market.html" class="logo logo-header">π</a> <!-- KANAN ATAS DIGESER KIRI -->
</div>

<div class="chat">
  <div class="stars"></div>
</div>
  <a href="avatar.html" class="logo logo-footer">🎨</a> <!-- KIRI BAWAH -->
<button id="btnLogin" class="btn-login-footer">Login</button>
  <a href="ai.html" class="logo logo-footer">+</a> <!-- KANAN BAWAH -->
</div>

<script src="https://sdk.minepi.com/pi-sdk.js"></script>
<script>

async function updatePrice() {
  const usdEl = document.querySelector('.price-usd');
  const idrEl = document.querySelector('.price-idr');
  try {
    const res = await fetch('https://api.pi-blockchain.com/v1/price');
    if(!res.ok) throw new Error('API error');
    const data = await res.json();
    const usd = parseFloat(data.usd).toFixed(6);
    const idr = (usd * 17880).toLocaleString('id-ID');
    usdEl.innerHTML = `1 Pi = $${usd}`;
    idrEl.innerHTML = `Rp${idr}`;
  } catch (e) {
    usdEl.innerHTML = `1 Pi = $0.111576`;
    idrEl.innerHTML = `Rp1,997.22`;
  }
}
updatePrice();
setInterval(updatePrice, 60000);
  // INIT PI SDK
Pi.init({ version: "2.0", sandbox: false }); 

const btnLogin = document.getElementById('btnLogin');

// CEK KALAU UDAH LOGIN
const savedUser = localStorage.getItem('pi_username');
if(savedUser){
  btnLogin.innerText = '@' + savedUser;
}

// EVENT LOGIN
btnLogin.addEventListener('click', async () => {
  // kalau udah login, klik buat logout
  if(localStorage.getItem('pi_username')){
    localStorage.removeItem('pi_username');
    btnLogin.innerText = 'Login';
    alert('Logout Berhasil');
    return;
  }

  try {
    const scopes = ['username', 'payments'];
    const authResult = await Pi.authenticate(scopes, onIncompletePaymentFound);
    
    const username = authResult.user.username;
    localStorage.setItem('pi_username', username);
    btnLogin.innerText = '@' + username; // GANTI JADI USERNAME
    
  } catch (err) {
    alert('Login dibatalkan / Gagal');
  }
});

function onIncompletePaymentFound(payment) {
  console.log('Ada payment belum selesai:', payment);
  }
  .star-burst {
  position: absolute;
  width: 10px; height: 10px;
  border-radius: 50%;
  pointer-events: none;
  animation: explode 0.8s ease-out forwards;
  z-index: 5;
}
@keyframes explode {
 0% { transform: scale(0.2); opacity: 1; }
  100% { transform: scale(10); opacity: 0; box-shadow: 0 0 40px 15px currentColor; }
  }
  const chat = document.querySelector('.chat');
const burstColors = ['#a855f7', '#00bfff', '#ff00ff', '#ffcc00', '#00ff88'];

chat.addEventListener('click', (e) => {
  const star = document.createElement('div');
  star.classList.add('star-burst');
  const randomColor = burstColors[Math.floor(Math.random() * burstColors.length)];
  star.style.left = `${e.clientX}px`;
  star.style.top = `${e.clientY}px`;
  star.style.background = randomColor;
  star.style.color = randomColor;
  chat.appendChild(star);
  setTimeout(() => star.remove(), 800);
});
</script>
</body>
</html>
