  *{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}
  html,body{height:100%;background:#000814;overflow:hidden}
  body{display:flex;align-items:center;justify-content:center;padding:6px}

  /* Bintang2 pasti muncul */
  #stars{position:absolute;top:0;left:0;width:100%;height:100%;z-index:0}
.star{position:absolute;width:2px;height:2px;background:#fff;border-radius:50%;

  @keyframes twinkle{0%,100%{opacity:0.2}50%{opacity:1}}

.box{position:relative;z-index:1;width:100%;max-width:310px;text-align:center}

.title{margin-bottom:8px}
.title h1{

    background:linear-gradient(270deg,#C0C0C0 0%,#FFD700 50%,#C0C0C0 100%);

    animation:slide 3.5s linear infinite;background-size:200% 100%;
    filter:drop-shadow(0 0 10px rgba(255,215,0,0.4))
  }
  @keyframes slide{0%{background-position:200% 0}100%{background-position:-200% 0}}

.sub{font-size:11.5px;color:#FFD700;margin-bottom:10px;font-weight:600}

  }
