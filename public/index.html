    <script>
    const loginBtn = document.getElementById('loginBtn');

    loginBtn.addEventListener('click', async () => {
        try {
            // 1. Minta izin login ke Pi
            const scopes = ['username', 'payments']; 
            const authResult = await Pi.authenticate(scopes, onIncompletePaymentFound);
            
            // 2. Kalau sukses
            console.log("Login Sukses:", authResult);
            loginBtn.innerText = authResult.user.username; // Ganti LOGIN jadi username
            loginBtn.style.color = 'white';
            alert("Selamat datang @" + authResult.user.username);

            // 3. Simpan data user biar gak login lagi
            localStorage.setItem('piUser', JSON.stringify(authResult.user));

        } catch (error) {
            // 4. Kalau gagal / cancel
            console.error("Login Gagal:", error);
            alert("Login dibatalkan");
        }
    });

    // Fungsi buat handle payment yg belum selesai
    function onIncompletePaymentFound(payment) {
        console.log("Ada payment belum selesai:", payment);
    }

    // CEK OTOMATIS: Kalau udah pernah login, langsung ganti jadi username
    window.onload = () => {
        const savedUser = localStorage.getItem('piUser');
        if(savedUser) {
            const user = JSON.parse(savedUser);
            loginBtn.innerText = user.username;
            loginBtn.style.color = 'white';
        }
    }
            </script>
    <script>
// AMBIL HARGA PI DARI COINGECKO - UPDATE TIAP 30 DETIK
async function getPiPrice() {
    try {
        // Catatan: Pi belum ada di CG resmi. Sementara pakai "io" dulu
        // Nanti ganti ke API resmi Pi Network kalau udah ada
        const res = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=pi-network&vs_currencies=usd,idr');
        const data = await res.json();

        const usd = data['pi-network'].usd;
        const idr = data['pi-network'].idr;

        document.getElementById('piPrice').innerHTML =
            `1 Pi = $${usd} | Rp${idr.toLocaleString('id-ID')}`;

    } catch (e) {
        // KALAU GAGAL, PAKAI HARGA DEFAULT GCV DULU
        document.getElementById('piPrice').innerHTML =
            `1 Pi = $314,159 | Rp5,100,000,000`;
    }
}

// JALANIN PAS LOAD + UPDATE TIAP 30 DETIK
getPiPrice();
setInterval(getPiPrice, 30000);
