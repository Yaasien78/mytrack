<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mall Genesis - Marketplace NFT Pi Network</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      text-align: center;
      padding: 40px 20px;
      min-height: 100vh;
    }
    .container {
      max-width: 400px;
      margin: 0 auto;
    }
    h1 { 
      font-size: 2.8rem;
      margin-bottom: 8px;
      background: linear-gradient(90deg, #ffd700, #ffed4e, #ffd700);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: 800;
      letter-spacing: 1px;
    }
    .subtitle { 
      font-size: 15px; 
      opacity: 0.85;
      margin-bottom: 35px;
      line-height: 1.5;
    }
    .profile {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      border: 4px solid #ffd700;
      margin: 25px auto;
      background: rgba(255,255,255,0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 45px;
      backdrop-filter: blur(10px);
      transition: 0.3s;
    }
    .profile:hover {
      transform: scale(1.05);
    }
    .user-id {
      font-size: 13px;
      opacity: 0.7;
      margin-bottom: 35px;
      font-family: monospace;
    }
    button {
      width: 100%;
      padding: 16px;
      margin: 12px 0;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.3s;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }
    #loginBtn {
      background: linear-gradient(90deg, #ffd700, #ffed4e);
      color: #1a1a2e;
    }
    #buyBtn {
      background: linear-gradient(90deg, #4CAF50, #66bb6a);
      color: white;
      display: none;
    }
    button:hover { 
      opacity: 0.9; 
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.3);
    }
    #status {
      margin-top: 25px;
      font-size: 14px;
      min-height: 22px;
      opacity: 0.9;
      padding: 10px;
      border-radius: 8px;
      background: rgba(255,255,255,0.1);
    }
  </style>
</head>
