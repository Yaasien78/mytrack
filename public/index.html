<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Track</title>
<style>
  html, body {
  height: 100%;
  margin: 0;
  padding: 0;
  background: #000;
}
.app {
  display: flex;
  flex-direction: column;
  height: 100vh;
}
.chat { flex: 1; }
  body { margin: 0; font-family: Arial, sans-serif; background: white; height: 100vh; display: flex; flex-direction: column; }
  
  /* HEADER SIMETRIS */
  .header { background: #004aad; padding: 6px 12px; border-bottom: 2px solid #ffcc00; display: flex; justify-content: space-between; align-items: center; color: white; flex-shrink: 0; }
  
  /* FOOTER SIMETRIS */
  .footer { background: #004aad; padding: 6px 12px; border-top: 2px solid #ffcc00; display: flex; justify-content: space-between; align-items: center; color: white; flex-shrink: 0; }
  
  /* SEMUA LOGO SAMA UKURAN 40px */
  .logo { 
    width: 40px; 
    height: 40px; 
    border-radius: 50%; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    text-decoration: none; 
    flex-shrink: 0; 
    box-sizing: border-box;
  }
  
  /* LOGO HEADER: BORDER KUNING BG BIRU TULISAN PUTIH */
  .logo-header { 
    background: #004aad; 
    border: 2px solid #ffcc00; 
    color: white; 
    font-weight: bold; 
  }
  .logo-header:first-of-type { font-size: 8px; line-height: 1.1; text-align: center; }
  .logo-header:last-of-type { font-size: 18px; margin-right: 4px; } /* DIGESER KE KIRI 4px */
  
  /* PRICE 2 BARIS DI TENGAH */
  .price-wrap { 
    flex: 1; 
    text-align: center; 
    display: flex; 
    flex-direction: column; 
    justify-content: center; 
    line-height: 1.3;
  }
  .price-usd { font-size: 14px; font-weight: 600; }
  .price-idr { font-size: 14px; font-weight: 600; }
  
  /* LOGO FOOTER: BG PUTIH */
  .logo-footer { 
    background: white; 
    border: 2px solid white; 
  }
  .logo-footer:first-of-type { font-size: 28px; } /* PALETTE */
  .logo-footer:last-of-type { font-size: 28px; color: #004aad; font-weight: bold; } /* + BIRU */
  
  /* LOGIN TENGAH FOOTER */
  .btn-login-footer { 
    padding: 8px 22px; 
    background: #004aad; 
    color: white; 
    text-align: center; 
    border-radius: 20px; 
    text-decoration: none; 
    font-weight: bold; 
    font-size: 15px; 
    border: 2px solid #ffcc00; 
  }
  
html, body {
  height: 100%;
  margin: 0;
  padding: 0;
  background: #000; /* biar gak ada putih2 */
}

.app {
  display: flex;
  flex-direction: column;
  height: 100vh; /* FULL TINGGI LAYAR HP */
}

.chat {
  flex: 1; /* AMBIL SISA RUANG */
  background: #000;
  display: flex;
  justify-content: center;
  align-items: center;
  position: relative;
  overflow: hidden;
}

#avatarDisplay {
  width: 160px; /* BISA DIBESARIN KALAU MAU */
  height: 160px;
  border-radius: 50%;
  background: radial-gradient(circle at 30% 30%, #1a1f5c, #000);
  border: 3px solid #ffcc00;
  font-size: 60px;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  box-shadow: 0 0 30px rgba(0, 123, 255, 0.8);
  z-index: 2;
}

/* EFEK BINTANG FULL LAYAR DI BELAKANG AVATAR */
.chat::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 100%;
  height: 100%;
  background-image: 
    radial-gradient(2px 2px at 20% 30%, #fff, transparent),
    radial-gradient(1px 1px at 80% 70%, #fff, transparent),
    radial-gradient(1px 1px at 50% 50%, #fff, transparent);
  background-size: 300px 300px;
  animation: stars 40s linear infinite;
  opacity: 0.6;
  z-index: 1;
}
@keyframes stars { from { background-position: 0 0; } to { background-position: -300px -300px; } }
</style>
</head>
<body>

<div class="header">
  <a href="upload.html" class="logo logo-header">My<br>Track</a> <!-- KIRI ATAS -->
  
  <div class="price-wrap"> <!-- PRICE 2 BARIS -->
    <div class="price-usd">1 Pi = $0.111576</div>
    <div class="price-idr">Rp1,997.22</div>
  </div>
  
  <a href="market.html" class="logo logo-header">π</a> <!-- KANAN ATAS DIGESER KIRI -->
</div>

<div class="app">
  <header>...</header>
  <div class="price-bar">...</div>
  <div class="chat">
    <div id="avatarDisplay">🌌</div>
  </div>
  <footer>...</footer>
</div>
  <a href="avatar.html" class="logo logo-footer">🎨</a> <!-- KIRI BAWAH -->
<button id="btnLogin" class="btn-login-footer">Login</button>
  <a href="ai.html" class="logo logo-footer">+</a> <!-- KANAN BAWAH -->
</div>

<script src="https://sdk.minepi.com/pi-sdk.js"></script>
<script>

async function updatePrice() {
  const usdEl = document.querySelector('.price-usd');
  const idrEl = document.querySelector('.price-idr');
  try {
    const res = await fetch('https://api.pi-blockchain.com/v1/price');
    if(!res.ok) throw new Error('API error');
    const data = await res.json();
    const usd = parseFloat(data.usd).toFixed(6);
    const idr = (usd * 17880).toLocaleString('id-ID');
    usdEl.innerHTML = `1 Pi = $${usd}`;
    idrEl.innerHTML = `Rp${idr}`;
  } catch (e) {
    usdEl.innerHTML = `1 Pi = $0.111576`;
    idrEl.innerHTML = `Rp1,997.22`;
  }
}
updatePrice();
setInterval(updatePrice, 60000);
  // INIT PI SDK
Pi.init({ version: "2.0", sandbox: false }); 

const btnLogin = document.getElementById('btnLogin');

// CEK KALAU UDAH LOGIN
const savedUser = localStorage.getItem('pi_username');
if(savedUser){
  btnLogin.innerText = '@' + savedUser;
}

// EVENT LOGIN
btnLogin.addEventListener('click', async () => {
  // kalau udah login, klik buat logout
  if(localStorage.getItem('pi_username')){
    localStorage.removeItem('pi_username');
    btnLogin.innerText = 'Login';
    alert('Logout Berhasil');
    return;
  }

  try {
    const scopes = ['username', 'payments'];
    const authResult = await Pi.authenticate(scopes, onIncompletePaymentFound);
    
    const username = authResult.user.username;
    localStorage.setItem('pi_username', username);
    btnLogin.innerText = '@' + username; // GANTI JADI USERNAME
    
  } catch (err) {
    alert('Login dibatalkan / Gagal');
  }
});

function onIncompletePaymentFound(payment) {
  console.log('Ada payment belum selesai:', payment);
  }
  const avatarDisplay = document.getElementById('avatarDisplay');

// WARNA LEDAKAN ACAK: BIRU, UNGU, PINK, KUNING, HIJAU
const burstColors = ['#00bfff', '#a855f7', '#ff00ff', '#ffcc00', '#00ff88', '#ff4500'];

// KLIK AVATAR = BINTANG MELEDAK
avatarDisplay.addEventListener('click', (e) => {
  const rect = avatarDisplay.getBoundingClientRect();
  const x = e.clientX - rect.left; // posisi klik X
  const y = e.clientY - rect.top;  // posisi klik Y
  
  const star = document.createElement('div');
  star.classList.add('star-burst');
  
  const randomColor = burstColors[Math.floor(Math.random() * burstColors.length)];
  star.style.left = `${x - 5}px`;
  star.style.top = `${y - 5}px`;
  star.style.color = randomColor; // warna ikut currentColor
  star.style.background = randomColor;
  
  avatarDisplay.appendChild(star);
  
  // hapus setelah animasi selesai biar gak numpuk
  setTimeout(() => star.remove(), 800);
});
  
</script>
</body>
</html>
