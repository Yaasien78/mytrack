<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Track | Login</title>
  
  <!-- 1. SDK Pi Cukup 1 Kali Saja, Taruh di Head -->
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>

  <style>
    body {background:#f1f3f6; font-family:system-ui; display:flex; justify-content:center; align-items:center; height:100vh; margin:0;}
    .card {background:#fff; padding:30px; border:1px solid #ddd; border-radius:12px; width:90%; max-width:380px; text-align:center; box-shadow:0 3px 8px rgba(0,0,0,.08);}
    h1 {margin:0 0 20px; font-size:22px;}
    button {width:100%; padding:12px; border:0; border-radius:10px; background:#4f46e5; color:#fff; font-weight:800; font-size:16px; cursor:pointer;}
    button:active {transform:scale(.98);}
    #warn {color:#ef4447; font-size:13px; margin-top:10px; display:none;}
    #ok {color:#16a34a; font-size:13px; margin-top:10px; display:none;}
  </style>
</head>
<body>
  <div class="card">
    <h1>Login MyTrack Pi</h1>
    <button id="btnLogin">Login dengan Pi</button>
    <div id="ok"></div>
    <div id="warn"></div>
  </div>

<script>
  // 1. Init doang
  Pi.init({ 
    version: "2.0", 
    sandbox: true,  
    clientId: "MU0h1YCvr5HMSJdt_iNaR7YPv0T4qV7MtUnv5uGUz48"
  });

  // 2. Cek login dari localStorage, bukan dari Pi lagi
  const piUser = localStorage.getItem('pi_user');
  if (!piUser) {
    window.location.href = "index.html"; // Kalau gak ada data, balik login
  } else {
    const user = JSON.parse(piUser);
    document.getElementById('btnUser').innerText = user.username;
  }

  // 3. Fungsi Bayar
  async function bayarVIP() {
    try {
      // Trik: Panggil authenticate 1x pas mau bayar doang
      await Pi.authenticate(['payments']); 

      const payment = await Pi.createPayment({
        amount: 0.1,
        memo: "Buka Menu VIP My Track",
        metadata: { product: "VIP_1_BULAN" }
      });
      console.log("Bayar Sukses:", payment);
      document.getElementById('menuVIP').classList.remove('hidden');
      document.getElementById('btnBayar').style.display = 'none';

    } catch (err) {
      alert("Bayar Gagal: " + err);
    }
  }
</script>
</body>
</html>
