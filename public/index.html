*{box-sizing:border-box}

.btn{width:100%;max-width:280px;padding:16px;border:none;border-radius:12px;background:#FFD700;color:#000;font-weight:900;font-size:16px;cursor:pointer}
.btn:active{transform:scale(0.97)}
.btn:disabled{opacity:0.6}
</style>
</head>

</div>
