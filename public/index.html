<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>My Track</title>
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: {
        colors: { 'ungu-tua': '#6d28d9', 'dongker': '#1e293b', 'emas': '#facc15' }
      }
    }
  </script>
  <style>
   .text-ss { 
     font-family: Impact, 'Arial Narrow', 'Arial Black', sans-serif;
     font-weight: 900;
     font-size: 29px;
     text-shadow: 0 4px 8px rgba(0,0,0,0.9);
     line-height: 1.05;
     letter-spacing: -1.5px;
   }
   .text-ss-kecil { 
     font-family: Impact, 'Arial Narrow', 'Arial Black', sans-serif;
     font-weight: 900;
     text-shadow: 0 2px 4px rgba(0,0,0,0.9);
     line-height: 1.1;
     letter-spacing: -0.5px;
   }
   .border-kuning-b { border-bottom: 2px solid #facc15; }
   .border-kuning-t { border-top: 2px solid #facc15; }
   .border-kuning { border: 2px solid #facc15; }
   .border-putih { border: 2px solid #ffffff; }
  </style>
</head>
<body class="bg-white">
  <header class="bg-dongker px-2 border-kuning-b flex items-center justify-between fixed top-0 w-full h-14">
    <a href="menu.html" class="flex flex-col justify-center space-y-1 w-6 h-6">
      <span class="w-full h-0.5 bg-white"></span>
      <span class="w-full h-0.5 bg-white"></span>
      <span class="w-full h-0.5 bg-white"></span>
    </a>
    <h1 class="text-2xl font-black text-white text-ss" style="font-size: 28px;">My Track</h1>
    <div class="w-10 h-10 rounded-full border-putih flex items-center justify-center">
      <span class="text-white text-2xl font-black">π</span>
    </div>
  </header>

  <main class="px-2 pt-14 pb-14">
    <div class="bg-ungu-tua border-kuning rounded-3xl px-2 pt-2 pb-2 m-1 flex-col justify-between" style="height: calc(100vh - 112px - 8px);">

        <div class="text-center">
          <p id="tanggal" class="text-ss text-white"></p>
          <p class="text-ss text-emas">Harga Pi/USDT</p>
          <p id="hargaUSDT" class="text-ss text-white">$0.1154</p>
          <p class="text-ss text-sky-300">Pi/Rupiah</p>
          <p id="hargaIDR" class="text-ss text-white">Rp 2.076,48</p>
          <p class="text-ss text-green-300">Dollar/Rupiah</p>
          <p id="kursUSDIDR" class="text-ss text-white">Loading...</p>
        </div>

        <!-- KUNCI: mt-4 = Jarak = Tinggi 1 huruf Welcome -->
        <div class="text-center mt-4">
          <div class="w-14 h-14 rounded-xl border-kuning ring-2 mx-auto bg-blue-500 flex items-center justify-center">
            <p class="text-lg text-ss-kecil text-white" style="line-height:1;">My<br>Track</p>
          </div>
          <p class="text-sm text-ss-kecil text-white mt-0.5 mb-0 leading-tight">
            Welcome to Pioneer<br>
            At My Track App<br>
            @2026
          </p>
        </div>
    </div>
  </main>

  <footer class="bg-dongker px-3 border-kuning-t flex items-center justify-center fixed bottom-0 w-full h-14">
    <button id="btnBayar" class="text-lg text-ss text-emas w-full" style="font-size: 20px;">Login Pi</button>
  </footer>

  <script>
    let currentUser = null;
    const btn = document.getElementById('btnBayar');
    window.onload = function() { Pi.init({ version: "2.0", sandbox: true }); };

    function updateTanggal() {
      const now = new Date();
      const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', timeZone: 'Asia/Jakarta' };
      document.getElementById('tanggal').innerText = now.toLocaleDateString('id-ID', options);
    }
    updateTanggal();

    btn.onclick = async () => {
      try {
        btn.innerText = 'Login...';
        const auth = await Pi.authenticate({ scopes: ['username'] });
        btn.innerText = `Halo ${auth.user.username}`;
      } catch (err) {
        btn.innerText = 'Login Pi';
        alert('Login Gagal: ' + err);
      }
    };

    async function updateData() {
      try {
        const res = await fetch('https://api.allorigins.win/raw?url=' + encodeURIComponent('https://api.coingecko.com/api/v3/simple/price?ids=pi-network&vs_currencies=usd,idr'));
        const data = await res.json();
        if(data['pi-network']) {
          const usd = data['pi-network'].usd;
          const idr = data['pi-network'].idr;
          document.getElementById('hargaUSDT').innerText = `$${usd.toFixed(4)}`;
          document.getElementById('hargaIDR').innerText = `Rp ${idr.toLocaleString('id-ID')}`;
          const kurs = idr / usd;
          document.getElementById('kursUSDIDR').innerText = `Rp ${kurs.toLocaleString('id-ID', {minimumFractionDigits: 2})}`;
        }
      } catch (e) {
        document.getElementById('kursUSDIDR').innerText = 'Error';
      }
    }
    updateData();
    setInterval(updateData, 5000);
  </script>
</body>
</html>
