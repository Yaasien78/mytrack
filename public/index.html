<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>My Track</title>
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #fff; font-family: Arial, sans-serif; }
    .bg-dongker { background-color: #1e293b; } 
    .bg-ungu { background-color: #a855f7; }
    .border-kuning-b { border-bottom: 2px solid #facc15; }
    .border-kuning-t { border-top: 2px solid #facc15; }
    .border-kuning { border: 2px solid #facc15; }
    .border-putih { border: 2px solid #ffffff; }
    .bg-putih { background-color: #ffffff; }
    .text-ss { font-family: Impact, 'Arial Black', sans-serif; font-weight: 900; text-shadow: 0 3px 6px rgba(0,0,0,0.9); line-height: 1.1; }
    .text-white { color: #fff; }
    .text-yellow { color: #facc15; }
    .text-sky { color: #7dd3fc; }
    .text-green { color: #86efac; }
    .text-2xl { font-size: 24px; } /* DIPERBESAR ISI BOX */
    .text-xl { font-size: 20px; }
    .text-lg { font-size: 18px; }
    .text-base { font-size: 14px; } /* BUAT WELCOME */
    .font-black { font-weight: 900; }
    .text-center { text-align: center; }
    .flex { display: flex; }
    .items-center { align-items: center; }
    .justify-between { justify-content: space-between; }
    .justify-center { justify-content: center; }
    .flex-col { flex-direction: column; }
    .mx-auto { margin-left: auto; margin-right: auto; }
    .mt-auto { margin-top: auto; }
    .mb-0 { margin-bottom: 0; }
    .mt-0\.5 { margin-top: 2px; }
    .p-2 { padding: 8px; }
    .px-2 { padding-left: 8px; padding-right: 8px; }
    .px-3 { padding-left: 12px; padding-right: 12px; }
    .pt-2 { padding-top: 8px; }
    .pb-2 { padding-bottom: 8px; }
    .m-1 { margin: 4px; }
    .w-full { width: 100%; }
    .w-12 { width: 48px; }
    .h-12 { height: 48px; }
    .w-10 { width: 40px; }
    .h-10 { height: 40px; }
    .w-6 { width: 24px; }
    .h-0\.5 { height: 2px; }
    .rounded-full { border-radius: 9999px; }
    .rounded-3xl { border-radius: 24px; }
    .rounded-lg { border-radius: 8px; }
    .ring-2 { box-shadow: 0 0 0 2px #93c5fd; }
    .fixed { position: fixed; }
    .top-0 { top: 0; }
    .bottom-0 { bottom: 0; }
    .space-y-1 > * + * { margin-top: 4px; }
    header, footer { height: 56px; }
    main { padding-top: 56px; padding-bottom: 56px; }
    button { background: none; border: none; }
  </style>
</head>
<body>
  <header class="bg-dongker px-2 border-kuning-b flex items-center justify-between fixed top-0 w-full">
    <!-- GARIS 3 MENU WARNA PUTIH -->
    <a href="menu.html" class="flex flex-col justify-center space-y-1 w-6 h-6">
      <span class="w-full h-0.5 bg-putih"></span>
      <span class="w-full h-0.5 bg-putih"></span>
      <span class="w-full h-0.5 bg-putih"></span>
    </a>
    <h1 class="text-2xl font-black text-white text-ss">My Track</h1>
    <div class="w-10 h-10 rounded-full border-putih flex items-center justify-center">
      <span class="text-white text-2xl font-black">π</span>
    </div>
  </header>

  <main class="px-2">
    <div class="bg-ungu border-kuning rounded-3xl px-2 pt-2 pb-2 m-1" style="height: calc(100vh - 112px - 8px); display: flex; flex-direction: column; justify-content: space-between;"> 
        
        <!-- ISI BOX ATAS = text-2xl = LEBIH BESAR -->
        <div class="text-center">
          <p id="tanggal" class="text-2xl text-ss text-white"></p> <!-- TANGGAL PUTIH -->
          <p class="text-2xl text-ss text-yellow">Harga Pi/USDT</p> <!-- KUNING -->
          <p id="hargaUSDT" class="text-2xl text-ss text-white">$0.1154</p>
          <p class="text-2xl text-ss text-sky">Pi/Rupiah</p>
          <p id="hargaIDR" class="text-2xl text-ss text-white">Rp 2.076,48</p>
          <p class="text-2xl text-ss text-green">Dollar/Rupiah</p>
          <p id="kursUSDIDR" class="text-2xl text-ss text-white">Rp 16.848,58</p>
        </div>

        <!-- BAWAH LOGO = SUSUNAN BARU 3 BARIS CENTER -->
        <div class="text-center mb-0">
          <div class="w-12 h-12 rounded-lg border-kuning ring-2 mx-auto" style="background:#3b82f6; display:flex; align-items:center; justify-content:center;">
            <p class="text-xl text-ss text-white" style="line-height:1;">My<br>Track</p>
          </div>
          <p class="text-base text-ss text-white mt-0.5 mb-0 leading-tight">
            Welcome to Pioneer<br>
            At My Track App<br>
            @2026
          </p>
        </div>
    </div>
  </main>

  <footer class="bg-dongker px-3 border-kuning-t flex items-center justify-center fixed bottom-0 w-full">
    <button id="btnBayar" class="text-lg text-ss text-yellow w-full">Login Pi</button>
  </footer>
  <script>
    let currentUser = null;
    const btn = document.getElementById('btnBayar');
    window.onload = function() { Pi.init({ version: "2.0", sandbox: true }); };

    function updateTanggal() {
      const now = new Date();
      const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', timeZone: 'Asia/Jakarta' };
      document.getElementById('tanggal').innerText = now.toLocaleDateString('id-ID', options);
    }
    updateTanggal();

    async function loginPi() {
      try {
        btn.innerText = 'Login...';
        const auth = await Pi.authenticate({ scopes: ['username'] }); 
        currentUser = auth.user;
        btn.innerText = `Halo ${currentUser.username}`;
      } catch (err) {
        btn.innerText = 'Login Pi';
        alert('Login Gagal: ' + err); 
      }
    }
    btn.onclick = loginPi;

    async function updateData() {
      try {
        // AMBIL PI + USD/IDR LIVE, NO DUMMY
        const res = await fetch('https://api.allorigins.win/raw?url=' + encodeURIComponent('https://api.coingecko.com/api/v3/simple/price?ids=pi-network&vs_currencies=usd,idr&include_market_cap=false&include_24hr_vol=false&include_24hr_change=false&include_last_updated_at=false'));
        const data = await res.json();
        
        if(data['pi-network']) {
          const usd = data['pi-network'].usd;
          const idr = data['pi-network'].idr;
          
          document.getElementById('hargaUSDT').innerText = `$${usd.toFixed(4)}`;
          document.getElementById('hargaIDR').innerText = `Rp ${idr.toLocaleString('id-ID')}`;
          
          // HITUNG KURS DOLLAR REAL TIME DARI PI
          const kurs = idr / usd; 
          document.getElementById('kursUSDIDR').innerText = `Rp ${kurs.toLocaleString('id-ID', {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;
        }
      } catch (e) {
        console.log('Gagal update:', e);
      }
    }
    updateData(); 
    setInterval(updateData, 5000); // Update tiap 5 detik
                       </script>
  
</body>
  </html>
