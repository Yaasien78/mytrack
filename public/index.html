<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyTrack</title>
<script src="https://sdk.minepi.com/pi-sdk.js"></script>
<style>
* {box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }
html, body { height: 100%; background: #000; overflow: hidden; }
.app { display: flex; flex-direction: column; height: 100vh; position:relative; z-index:10; pointer-events:none; }
#bg-space { position:fixed; top:0; left:0; width:100%; height:100%; background: url('space.jpg') center / cover no-repeat; }
#space { position: fixed; top:0; left:0; width:100%; height:100%; z-index: 3; cursor:pointer; touch-action: none; }
header, footer { pointer-events: auto; }
header { background: #0057d9; border-bottom: 2px solid #fffc00; color: white; padding: 6px 15px; display: flex; justify-content: space-between; align-items:center; }
.logo { 
  width: 45px; height: 45px; border-radius: 50%; border: 2px solid #fffc00; background: #0057d9; 
  display: flex; align-items:center; justify-content:center; font-weight:bold; color:white; text-decoration:none;
  font-size: 9px; line-height: 11px; text-align: center; flex-direction: column;
}
.harga { text-align: center; font-weight: bold; font-size: 14px; line-height: 1.4; }
.pi-logo { width: 45px; height: 45px; border-radius: 50%; border: 2px solid #fffc00; background: #0057d9; font-weight:bold; display:flex; align-items:center; justify-content:center; color:white; text-decoration:none; font-size:24px }
footer { background: #0057d9; border-top: 2px solid #fffc00; padding: 6px 15px; display: flex; justify-content: space-between; align-items:center }
.footer-left { width: 45px; height: 45px; border-radius: 50%; border: 2px solid #fffc00; background: white; display: flex; align-items:center; justify-content:center; font-size:24px; text-decoration:none; }
.login-btn { background: #0057d9; color: white; border: 2px solid #fffc00; padding: 10px 24px; border-radius: 22px; font-weight: bold; font-size:14px }
.footer-right { width: 45px; height: 45px; border-radius: 50%; border: 2px solid #fffc00; background: white; display: flex; align-items:center; justify-content:center; font-size:24px; font-weight:bold; text-decoration:none; color:#0057d9 }
            </style>

</head>
<body>
<div id="bg-space"></div>
<canvas id="space"></canvas>

<div class="app">
  <header>
    <a href="profil.html" class="logo">My<br>Track</a>
    <div class="harga">1 Pi = $0.112869 <br> Rp2,032.77</div>
    <a href="market.html" class="pi-logo">π</a>
  </header>
  <iframe id="textFrame" src="text.html" style="flex:1; width:100%; border:none; background:transparent; pointer-events:none;"></iframe>
  <footer>
    <a href="#" class="footer-left" id="btnQuote">🎨</a>
    <button class="login-btn" id="loginBtn">Login</button>
    <a href="ai.html" class="footer-right">+</a>
  </footer>
</div>

<script>
// 1. SUARA KRISTAL TING
let audioCtx;
function playSound() {
  if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  
  // Bikin 2 oscillator biar ada gema kristal
  for(let i = 0; i < 2; i++){
    const oscillator = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();
    
    oscillator.connect(gainNode); 
    gainNode.connect(audioCtx.destination);
    
    oscillator.type = 'sine'; // sine = suara paling bersih/kristal
    
    // Frekuensi tinggi. 1200Hz = nada ting. Yang kedua ditunda dikit buat gema
    oscillator.frequency.setValueAtTime(1200 + i*300, audioCtx.currentTime + i*0.05);
    
    // Volume naik cepat turun cepat = "ting"
    gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
    gainNode.gain.linearRampToValueAtTime(0.15, audioCtx.currentTime + 0.01); // naik
    gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.25); // turun cepat
    
    oscillator.start(); 
    oscillator.stop(audioCtx.currentTime + 0.25);
  }
                                               }
// 2. LOGIN PI
let piUsername = null;
window.addEventListener('load', function(){
  Pi.init({ version: "2.0", sandbox: true });
  document.getElementById('loginBtn').onclick = function(){
    playSound();
    Pi.authenticate(['username', 'payments']).then(function(auth){
      piUsername = auth.user.username;
      document.getElementById('loginBtn').innerText = 'Hi ' + piUsername;
    }).catch(function(error) { alert("Login gagal: " + error); });
  }
});

// 3. EFEK BINTANG + CAHAYA BIAS
const canvas = document.getElementById('space');
const ctx = canvas.getContext('2d');
let w = canvas.width = window.innerWidth;
let h = canvas.height = window.innerHeight;
let cx = w/2; let cy = h*0.35;
let stars = [];
let lights = []; // GANTI NAMA DARI explosions JADI lights
const colors = ['255,0,0','0,255,0','0,0,255','255,255,0','255,0,255','0,255,255','255,136,0','0,136,255'];

for(let i=0; i<220; i++){ stars.push({ x: (Math.random()-0.5)*w*2, y: (Math.random()-0.5)*h*2, z: Math.random()*w }) }

function animate(){
  ctx.clearRect(0,0,w,h);
  
  // BINTANG JALAN
  stars.forEach(s=>{ s.z -= 2.5; if(s.z <= 1){ s.z = w; s.x = (Math.random()-0.5)*w*2; s.y = (Math.random()-0.5)*h*2; }
    let x = (s.x * (w / s.z)) + cx; let y = (s.y * (w / s.z)) + cy;
    let size = (1 - s.z/w) * 2.5; ctx.fillStyle = 'white'; ctx.beginPath(); ctx.arc(x, y, size, 0, Math.PI*2); ctx.fill();
  });
  
  // EFEK CAHAYA MEMBIAS BARU
  lights.forEach((light, i)=>{
    light.r += 8; // melebar cepat
    light.a -= 0.04; // hilang pelan
    
    let gradient = ctx.createRadialGradient(light.x, light.y, 0, light.x, light.y, light.r);
    gradient.addColorStop(0, `rgba(${light.color},${light.a})`); // tengah terang
    gradient.addColorStop(0.4, `rgba(${light.color},${light.a * 0.5})`); // bias
    gradient.addColorStop(1, `rgba(${light.color},0)`); // tepi hilang
    
    ctx.fillStyle = gradient;
    ctx.beginPath();
    ctx.arc(light.x, light.y, light.r, 0, Math.PI*2);
    ctx.fill();
    
    if(light.a <= 0) lights.splice(i,1); // hapus kalau udah hilang
  });
  
  requestAnimationFrame(animate);
}
animate();

function handleClick(e){
  e.preventDefault();
  let x = e.touches? e.touches[0].clientX : e.clientX; 
  let y = e.touches? e.touches[0].clientY : e.clientY;
  let color = colors[Math.floor(Math.random()*colors.length)];
  lights.push({x:x, y:y, r:5, a:1, color: color}); // TAMBAH CAHAYA BARU
  playSound();
                     }
  
canvas.addEventListener('click', handleClick);
canvas.addEventListener('touchstart', handleClick);
window.addEventListener('resize', ()=>{ w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; cx = w/2; cy = h*0.35; });

// 4. TOMBOL KIRI SEMENTARA
document.querySelector('.footer-left').onclick = function(e){
  e.preventDefault();
  playSound();
}
  // 5. GANTI KALIMAT
document.getElementById('btnQuote').onclick = function(e){
  e.preventDefault();
  document.getElementById('textFrame').contentWindow.postMessage('next', '*');
        }
</script>
</body>
</html>
