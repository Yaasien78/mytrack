<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Track 1.0</title>
<script src="https://sdk.minepi.com/pi-sdk.js"></script>
<style>
body{background:#0f172a;color:#fff;margin:0;font-family:Arial;text-align:center} 
#loading{padding:100px 20px;font-size:18px}
.hidden{display:none} 
#loginBtn{background:#fbbf24;color:#000;border:none;padding:14px 24px;border-radius:12px;font-size:16px;font-weight:bold;cursor:pointer;margin-top:20px}
</style>
</head>
<body>

<div id="loading">
  <h2>My Track 1.0</h2>
  <p>Klik sekali untuk masuk</p>
  <button id="loginBtn">Masuk dengan Pi</button>
</div>

<div id="dashboard" class="hidden">
  <h2>Welcome <span id="username">...</span> 👋</h2>
  <p>Udah masuk bro</p>
</div>

<script>
  // Tunggu SDK siap dulu
  window.onload = async function() {
    await new Promise(r => setTimeout(r, 300)); 
    Pi.init({ version: "1.0" }); 

    // Cek udah pernah login belum
    const savedUser = localStorage.getItem('pi_user');
    if(savedUser){
      document.getElementById('username').innerText = savedUser;
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('dashboard').classList.remove('hidden');
      return; 
    }
  }

  // AUTH HANYA PAS DIKLIK
  document.getElementById('loginBtn').onclick = async function() {
    document.getElementById('loginBtn').innerText = "Login...";
    try {
      const auth = await Pi.authenticate(['username']);
      const user = auth.user.username;
      localStorage.setItem('pi_user', user);
      
      document.getElementById('username').innerText = user;
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('dashboard').classList.remove('hidden');
    } catch (err) {
      alert("Gagal: " + err.message);
      document.getElementById('loginBtn').innerText = "Masuk dengan Pi";
    }
  }
</script>
</body>
</html>
