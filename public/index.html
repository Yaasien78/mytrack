<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Track - Pi App</title>
<script src="https://sdk.minepi.com/pi-sdk.js"></script>
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }
  
  html, body { height: 100%; background: #ffffff; }

  .app {
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  /* HEADER */
  header {
    background: #007bff;
    color: white;
    padding: 12px 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-weight: bold;
    font-size: 18px;
  }
  .login-btn {
    background: #ffcc00;
    color: #000;
    border: none;
    padding: 6px 12px;
    border-radius: 20px;
    font-weight: bold;
    cursor: pointer;
  }

  /* HARGA PI */
  .price-bar {
    background: #f1f1f1;
    color: #333;
    padding: 8px;
    text-align: center;
    font-size: 14px;
    border-bottom: 1px solid #ddd;
  }

  /* AREA CHAT KOSONG PUTIH */
  .chat {
    flex: 1;
    background: #ffffff;
    padding: 15px;
    overflow-y: auto;
  }

  /* FOOTER */
  footer {
    background: #007bff;
    display: flex;
    justify-content: space-around;
    padding: 10px 0;
  }
  footer button {
    background: transparent;
    border: none;
    color: white;
    font-size: 22px;
    cursor: pointer;
  }
</style>
</head>
<body>
  <div class="app">
    <header>
      <span>My Track</span>
      <button class="login-btn" onclick="login()">Login</button>
    </header>

    <div class="price-bar">
      Harga Pi: $0.00 USD
    </div>

    <div class="chat">
      <!-- AREA KOSONG BUAT CHAT NANTI -->
    </div>

    <footer>
      <button onclick="alert('Home')">🏠</button>
      <button onclick="alert('Chat')">💬</button>
      <button onclick="alert('+')">➕</button>
    </footer>
  </div>

<script>
  Pi.init({ version: "2.0", sandbox: true });

  function login() {
    Pi.authenticate(['username'])
    .then(function(auth) {
      document.querySelector('.login-btn').innerText = `@${auth.user.username}`;
      document.querySelector('.login-btn').style.background = '#28a745';
      document.querySelector('.login-btn').style.color = 'white';
    })
    .catch(function(error) {
      alert("Login gagal: " + error);
      console.error(error);
    });
  }
</script>
</body>
</html>
