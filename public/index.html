<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>My Track</title>
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background-color: #ffffff; }
 .border-gold-2 { border: 2px solid #fbbf24; }
 .bg-dongker { background-color: #0f1a2e; }
 .bg-ungu { background-color: #6d28d9; }
    header { height: 64px; z-index: 30; } /* HEAD PALING ATAS */
    footer { height: 64px; z-index: 30; } /* FOOT PALING ATAS BIAR BISA KLIK */
    main { padding-top: 64px; padding-bottom: 64px; } /* KASIH RUANG BIAR GAK KETUTUP */
  </style>
</head>
<body class="font-sans bg-white">
  <!-- HEAD FIXED -->
  <header class="bg-dongker px-3 border-b-2 border-yellow-400 flex items-center justify-between fixed top-0 w-full">
    <a href="menu.html" class="text-3xl text-yellow-400">≡</a>
    <h1 class="text-2xl font-extrabold text-white tracking-wide">My Track</h1>
    <img src="https://minepi.com/favicon.ico" alt="Pi" class="w-10 h-10 rounded-full border-2 border-yellow-400 ring-2 ring-yellow-300/50">
  </header>

  <!-- BOX 1 LAYAR PENUH PAS DARI GARIS ATAS KE GARIS BAWAH -->
  <main class="px-3">
    <div class="bg-ungu border-gold-2 rounded-2xl p-4 text-center h-[calc(100vh-128px)] overflow-y-auto flex-col justify-start gap-1"> <!-- RAPET KE ATAS: gap-1 -->
      
      <!-- SEMUA TEXT-2XL BIAR SAMA BESAR -->
      <p class="text-2xl font-bold text-yellow-400">Harga Pi/USD</p>
      <p id="hargaUSD" class="text-2xl font-extrabold text-white mb-2">$0.0000</p>

      <p class="text-2xl font-bold text-blue-400">Pi/Rupiah</p>
      <p id="hargaIDR" class="text-2xl font-extrabold text-white mb-2">Rp 0</p>

      <p class="text-2xl font-bold text-green-400">Dollar/Rupiah</p>
      <p id="kursUSDIDR" class="text-2xl font-extrabold text-white mb-2">Rp 17,934.50</p>

      <p id="tanggal" class="text-2xl font-extrabold text-yellow-400 leading-tight mb-2">Loading...</p> <!-- TANGGAL SAMA BESAR -->

      <!-- WELCOME MASUK KE DALAM BOX PALING BAWAH -->
      <p class="text-2xl font-bold text-white mt-auto pt-4">Welcome to pioneer at My Track app @2026</p>

    </div>
  </main>

  <!-- FOOT FIXED BISA DIKLIK -->
  <footer class="bg-dongker px-3 border-t-2 border-yellow-400 flex items-center justify-center fixed bottom-0 w-full">
    <button id="btnLogin" class="text-lg font-bold text-yellow-400 w-full">Loading...</button> <!-- LOGIN KECILIN JADI text-lg -->
  </footer>

  <script>
    function updateTanggal() {
      const now = new Date();
      const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
      document.getElementById('tanggal').innerText = now.toLocaleDateString('id-ID', options);
    }
    updateTanggal(); setInterval(updateTanggal, 1000);

    try {
      Pi.init({ version: "2.0", sandbox: true });
      Pi.authenticate({ scopes: ['username', 'payments'], onIncompletePaymentFound: () => {} })
  .then(auth => { document.getElementById('btnLogin').innerText = `Welcome ${auth.user.username}`; })
  .catch(() => { document.getElementById('btnLogin').innerText = 'Login Pi - Gagal Whitelist'; });
    } catch(e) { document.getElementById('btnLogin').innerText = 'Buka di Pi Browser'; }

    async function updateData() {
      try {
        const apiUrl = 'https://api.coingecko.com/api/v3/simple/price?ids=pi-network,usd&vs_currencies=idr';
        const proxyUrl = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(apiUrl);
        const res = await fetch(proxyUrl);
        const data = await res.json();
        
        const pi = data['pi-network'];
        const usd = data['usd'];

        if(pi) {
          document.getElementById('hargaUSD').innerText = `$${pi.usd.toFixed(4)}`;
          document.getElementById('hargaIDR').innerText = `Rp ${pi.idr.toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g, ".")}`;
        }
        if(usd) {
          document.getElementById('kursUSDIDR').innerText = `Rp ${usd.idr.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ".")}`;
        }
      } catch (e) { console.log("API Gagal:", e); }
    }
    updateData(); setInterval(updateData, 15000);
  </script>
</body>
</html>
