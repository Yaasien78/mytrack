<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Track</title>
<style>
  body { margin: 0; font-family: Arial, sans-serif; background: #f5f5f5; }
  .header { background: #004aad; padding: 15px 15px; border-bottom: 4px solid #ffcc00; display: flex; justify-content: space-between; align-items: center; color: white; }
  .circle { width: 50px; height: 50px; border-radius: 50%; background: #004aad; border: 3px solid #ffcc00; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; flex-shrink: 0; text-decoration: none; font-size: 22px; }
  .circle:first-child { font-size: 10px; line-height: 1.1; text-align: center; }
  #piPrice { font-size: 19px; font-weight: bold; flex: 1; text-align: center; line-height: 1.5; }
  .chat { flex: 1; overflow-y: auto; padding: 20px 15px; background: #f5f5f5; padding-bottom: 90px; }
  .bubble-ai { background: white; border: 3px solid #00bfff; border-radius: 20px; padding: 15px 18px; color: #004aad; font-size: 16px; line-height: 1.8; box-shadow: 0 2px 8px rgba(0,0,0,0.1); max-width: 85%; }
  .avatar-ai { width: 45px; height: 45px; border-radius: 50%; background: linear-gradient(135deg, #004aad, #00bfff); color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; flex-shrink: 0; margin-right: 10px; font-size: 16px; }
  .msg-row { display: flex; align-items: flex-start; margin-bottom: 15px; }
  .footer { background: #004aad; padding: 12px 15px; border-top: 4px solid #ffcc00; display: flex; align-items: center; gap: 10px; color: white; position: fixed; bottom: 0; width: 100%; box-sizing: border-box; }
  .avatar-user { width: 50px; height: 50px; border-radius: 50%; background: white; flex-shrink: 0; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 2px solid white; font-size: 28px; }
  .username { flex: 1; text-align: center; font-weight: bold; font-size: 18px; }
  .btn-plus { width: 50px; height: 50px; border-radius: 50%; background: white; color: #004aad; font-size: 32px; border: none; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; line-height: 1; }
</style>
</head>
<body>

<div class="header">
  <div class="circle">My<br>Track</div>
  <div id="piPrice">1 Pi = <br> $0.111576 <br> Rp1,997.22</div>
  <a href="market.html" class="circle">π</a>
</div>

<div class="chat">
  <div class="msg-row">
    <div class="avatar-ai">AI</div>
    <div class="bubble-ai">
      AI Tracker Aktif!<br>
      Silahkan cek Harga Pi disini...<br><br>
      Ada yang bisa di bantu...<br><br>
      Silahkan klik tombol <b>+</b> untuk memulai percakapan.
    </div>
  </div>
</div>

<div class="footer">
  <div class="avatar-user" id="btnBackAvatar">
    🎨
  </div>
  <div class="username">@Yaasien</div>
  <button class="btn-plus">+</button> <!-- UDAH SAMA KAYAK SS -->
</div>

<script src="https://sdk.minepi.com/pi-sdk.js"></script>
<script>
Pi.init({ version: "2.0", sandbox: true });
async function updatePrice() {
  const el = document.getElementById('piPrice');
  try {
    const res = await fetch('https://api.pi-blockchain.com/v1/price');
    if(!res.ok) throw new Error('API error');
    const data = await res.json();
    const usd = parseFloat(data.usd).toFixed(6);
    const idr = (usd * 17880).toLocaleString('id-ID');
    el.innerHTML = `1 Pi = <br> $${usd} <br> Rp${idr}`;
  } catch (e) {
    el.innerHTML = `1 Pi = <br> $0.111576 <br> Rp1,997.22`;
  }
}
updatePrice();
setInterval(updatePrice, 60000);
</script>
</body>
</html>
