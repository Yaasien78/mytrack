<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Track</title>
<script src="https://sdk.minepi.com/pi-sdk.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body { padding-top: 70px; padding-bottom: 70px; background: #f5f5f5; font-family: Arial, sans-serif; }

/* HEADER FIX - 1 BARIS DOANG */
.main-container a.circle {
  text-decoration: none; /* HAPUS GARIS BAWAH */
  color: white; /* TULISAN PUTIH */
}
.circle {
  width: 50px; height: 50px; border-radius: 50%;
  background: #004aad; border: 3px solid #ffcc00; color: white;
  display: flex; align-items: center; justify-content: center;
  font-weight: bold; flex-shrink: 0;
}
.circle:first-child { font-size: 11px; line-height: 1.2; }
.circle:last-child { font-size: 28px; }
#piPrice { flex: 1; color: white; font-size: 15px; font-weight: bold; text-align: center; }

/* CHAT AI */
.ai-section { padding: 20px; }
.ai-chat { display: flex; gap: 10px; align-items: flex-start; margin-bottom: 15px; }
.ai-avatar { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, #0057d9, #00bfff); color: white; font-weight: bold; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.ai-bubble { background: #fff; color: #0057d9; padding: 12px 15px; border-radius: 18px; border: 2px solid #00bfff; font-size: 15px; line-height: 1.6; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }

/* FOOTER */
.footer { position: fixed; bottom: 0; left: 0; right: 0; height: 60px; background: #0057d7; border-top: 3px solid #FFD700; display: flex; justify-content: space-between; align-items: center; padding: 0 10px; z-index: 1000; }
.footer-avatar { width: 44px; height: 44px; border-radius: 50%; background: white; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; }
#loginBtn { color: white; font-weight: bold; font-size: 18px; cursor: pointer; text-decoration: none; }
.btn-plus { width: 44px; height: 44px; border-radius: 50%; background: white; color: #0057d7; border: none; font-size: 30px; font-weight: bold; cursor: pointer; }
.ai-avatar-sticky { position: fixed; bottom: 80px; right: 20px; width: 50px; height: 50px; border-radius: 50%; background: #0057d7; color: white; display: none; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; z-index: 999; }
</style>
</head>
<body>

<!-- HEADER 1 SAJA -->
<div class="main-container">
  <a href="upload.html" class="circle">My<br>Track</a>  <!-- KIRI KE UPLOAD -->
  <div id="piPrice">1 Pi = $0.112014 | Rp2.003,62</div>
  <a href="market.html" class="circle">π</a>  <!-- KANAN KE MARKET -->
</div>

<!-- CHAT -->
<div class="ai-section">
  <div class="ai-chat">
    <div class="ai-avatar">AI</div>
    <div class="ai-bubble">
      AI Tracker Aktif!<br>
      Silahkan cek Harga Pi disini...<br><br>
      Ada yang bisa di bantu...<br>
      Silahkan klik tombol <b>+</b> untuk memulai percakapan.
    </div>
  </div>
</div>

<!-- FOOTER -->
<footer class="footer">
  <div class="footer-avatar" onclick="openThemePicker()">🎨</div>
  <span id="loginBtn" onclick="handleLogin()">Yaasien</span>
  <button class="btn-plus" onclick="startAI()">+</button>
</footer>

<div class="ai-avatar-sticky" onclick="randomAvatarColor()">AI</div>

<script>
// INIT PI SDK
Pi.init({ version: "2.0", sandbox: true });

// AMBIL HARGA PI - 1 FUNGSI SAJA
async function getPiPrice(){
  let el=document.getElementById('piPrice');
  try{
    let r=await fetch('https://api.coingecko.com/api/v3/simple/price?ids=pi-network&vs_currencies=usd,idr');
    let d=await r.json();
    let usd=d['pi-network'].usd;
    let idr=d['pi-network'].idr.toLocaleString('id-ID');
    el.innerHTML=`1 Pi = $${usd} | Rp${idr}`;
  }catch(e){
    el.innerHTML=`1 Pi = $314,159 GCV | Rp5,000,000,000 GCV`;
  }
}
getPiPrice(); 
setInterval(getPiPrice,30000);

// LOGIN LOGOUT
async function handleLogin(){
  const loginBtn = document.getElementById('loginBtn');
  const savedUser = localStorage.getItem('piUser');
  if(savedUser){
    if(confirm("Logout dari @" + JSON.parse(savedUser).username + " ?")){
      localStorage.removeItem('piUser');
      loginBtn.innerText = "Yaasien";
      alert("Berhasil Logout");
    }
    return;
  }
  try {
    const authResult = await Pi.authenticate(['username', 'payments'], onIncompletePaymentFound);
    loginBtn.innerText = "@" + authResult.user.username;
    localStorage.setItem('piUser', JSON.stringify(authResult.user));
    alert("Selamat datang @" + authResult.user.username);
  } catch (error) {
    alert('Login dibatalkan');
  }
}

window.onload = () => {
  const savedUser = localStorage.getItem('piUser');
  if(savedUser){
    const user = JSON.parse(savedUser);
    document.getElementById('loginBtn').innerText = "@" + user.username;
  }
}

function onIncompletePaymentFound(payment){ console.log(payment); }

function startAI(){ alert('Mulai AI Tracking!'); }

let clickCount = 0; let clickTimer = null;
function openThemePicker(){
  clickCount++;
  clearTimeout(clickTimer);
  clickTimer = setTimeout(() => clickCount = 0, 1000);
  const avatarSticky = document.querySelector('.ai-avatar-sticky');
  if(clickCount === 1){ avatarSticky.style.display = 'flex'; }
  if(clickCount === 2){
    const colors = ['#0057d9','#BB5CF6','#16a34a','#f07316','#dc2626','#000000'];
    let pilihan = prompt('Pilih warna AI:\n1- Biru\n2- Ungu\n3- Hijau\n4- Orange\n5- Merah\n6- Hitam');
    if(pilihan && colors[pilihan-1]) avatarSticky.style.background = colors[pilihan-1];
    clickCount = 0;
  }
  if(clickCount === 3){ avatarSticky.style.display = 'none'; clickCount = 0; }
}
function randomAvatarColor(){ const colors=['#0057d9','#BB5CF6','#16a34a','#f07316','#dc2626']; document.querySelector('.ai-avatar-sticky').style.background=colors[Math.floor(Math.random()*5)]; }
</script>
</body>
</html>
