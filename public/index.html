<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mall Genesis</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(45deg, #0a0a2a 0%, #1a1a3a 40%, #4a1a4a 100%);
      color: white; min-height: 100vh; overflow-x: hidden;
    }

  .browser-info { position: fixed; top: 15px; right: 15px; font-size: 11px; color: white; opacity: 0.7; text-align: right; z-index: 100; }
  .browser-info a { color: white; text-decoration: underline; }
  .page { display: none; min-height: 100vh; }
  .page.active { display: block; }

    /* SIDEBAR - tambah menu Chat */
  .sidebar {
      position: fixed; left: 0; top: 0; width: 70px; height: 100vh;
      background: rgba(0,0,0,0.6); backdrop-filter: blur(15px);
      border-right: 1px solid rgba(255,255,255,0.1);
      display: flex; flex-direction: column; align-items: center;
      padding-top: 80px; gap: 25px; z-index: 50;
    }
  .menu-item { font-size: 10px; color: #aaa; text-align: center; cursor: pointer; transition: 0.3s; padding: 8px 5px; }
  .menu-item:hover { color: #ffd700; transform: scale(1.1); }
  .menu-icon { font-size: 24px; display: block; margin-bottom: 5px; }

    /* HALAMAN 1-2-3 sama seperti kode sebelumnya, gue singkat biar gak kepanjangan */
    /* ... kode login, galeri, feed IG tetap sama ... */

    /* HALAMAN 4: CHAT TELEGRAM STYLE */
  .page-chat {
      background: #0e1621; padding-left: 70px; height: 100vh; display: flex; flex-direction: column;
    }
  .chat-header {
      height: 55px; background: #17212b; border-bottom: 1px solid #0e1621;
      display: flex; align-items: center; padding: 0 15px; position: sticky; top: 0; z-index: 90;
    }
  .chat-tabs {
      display: flex; gap: 20px; font-size: 15px; font-weight: 600;
    }
  .chat-tab {
      cursor: pointer; padding: 10px 5px; border-bottom: 3px solid transparent;
      transition: 0.3s;
    }
  .chat-tab.active { color: #ffd700; border-bottom: 3px solid #ffd700; }

  .chat-body { flex: 1; overflow-y: auto; padding: 15px; }
  .chat-list { display: none; }
  .chat-list.active { display: block; }

    /* List DM user */
  .dm-item {
      display: flex; align-items: center; padding: 12px;
      border-radius: 10px; cursor: pointer; margin-bottom: 5px;
      transition: 0.2s;
    }
  .dm-item:hover { background: rgba(255,255,255,0.05); }
  .dm-avatar {
      width: 50px; height: 50px; border-radius: 50%;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; margin-right: 12px;
    }
  .dm-info { flex: 1; }
  .dm-name { font-weight: 700; font-size: 15px; margin-bottom: 3px; }
  .dm-last { font-size: 13px; color: #8a9ba8; }

    /* Chat window */
  .chat-window { display: none; flex-direction: column; height: calc(100vh - 55px); }
  .chat-window.active { display: flex; }
  .chat-back { cursor: pointer; margin-right: 15px; font-size: 24px; }

  .chat-messages {
      flex: 1; overflow-y: auto; padding: 15px;
      background: #0e1621;
    }
  .msg {
      max-width: 70%; margin-bottom: 12px; padding: 8px 12px;
      border-radius: 12px; font-size: 14px; line-height: 1.4;
      word-wrap: break-word;
    }
  .msg.me {
      background: #5288b8; margin-left: auto; border-bottom-right-radius: 4px;
    }
  .msg.other {
      background: #182533; margin-right: auto; border-bottom-left-radius: 4px;
    }
  .msg-time { font-size: 10px; opacity: 0.6; margin-top: 4px; text-align: right; }

  .chat-input-box {
      display: flex; padding: 10px; background: #17212b;
      border-top: 1px solid #0e1621;
    }
  .chat-input {
      flex: 1; padding: 12px 15px; border-radius: 22px;
      border: none; background: #242f3d; color: white; font-size: 15px;
      outline: none;
    }
  .chat-send {
      width: 45px; height: 45px; border-radius: 50%;
      background: #5288b8; border: none; color: white;
      font-size: 20px; margin-left: 10px; cursor: pointer;
    }

  .header-user { position: fixed; top: 15px; right: 200px; font-size: 13px; color: #ffd700; z-index: 100; }
  .logout-btn-small { padding: 6px 12px; font-size: 11px; width: auto; background: rgba(255,255,255,0.2); color: white; margin-left: 10px; }
  </style>
</head>
