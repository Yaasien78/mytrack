<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Menu VIP</title>
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0A0082] text-white">
  <header class="flex justify-between p-4 bg-[#07004D]">
    <a href="dashboard.html" class="text-yellow-400">Back</a>
    <button id="btnUser" class="font-bold text-yellow-400">Loading...</button>
  </header>

  <main class="p-4 text-center">
    <h1 class="text-2xl font-bold text-yellow-400 mb-4">Menu VIP</h1>
    <button id="btnBayar" onclick="bayarVIP()" class="w-full bg-yellow-400 text-black font-bold text-xl p-4 rounded-2xl">
      Bayar 0.1 Pi Untuk Buka
    </button>
    <div id="menuVIP" class="hidden mt-6 bg-[#1A1A3D] p-4 rounded-2xl">
      <p class="font-bold">🔥 Sinyal VIP Terbuka</p>
    </div>
  </main>

  <script>
    // JURUS TERAKHIR: TUNGGU SDK SIAP DULU
    window.onload = function() {
      // Kasih jeda 500ms biar SDK Pi bener2 nongol
      setTimeout(function() { 
        
        console.log("Pi SDK:", Pi); // Cek di console Pi Browser

        Pi.init({ 
          version: "2.0", 
          sandbox: true,  
          clientId: "MU0h1YCvr5HMSJdt_iNaR7YPv0T4qV7MtUnv5uGUz48" // <-- CEK 3X. HARUS SAMA DGN DI DEVELOPER PI
        });

        const isLoggedIn = localStorage.getItem('pi_auth');
        const piUser = localStorage.getItem('pi_user');

        if (isLoggedIn !== 'true' || !piUser) {
          localStorage.clear(); 
          window.location.replace("index.html"); 
          return; // Stop di sini
        } 
        
        document.getElementById('btnUser').innerText = JSON.parse(piUser).username;

      }, 500); // Jeda 0.5 detik
    };

    // Fungsi tombol harus di luar window.onload
    async function bayarVIP() {
  try {
    await Pi.authenticate(['payments']);
    await Pi.createPayment({ 
      amount: 0.1, 
      memo: "Buka Menu VIP", 
      metadata: { product: "VIP_1_BULAN" },
      callbacks: {
        onReadyForServerApproval: (paymentId) => { console.log("Approve:", paymentId); },
        onReadyForServerCompletion: (paymentId, txid) => { 
          console.log("Sukses:", paymentId, txid);
          document.getElementById('menuVIP').classList.remove('hidden');
          document.getElementById('btnBayar').style.display = 'none';
          alert("VIP Terbuka");
        },
        onCancel: (paymentId) => { alert("Dibatalkan"); },
        onError: (error, payment) => { alert("Error: " + error); }
      }
    });
  } catch (err) { alert("Gagal Auth: " + err); }
    }
  </script>
</body>
</html>
