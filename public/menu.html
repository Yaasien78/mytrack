<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyTrack Menu</title>
  <script src="https://sdk.minepi.com/pi-sdk.js"></script> <!-- Pi SDK -->
  <style>
    :root {
      --head-foot: #2E5A8A; /* Biru Tua 100% = Head & Foot */
      --col-1: #4A7BB8; /* Biru 75% dari head */
      --col-2: #5A9BD5; /* Biru 50% dari head */ 
      --col-3: #A0D8F1; /* Biru 25% dari head */
      --gold-border: #DAA520; 
      --content-bg: #F0F8FF; 
    }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
    html, body { height: 100%; }
    body { display: flex; flex-direction: column; background: var(--content-bg); }

    /* HEAD BISA DI KLIK */
    .head {
      height: 60px; background: var(--head-foot);
      border-bottom: 2px solid var(--gold-border);
      display: flex; align-items: center; padding: 0 20px; 
      color: #fff; flex-shrink: 0; cursor: pointer; /* Biar tau bisa di klik */
    }
    .head .logo { font-weight: bold; font-size: 20px; }

    /* MENU KE BAWAH, FULL LEBAR */
    .sidebar { width: 100%; border-bottom: 2px solid var(--gold-border); flex-shrink: 0; }
    .sidebar ul { list-style: none; }
    .sidebar li a {
      display: flex; align-items: center; justify-content: center; 
      height: 60px; /* Sama tinggi head */
      width: 100%; /* Sama lebar layar */
      text-decoration: none; color: #fff; font-weight: 700; font-size: 18px;
      border-bottom: 2px solid var(--gold-border);
    }
    .nav-profil a { background: var(--col-1); } /* 75% */
    .nav-ads a { background: var(--col-2); }    /* 50% */
    .nav-info a { background: var(--col-3); color: #003366; } /* 25% */

    /* KONTEN TENGAH */
    .content { 
      flex: 1; padding: 30px 20px; background: var(--content-bg); 
      text-align: center; display: flex; flex-direction: column; justify-content: center;
    }
    .content h2 { font-size: 28px; line-height: 1.3; font-weight: 800; }
    .content .username { 
      font-size: 18px; font-weight: bold; color: var(--head-foot); 
      margin: 8px 0 15px 0; 
    }
    .content p { font-size: 15px; }

    /* FOOT */
    .foot {
      height: 50px; background: var(--head-foot);
      border-top: 2px solid var(--gold-border);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; color: #fff; font-weight: 500; flex-shrink: 0;
    }
  </style>
</head>
<body>

  <!-- HEAD DI KLIK BALIK KE COVER -->
  <header class="head" onclick="window.location.href='index.html'">
    <div class="logo">Menu</div> 
  </header>

  <!-- MENU 3 KOLOM KE BAWAH -->
  <nav class="sidebar">
    <ul>
      <li class="nav-profil"><a href="profil.html">Profil</a></li>
      <li class="nav-ads"><a href="ads.html">Ads</a></li>
      <li class="nav-info"><a href="info.html">Info Public</a></li>
    </ul>
  </nav>

  <!-- KONTEN -->
  <main class="content">
    <h2>
      Selamat Datang<br>
      di My Track<br>
      Appnya Pioneer
    </h2>
    <div class="username" id="username">@loading...</div>
    <p>Klik menu di atas buat pindah view.</p>
  </main>

  <footer class="foot">
    <div>My Track @2026 | Terbit: <span id="tgl"></span></div>
  </footer>

  <script>
    // Tanggal Auto
    const tgl = new Date();
    document.getElementById('tgl').innerText = tgl.toLocaleDateString('id-ID', { day: '2-digit', month: 'long', year: 'numeric' });
    
    // Ambil @username dari Pi SDK
    Pi.init({ version: "2.0" });
    Pi.authenticate({ scopes: ['username'] }, function(authResult) {
        document.getElementById('username').innerText = '@' + authResult.user.username;
    }, function(error) {
        document.getElementById('username').innerText = '@guest';
    });
  </script>
</body>
  </html>
