<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyTrack Menu</title>
  <style>
    :root {
      --head-blue: #87CEEB; /* Biru muda Head */
      --gold-border: #DAA520; /* Emas tipis */
      --col-1: #A0D8F1; /* Biru -25% dari head */
      --col-2: #5A9BD5; /* Biru -50% dari head */
      --col-3: #2E5A8A; /* Biru -75% dari head */
      --content-bg: #F0F8FF; /* Putih kebiruan 10% */
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      background: var(--content-bg);
    }

    /* 1. HEAD - Ditambah flex space-between */
    .head {
      height: 60px; /* Samain tinggi sama cover lu */
      background: var(--head-blue);
      border-bottom: 2px solid var(--gold-border);
      display: flex;
      align-items: center;
      justify-content: space-between; /* Biar kiri-kanan pisah */
      padding: 0 20px;
      color: #003366;
    }
    .head .logo {
      font-weight: bold;
      font-size: 18px;
    }
    /* Tombol Garis 3 */
    .back-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      color: #003366;
      font-size: 14px;
      font-weight: 500;
    }
    .hamburger {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .hamburger span {
      width: 22px;
      height: 2px;
      background: #003366;
      border-radius: 2px;
    }

    /* 2. LAYOUT UTAMA */
    .container { display: flex; flex: 1; }

    /* 3. SIDEBAR MENU */
    .sidebar {
      width: 250px;
      background: var(--content-bg);
      padding: 10px 0;
    }
    .sidebar ul { list-style: none; }
    .sidebar li a {
      display: block;
      padding: 14px 20px;
      text-decoration: none;
      color: #fff;
      font-weight: 500;
      border-left: 4px solid var(--gold-border);
      margin-bottom: 2px;
      transition: 0.2s;
    }
    .sidebar li a:hover { filter: brightness(1.1); }

    /* Warna kolom sesuai minta */
    .nav-profil a { background: var(--col-1); } /* Biru -25% */
    .nav-ads a { background: var(--col-2); }    /* Biru -50% */
    .nav-info a { background: var(--col-3); }   /* Biru -75% */

    /* 4. KONTEN */
    .content { flex: 1; padding: 20px; background: var(--content-bg); }

    /* 5. FOOT */
    .foot {
      height: 50px;
      background: var(--head-blue);
      border-top: 2px solid var(--gold-border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      color: #003366;
      font-weight: 500;
    }
  </style>
</head>
<body>

  <!-- HEAD + TOMBOL BACK COVER -->
  <header class="head">
    <div class="logo">Menu</div> 
    
    <a href="index.html" class="back-btn"> <!-- Ganti index.html ke file cover lu -->
      <div class="hamburger">
        <span></span>
        <span></span>
        <span></span>
      </div>
      Back to Cover
    </a>
  </header>

  <div class="container">
    <!-- SIDEBAR MENU -->
    <nav class="sidebar">
      <ul>
        <li class="nav-profil">
          <a href="profil.html">Profil</a>
        </li>
        <li class="nav-ads">
          <a href="ads.html">Ads</a>
        </li>
        <li class="nav-info">
          <a href="info.html">Info Public</a>
        </li>
      </ul>
    </nav>

    <!-- KONTEN TENGAH -->
    <main class="content">
      <h2>Selamat Datang di MyTrack</h2>
      <p>Klik menu di kiri buat pindah view.</p>
    </main>
  </div>

  <!-- FOOT -->
  <footer class="foot">
    My Track @2026 | Terbit: <span id="tgl"></span>
  </footer>

  <script>
    // Auto isi tanggal hari ini/bulan/tahun
    const tgl = new Date();
    document.getElementById('tgl').innerText = tgl.toLocaleDateString('id-ID', {
      day: '2-digit', month: 'long', year: 'numeric'
    });
  </script>

</body>
    </html>
