<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyTrack Menu</title>
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
  <style>
    :root {
      --head-foot: #2E5A8A; 
      --col-1: #4A7BB8; /* 75% */
      --col-2: #5A9BD5; /* 50% */ 
      --col-3: #A0D8F1; /* 25% */
      --gold-border: #DAA520; /* 2px tipis semua */
      --content-bg: #F0F8FF; 
    }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
    html, body { height: 100%; }
    body { display: flex; flex-direction: column; background: var(--content-bg); }

    .head {
      height: 60px; background: var(--head-foot);
      border-bottom: 2px solid var(--gold-border); /* 2px tipis */
      display: flex; align-items: center; padding: 0 20px; 
      color: #fff; flex-shrink: 0; cursor: pointer;
    }
    .head .logo { font-weight: bold; font-size: 20px; }

    .sidebar { width: 100%; flex-shrink: 0; }
    .sidebar ul { list-style: none; }
    .sidebar li a {
      display: flex; align-items: center; justify-content: center; 
      height: 60px; width: 100%;
      text-decoration: none; color: #fff; font-weight: 700; font-size: 18px;
      border-top: 2px solid var(--gold-border); /* Ganti jadi border-top biar gak dobel di bawah */
    }
    .nav-profil a { background: var(--col-1); } 
    .nav-ads a { background: var(--col-2); }    
    .nav-info a { background: var(--col-3); color: #003366; } 

    .content { 
      flex: 1; padding: 30px 20px; background: var(--content-bg); 
      text-align: center; display: flex; flex-direction: column; justify-content: center;
    }
    .content h2 { font-size: 28px; line-height: 1.3; font-weight: 800; }
    .content .username { 
      font-size: 18px; font-weight: bold; color: var(--head-foot); 
      margin: 8px 0 15px 0; 
    }
    .content p { font-size: 15px; }

    .foot {
      height: 50px; background: var(--head-foot);
      border-top: 2px solid var(--gold-border); /* 2px tipis */
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; color: #fff; font-weight: 500; flex-shrink: 0;
    }
  </style>
</head>
<body>

  <header class="head" onclick="window.location.href='index.html'">
    <div class="logo">Menu</div> 
  </header>

  <nav class="sidebar">
    <ul>
      <li class="nav-profil"><a href="profil.html">Profil</a></li>
      <li class="nav-ads"><a href="ads.html">Ads</a></li>
      <li class="nav-info"><a href="info.html">Info Public</a></li>
    </ul>
  </nav>

  <main class="content">
    <h2>
      Selamat Datang<br>
      di My Track<br>
      Appnya Pioneer
    </h2>
    <div class="username" id="username">@loading...</div>
    <p>Klik menu di atas buat pindah view.</p>
  </main>

  <footer class="foot">
    <div>My Track @2026 | Terbit: <span id="tgl"></span></div>
  </footer>

  <script>
    const tgl = new Date();
    document.getElementById('tgl').innerText = tgl.toLocaleDateString('id-ID', { day: '2-digit', month: 'long', year: 'numeric' });
    
    // Pi SDK Auto Username - Versi Pasti Jalan
    async function getPiUser() {
      try {
        Pi.init({ version: "2.0", sandbox: false }); // sandbox: true kalau masih ngetes
        const auth = await Pi.authenticate(['username']);
        document.getElementById('username').innerText = '@' + auth.user.username;
      } catch (err) {
        document.getElementById('username').innerText = '@guest';
        console.error("Pi Auth Error:", err);
      }
    }
    getPiUser();
  </script>
</body>
  </html>
