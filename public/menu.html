<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Track</title>
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { background-color: #ffffff; }
.border-gold-2 { border: 2px solid #fbbf24; }
.bg-dongker { background-color: #0f1a2e; }
.bg-ungu { background-color: #6d28d9; }
  </style>
</head>
<body class="font-sans">
  <div class="w-full min-h-screen flex-col bg-white overflow-y-auto pb-24">
    <header class="bg-dongker p-3 border-b-2 border-yellow-400 flex items-center justify-between sticky top-0 z-10">
      <a href="menu.html" class="text-3xl text-yellow-400 active:scale-90">≡</a> <!-- LINK KE MENU.HTML -->
      <h1 class="text-2xl font-extrabold text-white tracking-wide">My Track</h1>
      <img src="https://minepi.com/favicon.ico" alt="Pi" class="w-8 h-8 rounded-full border-2 border-yellow-400">
    </header>
    <main class="p-3 flex-1 flex-col gap-3">
      <div class="bg-ungu border-gold-2 rounded-2xl p-3 text-center">
        <h2 class="text-lg text-white">Harga Pi/USD Live</h2>
        <p id="hargaUSD" class="text-5xl font-extrabold text-yellow-400 my-1">$0.0000</p>
        <p id="hargaIDR" class="text-xl text-yellow-400">Harga /pi = Rp 0</p>
        <p id="persen" class="text-2xl font-bold">0.00%</p>
        <p class="text-xs text-purple-200 mt-1">Kurs: 1 USD = Rp 17934.50 | Update <span id="jam"></span></p>
      </div>
      <div class="bg-ungu border-gold-2 rounded-2xl p-2 h-64"><canvas id="priceChart"></canvas></div>
    </main> <button id="btnBayarMenu" onclick="bayarBukaMenu()" class="bg-yellow-400 text-black font-bold p-3 rounded-xl w-full mt-4">Bayar 0.1 Pi Buka Menu</button>
    <footer class="bg-dongker p-3 border-t-2 border-yellow-400 text-center fixed bottom-0 w-full left-0">
      <button id="btnLogin" class="text-xl font-bold text-yellow-400 active:scale-95 w-full">Loading...</button>
    </footer>
  </div>
  <script>
    let chart; let dataPoints = [];
Pi.init({ version: "2.0", sandbox: true }); // <- CUMA INIT DOANG, JANGAN AUTH DI SINI
      try {
        const res = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=pi-network&vs_currencies=usd,idr&include_24hr_change=true');
        const pi = (await res.json())['pi-network'];
        document.getElementById('hargaUSD').innerText = `$${pi.usd.toFixed(4)}`;
        document.getElementById('hargaIDR').innerText = `Harga /pi = Rp ${pi.idr.toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g, ".")}`;
        const persenEl = document.getElementById('persen');
        if (pi.usd_24h_change >= 0) { persenEl.className = 'text-2xl font-bold text-green-400'; persenEl.innerText = `+${pi.usd_24h_change.toFixed(2)}%`; }
        else { persenEl.className = 'text-2xl font-bold text-red-500'; persenEl.innerText = `${pi.usd_24h_change.toFixed(2)}%`; }
        dataPoints.push(pi.usd); if(dataPoints.length > 20) dataPoints.shift(); updateChart();
        document.getElementById('jam').innerText = new Date().toLocaleTimeString('id-ID', {hour: '2-digit', minute:'2-digit'});
      } catch (e) {}
    }
    function initChart() {
      chart = new Chart(document.getElementById('priceChart'), {
        type: 'line', data: { labels: Array(20).fill(''), datasets: [{ data: dataPoints, borderColor: '#ffffff', borderWidth: 2, backgroundColor: 'rgba(255, 255, 255, 0.1)', fill: true, tension: 0.3, pointRadius: 0 }]},
        options: { maintainAspectRatio: false, animation: false, scales: { y: { display: true, ticks: { color: 'white', callback: (val) => val.toFixed(4).replace('.', ',') }, grid: { color: 'rgba(255,255,255,0.1)' } }, x: { display: false } }, plugins: { legend: { display: false } }
      });
    }
    function updateChart() { if(chart) { chart.data.datasets[0].data = dataPoints; chart.update(); } }
    let currentUser = null;
let isPaid = false;

function bayarBukaMenu(){ // <- MESIN BAYAR
    if(!currentUser){alert('Login dulu bro');return;}
    if(isPaid){alert('Udah bayar bro');return;}

    Pi.createPayment({ // <- INI YANG BIKIN POPUP MUNCUL
      amount: 0.1,
      memo: 'Bayar Buka Menu VIP My Track 0.1 Pi',
      metadata: {app: 'mytrack', action: 'unlock_menu'},
      onReadyForServerApproval: async (paymentId) => {
        alert("Nembak approve...");
        await fetch('/api/payments/approve', {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify({ paymentId })
        });
      },
      onReadyForServerCompletion: async (paymentId, txid) => {
        await fetch('/api/payments/complete', {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify({ paymentId, txid })
        });
        isPaid = true;
        document.getElementById('btnBayarMenu').innerText='✅ Udah Bayar';
        alert('Sukses! Menu VIP Kebuka. Tx: ' + txid);
      },
      onCancel: () => alert('Batal Bayar'),
      onError: (error) => alert('Error: ' + error)
    });
} // <- TUTUP FUNGSI

// SIMPAN USER PAS LOGIN
Pi.authenticate({ scopes: ['username', 'payments'] }).then(auth => {
  currentUser = auth.user;
  document.getElementById('btnLogin').innerText = 'Welcome '+auth.user.username;
  alert('LOGIN SUKSES: '+auth.user.username); // <- TAMBAH INI
}).catch((err) => { // <- TANGKEP ERROR NYA
  document.getElementById('btnLogin').innerText = 'Login Pi';
  alert('LOGIN GAGAL: '+err); // <- TAMBAH INI
});
    initChart(); updateData(); setInterval(updateData, 15000);
  </script>
</body>
</html>
