<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menu VIP</title>
<script src="https://sdk.minepi.com/pi-sdk.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0A0082] text-white font-sans">
<header class="flex justify-between items-center p-4 bg-[#07004D]">
  <a href="/dashboard.html" class="text-yellow-400">← Back</a>
  <button id="btnUser" class="text-sm font-bold text-yellow-400">Loading...</button>
</header>

<main class="p-4 text-center">
  <h1 class="text-2xl font-bold text-yellow-400 mb-4">Menu VIP</h1>
  <p class="text-gray-300 mb-6">Buka akses semua sinyal premium</p>

  <button id="btnBayar" class="w-full bg-yellow-400 text-black font-bold text-xl p-4 rounded-2xl active:scale-95">
    Bayar 0.1 Pi Untuk Buka
  </button>
  
  <div id="menuVIP" class="hidden mt-6 text-left bg-[#1A10A3] p-4 rounded-2xl">
    <p class="font-bold">🔥 Sinyal VIP Terbuka</p>
    <p class="text-sm mt-2">1. BUY Pi < 0.35</p>
    <p class="text-sm">2. SELL Pi > 0.38</p>
  </div><button id="btn-vip">Beli VIP 1 Bulan - 1 Pi</button>
</main>

<script>
Pi.init({ version: "2.0", sandbox: true });
const btnUser = document.getElementById('btnUser');
const btnBayar = document.getElementById('btnBayar');
const menuVIP = document.getElementById('menuVIP');
let currentUser = null;

// 1. CEK LOGIN. KALAU BELUM LOGIN = TENDANG KE INDEX
const username = localStorage.getItem('pi_username');
if(!username){
  window.location.href = '/index.html';
}else{
  btnUser.innerText = 'Hi, '+username;
  // Cek kalau udah pernah bayar
  if(localStorage.getItem('pi_paid') === 'true'){
    toggleMenu(true);
  }
}

// 2. FUNGSI BAYAR - INI KUNCINYA
btnBayar.onclick = async () => {
  if(!username) return alert('Login dulu bro');
  
  alert('Nembak approve...'); // BUAT NGETES SAMPE SINI GAK
  
  const paymentData = {
    amount: 0.1,
    memo: 'Buka Menu VIP My Track',
    metadata: { app: 'mytrack', user: username }
  };

  const callbacks = {
    onReadyForServerApproval: async (paymentId) => {
      alert('Server approve...'); // LINE 78 VERSI LU
      const res = await fetch('/api/approve', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ paymentId })
      });
      if(!res.ok) throw new Error('Approve gagal');
    },
    onReadyForServerCompletion: async (paymentId, txid) => {
      await fetch('/api/complete', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ paymentId, txid })
      });
      localStorage.setItem('pi_paid', 'true'); // SIMPEN UDAH BAYAR
      toggleMenu(true);
      alert('Sukses! Menu VIP Kebuka'); // LINE 93 VERSI LU
    },
    onCancel: () => alert('Bayar dibatalkan'),
    onError: (error) => alert('Error: '+error)
  };

  try{
    await Pi.createPayment(paymentData, callbacks); // <- INI YANG BIKIN POPUP
  }catch(e){
    alert('Gagal buka popup: '+e.message);
  }
}

function toggleMenu(open){
  if(open){
    menuVIP.classList.remove('hidden');
    btnBayar.classList.add('hidden');
  }
}
</script>
  <script>
const btnVip = document.getElementById('btn-vip');

btnVip.onclick = async () => {
  try {
    btnVip.disabled = true;
    btnVip.textContent = 'Nembak approve...';

    const payment = await Pi.createPayment({
      amount: 1,
      memo: "AKSES VIP 1 BULAN - mytrack.id", // <- INI YANG MUNCUL DI POPUP
      metadata: { product: "vip_bulanan" }
    }, {
      onReadyForServerApproval: async (paymentId) => {
        await fetch('/api/payments/approve', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ paymentId })
        });
      },
      onReadyForServerCompletion: async (paymentId, txid) => {
        await fetch('/api/payments/complete', {
          method: 'POST', 
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ paymentId, txid })
        });
        alert('Sukses! VIP Aktif');
        btnVip.textContent = 'Beli VIP 1 Bulan - 1 Pi';
        btnVip.disabled = false;
      },
      onCancel: () => {
        alert('Dibatalkan');
        btnVip.textContent = 'Beli VIP 1 Bulan - 1 Pi';
        btnVip.disabled = false;
      },
      onError: (err) => {
        alert('Error: ' + err.message);
        btnVip.textContent = 'Beli VIP 1 Bulan - 1 Pi';
        btnVip.disabled = false;
      }
    });
  } catch(e){
    alert('Gagal: ' + e.message);
  }
};
  </script>
</body>
</html>
