<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>3. Chat My Track</title>
<style>
:root{--biru:#0A1F44; --ungu:#4B0082; --emas:#DAA520; --hitam:#000;}
*{box-sizing:border-box}
body{margin:0;height:100dvh;display:flex;flex-direction:column;background:var(--biru);color:#fff;font-family:'Segoe UI',Arial,sans-serif}
.header{padding:12px 15px;background:var(--ungu);display:flex;align-items:center;gap:10px;flex-shrink:0}
.header a{font-size:1.8em;color:var(--emas);text-decoration:none;font-weight:700}
.header h1{font-size:1.2em;margin:0;flex-grow:1;text-align:center;color:var(--emas)}
#loginBox{padding:10px;background:var(--hitam);text-align:center;flex-shrink:0}
#loginBtn{background:var(--emas);color:var(--hitam);border:0;padding:10px 20px;border-radius:8px;font-weight:700;cursor:pointer}
#userInfo{display:none;gap:10px;align-items:center;justify-content:center}
#userInfo img{width:32px;height:32px;border-radius:50%}
#chatBox{flex-grow:1;overflow-y:auto;padding:15px;display:flex;flex-direction:column;gap:10px}
.msg{background:var(--ungu);padding:8px 12px;border-radius:12px;max-width:80%}
.msg.me{background:var(--emas);color:var(--hitam);align-self:flex-end}
.msg .user{font-size:0.8em;font-weight:700;color:var(--emas);margin-bottom:3px}
.msg.me .user{color:var(--hitam)}
.inputBox{display:flex;padding:10px;gap:10px;background:var(--hitam);flex-shrink:0}
.inputBox input{flex-grow:1;padding:12px;border:0;border-radius:8px;background:#222;color:#fff;font-size:1em}
.inputBox button{padding:0 20px;border:0;border-radius:8px;background:var(--emas);color:var(--hitam);font-weight:700;cursor:pointer}
.inputBox button:disabled{opacity:0.5;cursor:not-allowed}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>
<body>

<header class="header">
  <a href="menu.html"><</a>
  <h1>Chat Public</h1>
</header>

<div id="loginBox">
  <button id="loginBtn">Login dengan Pi</button>
  <div id="userInfo">
    <img id="avatar" src="">
    <span id="username"></span>
  </div>
</div>

<div id="chatBox"></div>

<div class="inputBox">
  <input id="chatInput" type="text" placeholder="Login dulu buat chat..." disabled>
  <button id="sendBtn" disabled>Kirim</button>
</div>

<script>
// 1. KONEKSI SUPABASE LU - UDAH GUE ISI
const SUPA_URL = 'https://aecidmcsdtkshjdnrrrd.supabase.co'; 
const SUPA_KEY = 'sb_publishable_Ha3M2Q6FzUGaTVV4rtnong_lkHZrQWD';
const supabase = window.supabase.createClient(SUPA_URL, SUPA_KEY);

// 2. STATE
let currentUser = null;
const chatBox = document.getElementById('chatBox');
const chatInput = document.getElementById('chatInput');
const sendBtn = document.getElementById('sendBtn');

// 3. LOGIN PI
document.getElementById('loginBtn').onclick = async () => {
  try {
    Pi.init({ version: "2.0", sandbox: false }); // sandbox:true kalo masih testnet
    const scopes = ['username', 'payments'];
    const auth = await Pi.authenticate(scopes, function onIncompletePayment(payment){});
    
    currentUser = { uid: auth.user.uid, username: auth.user.username, avatar: auth.user.profilePicture };
    
    document.getElementById('loginBtn').style.display = 'none';
    document.getElementById('userInfo').style.display = 'flex';
    document.getElementById('username').textContent = '@' + currentUser.username;
    document.getElementById('avatar').src = currentUser.avatar;
    
    chatInput.disabled = false;
    chatInput.placeholder = "Ketik pesan...";
    sendBtn.disabled = false;
    loadChat(); // Muat chat setelah login
  } catch(e) {
    alert('Login Pi Gagal: ' + e.message);
    console.error(e);
  }
}

// 4. KIRIM PESAN
sendBtn.onclick = sendMessage;
chatInput.addEventListener('keydown', e => { if(e.key === 'Enter') sendMessage(); });

async function sendMessage(){
  const text = chatInput.value.trim();
  if(!text || !currentUser) return;
  chatInput.value = '';
  
  const { error } = await supabase.from('chat_messages').insert([{
    uid: currentUser.uid,
    username: currentUser.username,
    avatar_url: currentUser.avatar,
    text: text
  }]);
  if(error) alert('Gagal kirim: ' + error.message);
}

// 5. MUAT & REAL-TIME CHAT
async function loadChat(){
  const { data, error } = await supabase.from('chat_messages').select('*').order('id', {ascending:true}).limit(50);
  if(error){ console.error(error); return; }
  chatBox.innerHTML = '';
  data.forEach(renderMsg);
  chatBox.scrollTop = chatBox.scrollHeight;

  // Dengerin pesan baru masuk
  supabase.channel('chat-room')
    .on('postgres_changes', {event: 'INSERT', schema: 'public', table: 'chat_messages'}, payload => {
      renderMsg(payload.new);
      chatBox.scrollTop = chatBox.scrollHeight;
    })
    .subscribe();
}

function renderMsg(msg){
  const div = document.createElement('div');
  div.className = 'msg ' + (msg.uid === currentUser?.uid ? 'me' : '');
  div.innerHTML = `<div class="user">@${msg.username}</div><div>${msg.text}</div>`;
  chatBox.appendChild(div);
}
</script>

<script src="menu.js"></script> <!-- INI BUAT SWIPE 7 HALAMAN -->
</body>
  </html>
