<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
  <style>
    body{background:#1a0033;color:#fff;font-family:sans-serif;margin:0;padding:10px}
    #chat-box{height:60vh;overflow-y:auto;background:#2a0044;border-radius:12px;padding:10px;margin:10px 0}
    #user-list{height:15vh;overflow-y:auto;background:#2a0044;border-radius:12px;padding:10px;margin:10px 0;display:none}
    #user-list div{padding:8px;background:#3a0055;margin:4px 0;border-radius:8px;cursor:pointer}
    button{background:#6a0dad;color:#fff;border:none;border-radius:10px;padding:10px 12px;font-weight:bold;margin:3px;transition:.2s}
    button.active{box-shadow:0 0 15px gold}
    input{width:70%;padding:10px;border-radius:10px;border:none;background:#3a0055;color:#fff}
    #kirim{width:25%}
  </style>
</head>
<body>
  <h3>My Track V=43 © 2026</h3>
  
  <button id="public" onclick="setMode('public')">Public</button>
  <button id="team" onclick="setMode('team')">Team</button>
  <button id="privasi" onclick="setMode('privasi')">Privasi</button>
  
  <div id="user-list"></div>
  <div id="chat-box"></div>
  
  <input id="input" placeholder="Ketik pesan...">
  <button id="kirim">Kirim</button>

<script type="module">
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'
  
  const SUPABASE_URL = 'https://dwcgozbbqkcimzndfqaf.supabase.co' // GANTI
  const SUPABASE_KEY = 'eyJhbGciOi...' // GANTI
  const supabase = createClient(SUPABASE_URL, SUPABASE_KEY)

  let currentUser = null;
  let currentMode = 'public'; 
  let currentReceiver = null; 
  let channel = null; 

  const box = document.getElementById('chat-box');
  const userList = document.getElementById('user-list');
  const input = document.getElementById('input');
  const btn = document.getElementById('kirim');

  async function loginPi() {
    const scopes = ['username'];
    const auth = await window.Pi.authenticate(scopes);
    currentUser = { uid: auth.user.uid, username: auth.user.username };
    setMode('public');
  }

  window.setMode = async (mode) => {
    currentMode = mode;
    currentReceiver = null;
    document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
    document.getElementById(mode).classList.add('active');
    box.innerHTML = ''; 
    if(channel) supabase.removeChannel(channel); 

    if(mode === 'privasi') {
      userList.style.display = 'block';
      await loadUsers(); // Tampilin list orang buat DM
    } else {
      userList.style.display = 'none';
      loadMessages(); 
      subscribeRealtime(); 
    }
  }

  async function loadUsers() {
    userList.innerHTML = 'Pilih orang buat DM...';
    const { data } = await supabase.from('message_public').select('pi_uid, pi_username').limit(50);
    const unique = [...new Map(data.map(i => [i.pi_uid, i])).values()]; // Hapus duplikat
    userList.innerHTML = '';
    unique.forEach(u => {
      if(u.pi_uid === currentUser.uid) return;
      const div = document.createElement('div');
      div.textContent = u.pi_username;
      div.onclick = () => {
        currentReceiver = {uid: u.pi_uid, username: u.pi_username};
        userList.style.display = 'none';
        box.innerHTML = `<p style="text-align:center">Chat dengan ${u.pi_username}</p>`;
        loadMessages();
        subscribeRealtime();
      };
      userList.appendChild(div);
    });
  }

  async function loadMessages() {
    let query;
    if (currentMode === 'public') query = supabase.from('message_public').select('*');
    if (currentMode === 'team') query = supabase.from('message_team').select('*');
    if (currentMode === 'privasi') {
      if(!currentReceiver) return;
      query = supabase.from('message_dm').or(`and(sender_uid.eq.${currentUser.uid},receiver_uid.eq.${currentReceiver.uid}),and(sender_uid.eq.${currentReceiver.uid},receiver_uid.eq.${currentUser.uid})`);
    }
    
    const { data } = await query.order('created_at', {ascending: true}).limit(100);
    data.forEach(renderMsg);
    box.scrollTop = box.scrollHeight;
  }

  function subscribeRealtime() {
    let table = currentMode === 'privasi' ? 'message_dm' : 'message_' + currentMode;
    channel = supabase.channel('chat_' + currentMode)
      .on('postgres_changes', { event: 'INSERT', schema: 'public', table: table }, payload => {
        const msg = payload.new;
        if(currentMode === 'privasi') {
           if(!(msg.sender_uid === currentUser.uid && msg.receiver_uid === currentReceiver.uid) && !(msg.sender_uid === currentReceiver.uid && msg.receiver_uid === currentUser.uid)) return;
        }
        renderMsg(msg);
      })
      .subscribe();
  }

  function renderMsg(msg) {
    const name = msg.pi_username || msg.sender_username || 'Anon';
    const div = document.createElement('div');
    div.style.margin = '6px 0';
    div.innerHTML = `<b style="color:#ffd700">${name}:</b> ${msg.text}`;
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
  }

  btn.onclick = async () => {
    const text = input.value.trim();
    if(!text || !currentUser) return;
    input.value = '';

    if(currentMode === 'public' || currentMode === 'team') {
      await supabase.from('message_' + currentMode).insert({text, pi_uid: currentUser.uid, pi_username: currentUser.username});
    }
    if(currentMode === 'privasi') {
      if(!currentReceiver) return alert('Pilih orang dulu');
      await supabase.from('message_dm').insert({text, sender_uid: currentUser.uid, receiver_uid: currentReceiver.uid, sender_username: currentUser.username});
    }
  }

  loginPi();
</script>
</body>
</html>
