<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Track Chat</title>
<script src="https://sdk.minepi.com/pi-sdk.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{background:#1a0033;color:#fff;font-family:sans-serif;margin:0;padding:8px}
.kotak-login{background:#2a0052;border:1px solid #f9c74f;border-radius:10px;padding:6px;margin-bottom:8px;text-align:center} /* DIPENDEKIN */
.kotak-login button{background:#f9c74f;color:#000;border:0;border-radius:8px;padding:8px 15px;font-weight:700;cursor:pointer;width:100%}
.tabs{display:flex;gap:6px;margin-bottom:8px}
.tabs button{flex:1;padding:10px;border:2px solid #f9c74f;background:#2a0052;color:#fff;border-radius:10px;font-weight:700}
.tabs button.active{background:#f9c74f;color:#000}
.chatbox{height:300px;overflow-y:auto;border:2px solid #f9c74f;border-radius:10px;padding:8px;background:#2a0052}
.msg{margin:6px 0;padding:6px 8px;border-radius:8px;background:#3a006a}
.msg b{color:#f9c74f}
.input{display:flex;gap:6px;margin-top:8px}
.input input{flex:1;padding:10px;border:2px solid #f9c74f;border-radius:10px;background:#2a0052;color:#fff}
.input button{width:50px;height:50px;border:0;border-radius:10px;background:#f9c74f;color:#000;font-weight:700;font-size:20px} /* JADI KOTAK > */
.hint{text-align:center;font-size:12px;margin-top:5px;opacity:.7}
</style>
</head>
<body>

<div class="kotak-login" id="loginBox">
  <button id="btnLogin">Login dengan Pi</button> <!-- TEKS "BELUM LOGIN" DIHAPUS -->
</div>

<div class="tabs">
  <button class="tab active" data-tab="public">Public</button>
  <button class="tab" data-tab="team">Team</button>
  <button class="tab" data-tab="dm">Privasi</button>
</div>

<div class="chatbox" id="chatbox"></div>

<div class="input">
  <input id="txt" placeholder="Ketik pesan...">
  <button id="kirim">></button> <!-- JADI SIMBOL > KOTAK -->
</div>
<div class="hint">Swipe Kiri ke NFT | Kanan ke MAP</div>

<script>
const SUPABASE_URL = 'https://xxxx.supabase.co'; // GANTI PUNYA LU
const SUPABASE_KEY = 'xxx'; // GANTI PUNYA LU
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let user = null;
let currentTab = 'public';
let startX = 0;

const tabs = ['public','team','dm'];
const tabTables = {public:'message_public', team:'message_team', dm:'message_dm'};

Pi.init({ version: "2.0", sandbox: true }); // GANTI sandbox:false kalau udah live

document.getElementById('btnLogin').onclick = async () => {
  try {
    const auth = await Pi.authenticate(['username'], (p)=>{});
    user = {uid: auth.user.uid, username: auth.user.username};
    document.getElementById('loginBox').style.display = 'none'; // LANGSUNG ILANG KOTAKNYA
    loadChat();
  } catch(e) {
    alert('Login Pi gagal: ' + e); // ERROR MUNCUL POPUP AJA
  }
}

document.querySelectorAll('.tab').forEach(b=>{
  b.onclick = ()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    currentTab = b.dataset.tab;
    loadChat();
  }
});

// SWIPE KIRI KAN -> PINDAH HALAMAN
document.body.addEventListener('touchstart', e=>{ startX = e.touches[0].clientX; });
document.body.addEventListener('touchend', e=>{
  let dx = e.changedTouches[0].clientX - startX;
  if(Math.abs(dx) > 60){ // threshold swipe
    if(dx > 60){ window.location.href = 'map.html'; } // SWIPE KAN -> MAP
    if(dx < -60){ window.location.href = 'nft.html'; } // SWIPE KIRI -> NFT
  }
});

async function loadChat(){
  const table = tabTables[currentTab];
  const {data} = await supabase.from(table).select('*').order('id',{ascending:false}).limit(50);
  const box = document.getElementById('chatbox');
  box.innerHTML = '';
  data.reverse().forEach(m=>{
    let name = m.pi_username || m.sender_username || 'Anon';
    let text = m.text;
    box.innerHTML += `<div class="msg"><b>@${name}</b>: ${text}</div>`;
  });
  box.scrollTop = box.scrollHeight;
}

document.getElementById('kirim').onclick = async ()=>{
  if(!user) return alert('Login dulu bro');
  const text = document.getElementById('txt').value.trim();
  if(!text) return;
  const table = tabTables[currentTab];
  let row = currentTab==='dm' 
  ? {text, sender_uid:user.uid, sender_username:user.username, receiver_uid:'all'} 
    : {text, pi_uid:user.uid, pi_username:user.username};
  await supabase.from(table).insert(row);
  document.getElementById('txt').value = '';
  loadChat();
}

// Realtime
supabase.channel('room1')
.on('postgres_changes',{event:'INSERT',schema:'public',table:'message_public'},loadChat)
.on('postgres_changes',{event:'INSERT',schema:'public',table:'message_team'},loadChat)
.on('postgres_changes',{event:'INSERT',schema:'public',table:'message_dm'},loadChat)
.subscribe();
</script>
</body>
</html>
