<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>My Track Chat</title>
<script src="https://sdk.minepi.com/pi-sdk.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
html,body{height:100%;margin:0;padding:0;background:#1a0033;color:#fff;font-family:sans-serif;overflow:hidden}
body{display:flex;flex-direction:column;padding:8px;box-sizing:border-box}
.kotak-login{background:#2a0052;border:1px solid #f9c74f;border-radius:10px;padding:6px;margin-bottom:8px}
.kotak-login button{background:#f9c74f;color:#000;border:0;border-radius:8px;padding:10px;font-weight:700;cursor:pointer;width:100%;font-size:16px}
.tabs{display:flex;gap:6px;margin-bottom:8px;flex-shrink:0}
.tabs button{flex:1;padding:10px;border:2px solid #f9c74f;background:#2a0052;color:#fff;border-radius:10px;font-weight:700}
.tabs button.active{background:#f9c74f;color:#000}
.chatbox{flex:1;overflow-y:auto;border:2px solid #f9c74f;border-radius:10px;padding:8px;background:#2a0052}
.msg{margin:6px 0;padding:6px 8px;border-radius:8px;background:#3a006a;word-wrap:break-word}
.msg b{color:#f9c74f}
.input{display:flex;gap:6px;margin-top:8px;flex-shrink:0} /* KOTAK KIRIM GAK GUE SEMBUNYIIN LAGI */
.input input{flex:1;padding:10px;border:2px solid #f9c74f;border-radius:10px;background:#2a0052;color:#fff;font-size:16px}
.input button{width:50px;height:50px;border:0;border-radius:10px;background:#f9c74f;color:#000;font-weight:700;font-size:24px}
.hide{display:none!important} /* BUAT SEMBUNYIIN LOGIN DOANG */
</style>
</head>
<body>

<div class="kotak-login" id="loginBox">
  <button id="btnLogin">Login dengan Pi Testnet</button> 
</div>

<div class="tabs">
  <button class="tab active" data-tab="public">Public</button>
  <button class="tab" data-tab="team">Team</button>
  <button class="tab" data-tab="dm">Privasi</button>
</div>

<div class="chatbox" id="chatbox"></div>

<div class="input">
  <input id="txt" placeholder="Ketik pesan...">
  <button id="kirim">></button> 
</div>

<script>
const SUPABASE_URL = 'https://aecidmcsdtkshjdnrrrd.supabase.co'; 
const SUPABASE_KEY = 'sb_publishable_Ha3M2Q6FzUGaTVV4rtnong_lkHZrQWD'; 
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let user = null;
let currentTab = 'public';
let startX = 0;
const tabTables = {public:'message_public', team:'message_team', dm:'message_dm'};
let piReady = false;

// KUNCI: JALANIN LANGSUNG PAS DOM SIAP, BUKAN WINDOW.LOAD
document.addEventListener('DOMContentLoaded', initPi);

function initPi(){
  if(!window.Pi){
    document.getElementById('chatbox').innerHTML = '<div class="msg"><b>ERROR</b>: Pi SDK gak kebaca. WAJIB BUKA DI PI BROWSER, BUKAN DARI IFRAME.</div>';
    return;
  }
  
  Pi.init({ version: "2.0", sandbox: true }); // TESTNET
  piReady = true;
  console.log('Pi SDK Init OK');

  document.getElementById('btnLogin').onclick = async () => {
    if(!piReady) return alert('SDK belum siap');
    try {
      const auth = await Pi.authenticate(['username']); 
      user = {uid: auth.user.uid, username: auth.user.username};
      document.getElementById('loginBox').classList.add('hide'); // SEMBUNYIIN LOGIN
      loadChat();
    } catch(e) {
      document.getElementById('chatbox').innerHTML = `<div class="msg"><b>Login Gagal:</b> ${e.message}</div>`;
    }
  }

  document.querySelectorAll('.tab').forEach(b=>{
    b.onclick = ()=>{
      document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
      b.classList.add('active');
      currentTab = b.dataset.tab;
      loadChat();
    }
  });

  document.getElementById('kirim').onclick = sendMsg;
  document.getElementById('txt').onkeypress = e=>{ if(e.key==='Enter') sendMsg(); }
  
  // SWIPE: MAP <- CHAT -> NFT. INDEX CHAT = 1
  let currentIndex = 1; 
  const pages = ['map.html', 'chat.html', 'nft.html'];
  document.body.addEventListener('touchstart', e=>{ startX = e.changedTouches[0].screenX; }, {passive:true});
  document.body.addEventListener('touchend', e=>{
    let dx = e.changedTouches[0].screenX - startX;
    if(Math.abs(dx) > 70){
      if(dx > 70 && currentIndex > 0){ window.location.href = pages[currentIndex-1]; }
      if(dx < -70 && currentIndex < pages.length - 1){ window.location.href = pages[currentIndex+1]; }
    }
  });
}

async function loadChat(){
  if(!user) return;
  const table = tabTables[currentTab];
  let q = supabase.from(table).select('*').order('id',{ascending:false}).limit(50);
  if(currentTab==='dm'){ q = q.or(`sender_uid.eq.${user.uid},receiver_uid.eq.${user.uid}`); }
  const {data} = await q;
  const box = document.getElementById('chatbox');
  box.innerHTML = '';
  data.reverse().forEach(m=>{
    let name = m.pi_username || m.sender_username || 'Anon';
    box.innerHTML += `<div class="msg"><b>@${name}</b>: ${m.text}</div>`;
  });
  box.scrollTop = box.scrollHeight;
}

async function sendMsg(){
  if(!user) return alert('Login dulu bro');
  const text = document.getElementById('txt').value.trim();
  if(!text) return;
  const table = tabTables[currentTab];
  let row = currentTab==='dm' 
 ? {text, sender_uid:user.uid, sender_username:user.username, receiver_uid:'all'} 
    : {text, pi_uid:user.uid, pi_username:user.username};
  await supabase.from(table).insert(row);
  document.getElementById('txt').value = '';
}

supabase.channel('room1')
.on('postgres_changes',{event:'INSERT',schema:'public',table:'message_public'},payload=>{ if(currentTab==='public') loadChat(); })
.on('postgres_changes',{event:'INSERT',schema:'public',table:'message_team'},payload=>{ if(currentTab==='team') loadChat(); })
.on('postgres_changes',{event:'INSERT',schema:'public',table:'message_dm'},payload=>{ if(currentTab==='dm') loadChat(); })
.subscribe();
</script>
</body>
</html>
