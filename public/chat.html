<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solusi Emas Chat - Pioneer Only</title>
<script src="https://sdk.minepi.com/pi-sdk.js"></script> 
<style>
  body { font-family: system-ui; background: #0f172a; color: #e2e8f0; margin: 0; display: flex; flex-direction: column; height: 100vh; }
  header { padding: 12px; background: #1e293b; text-align: center; font-weight: 700; }
  #loginWrap { text-align: center; padding: 40px 12px; }
  #loginBtn { padding: 12px 24px; border: none; border-radius: 8px; background: #fbbf24; color: #000; font-weight: 700; cursor: pointer; font-size: 16px; }
  #chatWrap { display: none; flex-direction: column; flex: 1; }
  #chatBox { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px; }
  .msg { padding: 8px 12px; border-radius: 12px; max-width: 75%; }
  .me { background: #2563eb; align-self: flex-end; }
  .other { background: #334155; align-self: flex-start; }
  #inputWrap { display: flex; padding: 12px; background: #1e293b; gap: 8px; }
  #msgInput { flex: 1; padding: 10px; border-radius: 8px; border: none; background: #0f172a; color: #e2e8f0; }
  #sendBtn { padding: 10px 16px; border: none; border-radius: 8px; background: #2563eb; color: #fff; font-weight: 700; cursor: pointer; }
</style>
</head>
<body>
  <header>💬 Solusi Emas Chat</header>
  
  <div id="loginWrap">
    <h2>Wajib Login Pioneer</h2>
    <button id="loginBtn">Login dengan Pi</button>
  </div>

  <div id="chatWrap">
    <div id="chatBox"></div>
    <div id="inputWrap">
      <input id="msgInput" placeholder="Ketik pesan...">
      <button id="sendBtn">Kirim</button>
    </div>
  </div>

<script type="module">
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

  const SUPABASE_URL = 'https://aecidmcsdtkshjdnrrrd.supabase.co'
  const SUPABASE_ANON_KEY = 'sb_publishable_Ha3M2Q6FzUGaTVV4rtnong_lkHZrQWD'
  const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

  let myUsername = ''; 
  let myUid = '';  

  Pi.init({ version: "2.0", sandbox: false });

  document.getElementById('loginBtn').onclick = async () => {
    try {
      const authResult = await Pi.authenticate(['username', 'payments'], onIncompletePaymentFound);
      
      myUsername = authResult.user.username; // Masuk ke kolom pi_username
      myUid = authResult.user.uid;           // Masuk ke kolom pi_uid
      
      document.getElementById('loginWrap').style.display = 'none';
      document.getElementById('chatWrap').style.display = 'flex';
      
      loadMessages();

    } catch (err) { alert('Gagal login Pi: ' + err); }
  }

  async function loadMessages() {
    const { data } = await supabase.from('message_public').select('*').order('created_at', { ascending: true });
    document.getElementById('chatBox').innerHTML = '';
    data.forEach(m => addMessage(m.pi_username, m.text)); // Ambil pi_username & text
  }

  async function sendMessage() {
    const text = document.getElementById('msgInput').value.trim();
    if (!text) return;
    await supabase.from('message_public').insert({ 
      pi_username: myUsername, // Kirim ke kolom pi_username
      text: text,              // Kirim ke kolom text 
      pi_uid: myUid            // Kirim ke kolom pi_uid
    });
    document.getElementById('msgInput').value = '';
  }

  function addMessage(sender, text) {
    const div = document.createElement('div');
    div.className = 'msg ' + (sender === myUsername ? 'me' : 'other');
    div.textContent = sender + ': ' + text;
    document.getElementById('chatBox').appendChild(div);
    document.getElementById('chatBox').scrollTop = document.getElementById('chatBox').scrollHeight;
  }

  supabase.channel('public:messages')
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'message_public' }, payload => {
      addMessage(payload.new.pi_username, payload.new.text); // Dengerin pi_username & text
    })
    .subscribe();

  document.getElementById('sendBtn').onclick = sendMessage;
  document.getElementById('msgInput').addEventListener('keypress', e => e.key === 'Enter' && sendMessage());
  
  function onIncompletePaymentFound(payment) { console.log('Incomplete:', payment); }
</script>
</body>
</html>
