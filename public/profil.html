<!DOCTYPE html>
<html>
<head><meta charset="UTF-8">
<title>Profil Pioneer</title>
<style>
html,body{background:#000; margin:0; padding:20px; text-align:center; height:100vh; color:#00BFFF;}
.arab{font-size:6vw;font-weight:900;direction:rtl;margin:4px 0;text-shadow:0 0 4px #000}
.latin{font-size:3.8vw;font-style:italic;margin:3px 0;font-weight:600;text-shadow:0 0 4px #000}
.indo{font-size:3.5vw;font-weight:800;margin:3px 0;text-shadow:0 0 4px #000}
.arti{font-size:3.2vw;margin:3px 0;font-weight:500;text-shadow:0 0 4px #000}
.counter{font-size:2.8vw;margin-top:6px;text-shadow:0 0 4px #000}
a{color:#fffc00; text-decoration:none; font-size:4vw; position:absolute; top:10px; left:10px;}
</style>
</head>
<body>
<a href="index.html">⬅️</a>
<div id="c"></div>

<script>
const k = [
["بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ","Bismillahirrahmanirrahim","Dengan menyebut nama Allah Yang Maha Pengasih lagi Maha Penyayang","Artinya: Memulai dengan nama Allah."],
["أَشْهَدُ أَنْ لَا إِلَٰهَ إِلَّا اللَّهُ","Asyhadu alla ilaha illallah","Aku bersaksi bahwa tidak ada tuhan selain Allah","Artinya: Dua kalimat syahadat."],
["اللَّهُمَّ صَلِّ عَلَىٰ سَيِّدِنَا مُحَمَّدٍ","Allahumma sholli ala sayyidina muhammad","Ya Allah limpahkan shalawat kepada Nabi Muhammad","Artinya: Doa untuk Nabi Muhammad SAW."],
["سَلَامُ بَتِيرْ بُوَاتْ پِوْنِيْرْ","Salam Petir buat Pioner","Salam Petir buat Pioner","Artinya: Salam semangat klik petir. Jeger.. ⚡"],
["سُدَهْكَهْ كْلِكْ پَتِيْرْ هَرِ اِنِ","Sudahkah klik petir hari ini","Sudahkah klik petir hari ini","Artinya: Pengingat menambang Pi 24 jam."],
["AI TRACKER سِيَاْپْ مَنَمَانِي","AI Tracker siap menemani","AI Tracker siap menemani anda hari ini","Artinya: AI Tracker bantu jawab Pi Network."],
["گُوْنَكَنْ كُوْدْ رِفْ Yaasien","Gunakan kode reff Yaasien","Gunakan kode reff Yaasien pada Pi Network","Artinya: Masukkan kode undangan 'Yaasien'."]
];
let nomor = 1;
function tampil(){
  let x = k[nomor-1];
  document.getElementById('c').innerHTML = 
  `<div class="arab">${x[0]}</div><div class="latin">${x[1]}</div><div class="indo">${x[2]}</div><div class="arti">${x[3]}</div><div class="counter">${nomor}/7</div>`;
}
tampil(); // tampil pertama

document.body.onclick = function(){ // klik layar = ganti kalimat
  nomor = nomor + 1;
  if(nomor > 7) nomor = 1;
  tampil();
}
</script>
</body></html>
