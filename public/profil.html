<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Profil Islami</title>
<style>
html,body{
  margin:0; 
  padding:0; 
  text-align:center; 
  height:100vh; 
  /* FOTO KA'BAH FULL SCREEN */
  background:url('makkah.html') no-repeat center fixed; 
  background-size:cover;
  color:#00BFFF; /* BIRU */
}
/* BOX TRANSPARAN TIPIS AJA BIAR FOTO KELIATAN */
#c{
  background:rgba(0,0,0,0.25); /* DARI 0.55 JADI 0.25 */
  padding:25px 20px;
  border-radius:20px;
  margin-top:5vh;
  margin-left:10px;
  margin-right:10px;
  display:inline-block;
  backdrop-filter: blur(3px); /* EFEK KACA BURAM */
}
.arab{
  font-size:32px;
  font-weight:900;
  direction:rtl;
  margin:10px 0;
  color:#00BFFF; /* BIRU */
  text-shadow:0 0 10px #000, 0 0 5px #00BFFF; /* GLOW + BAYANGAN HITAM BIAR KEBACA */
}
.latin{
  font-size:18px;
  font-style:italic;
  margin:5px 0;
  font-weight:600;
  color:#FFFFFF; 
  text-shadow:0 2px 4px #000;
}
.indo{
  font-size:16px;
  font-weight:700;
  margin:3px 0;
  color:#FFFFFF; 
  text-shadow:0 2px 4px #000;
}
.arti{
  font-size:12px;
  font-style:italic;
  font-weight:100;
  color:#DDDDDD; 
  text-shadow:0 2px 4px #000;
}
.counter{
  font-size:14px;
  margin-top:15px;
  color:#FFCF00; /* KUNING EMAS */
  font-weight:bold;
  text-shadow:0 2px 4px #000;
}
a{color:#FFCF00;text-decoration:none;font-size:14px;position:absolute;top:15px;left:15px;font-weight:bold;text-shadow:0 2px 4px #000;}
</style>
</head>
<body>
<a href="index.html">← Kembali</a>
<div id="c"></div>

<script>
const k = [
["بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ","Bismillahirrahmanirrahim","Dengan menyebut nama Allah Yang Maha Pengasih lagi Maha Penyayang","Artinya: Memulai dengan nama Allah."],
["أَشْهَدُ أَنْ لَا إِلَٰهَ إِلَّا اللَّهُ","Asyhadu alla ilaha illallah","Aku bersaksi bahwa tidak ada tuhan selain Allah","Artinya: Dua kalimat syahadat."],
["اللَّهُمَّ صَلِّ عَلَىٰ سَيِّدِنَا مُحَمَّدٍ","Allahumma sholli ala sayyidina muhammad","Ya Allah limpahkan shalawat kepada Nabi Muhammad","Artinya: Doa untuk Nabi Muhammad SAW."],
["سَلَامُ بَتِيرْ بُوَاتْ پِوْنِيْرْ","Salam Petir buat Pioner","Salam Petir buat Pioner","Artinya: Salam semangat klik petir. Jeger.. ⚡"],
["سُدَهْكَهْ كْلِكْ پَتِيْرْ هَرِ اِنِ","Sudahkah klik petir hari ini","Sudahkah klik petir hari ini","Artinya: Pengingat menambang Pi 24 jam."],
["AI TRACKER سِيَاْپْ مَنَمَانِي","AI Tracker siap menemani","AI Tracker siap menemani anda hari ini","Artinya: AI Tracker bantu jawab Pi Network."],
["گُوْنَكَنْ كُوْدْ رِفْ Yaasien","Gunakan kode reff Yaasien","Gunakan kode reff Yaasien pada Pi Network","Artinya: Masukkan kode undangan 'Yaasien'."]
];
let nomor = 1; 
let total = k.length + 1; // 7 + 1 = 8

function tampil(){
  if(nomor <= 7){ 
    let x = k[nomor-1];
    document.getElementById('c').innerHTML = 
    `<div class="arab">${x[0]}</div><div class="latin">${x[1]}</div><div class="indo">${x[2]}</div><div class="arti">${x[3]}</div><div class="counter">${nomor}/7</div>`;
  } else { // 8 KOSONG
    document.getElementById('c').innerHTML = ``; 
  }
}
tampil(); 

document.body.onclick = function(){ 
  nomor = nomor + 1;
  if(nomor > total) nomor = 1; 
  tampil();
}
</script>
</body></html>
