<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Track - Market</title>
    
    <!-- Pi SDK -->
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script>
        Pi.init({ version: "2.0", sandbox: true });
    </script>
    <style>
    :root {
        --blue: #0066cc;
        --gold: #ffd700;
        --white: #ffffff;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    /* HEADER */
    .header-container {
        display: flex !important;
        justify-content: space-between;
        align-items: center;
        width: 100%;
        padding: 10px 15px;
        background: var(--blue);
        border-bottom: 3px solid var(--gold);
        position: sticky; top: 0;
    }
    .logo-left, .pi-logo-right {
        height: 42px !important; width: 42px !important;
        background: var(--blue); border-radius: 50%;
        border: 3px solid var(--gold); display: flex;
        align-items: center; justify-content: center;
    }
    .logo-left span { font-size: 9px !important; font-weight: bold; color: white !important; text-align: center; }
    .pi-logo-right span { font-size: 24px !important; font-weight: bold; color: white !important; }
body { 
    font-family: Arial, sans-serif; 
    background: #ffffff; 
    color: #333; 
    padding-bottom: 70px; /* TAMBAH INI BIAR GAK KETUTUP FOOTER */
}
    /* TANGGAL */
    .date-title {
    text-align: center; 
    color: var(--blue); 
    font-size: 20px; 
    font-weight: bold; 
    margin: 8px 0 5px 0; /* DARI 15px JADI 8px */
}

.price-container {
    width: 92%; /* DARI 90% JADI 92% BIAR AGAK LEBAR */
    margin: 0 auto 10px auto; /* DARI 20px JADI 10px */
    border: 2px solid var(--gold);
    border-radius: 10px;
    overflow: hidden;
}

.price-col-left, .price-col-right {
    padding: 8px 12px; /* DARI 12px JADI 8px BIAR RAPAT */
                     }
    .price-row {
        display: flex;
        border-bottom: 2px solid var(--gold);
    }
    .price-row:last-child { border-bottom: none; }

    .price-col-left {
        width: 50%; background: white; padding: 10px;
        font-weight: bold; font-size: 16px;
    }
    .price-col-right {
        width: 50%; background: var(--blue); color: white; padding: 10px;
        font-weight: bold; font-size: 16px; text-align: center;
    }
    .label-pi-usdt { color: var(--blue); }
    .label-pi-idr { color: green; }
    .label-usdt-idr { color: orange; }

    /* FOOTER */
    footer {
        background: linear-gradient(#0066cc, #004499);
        color: white; text-align: center; padding: 18px;
        border-top: 2px solid var(--gold); position: fixed;
        bottom: 0; width: 100%; font-size: 1.1rem;
    }
        </style>
</head>
<body>
    <!-- HEADER -- SAMAIN KAYAK INDEX -->
<header style="background:#0066cc; border-bottom:3px solid #ffd700; width:100%; padding:8px 0; position:sticky; top:0; z-index:1000;">
        <div style="display:flex; justify-content:space-between; align-items:center; width:100%; padding:0 15px; box-sizing:border-box;">
            
            <!-- KIRI -->
            <a href="index.html" style="height:42px; width:42px; background:#0066cc; border-radius:50%; border:3px solid #ffd700; box-shadow:0 0 0 2px white; display:flex; align-items:center; justify-content:center; text-decoration:none; flex-shrink:0;">
                <span style="font-size:9px; font-weight:bold; color:white; line-height:1.0; text-align:center; font-family:Arial;">My<br>Track</span>
            </a>

            <!-- TENGAH -->
            <div style="color:white; font-weight:bold; font-size:20px; text-align:center; flex:1;">Pi Coin Price</div>

            <!-- KAN -->
            <div style="height:42px; width:42px; background:#0066cc; border-radius:50%; border:3px solid #ffd700; box-shadow:0 0 0 2px white; display:flex; align-items:center; justify-content:center; flex-shrink:0;">
                <span style="font-size:24px; font-weight:bold; color:white; font-family:Arial;">π</span>
            </div>
        </div>
    </header>

<!-- BOX HARGA BARU -->
<div id="tanggal" class="date-title"></div>

<div class="price-container">
    <div class="price-row">
        <div class="price-col-left label-pi-usdt">Harga Pi/USDT</div>
        <div class="price-col-right" id="piUsdt">0.8524</div>
    </div>
    <div class="price-row">
        <div class="price-col-left label-pi-idr">Harga Pi/IDR</div>
        <div class="price-col-right" id="piIdr">13450</div>
    </div>
    <div class="price-row">
        <div class="price-col-left label-usdt-idr">Harga USDT/IDR</div>
        <div class="price-col-right" id="usdtIdr">15780</div>
    </div>
</div>
    <!-- FOOTER -->
<footer style="background:linear-gradient(#0066cc, #004499); color:white; text-align:center; padding:15px 0; font-size:18px; font-weight:800; border-top:3px solid #ffd700; letter-spacing:0.5px;">
    Welcome to My Track App
</footer>

<script>
document.addEventListener('DOMContentLoaded', function() {
    
    // 1. TANGGAL
    function updateTanggal() {
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        const tgl = document.getElementById('tanggal');
        if(tgl){ // biar gak error kalau div nya belum ada
            tgl.innerText = new Date().toLocaleDateString('id-ID', options);
        }
    }
    updateTanggal();

    // 2. DATA HARGA PALSU DULU BUAT TES
    document.getElementById('piUsdt').innerText = '0.8524';
    document.getElementById('piIdr').innerText = '13,450';
    document.getElementById('usdtIdr').innerText = '15,780';

});
</script>
</body>
  </html>
