<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Track - Market</title>
    
    <!-- Pi SDK -->
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script>
        Pi.init({ version: "2.0", sandbox: true });
    </script>
    
    <style>
        :root {
            --blue: #0066cc;
            --gold: #ffd700;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #ffffff;
            color: #333;
        }

        /* HEADER - Sama style dengan halaman lain */
        

        .header-container {
    display: flex !important;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    padding: 10px 15px;
}

.logo-left, .pi-logo-right { 
    height:42px !important; 
    width:42px !important;
    min-width: 42px !important;
    aspect-ratio: 1 / 1;
    background: var(--blue); 
    border-radius: 50%; 
    border: 3px solid var(--gold);
    box-shadow: 0 0 0 2px white;
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    flex-shrink: 0;
}

.logo-left span { 
    font-size: 9px !important; 
    font-weight: bold; 
    color: white !important;
    line-height: 1.0 !important;
    text-align: center;
}
.pi-logo-right span { 
    font-size: 24px !important; 
    font-weight: bold; 
    color: white !important;
}
 .price-center { 
    color: var(--gold); 
    font-weight: bold; 
    font-size: 14px; 
    }

        /* BODY */
        .market-container {
            max-width: 900px;
            margin: 20px auto;
            padding: 0 15px;
        }

        .price-box {
            background: white;
            border: 2px solid var(--gold);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
        }

        .price-item {
            font-size: 1.3rem;
            margin: 12px 0;
            font-weight: bold;
        }

        .chart-container {
            background: white;
            border: 2px solid var(--gold);
            border-radius: 12px;
            padding: 15px;
            margin-top: 20px;
        }

        canvas {
            width: 100% !important;
            height: 300px !important;
        }

        /* FOOTER */
        footer {
            background: linear-gradient(#0066cc, #004499);
            color: white;
            text-align: center;
            padding: 18px;
            border-top: 2px solid var(--gold);
            position: fixed;
            bottom: 0;
            width: 100%;
            z-index: 100;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>
    <!-- HEADER -- SAMAIN KAYAK INDEX -->
    <header style="background:#0066cc; border-bottom:3px solid #ffd700; width:100%; padding:8px 0;">
        <div style="display:flex; justify-content:space-between; align-items:center; width:100%; padding:0 15px; box-sizing:border-box;">
            
            <!-- KIRI -->
            <a href="index.html" style="height:42px; width:42px; background:#0066cc; border-radius:50%; border:3px solid #ffd700; box-shadow:0 0 0 2px white; display:flex; align-items:center; justify-content:center; text-decoration:none; flex-shrink:0;">
                <span style="font-size:9px; font-weight:bold; color:white; line-height:1.0; text-align:center; font-family:Arial;">My<br>Track</span>
            </a>

            <!-- TENGAH -->
            <div style="color:#ffd700; font-weight:bold; font-size:14px; text-align:center; flex:1;">Pi Coin Price</div>

            <!-- KAN -->
            <div style="height:42px; width:42px; background:#0066cc; border-radius:50%; border:3px solid #ffd700; box-shadow:0 0 0 2px white; display:flex; align-items:center; justify-content:center; flex-shrink:0;">
                <span style="font-size:24px; font-weight:bold; color:white; font-family:Arial;">π</span>
            </div>
        </div>
    </header>

    <!-- BODY MARKET -->
    <div class="market-container">
        <h2 style="text-align:center; margin:20px 0; color:#0066cc;">Harga Real Time</h2>
        
        <div class="price-box">
            <div class="price-item">PI/USDT = <span id="piUsdt">0.8524</span></div>
            <div class="price-item">PI/IDR = <span id="piIdr">13.450</span></div>
            <div class="price-item">USDT/IDR = <span id="usdtIdr">15.780</span></div>
        </div>

        <div class="chart-container">
            <h3 style="text-align:center; margin-bottom:10px; color:#0066cc;">Chart PI/USDT (5 Detik)</h3>
            <canvas id="priceChart" width="800" height="300"></canvas>
        </div>
    </div>

    <!-- FOOTER -->
    <footer>
        Welcome to My Track App
    </footer>

    <script>
        // Update harga real-time
        function updatePrices() {
            const piUsdtEl = document.getElementById('piUsdt');
            const piIdrEl = document.getElementById('piIdr');
            const usdtIdrEl = document.getElementById('usdtIdr');

            let piUsdt = 0.8524;
            let piIdr = 13450;
            let usdtIdr = 15780;

            setInterval(() => {
                piUsdt += (Math.random() * 0.008 - 0.004);
                piIdr += (Math.random() * 80 - 40);
                usdtIdr += (Math.random() * 30 - 15);

                piUsdtEl.textContent = piUsdt.toFixed(4);
                piIdrEl.textContent = Math.round(piIdr).toLocaleString('id-ID');
                usdtIdrEl.textContent = Math.round(usdtIdr).toLocaleString('id-ID');
            }, 3000);
        }

        // Simple Chart dengan Canvas (fluktuasi 5 detik)
        function drawChart() {
            const canvas = document.getElementById('priceChart');
            const ctx = canvas.getContext('2d');
            let prices = [0.85, 0.852, 0.849, 0.855, 0.851];
            let x = 0;

            setInterval(() => {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                // Background grid
                ctx.strokeStyle = '#eee';
                for (let i = 0; i < 6; i++) {
                    ctx.beginPath();
                    ctx.moveTo(0, i * 50);
                    ctx.lineTo(canvas.width, i * 50);
                    ctx.stroke();
                }

                // Line chart
                ctx.strokeStyle = '#ffd700';
                ctx.lineWidth = 3;
                ctx.beginPath();
                
                for (let i = 0; i < prices.length; i++) {
                    const y = canvas.height - (prices[i] - 0.84) * 8000;
                    if (i === 0) ctx.moveTo(i * (canvas.width / 4), y);
                    else ctx.lineTo(i * (canvas.width / 4), y);
                }
                ctx.stroke();

                // Update data
                prices.shift();
                prices.push(0.84 + Math.random() * 0.02);
            }, 5000);
        }

        // Inisialisasi
        window.onload = () => {
            updatePrices();
            drawChart();
        };
    </script>
</body>
  </html>
