<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Track - Market</title>
    
    <!-- Pi SDK -->
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script>
        Pi.init({ version: "2.0", sandbox: true });
    </script>
    
    <style>
        :root {
            --blue: #0066cc;
            --gold: #ffd700;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #ffffff;
            color: #333;
        }

        /* HEADER - Sama style dengan halaman lain */
        
        .header-container {
    display: flex !important;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    padding: 10px 15px;
}

.logo-left, .pi-logo-right { 
    height:42px !important; 
    width:42px !important;
    min-width: 42px !important;
    aspect-ratio: 1 / 1;
    background: var(--blue); 
    border-radius: 50%; 
    border: 3px solid var(--gold);
    box-shadow: 0 0 0 2px white;
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    flex-shrink: 0;
}

.logo-left span { 
    font-size: 9px !important; 
    font-weight: bold; 
    color: white !important;
    line-height: 1.0 !important;
    text-align: center;
}
.pi-logo-right span { 
    font-size: 24px !important; 
    font-weight: bold; 
    color: white !important;
}
 .price-center { 
    color: var(--gold); 
    font-weight: bold; 
    font-size: 14px; 
    }

        :root {
    --blue: #0066cc;
    --gold: #ffd700;
    --white: #ffffff;
}


.price-container {
    width: 90%;
    margin: 15px auto;
    border: 2px solid var(--gold); /* CUMA INI GARISNYA */
    border-radius: 10px;
    overflow: hidden;
}

.price-row {
    display: flex;
}

.price-col-left {
    width: 60%;
    background: white;
    padding: 12px;
    font-weight: bold;
    font-size: 16px;
}

.price-col-right {
    width: 40%;
    background: var(--blue);
    color: white;
    padding: 12px;
    font-weight: bold;
    font-size: 18px;
    text-align: center;
}

.label-pi-usdt { color: var(--blue); }
.label-pi-idr { color: green; }
.label-usdt-idr { color: orange; }

/* WARNA TEKS KIRI */
.label-pi-usdt { color: #333; }
.label-pi-idr { color: green; }
.label-usdt-idr { color: orange; }
        .price-item {
            font-size: 1.3rem;
            margin: 12px 0;
            font-weight: bold;
        }

        .chart-container {
            background: white;
            border: 2px solid var(--gold);
            border-radius: 12px;
            padding: 15px;
            margin-top: 20px;
        }

        canvas {
            width: 100% !important;
            height: 300px !important;
        }

        /* FOOTER */
        footer {
            background: linear-gradient(#0066cc, #004499);
            color: white;
            text-align: center;
            padding: 18px;
            border-top: 2px solid var(--gold);
            position: fixed;
            bottom: 0;
            width: 100%;
            z-index: 100;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>
    <!-- HEADER -- SAMAIN KAYAK INDEX -->
<header style="background:#0066cc; border-bottom:3px solid #ffd700; width:100%; padding:8px 0; position:sticky; top:0; z-index:1000;">
        <div style="display:flex; justify-content:space-between; align-items:center; width:100%; padding:0 15px; box-sizing:border-box;">
            
            <!-- KIRI -->
            <a href="index.html" style="height:42px; width:42px; background:#0066cc; border-radius:50%; border:3px solid #ffd700; box-shadow:0 0 0 2px white; display:flex; align-items:center; justify-content:center; text-decoration:none; flex-shrink:0;">
                <span style="font-size:9px; font-weight:bold; color:white; line-height:1.0; text-align:center; font-family:Arial;">My<br>Track</span>
            </a>

            <!-- TENGAH -->
            <div style="color:white; font-weight:bold; font-size:20px; text-align:center; flex:1;">Pi Coin Price</div>

            <!-- KAN -->
            <div style="height:42px; width:42px; background:#0066cc; border-radius:50%; border:3px solid #ffd700; box-shadow:0 0 0 2px white; display:flex; align-items:center; justify-content:center; flex-shrink:0;">
                <span style="font-size:24px; font-weight:bold; color:white; font-family:Arial;">π</span>
            </div>
        </div>
    </header>

    <!-- BOX HARGA BARU -->
<div class="price-container">
    <div class="price-row">
        <div class="price-col-left label-pi-usdt">Harga Pi/USDT</div>
        <div class="price-col-right" id="piUsdt">0.8524</div>
    </div>
    <div class="price-row">
        <div class="price-col-left label-pi-idr">Harga Pi/IDR</div>
        <div class="price-col-right" id="piIdr">13450</div>
    </div>
    <div class="price-row">
        <div class="price-col-left label-usdt-idr">Harga USDT/IDR</div>
        <div class="price-col-right" id="usdtIdr">15780</div>
    </div>
</div>
    
<!-- CHART -->
<canvas id="priceChart" style="width:100%; height:160px; background:white; margin-top:10px; border-top:1px solid #ddd;"></canvas>

    <!-- FOOTER -->
<footer style="background:linear-gradient(#0066cc, #004499); color:white; text-align:center; padding:15px 0; font-size:18px; font-weight:800; border-top:3px solid #ffd700; letter-spacing:0.5px;">
    Welcome to My Track App
</footer>
<script>
document.addEventListener('DOMContentLoaded', function() {

    // 1. TANGGAL
    function updateTanggal() {
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById('tanggal').innerText = new Date().toLocaleDateString('id-ID', options);
    }
    updateTanggal();

    // 2. HARGA
    const piUsdtEl = document.getElementById('piUsdt');
    const piIdrEl = document.getElementById('piIdr');
    const usdtIdrEl = document.getElementById('usdtIdr');

    let piUsdt = 0.8524;
    let piIdr = 13450;
    let usdtIdr = 15780;

    piUsdtEl.textContent = piUsdt.toFixed(4);
    piIdrEl.textContent = Math.round(piIdr).toLocaleString('id-ID');
    usdtIdrEl.textContent = Math.round(usdtIdr).toLocaleString('id-ID');

    setInterval(() => {
        piUsdt += (Math.random() - 0.5) * 0.008;
        piIdr += (Math.random() - 0.5) * 80;
        usdtIdr += (Math.random() - 0.5) * 30;

        piUsdtEl.textContent = piUsdt.toFixed(4);
        piIdrEl.textContent = Math.round(piIdr).toLocaleString('id-ID');
        usdtIdrEl.textContent = Math.round(usdtIdr).toLocaleString('id-ID');
    }, 3000);

    // CHART DENGAN 2 GARIS: HARGA + SUPPLY
const canvas = document.getElementById('priceChart');
const ctx = canvas.getContext('2d');
canvas.width = canvas.offsetWidth;
canvas.height = 160;

let harga = 0.8529; // Harga sekarang
let demand = 75; // Demand dalam %

function drawChart() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // GARIS VERTIKAL = HARGA
    let xHarga = (harga - 0.85) * 2000; // posisi berdasarkan harga
    ctx.strokeStyle = '#0066cc';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(xHarga, 0);
    ctx.lineTo(xHarga, canvas.height);
    ctx.stroke();
    
    // GARIS HORIZONTAL = DEMAND
    let yDemand = canvas.height - (demand * 1.6); // posisi berdasarkan demand
    ctx.strokeStyle = '#ff6600';
    ctx.lineWidth = 2;
    ctx.setLineDash([5, 5]); // garis putus-putus
    ctx.beginPath();
    ctx.moveTo(0, yDemand);
    ctx.lineTo(canvas.width, yDemand);
    ctx.stroke();
    ctx.setLineDash([]);

    // TULISAN LEGENDA
    ctx.font = '11px Arial';
    ctx.fillStyle = '#0066cc';
    ctx.fillText('Harga PI/USDT', xHarga + 5, 15);
    ctx.fillStyle = '#ff6600';
    ctx.fillText('Demand ' + demand + '%', 10, yDemand - 5);
    
    // SKALA
    ctx.fillStyle = '#666';
    ctx.font = '10px Arial';
    ctx.fillText('0.85', 5, canvas.height - 5);
    ctx.fillText('0.86', canvas.width - 35, canvas.height - 5);
}
drawChart();

// UPDATE SETIAP 5 DETIK
setInterval(() => {
    harga = 0.8529 + (Math.random() - 0.5) * 0.005;
    demand = 70 + Math.random() * 20;
    drawChart();
}, 5000);
});
</script>
</body>
  </html>
