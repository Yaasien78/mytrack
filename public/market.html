<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Track - Market</title>
    
    <!-- Pi SDK -->
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script>
        Pi.init({ version: "2.0", sandbox: true });
    </script>
    
    <style>
        :root {
            --blue: #0066cc;
            --gold: #ffd700;
            --white: #ffffff;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #ffffff;
            color: #333;
        }

        /* HEADER - Sama style dengan halaman lain */
        
        .header-container {
    display: flex !important;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    padding: 10px 15px;
}

.logo-left, .pi-logo-right { 
    height:42px !important; 
    width:42px !important;
    min-width: 42px !important;
    aspect-ratio: 1 / 1;
    background: var(--blue); 
    border-radius: 50%; 
    border: 3px solid var(--gold);
    box-shadow: 0 0 0 2px white;
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    flex-shrink: 0;
}

.logo-left span { 
    font-size: 9px !important; 
    font-weight: bold; 
    color: white !important;
    line-height: 1.0 !important;
    text-align: center;
}
.pi-logo-right span { 
    font-size: 24px !important; 
    font-weight: bold; 
    color: white !important;
}
       
.price-container {
    width: 90%;
    margin: 15px auto;
    border: 2px solid var(--gold); /* CUMA INI GARISNYA */
    border-radius: 10px;
    overflow: hidden;
}
.date-title {
    text-align: center; 
    color: var(--blue); 
    font-size: 22px; 
    font-weight: bold; 
    margin: 10px 0; 
        }
.price-row {
    display: flex;
    border-bottom: 2px solid var(--gold); /* TAMBAH INI */
}
.price-row:last-child { /* TAMBAH INI JUGA */
    border-bottom: none;
    }

.price-col-left {
    width: 60%;
    background: white;
    padding: 12px;
    font-weight: bold;
    font-size: 16px;
}

.price-col-right {
    width: 40%;
    background: var(--blue);
    color: white;
    padding: 12px;
    font-weight: bold;
    font-size: 18px;
    text-align: center;
}

.label-pi-usdt { color: var(--blue); }
.label-pi-idr { color: green; }
.label-usdt-idr { color: orange; }


        .price-item {
            font-size: 1.3rem;
            margin: 12px 0;
            font-weight: bold;
        }

        .chart-container {
            background: white;
            border: 2px solid var(--gold);
            border-radius: 12px;
            padding: 15px;
            margin-top: 20px;
        }

        canvas {
            width: 100% !important;
            height: 300px !important;
        }

        /* FOOTER */
        footer {
            background: linear-gradient(#0066cc, #004499);
            color: white;
            text-align: center;
            padding: 18px;
            border-top: 2px solid var(--gold);
            position: fixed;
            bottom: 0;
            width: 100%;
            z-index: 100;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>
    <!-- HEADER -- SAMAIN KAYAK INDEX -->
<header style="background:#0066cc; border-bottom:3px solid #ffd700; width:100%; padding:8px 0; position:sticky; top:0; z-index:1000;">
        <div style="display:flex; justify-content:space-between; align-items:center; width:100%; padding:0 15px; box-sizing:border-box;">
            
            <!-- KIRI -->
            <a href="index.html" style="height:42px; width:42px; background:#0066cc; border-radius:50%; border:3px solid #ffd700; box-shadow:0 0 0 2px white; display:flex; align-items:center; justify-content:center; text-decoration:none; flex-shrink:0;">
                <span style="font-size:9px; font-weight:bold; color:white; line-height:1.0; text-align:center; font-family:Arial;">My<br>Track</span>
            </a>

            <!-- TENGAH -->
            <div style="color:white; font-weight:bold; font-size:20px; text-align:center; flex:1;">Pi Coin Price</div>

            <!-- KAN -->
            <div style="height:42px; width:42px; background:#0066cc; border-radius:50%; border:3px solid #ffd700; box-shadow:0 0 0 2px white; display:flex; align-items:center; justify-content:center; flex-shrink:0;">
                <span style="font-size:24px; font-weight:bold; color:white; font-family:Arial;">π</span>
            </div>
        </div>
    </header>
<!-- BOX HARGA BARU -->
<div id="tanggal" class="date-title"></div> <!-- TAMBAH INI -->
    <div class="price-container">
    <div class="price-row">
        <div class="price-col-left label-pi-usdt">Harga Pi/USDT</div>
        <div class="price-col-right" id="piUsdt">0.8524</div>
    </div>
    <div class="price-row">
        <div class="price-col-left label-pi-idr">Harga Pi/IDR</div>
        <div class="price-col-right" id="piIdr">13450</div>
    </div>
    <div class="price-row">
        <div class="price-col-left label-usdt-idr">Harga USDT/IDR</div>
        <div class="price-col-right" id="usdtIdr">15780</div>
    </div>
</div>
    <!-- FOOTER -->
<footer style="background:linear-gradient(#0066cc, #004499); color:white; text-align:center; padding:15px 0; font-size:18px; font-weight:800; border-top:3px solid #ffd700; letter-spacing:0.5px;">
    Welcome to My Track App
</footer>
<script>
document.addEventListener('DOMContentLoaded', function() {

    // 1. TANGGAL
    function updateTanggal() {
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById('tanggal').innerText = new Date().toLocaleDateString('id-ID', options);
    }

</script>
</body>
  </html>
