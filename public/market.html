<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Track - Market</title>
    
    <!-- Pi SDK -->
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script>
        Pi.init({ version: "2.0", sandbox: true });
    </script>
    
    <style>
        :root {
            --blue: #0066cc;
            --gold: #ffd700;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #ffffff;
            color: #333;
        }

        /* HEADER - Sama style dengan halaman lain */
        

        .header-container {
    display: flex !important;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    padding: 10px 15px;
}

.logo-left, .pi-logo-right { 
    height:42px !important; 
    width:42px !important;
    min-width: 42px !important;
    aspect-ratio: 1 / 1;
    background: var(--blue); 
    border-radius: 50%; 
    border: 3px solid var(--gold);
    box-shadow: 0 0 0 2px white;
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    flex-shrink: 0;
}

.logo-left span { 
    font-size: 9px !important; 
    font-weight: bold; 
    color: white !important;
    line-height: 1.0 !important;
    text-align: center;
}
.pi-logo-right span { 
    font-size: 24px !important; 
    font-weight: bold; 
    color: white !important;
}
 .price-center { 
    color: var(--gold); 
    font-weight: bold; 
    font-size: 14px; 
    }

        /* BODY */
        .market-container {
            max-width: 900px;
            margin: 20px auto;
            padding: 0 15px;
        }

        .price-box {
            background: white;
            border: 2px solid var(--gold);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
        }

        .price-item {
            font-size: 1.3rem;
            margin: 12px 0;
            font-weight: bold;
        }

        .chart-container {
            background: white;
            border: 2px solid var(--gold);
            border-radius: 12px;
            padding: 15px;
            margin-top: 20px;
        }

        canvas {
            width: 100% !important;
            height: 300px !important;
        }

        /* FOOTER */
        footer {
            background: linear-gradient(#0066cc, #004499);
            color: white;
            text-align: center;
            padding: 18px;
            border-top: 2px solid var(--gold);
            position: fixed;
            bottom: 0;
            width: 100%;
            z-index: 100;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>
    <!-- HEADER -- SAMAIN KAYAK INDEX -->
<header style="background:#0066cc; border-bottom:3px solid #ffd700; width:100%; padding:8px 0; position:sticky; top:0; z-index:1000;">
        <div style="display:flex; justify-content:space-between; align-items:center; width:100%; padding:0 15px; box-sizing:border-box;">
            
            <!-- KIRI -->
            <a href="index.html" style="height:42px; width:42px; background:#0066cc; border-radius:50%; border:3px solid #ffd700; box-shadow:0 0 0 2px white; display:flex; align-items:center; justify-content:center; text-decoration:none; flex-shrink:0;">
                <span style="font-size:9px; font-weight:bold; color:white; line-height:1.0; text-align:center; font-family:Arial;">My<br>Track</span>
            </a>

            <!-- TENGAH -->
            <div style="color:white; font-weight:bold; font-size:20px; text-align:center; flex:1;">Pi Coin Price</div>

            <!-- KAN -->
            <div style="height:42px; width:42px; background:#0066cc; border-radius:50%; border:3px solid #ffd700; box-shadow:0 0 0 2px white; display:flex; align-items:center; justify-content:center; flex-shrink:0;">
                <span style="font-size:24px; font-weight:bold; color:white; font-family:Arial;">π</span>
            </div>
        </div>
    </header>

    <!-- BODY MARKET -->
    <div class="market-container">
<div id="tanggal" style="text-align: center; color: #0066cc; font-size: 16px; font-weight: bold; margin: 10px 0; background:white; padding:5px 0;">
        
        <div class="price-box">
            <div class="price-item">PI/USDT = <span id="piUsdt">0.8524</span></div>
            <div class="price-item">PI/IDR = <span id="piIdr">13.450</span></div>
            <div class="price-item">USDT/IDR = <span id="usdtIdr">15.780</span></div>
        </div>

        <div class="chart-container">
            <h3 style="text-align:center; margin-bottom:10px; color:#0066cc;">Chart PI/USDT (5 Detik)</h3>
            <canvas id="priceChart" width="800" height="300"></canvas>
        </div>
    </div>

    <!-- FOOTER -->
    <footer>
        Welcome to My Track App
    </footer>
<script>
document.addEventListener('DOMContentLoaded', function() {

    // 1. TANGGAL
    function updateTanggal() {
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById('tanggal').innerText = new Date().toLocaleDateString('id-ID', options);
    }
    updateTanggal();

    // 2. HARGA
    const piUsdtEl = document.getElementById('piUsdt');
    const piIdrEl = document.getElementById('piIdr');
    const usdtIdrEl = document.getElementById('usdtIdr');

    let piUsdt = 0.8524;
    let piIdr = 13450;
    let usdtIdr = 15780;

    piUsdtEl.textContent = piUsdt.toFixed(4);
    piIdrEl.textContent = Math.round(piIdr).toLocaleString('id-ID');
    usdtIdrEl.textContent = Math.round(usdtIdr).toLocaleString('id-ID');

    setInterval(() => {
        piUsdt += (Math.random() - 0.5) * 0.008;
        piIdr += (Math.random() - 0.5) * 80;
        usdtIdr += (Math.random() - 0.5) * 30;

        piUsdtEl.textContent = piUsdt.toFixed(4);
        piIdrEl.textContent = Math.round(piIdr).toLocaleString('id-ID');
        usdtIdrEl.textContent = Math.round(usdtIdr).toLocaleString('id-ID');
    }, 3000);

    // 3. CHART
    const canvas = document.getElementById('priceChart');
    const ctx = canvas.getContext('2d');
    let chartData = [0.8524, 0.8530, 0.8520, 0.8550, 0.8540, 0.8528];

    function drawChart() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = '#0066cc';
        ctx.lineWidth = 3;
        ctx.beginPath();
        chartData.forEach((val, i) => {
            let x = i * (canvas.width / (chartData.length - 1));
            let y = canvas.height - ((val - 0.85) * 4000);
            if(i === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
        });
        ctx.stroke();
    }
    drawChart();

    setInterval(() => {
        chartData.shift();
        chartData.push(0.8524 + (Math.random() - 0.5) * 0.01);
        drawChart();
    }, 5000);

});
</script>
</body>
  </html>
