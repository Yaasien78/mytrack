  <style>
    :root {
        --blue: #0066cc;
        --gold: #ffd700;
        --white: #ffffff;
        --green: green;
        --orange: orange;
        body { 
    font-family: Arial, sans-serif; 
    background: #ffffff; 
    color: #333; 
    padding-bottom: 70px; /* INI WAJIB ADA */
        }
        footer {
    background: linear-gradient(#0066cc, #004499);
    color: white; 
    text-align: center;

    border-top: 2px solid var(--gold);

    font-weight: bold; 
    margin: 10px 0 8px 0;
      }

    }
    .price-col-right {
        width: 50%; 
        background: var(--blue); 
        color: white; /* ANGKA WARNA PUTIH */
        padding: 8px 12px;

        text-align: center;
    }

    /* HEADER BARIS 1 */
    .header-left {

        text-align: center;
        font-size: 16px;
    }

    /* WARNA TEKS KIRI BARIS 2,3,4 */
    .label-pi-usdt { color: var(--blue); }
    .label-pi-idr { color: var(--green); }

        /* 1. BIAR FULL LAYAR */
html, body {
    width: 100%;
    height: 100%;
    margin: 0;
    padding: 0;
    overflow-x: hidden;
}

/* 2. CONTAINER UTAMA CENTER */
body {
    display: flex;
    flex-direction: column;
    align-items: center;
    background: #ffffff;
}

/* 3. HEADER BIRU FULL WIDTH */
.header-blue {
    width: 100%;
    box-sizing: border-box;
}

/* 4. TABEL HARGA DI TENGAH */
.price-table {
    width: 95%;
    max-width: 500px;
    margin: 20px auto;
}

/* 5. FOOTER FULL WIDTH & CENTER */
.footer {
    width: 100%;
    text-align: center;
    box-sizing: border-box;
    margin-top: auto;
    }
      /* FIX FOOTER */
footer {
    width: 100%;
    background: #0056b3; /* biru sama kayak header */
    color: white;
    text-align: center;
    padding: 15px 0;
    font-size: 16px;

      .chart-box {

.chart-box h3 {

    padding: 5px;
}

</head>
<body>
    
    <!-- HEADER -- SAMAIN KAYAK INDEX -->
<header style="background:#0066cc; border-bottom:3px solid #ffd700; width:100%; padding:8px 0; position:sticky; top:0; z-index:1000;">
        <div style="display:flex; justify-content:space-between; align-items:center; width:100%; padding:0 15px; box-sizing:border-box;">
            
            <!-- KIRI -->
            <a href="index.html" style="height:42px; width:42px; background:#0066cc; border-radius:50%; border:3px solid #ffd700; box-shadow:0 0 0 2px white; display:flex; align-items:center; justify-content:center; text-decoration:none; flex-shrink:0;">
                <span style="font-size:9px; font-weight:bold; color:white; line-height:1.0; text-align:center; font-family:Arial;">My<br>Track</span>
            </a>

            <!-- TENGAH -->
            <div style="color:white; font-weight:bold; font-size:20px; text-align:center; flex:1;">Pi Coin Price</div>

            <!-- KAN -->
            <div style="height:42px; width:42px; background:#0066cc; border-radius:50%; border:3px solid #ffd700; box-shadow:0 0 0 2px white; display:flex; align-items:center; justify-content:center; flex-shrink:0;">
                <span style="font-size:24px; font-weight:bold; color:white; font-family:Arial;">π</span>
            </div>
        </div>
    </header>

<!-- BOX HARGA BARU 4 BARIS -->
<div id="tanggal" class="date-title"></div>

<div class="price-container">
    <!-- BARIS 1 HEADER -->
    <div class="price-row">
        <div class="price-col-left header-left">Crypto</div>
        <div class="price-col-right header-right">Harga</div>
    </div>

    <!-- BARIS 2 -->
    <div class="price-row">
        <div class="price-col-left label-pi-usdt">Pi/USDT</div>
        <div class="price-col-right" id="piUsdt">0.8524</div>
    </div>

    <!-- BARIS 3 -->
    <div class="price-row">
        <div class="price-col-left label-pi-idr">Pi/IDR</div>
        <div class="price-col-right" id="piIdr">13,450</div>
    </div>

    <!-- BARIS 4 -->
    <div class="price-row">
        <div class="price-col-left label-usdt-idr">USDT/IDR</div>
        <div class="price-col-right" id="usdtIdr">15,780</div>
    </div>
    <!-- BOX CHART -->
<div class="chart-box">
    <h3>Grafik Pi/USDT 24 Jam</h3>
    <canvas id="piChart"></canvas>
    <p class="update-time" id="lastUpdate">Update: --:--</p>
</div>
</div>
    <!-- FOOTER -->
<footer> 
    Welcome to My Track App
</footer>
    
    <script>
document.addEventListener('DOMContentLoaded', function() {

    // 1. TANGGAL OTOMATIS
    function updateTanggal() {
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        const tgl = document.getElementById('tanggal');
        if(tgl) tgl.innerText = new Date().toLocaleDateString('id-ID', options);
    }
    updateTanggal();

    // 2. SETUP CHART
    const ctx = document.getElementById('piChart').getContext('2d');
    const piChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: [], // jam
            datasets: [{
                label: 'Pi/USDT',
                data: [], // harga
                borderColor: '#FFD700',
                backgroundColor: 'rgba(255, 215, 0, 0.2)',
                borderWidth: 2,
                tension: 0.4,
                fill: true
            }]
        },
        options: {
            responsive: true,
            plugins: { legend: { display: false } },
            scales: {
                x: { ticks: { color: 'white' } },
                y: { ticks: { color: 'white' }
            }
        }
    });

    // 3. AMBIL DATA + UPDATE CHART
    async function updateHarga() {
        try {
            const res = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=pi-network,tether&vs_currencies=idr');
            const data = await res.json();

            const piIdr = data['pi-network']?.idr || 0;
            const usdtIdr = data['tether']?.idr || 0;
            const piUsdt = (piIdr > 0 && usdtIdr > 0)? (piIdr / usdtIdr) : 0;

            // UPDATE ANGKA
            document.getElementById('piUsdt').innerText = piUsdt.toFixed(5);
            document.getElementById('piIdr').innerText = piIdr.toLocaleString('id-ID');
            document.getElementById('usdtIdr').innerText = usdtIdr.toLocaleString('id-ID');

            // UPDATE CHART
            const now = new Date().toLocaleTimeString('id-ID');
            piChart.data.labels.push(now);
            piChart.data.datasets[0].data.push(piUsdt);
            
            // simpan max 24 data = 24 jam
            if(piChart.data.labels.length > 24){
                piChart.data.labels.shift();
                piChart.data.datasets[0].data.shift();
            }
            piChart.update();

            document.getElementById('lastUpdate').innerText = `Update: ${now}`;

        } catch (error) {
            console.log('Error:', error);
        }
    }

    updateHarga();
    setInterval(updateHarga, 60000); // update tiap 1 menit

});
    </script>
</script>
</body>
  </html>
