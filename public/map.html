<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2. Pi Map Global - My Track</title>
<style>
  :root{--navy:#0f1a2e;--gold:#FFD700;--bg:#1a0f2e}
  *{box-sizing:border-box}
  html,body{height:100%;margin:0;background:var(--bg);color:var(--gold);font-family:sans-serif;overflow:hidden}

  /* HEADER SAMA KAYAK INDEX.HTML */
 .header {
    height:60px; background:var(--navy); border-bottom:2px solid var(--gold);
    display:flex; align-items:center; padding:0 16px; gap:12px;
  }
 .header a { color:var(--gold); text-decoration:none; font-size:22px; }
 .header h2 { margin:0; font-size:18px; flex:1; text-align:center; }

  /* KONTEN FULLSCREEN */
 .content{height:calc(100% - 60px - 40px); position:relative}
  #gmap{width:100%;height:100%;border:0}
  #status{
    position:absolute; top:8px; left:50%; transform:translateX(-50%);
    background:#00088; padding:4px 10px; border-radius:12px; font-size:12px; z-index:5;
  }

  /* FOOTER SAMA KAYAK INDEX.HTML */
 .footer{
    height:40px; background:var(--navy); border-top:2px solid var(--gold);
    display:flex; align-items:center; justify-content:center; font-size:12px; text-align:center; padding:0 8px;
  }

  /* SWIPE */
  body { touch-action: pan-y; }
</style>
</head>
<body>
  <!-- HEADER SAMA PERSIS KYK HALAMAN LAIN -->
  <div class="header">
    <a href="index.html">←</a>
    <h2>2. Pi Map Global</h2>
    <div style="width:22px"></div> <!-- Spacer biar tengah -->
  </div>

  <div class="content">
    <div id="status">Mencari lokasi...</div>
    <iframe id="gmap" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
  </div>

  <!-- FOOTER = LOKASI ANDA SEKARANG -->
  <div class="footer" id="footerTxt">
    Lokasi anda sekarang:...
  </div>

<script>
const statusTxt = document.getElementById('status');
const gmap = document.getElementById('gmap');
const footerTxt = document.getElementById('footerTxt');

// 1. AMBIL LOKASI HP
navigator.geolocation.getCurrentPosition(pos => {
  const lat = pos.coords.latitude;
  const lon = pos.coords.longitude;
  const txt = `Lat: ${lat.toFixed(4)}, Lon: ${lon.toFixed(4)}`;

  statusTxt.innerText = txt;
  footerTxt.innerText = `Lokasi anda sekarang: ${txt}`; // FOOTER SESUAI MINTA

  // 2. MASUKIN KE GOOGLE MAPS EMBED. RINGAN, GAK PAKE KEY
  gmap.src = `https://www.google.com/maps?q=${lat},${lon}&z=15&output=embed`;

}, err => {
  statusTxt.innerText = "Gagal ambil lokasi. Aktifkan GPS.";
  footerTxt.innerText = "Lokasi anda sekarang: Tidak diketahui";
  gmap.src = `https://www.google.com/maps?q=Indonesia&z=5&output=embed`; // Default
});

// 3. SCRIPT SWIPE KIRI/KAN
let touchstartX = 0;
document.addEventListener('touchstart', e => touchstartX = e.changedTouches[0].screenX);
document.addEventListener('touchend', e => {
  const touchendX = e.changedTouches[0].screenX;
  if (touchendX < touchstartX - 50) window.location.href = 'nft.html'; // Swipe kiri -> ke NFT
  if (touchendX > touchstartX + 50) window.location.href = 'chart.html'; // Swipe kanan -> ke Chart
});
</script>
</body>
</html>
