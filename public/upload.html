<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upload - My Track</title>
<script src="https://sdk.minepi.com/pi-sdk.js"></script>
<style>
    :root {
        --emas: #D4AF37;
        --biru: #0066cc;
    }
    body { margin: 0; font-family: Arial, sans-serif; background: #ffffff; }
    
    /* HEADER */
    header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: var(--biru);
        padding: 5px 10px;
        color: white;
        border-bottom: 2px solid var(--emas);
    }
   .logo-left,.pi-logo-right {
        background: var(--biru);
        color: white;
        width: 42px; /* 42px SAMA DENGAN LAINNYA */
        height: 42px; /* 42px SAMA DENGAN LAINNYA */
        border-radius: 50%;
        border: 2px solid var(--emas);
        box-shadow: 0 0 0 2px white, 0 0 0 4px var(--emas);
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
        text-decoration: none;
        flex-shrink: 0;
    }
   .logo-left { font-size: 8px; line-height: 1.1; }
   .pi-logo-right { font-size: 20px; }
    #headerTitle { 
        flex: 1; 
        text-align: center; 
        font-size: 18px;
        font-weight: bold; 
        margin: 0; 
    }

    /* JUDUL */
    h2 { 
        text-align: center; 
        color: var(--biru); 
        margin: 25px 0; 
        font-size: 1.8rem; 
        font-weight: bold;
    }

    /* BOX UPLOAD */
   .upload-container { padding: 0 15px 90px 15px; }
   .upload-area {
        background: white;
        border: 2px dashed var(--emas);
        border-radius: 12px;
        padding: 60px 20px;
        text-align: center;
        cursor: pointer;
        transition: 0.3s;
        margin: 0 auto;
        max-width: 500px;
    }
   .upload-area:hover { background: #f0f8ff; border-color: var(--biru); }
    #fileName { margin-top: 15px; color: var(--biru); font-weight: bold; font-size: 1rem; }

    /* FOOTER */
   .send-btn {
        background: linear-gradient(180deg, #0066cc, #004499);
        color: white;
        border: none;
        width: 100%;
        padding: 16px;
        font-size: 1.15rem;
        font-weight: bold;
        cursor: pointer;
        position: fixed;
        bottom: 0;
        left: 0;
        border-top: 2px solid var(--emas);
        letter-spacing: 0.5px;
    }
</style>
</head>
<body>

<header>
    <a href="index.html" class="logo-left">My<br>Track</a>
    <h1 id="headerTitle">@Yaasien</h1>
    <a href="market.html" class="pi-logo-right">π</a>
</header>

<h2>Postingan Terbaru</h2>

<div class="upload-container">
    <div class="upload-area" id="uploadArea">
        <p id="fileName"></p>
    </div>
    <input type="file" id="fileInput" accept="image/*,video/*" style="display:none;">
</div>

<button class="send-btn" onclick="sendPost()">Send 0.01 Pi to Post</button>

<script>
Pi.init({ version: "2.0", sandbox: true });
let selectedFile = null;
let username = localStorage.getItem("piUsername");
window.onload = function() {
    if(!username) { alert("Silakan login dulu di beranda"); window.location.href = "index.html"; }
    document.getElementById('headerTitle').innerText = `@${username}`;
    document.getElementById('uploadArea').onclick = () => document.getElementById('fileInput').click();
    document.getElementById('fileInput').onchange = (e) => { 
        selectedFile = e.target.files[0]; 
        if (selectedFile) document.getElementById('fileName').textContent = "✅ " + selectedFile.name; 
    };
}
function sendPost() {
    if (!username) return alert("❌ Silakan Login terlebih dahulu!");
    if (!selectedFile) return alert("❌ Silahkan upload file terlebih dahulu!");
    Pi.createPayment({ amount: 0.01, memo: "Upload My Track", metadata: {} }, {
        onReadyForServerCompletion: (paymentId) => {
            const reader = new FileReader();
            reader.onload = function(e) {
                let posts = JSON.parse(localStorage.getItem('mytrack_posts') || '[]');
                posts.unshift({ user: username, time: "Baru saja", content: `<img src="${e.target.result}" style="width:100%; border-radius:10px;">` });
                localStorage.setItem('mytrack_posts', JSON.stringify(posts));
                alert("✅ Pembayaran 0.01 Pi berhasil!");
                window.location.href = "index.html";
            }
            reader.readAsDataURL(selectedFile);
        },
        onCancel: () => alert("❌ Dibatalkan"),
        onError: (err) => alert("❌ Error: " + err)
    });
}
</script>
</body>
</html>
