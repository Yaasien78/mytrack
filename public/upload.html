<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Track - Upload</title>
    
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script>Pi.init({ version: "2.0", sandbox: true });</script>
    
    <style>
        .logo-left { 
    height:38px; 
    width:38px;
    cursor:pointer; 
    background: var(--blue); 
    border-radius: 50%; 
    border: 3px solid var(--gold); /* Border emas tebel */
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
}
.logo-left span { 
    font-size: 10px; 
    font-weight: bold; 
    color: white; 
    line-height: 1.1; 
    text-align: center;
}
.pi-logo-right { 
    height:38px; 
    width:38px;
    cursor:pointer; 
    background: var(--blue);     
    border-radius: 50%; 
    border: 3px solid var(--gold); /* Border emas tebel */
    box-shadow: 0 0 0 1px white;   /* Biar nongol */
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
}
.pi-logo-right span { 
    font-size: 24px; 
    font-weight: bold; 
    color: white;                
    line-height: 1;
}
        :root { --blue: #0066cc; --gold: #ffd700; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: Arial, sans-serif; background:#fff; padding-bottom: 70px; }

        header {
            background: linear-gradient(#0066cc, #004499);
            color: white;
            padding: 12px 15px;
            border-bottom: 2px solid var(--gold);
            position: sticky; top: 0; z-index: 100;
        }
      .header-container {
            display: flex; align-items: center; justify-content: space-between;
            max-width: 1200px; margin: 0 auto;
        }
      .logo-left img { height:35px; cursor:pointer; }
      .user-center { text-align: center; flex: 1; font-size: 1.2rem; font-weight: bold; color: var(--gold); }
      .pi-logo-right { height:45px; cursor:pointer; }

      .upload-container { max-width:800px; margin:20px auto; padding:0 15px; }
      .upload-box {
            border:2px solid var(--gold); border-radius:12px; padding:20px; text-align:center;
        }
      .upload-area {
            border:2px dashed var(--gold); padding:40px 20px; border-radius:10px; margin:15px 0; cursor:pointer;
            background: #fffdf5;
        }
        footer {
            background: linear-gradient(#0066cc, #004499);
            color:white; text-align:center; padding:15px;
            position:fixed; bottom:0; width:100%; border-top:2px solid var(--gold);
        }
      .send-btn { color:var(--gold); font-size:1.2rem; font-weight:bold; cursor:pointer; }
    </style>
</head>
<body>

    <header>
        <div class="header-container">
            <!-- 1. KLIK KIRI = KE HOME/INDEX -->
            <a href="index.html" class="logo-left">
                <img src="logo-mytrack.png" alt="My Track">
            </a>
            
            <!-- 2. TENGAH: USERNAME -->
            <div class="user-center" id="header-username">@Guest</div>
            
            <!-- 3. KLIK KAN = KE MARKET -->
            <img src="https://minepi.com/wp-content/uploads/2021/04/pi-logo.png" 
                 class="pi-logo-right" onclick="window.location.href='market.html'">
        </div>
    </header>

    <div class="upload-container">
        <h2 style="text-align:center; margin:20px 0; color:#0066cc;">Upload Postingan Baru</h2>
        <div class="upload-box">
            <div id="userStatus" style="margin:10px 0; font-size:1.1rem;"></div>
            
            <div class="upload-area" id="uploadArea">
                <p>Klik atau tarik file di sini untuk upload</p>
                <input type="file" id="fileInput" style="display:none;" accept="image/*,video/*">
                <p id="fileName" style="margin-top:10px; font-weight:bold; color:#0066cc;"></p>
            </div>
        </div>
    </div>

    <footer>
        <span class="send-btn" onclick="sendPost()">Send 0.01 Pi to Post</span>
    </footer>

    <script>
        let selectedFile = null;
        let username = localStorage.getItem("pi_username"); 

        // CEK LOGIN + TAMPILIN DI HEADER TENGAH
        function checkLogin() {
            const status = document.getElementById("userStatus");
            const headerUser = document.getElementById("header-username");

            if (username) {
                headerUser.innerText = `@${username}`;
                status.innerHTML = `Kamu login sebagai <span style="color:#ffd700; font-weight:bold;">@${username}</span>`;
            } else {
                alert("Silakan login dulu di beranda");
                window.location.href = "index.html";
            }
        }

        // UPLOAD FILE
        document.getElementById('uploadArea').addEventListener('click', () => {
            document.getElementById('fileInput').click();
        });

        document.getElementById('fileInput').addEventListener('change', (e) => {
            selectedFile = e.target.files[0];
            if (selectedFile) document.getElementById('fileName').textContent = "✅ " + selectedFile.name;
        });

        // KIRIM POST
        function sendPost() {
            if (!username) return alert("❌ Silakan Login terlebih dahulu!");
            if (!selectedFile) return alert("❌ Silahkan upload file terlebih dahulu!");

            Pi.createPayment({ amount: 0.01, memo: "Upload My Track", metadata: {} }, {
                onReadyForServerCompletion: (paymentId) => {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        let posts = JSON.parse(localStorage.getItem('mytrack_posts')) || [];
                        posts.unshift({ 
                            user: username, 
                            time: "Baru saja", 
                            content: `<p>${selectedFile.name}</p><img src="${e.target.result}">` 
                        });
                        localStorage.setItem('mytrack_posts', JSON.stringify(posts));
                        alert("✅ Pembayaran 0.01 Pi berhasil!");
                        window.location.href = "index.html";
                    }
                    reader.readAsDataURL(selectedFile);
                },
                onCancel: () => alert("❌ Dibatalkan"),
                onError: () => alert("❌ Error Pembayaran")
            });
        }

        window.onload = checkLogin;
    </script>
</body>
</html>
