<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Track - Upload</title>
    
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script>Pi.init({ version: "2.0", sandbox: true });</script>
    
    <style>
        :root { --blue: #0066cc; --gold: #ffd700; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: Arial, sans-serif; background:#fff; }

        /* HEADER */
        header {
            background: linear-gradient(#0066cc, #004499);
            color: white;
            padding: 12px 15px;
            border-bottom: 2px solid var(--gold);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            max-width: 1200px;
            margin: 0 auto;
        }
        .pi-logo { height: 45px; cursor: pointer; }
        .center-username { 
            font-size: 1.35rem; 
            font-weight: bold; 
            color: var(--gold); 
            text-align: center;
            flex: 1;
        }
        .mytrack-logo { 
            font-weight: bold; 
            font-size: 1.4rem; 
            cursor: pointer; 
            color: white; 
            text-decoration: none; 
        }

        /* BODY */
        .upload-container {
            max-width: 700px;
            margin: 30px auto;
            padding: 0 15px;
        }
        .upload-box {
            border: 2px solid var(--gold);
            border-radius: 15px;
            padding: 30px 20px;
            text-align: center;
            background: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .upload-area {
            border: 3px dashed var(--gold);
            padding: 50px 20px;
            border-radius: 12px;
            margin: 20px 0;
            cursor: pointer;
            background: #f9f9f9;
        }

        /* FOOTER */
        footer {
            background: linear-gradient(#0066cc, #004499);
            color: white;
            text-align: center;
            padding: 18px;
            position: fixed;
            bottom: 0;
            width: 100%;
            border-top: 2px solid var(--gold);
            font-size: 1.25rem;
            z-index: 100;
        }
        .footer-text {
            color: var(--gold);
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- HEADER -->
    <header>
        <div class="header-container">
            <!-- Kiri: Logo Pi Network -->
            <img src="https://minepi.com/wp-content/uploads/2021/04/pi-logo.png" 
                 class="pi-logo" 
                 onclick="window.location.href='market.html'">

            <!-- Tengah: @username -->
            <div id="centerUsername" class="center-username">
                <!-- JS akan isi -->
            </div>

            <!-- Kanan: Logo My Track -->
            <a href="index.html" class="mytrack-logo">My Track</a>
        </div>
    </header>

    <!-- BODY -->
    <div class="upload-container">
        <div class="upload-box">
            <h2 style="color:#0066cc; margin-bottom:20px;">Upload Postingan</h2>
            
            <div class="upload-area" id="uploadArea">
                <h3>📤 Upload di Sini</h3>
                <p>Klik atau tarik file gambar/video</p>
                <input type="file" id="fileInput" style="display:none;" accept="image/*,video/*">
                <p id="fileName" style="margin-top:15px; font-weight:bold; color:#0066cc;"></p>
            </div>
        </div>
    </div>

    <!-- FOOTER -->
    <footer>
        <span id="footerAction" class="footer-text" onclick="handleFooterClick()">
            <!-- JS akan ubah teks -->
        </span>
    </footer>

    <script>
        let selectedFile = null;
        let username = localStorage.getItem("piUsername");

        function updateUI() {
            const usernameEl = document.getElementById("centerUsername");
            const footerEl = document.getElementById("footerAction");

            if (username) {
                usernameEl.textContent = `@${username}`;
                footerEl.textContent = "Send 0.01 Pi to Post";
            } else {
                usernameEl.innerHTML = `<span onclick="doLogin()" style="color:#ffd700; text-decoration:underline; cursor:pointer;">Login</span>`;
                footerEl.textContent = "Login";
            }
        }

        function doLogin() {
            const input = prompt("Masukkan Username Pi Network kamu:");
            if (input && input.trim() !== "") {
                username = input.trim();
                localStorage.setItem("piUsername", username);
                updateUI();
                alert("✅ Login berhasil!");
            }
        }

        // Upload Area
        document.getElementById('uploadArea').addEventListener('click', () => {
            document.getElementById('fileInput').click();
        });

        document.getElementById('fileInput').addEventListener('change', (e) => {
            selectedFile = e.target.files[0];
            if (selectedFile) {
                document.getElementById('fileName').textContent = "✅ " + selectedFile.name;
            }
        });

        // Footer Action
        function handleFooterClick() {
            if (!username) {
                doLogin();
                return;
            }

            if (!selectedFile) {
                alert("❌ Silahkan upload file terlebih dahulu!");
                return;
            }

            // Simulasi Payment
            alert("✅ Pembayaran 0.01 Pi berhasil!\nPostingan kamu akan muncul di Beranda.");
            // Reset
            selectedFile = null;
            document.getElementById('fileName').textContent = "";
        }

        // Inisialisasi
        window.onload = updateUI;
    </script>
</body>
</html>
