<!DOCTYPE html>
<html>
<head>
  <title>My Track - Upload</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    .app-head {
    display: flex;
    align-items: center;
    justify-content: center;
    background: #003366;
    color: white;
    padding: 10px;
    border-bottom: 3px solid #FFD700;
    position: relative;
    font-weight: bold;
}
.app-head h1 {
    margin: 0;
    font-size: 20px;
    color: #FFD700;
}
.logo-head {
    position: absolute;
    left: 10px;
    width: 40px;
    height: 40px;
    border-radius: 8px;
    border: 2px solid #FFD700;
    cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="app-head">
    <img src="/logo.png" class="logo-head" onclick="window.location.href='upload.html'">
    <h1 id="header-title">Market Pi</h1>
  </div>

<script src="https://sdk.minepi.com/pi-sdk.js"></script>
<script>
Pi.init({ version: "2.0", sandbox: true, clientId: "GANTI_DENGAN_CLIENT_ID_KAMU" });
let currentUser = localStorage.getItem("pi_user");
let uploadedFile = null; let uploadedMedia = "";

if(!currentUser) { alert("Login dulu bro"); window.location.href = 'index.html'; }
document.getElementById("usernameBar").value = currentUser;

function previewFile(e) {
  uploadedFile = e.target.files[0];
  const reader = new FileReader();
  reader.onload = function(event) {
    uploadedMedia = event.target.result;
    document.getElementById("preview").innerHTML = uploadedFile.type.startsWith('image') 
      ? `<img src="${uploadedMedia}" style="width:100px; margin-top:5px; border:2px solid gold">`
      : `<video src="${uploadedMedia}" style="width:100px; margin-top:5px; border:2px solid gold" controls></video>`;
  }
  reader.readAsDataURL(uploadedFile);
}

function handlePost() {
  const caption = document.getElementById("caption").value;
  if(!uploadedMedia && caption.trim() === "") return alert("Silahkan upload in box");
  
  Pi.createPayment({amount: 0.01, memo: "Post MyTrack", metadata: {}}, {
    onReadyForServerCompletion: (payment) => {
      let posts = JSON.parse(localStorage.getItem("mytrack_posts") || "[]");
      let mediaTag = "";
      if(uploadedMedia) mediaTag = uploadedFile.type.startsWith('image') 
        ? `<img src="${uploadedMedia}">` : `<video src="${uploadedMedia}" controls></video>`;
      posts.unshift({user: currentUser, caption: caption, media: mediaTag});
      localStorage.setItem("mytrack_posts", JSON.stringify(posts));
      alert("Post Berhasil!");
      window.location.href = 'index.html';
    },
    onError: (e) => alert("Batal: " + e)
  });
}

async function getPiPrice() {
  try {
    const res = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=pi-network&vs_currencies=usdt');
    const data = await res.json();
    document.getElementById("piPrice").innerText = `Pi/USDT: $${data['pi-network'].usdt}`;
  } catch(e) { document.getElementById("piPrice").innerText = `Pi/USDT: $0.58`; }
}
getPiPrice(); setInterval(getPiPrice, 30000);
</script>
<div id="login-info"></div>
</body>
</html>
