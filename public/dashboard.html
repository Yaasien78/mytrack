<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mall Genesis Space</title>
<script src="https://sdk.minepi.com/pi-sdk.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{overflow-x:hidden;width:100%;max-width:100%} /* kunci biar gak scroll kanan kiri */
body{
  background:#000;color:#fff;font-family:Arial;min-height:100vh;
  background-image:
    radial-gradient(2px 2px at 20px 30px, #fff, transparent),
    radial-gradient(2px 2px at 40px 70px, rgba(255,255,255,0.8), transparent),
    linear-gradient(to bottom, #000814 0%, #001122 50%, #000 100%);
  background-size: 200px 200px, 300px 300px, 100% 100%;
  animation: stars 100s linear infinite;
}
@keyframes stars{ from{background-position:0 0} to{background-position:-10000px 5000px} }

/* HEADER 56PX + FOTO 40PX PAS TENGAH */
.header{position:fixed;top:0;left:0;width:100%;height:56px;background:#6a0dad;border-bottom:3px solid #FFD700;display:flex;align-items:center;justify-content:space-between;padding:0 6px;z-index:100}
.header-left{display:flex;align-items:center;gap:6px}
.header-left button{background:#FFD700;border:none;color:#6a0dad;width:34px;height:34px;border-radius:8px;font-size:18px;font-weight:900;cursor:pointer}
.back-btn{display:none;background:#ff69b4!important;color:#fff!important;font-size:22px!important}
.header-center h2{color:#FFD700;font-size:16px;text-shadow:0 0 10px #FFD700}

/* FOTO PROFIL 40PX = HEADER 56 - BORDER 3*2 - PADDING 5*2 */
.header-right{height:100%;display:flex;align-items:center;padding:5px 0}
.header-right.profile{
  width:40px;height:40px;border-radius:50%;border:2px solid #FFD700;
  overflow:hidden;cursor:pointer;box-shadow:0 0 8px #FFD700;
  flex-shrink:0;
}
.header-right.profile img{width:40px;height:40px;object-fit:cover;display:block}

/* PAKSA SEMUA IMG GAK BOLEH LEBIH DARI LAYAR */
img{max-width:100%!important;height:auto!important;display:block}

/* PREVIEW FOTO */
.preview-foto{
  display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  width:90%;max-width:320px;z-index:999;background:#000;
  border:3px solid #FFD700;border-radius:15px;padding:10px;
  box-shadow:0 0 40px rgba(255,215,0,0.8)
}
.preview-foto img{width:100%;border-radius:10px}
.preview-foto.show{display:block;animation:fadeOut 2s forwards}
@keyframes fadeOut{0%{opacity:1}80%{opacity:1}100%{opacity:0}}

#inputGaleri{display:none}

/* LAYAR */
.screen{display:none;margin-top:56px;margin-bottom:60px;min-height:calc(100vh - 116px);width:100%;overflow-x:hidden}
.screen.active{display:block}

/* HOME - KUNCI LEBAR POST */
.content{padding:15px 8px;display:flex;flex-direction:column;align-items:center;gap:15px;width:100%;max-width:100%;overflow-x:hidden}
.post{width:100%;max-width:480px;background:rgba(0,0,20,0.85);border:2px solid rgba(106,13,173,0.8);border-radius:15px;padding:12px;overflow:hidden} /* overflow hidden biar img gak keluar */
.post-img{width:100%!important;max-width:100%!important;border-radius:12px;margin:10px 0;border:1px solid rgba(255,215,0,0.3)}
.post-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.post-user{display:flex;align-items:center;gap:8px}
.post-user img{width:36px;height:36px;border-radius:50%;border:2px solid #FFD700;flex-shrink:0}
.post-user span{color:#FFD700;font-weight:700;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.post-price button{background:#FFD700;color:#6a0dad;padding:6px 12px;border-radius:10px;font-weight:900;font-size:12px;border:2px solid #6a0dad;cursor:pointer;flex-shrink:0}
.post-act{display:flex;justify-content:space-around;padding-top:10px;margin-top:10px;border-top:1px solid rgba(106,13,173,0.5)}
.post-act button{background:none;border:none;color:#FFD700;cursor:pointer;font-weight:700;font-size:13px;padding:5px}

/* PAGE LAIN */
.page-box{padding:20px;text-align:center;width:100%}

/* FOOTER PINK */
.footer{position:fixed;bottom:0;left:0;width:100%;height:60px;background:#ff69b4;border-top:3px solid #FFD700;display:flex;z-index:100}
.footer button{width:50%;border:none;background:transparent;color:#fff;font-weight:900;font-size:14px;cursor:pointer}

/* CHAT LAYER */
.chat-layer{display:none;position:fixed;top:56px;left:0;width:100%;height:calc(100vh - 116px);background:rgba(0,0,20,0.95);z-index:200;flex-direction:column}
.chat-header{height:50px;background:#6a0dad;border-bottom:2px solid #FFD700;display:flex;align-items:center;justify-content:space-between;padding:0 15px;color:#FFD700;font-weight:900}
.chat-header button{background:none;border:none;color:#FFD700;font-size:20px;cursor:pointer}
.chat-tab{display:flex;background:#001122;border-bottom:1px solid #6a0dad}
.chat-tab button{flex:1;padding:10px;border:none;background:none;color:#FFD700;cursor:pointer;font-weight:700}
.chat-tab button.active{background:#FFD700;color:#6a0dad}
.chat-box{flex:1;padding:15px;overflow-y:auto;font-size:14px}
.chat-input{display:flex;padding:10px;background:#001122;border-top:1px solid #6a0dad}
.chat-input input{flex:1;padding:8px;border:1px solid #6a0dad;background:#000;color:#fff;border-radius:6px}
.chat-input button{margin-left:8px;padding:8px 15px;background:#FFD700;color:#6a0dad;border:none;border-radius:6px;font-weight:900;cursor:pointer}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <button id="menuBtn" onclick="bukaMenu()">☰</button>
    <button id="backBtn" class="back-btn" onclick="balikHome()">←</button>
  </div>
  <div class="header-center"><h2 id="judulHeader">Mall Genesis</h2></div>
  <div class="header-right">
    <div class="profile" onclick="document.getElementById('inputGaleri').click()">
      <img id="fotoProfil" src="https://i.pravatar.cc/100">
    </div>
    <input type="file" id="inputGaleri" accept="image/*" onchange="gantiFotoProfil(event)">
  </div>
</div>

<div class="preview-foto" id="previewFoto">
  <img id="imgPreview">
</div>

<div class="screen active" id="home">
  <div class="content">
    <div class="post">
      <div class="post-head">
        <div class="post-user">
          <img src="https://i.pravatar.cc/100?u=yaasien">
          <span>@yaasien</span>
        </div>
        <div class="post-price">
          <button onclick="beliNFT(this, 'yaasien', 1.5, 'nft_001')">💰 1.5 Pi</button>
        </div>
      </div>
      <img class="post-img" src="https://picsum.photos/480/400?random=1">
      <div class="post-act">
        <button onclick="likeNFT(this, 'yaasien', 'nft_001')">❤️ Like 0.01 Pi</button>
        <button onclick="followUser(this, 'yaasien')">➕ Follow</button>
        <button onclick="bukaKomen('yaasien', 'nft_001')">💬 Komen</button>
      </div>
    </div>
  </div>
</div>

<div class="screen" id="explore"><div class="page-box"><h3>🔍 Explore NFT</h3></div></div>
<div class="screen" id="notif"><div class="page-box"><h3>🔔 Notifikasi</h3></div></div>
<div class="screen" id="profil">
  <div class="page-box">
    <h3>👤 Profil @user_test</h3>
    <img id="fotoProfilBesar" src="https://i.pravatar.cc/150" style="width:120px;height:120px;border-radius:50%;border:3px solid #FFD700;margin:15px auto">
    <button onclick="document.getElementById('inputGaleri').click()" style="margin-top:20px;padding:10px 20px;background:#FFD700;color:#6a0dad;border:none;border-radius:8px;font-weight:900;cursor:pointer">Ganti Foto</button>
  </div>
</div>

<div class="footer">
  <button onclick="bukaChat()">💬 Chating</button>
  <button onclick="mintNFT()">🎨 Mint NFT 0.01 Pi</button>
</div>

<div class="chat-layer" id="chatLayer">
  <div class="chat-header"><span>💬 Chating</span><button onclick="tutupChat()">✕</button></div>
  <div class="chat-tab">
    <button class="active" onclick="gantiTab('public')">Public</button>
    <button onclick="gantiTab('private')">Private</button>
    <button onclick="gantiTab('komen')">Komen</button>
  </div>
  <div class="chat-box" id="chatBox"></div>
  <div class="chat-input"><input type="text" id="chatText"><button onclick="kirimChat()">Kirim</button></div>
</div>

<script>
let currentUser = 'user_test';
let currentTab = 'public';
let currentNFTid = null;
let PiReady = false;

window.onload = function(){
  let foto = localStorage.getItem('fotoProfilMG');
  if(foto){
    document.getElementById('fotoProfil').src = foto;
    document.getElementById('fotoProfilBesar').src = foto;
  }
}

function cekPi(){
  if(typeof Pi!== 'undefined'){
    try{ Pi.init({version:"2.0", sandbox:true}); PiReady = true; }
    catch(e){}
  } else { setTimeout(cekPi, 500); }
}
cekPi();

function gantiFotoProfil(event){
  let file = event.target.files[0];
  if(!file) return;
  let reader = new FileReader();
  reader.onload = function(e){
    let base64 = e.target.result;
    document.getElementById('imgPreview').src = base64;
    document.getElementById('previewFoto').classList.add('show');
    setTimeout(() => document.getElementById('previewFoto').classList.remove('show'), 2000);
    localStorage.setItem('fotoProfilMG', base64);
    document.getElementById('fotoProfil').src = base64;
    document.getElementById('fotoProfilBesar').src = base64;
  }
  reader.readAsDataURL(file);
}

function pindahLayar(nama){
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(nama).classList.add('active');
  let judul = {home:'Mall Genesis', explore:'Explore', notif:'Notifikasi', profil:'Profil'};
  document.getElementById('judulHeader').textContent = judul[nama];
  document.getElementById('menuBtn').style.display = nama==='home'?'block':'none';
  document.getElementById('backBtn').style.display = nama==='home'?'none':'block';
}
function balikHome(){ pindahLayar('home'); }
function bukaMenu(){
  let pilih = prompt('1.Home 2.Explore 3.Notif 4.Profil\nKetik 1-4');
  if(pilih=='1') pindahLayar('home');
  if(pilih=='2') pindahLayar('explore');
  if(pilih=='3') pindahLayar('notif');
  if(pilih=='4') pindahLayar('profil');
}
function bukaChat(){ document.getElementById('chatLayer').style.display = 'flex'; }
function tutupChat(){ document.getElementById('chatLayer').style.display = 'none'; }
function gantiTab(tab){
  currentTab = tab;
  document.querySelectorAll('.chat-tab button').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
}
function bukaKomen(owner, nftId){ currentNFTid = nftId; bukaChat(); gantiTab('komen'); }
async function serverApprove(id, r){ return {status:'ok'}; }
async function serverComplete(id, t){}
function likeNFT(btn, owner, nftId){
  if(btn.disabled ||!PiReady) return;
  Pi.createPayment({amount: 0.01, memo: "Like @" + owner}, {
    onReadyForServerApproval: async function(id){ await serverApprove(id, owner); },
    onReadyForServerCompletion: async function(id, txid){ btn.innerHTML='❤️ Liked'; btn.disabled=true; },
    onCancel: function(){}, onError: function(e){}
  });
}
function beliNFT(btn, owner, harga, nftId){
  if(btn.disabled ||!PiReady) return;
  Pi.createPayment({amount: harga, memo: "Beli NFT"}, {
    onReadyForServerApproval: async function(id){ await serverApprove(id, owner); },
    onReadyForServerCompletion: async function(id, txid){ btn.innerHTML='✓ Sold'; btn.disabled=true; },
    onCancel: function(){}, onError: function(e){}
  });
}
function mintNFT(){
  if(!PiReady) return;
  Pi.createPayment({amount: 0.01, memo: "Mint NFT"}, {
    onReadyForServerApproval: async function(id){ await serverApprove(id, 'OWNER'); },
    onReadyForServerCompletion: async function(id, txid){ alert('Mint berhasil!'); },
    onCancel: function(){}, onError: function(e){}
  });
}
function followUser(btn, username){
  btn.textContent = '✓ Following';
  btn.disabled = true;
  btn.style.color = '#00ff00';
}
</script>
</body>
  </html>
