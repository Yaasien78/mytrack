<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard My Track</title>
<script src="https://sdk.minepi.com/pi-sdk.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-[#0A0082] text-white font-sans">
<header class="flex justify-between items-center p-4 bg-[#07004D]">
  <h1 class="text-xl font-bold text-yellow-400">Dashboard</h1>
  <button id="btnUser" class="text-sm font-bold text-yellow-400">Loading...</button>
</header>

<main class="p-4">
  <!-- HARGA PI LIVE -->
  <div class="bg-[#1A10A3] p-4 rounded-2xl mb-4">
    <div class="flex justify-between items-center">
      <div>
        <p class="text-sm text-gray-300">Pi / USD</p>
        <p id="price" class="text-3xl font-bold">$. --</p>
      </div>
      <div class="text-right">
        <p id="change" class="text-lg font-bold">--%</p>
        <p id="idr" class="text-sm text-gray-300">Rp --</p>
      </div>
    </div>
    <canvas id="chart" class="mt-2"></canvas>
  </div>

  <!-- TOMBOL KE MENU VIP -->
  <a href="/menu.html" class="block w-full bg-yellow-400 text-black font-bold text-xl p-4 rounded-2xl text-center active:scale-95">
    Buka Menu VIP 0.1 Pi
  </a>
</main>

<script>
Pi.init({ version: "2.0", sandbox: true });

// 1. CEK LOGIN DULU. KALAU BELUM LOGIN = TENDANG KE INDEX
const username = localStorage.getItem('pi_username');
if(!username){
  window.location.href = '/index.html';
}else{
  document.getElementById('btnUser').innerText = 'Hi, '+username;
}

let chart;
let dataPoints = [];

// 2. GRAFIK HARGA
function initChart(){
  const ctx = document.getElementById('chart').getContext('2d');
  chart = new Chart(ctx, {
    type: 'line',
    data: { labels: [], datasets: [{ label: 'Pi/USD', data: [], borderColor: '#facc15', tension: 0.4, fill: false }] },
    options: { responsive: true, plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { display: false } } }
  });
}

// 3. AMBIL DATA DARI COINGECKO
async function updateData(){
  try{
    const res = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=pi-network&vs_currencies=usd,idr&include_24hr_change=true');
    const data = await res.json();
    const pi = data['pi-network'];
    
    document.getElementById('price').innerText = '$ '+pi.usd.toFixed(4);
    document.getElementById('idr').innerText = 'Rp '+pi.idr.toLocaleString('id-ID');
    document.getElementById('change').innerText = pi.usd_24h_change.toFixed(2)+'%';
    document.getElementById('change').className = pi.usd_24h_change >= 0? 'text-lg font-bold text-green-400' : 'text-lg font-bold text-red-400';
    
    dataPoints.push(pi.usd);
    if(dataPoints.length > 20) dataPoints.shift();
    chart.data.labels = dataPoints.map((_,i)=>i);
    chart.data.datasets[0].data = dataPoints;
    chart.update();

  }catch(e){
    document.getElementById('price').innerText = 'API Down';
  }
}

initChart();
updateData();
setInterval(updateData, 15000); // Update 15 detik sekali
</script>
</body>
</html>
