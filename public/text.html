<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Spirit Pioneer</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap');

html,body{
  margin:0; 
  padding:0; 
  text-align:center; 
  height:100vh; 
  background:url('luarangkasa.jpg') no-repeat center fixed; 
  background-size:cover;
  font-family: 'Orbitron', sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
}

#c{
  background:rgba(0,0,0,0.3); /* BOX TIPIS AJA BIAR TULISAN KEBACA */
  padding:30px 20px;
  border-radius:20px;
}

.teks{
  font-size:28px;
  font-weight:900;
  color:#00FFEA; /* CYAN ROBOT */
  text-transform: uppercase;
  letter-spacing: 3px;
  line-height:1.5;
  /* SEMUA EFEK GLOW DIHAPUS */
  text-shadow:none; 
}
.counter{
  font-size:16px;
  margin-top:20px;
  color:#FFFFFF; /* PUTIH BIAR JELAS */
  font-weight:bold;
  text-shadow:none;
}
a{color:#FFCF00;text-decoration:none;font-size:14px;position:absolute;top:15px;left:15px;font-family:sans-serif;}
</style>
</head>
<body>
<a href="index.html">← Kembali</a>
<div>
  <div id="c" class="teks"></div>
  <div id="nomor" class="counter"></div>
</div>

<script>
const k = [
"JANGAN MENYERAH PIONEER, PI ADALAH MASA DEPAN",
"KLIK PETIR SETIAP 24 JAM JANGAN LUPA",
"KONSENSUS 314159 HARGA MASA DEPAN",
"AI TRACKER SIAP MEMBANTU SEMUA PIONER",
"GUNAKAN KODE REFF YAASIEN",
"BERSABAR KARENA KEMENANGAN SUDAH DEKAT",
"PI NETWORK ADALAH REVOLUSI KEUANGAN"
];
let nomor = 1;

function tampil(){
  document.getElementById('c').innerText = k[nomor-1];
  document.getElementById('nomor').innerText = nomor + "/7";
}
tampil();

document.body.onclick = function(){ 
  nomor = nomor + 1;
  if(nomor > k.length) nomor = 1; 
  tampil();
}
</script>
</body></html>
