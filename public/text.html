<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Spirit Pioneer</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap');

html,body{
  margin:0; 
  padding:0; 
  text-align:center; 
  height:100vh; 
  background:url('luarangkasa.jpg') no-repeat center fixed; 
  background-size:cover;
  font-family: 'Orbitron', sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
}

#c{
  background:rgba(0,0,0,0.3); 
  padding:20px 15px;
  border-radius:20px;
  min-height:100px; 
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:5;
}

.teks{
  font-size:17px; /* DIKECILIN LAGI BIAR PAS */
  font-weight:900;
  color:#00FFEA; 
  text-transform: uppercase;
  letter-spacing: 2px;
  line-height:1.4;
}
.counter{
  font-size:13px; 
  margin-top:10px;
  color:#FFFFFF; 
  font-weight:bold;
}

/* TOMBOL INVISIBLE BUAT NANGKEP KLIK */
#areaKlik{
  position:fixed;
  bottom:0;
  left:0;
  width:80px; /* SEBESAR TOMBOL PALETTE */
  height:80px;
  z-index:999; /* DIATAS SEMUA */
  background:transparent;
}
</style>
</head>
<body>

<div>
  <div id="c" class="teks"></div>
  <div id="nomor" class="counter"></div>
</div>

<!-- AREA KLIK INVISIBLE DIATAS TOMBOL PALETTE -->
<div id="areaKlik"></div>

<script>
const k = [
"JANGAN MENYERAH PIONEER, PI ADALAH MASA DEPAN",
"KLIK PETIR SETIAP 24 JAM JANGAN LUPA",
"KONSENSUS 314159 HARGA MASA DEPAN",
"AI TRACKER SIAP MEMBANTU SEMUA PIONER",
"GUNAKAN KODE REFF YAASIEN",
"BERSABAR KARENA KEMENANGAN SUDAH DEKAT",
"PI NETWORK ADALAH REVOLUSI KEUANGAN"
];
let nomor = 0; // MULAI KOSONG

function tampil(){
  if(nomor === 0){
    document.getElementById('c').innerText = ""; 
    document.getElementById('nomor').innerText = "";
  } else {
    document.getElementById('c').innerText = k[nomor-1];
    document.getElementById('nomor').innerText = nomor + "/7";
  }
}
tampil(); 

// KLIK NYA KITA TARUH DI ATAS TOMBOL PALETTE
document.getElementById('areaKlik').onclick = function(){ 
  nomor = nomor + 1;
  if(nomor > k.length) nomor = 1; 
  tampil();
}
</script>
</body></html>
