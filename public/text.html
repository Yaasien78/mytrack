<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teks Dakwah</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:Arial, sans-serif; }
body {
  background: transparent; /* transparan */
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 20px 15px 120px 15px;
  color: #ffffff; /* HURUF PUTIH */
  text-align: center;
  user-select: none;
}
.hide { display: none; }

.arab {
  font-size: 8vw;
  font-weight: bold;
  color: #ffffff;
  margin-bottom: 15px;
  direction: rtl;
  line-height: 1.8;
  text-shadow: 0 2px 8px rgba(0,0,0,0.7); /* biar kebaca */
}
.latin { font-size: 5vw; color: #ffffff; font-style: italic; margin-bottom: 12px; text-shadow: 0 2px 8px rgba(0,0,0,0.7); }
.indo { font-size: 4.5vw; color: #ffffff; font-weight: bold; margin-bottom: 10px; text-shadow: 0 2px 8px rgba(0,0,0,0.7); }
.arti { font-size: 4vw; color: #ffffff; line-height: 1.6; text-shadow: 0 2px 8px rgba(0,0,0,0.7); }
.counter { font-size: 3.5vw; color: #ffffff; margin-top: 20px; opacity: 0.7; }
</style>
</head>
<body>

<div id="content"></div>
<div class="counter" id="counter">Klik tombol Text untuk mulai 1/7</div>

<script>
const kalimat = [
  { arab: "بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ", latin: "Bismillahirrahmanirrahim", indo: "Dengan menyebut nama Allah Yang Maha Pengasih lagi Maha Penyayang", arti: "Artinya: Kita memulai segala sesuatu dengan menyebut nama Allah yang memiliki kasih sayang luas kepada semua makhluk." },
  { arab: "أَشْهَدُ أَنْ لَا إِلَٰهَ إِلَّا اللَّهُ وَأَشْهَدُ أَنَّ مُحَمَّدًا رَسُولُ اللَّهِ", latin: "Asyhadu alla ilaha illallah, wa asyhadu anna muhammadar rasulullah", indo: "Aku bersaksi bahwa tidak ada tuhan selain Allah, dan aku bersaksi bahwa Muhammad adalah utusan Allah", arti: "Artinya: Dua kalimat syahadat sebagai pintu masuk Islam dan bukti keimanan kepada Allah dan Rasul-Nya." },
  { arab: "اللَّهُمَّ صَلِّ عَلَىٰ سَيِّدِنَا مُحَمَّدٍ وَعَلَىٰ آلِ سَيِّدِنَا مُحَمَّدٍ", latin: "Allahumma sholli ala sayyidina muhammad wa ala ali sayyidina muhammad", indo: "Ya Allah, limpahkanlah shalawat kepada junjungan kami Nabi Muhammad dan kepada keluarga junjungan kami Nabi Muhammad", arti: "Artinya: Doa memohon keberkahan dan kemuliaan untuk Nabi Muhammad SAW beserta keluarganya." },
  { arab: "سَلَامُ بَتِيرْ بُوَاتْ پِوْنِيْرْ", latin: "Salam Petir buat Pioner", indo: "Salam Petir buat Pioner", arti: "Artinya: Salam semangat klik petir setiap hari untuk para Pioneer Pi Network. Jeger.. jeger.. jegerr.. ⚡" },
  { arab: "سُدَهْكَهْ كْلِكْ پَتِيْرْ هَرِ اِنِ", latin: "Sudahkah klik petir hari ini", indo: "Sudahkah klik petir hari ini", arti: "Artinya: Pengingat untuk tidak lupa menambang Pi setiap 24 jam sekali." },
  { arab: "AI TRACKER سِيَاْپْ مَنَمَانِي اَنْدَا هَرِ اِنِ", latin: "AI Tracker siap menemani anda hari ini", indo: "AI Tracker siap menemani anda hari ini", arti: "Artinya: AI Tracker akan membantu menjawab pertanyaan tentang Pi Network dan lainnya." },
  { arab: "گُوْنَكَنْ كُوْدْ رِفْ Yaasien پَدَ پِ نَتْوَرْكْ", latin: "Gunakan kode reff Yaasien pada Pi Network", indo: "Gunakan kode reff Yaasien pada Pi Network", arti: "Artinya: Masukkan kode undangan 'Yaasien' saat daftar Pi Network untuk saling mendukung." }
];

// ambil index dari localStorage biar nyambung tiap klik tombol footer
let index = parseInt(localStorage.getItem('textIndex')) || 0;
const content = document.getElementById('content');
const counter = document.getElementById('counter');

function tampilkan() {
  if(index >= 7) { // kalau udah 8
    document.body.classList.add('hide');
    localStorage.setItem('textIndex', 0); // reset buat klik berikutnya
    return;
  }
  const k = kalimat[index];
  content.innerHTML = `
    <div class="arab">${k.arab}</div>
    <div class="latin">${k.latin}</div>
    <div class="indo">${k.indo}</div>
    <div class="arti">${k.arti}</div>
  `;
  counter.innerText = `Klik tombol Text untuk lanjut ${index + 1}/7`;
}

// tiap buka halaman = ganti ke kalimat berikutnya
index++;
localStorage.setItem('textIndex', index);
tampilkan();
</script>

</body>
</html>
