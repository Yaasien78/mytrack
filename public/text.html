<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
html,body{background:transparent;margin:0;padding:5px 0;text-align:center}
.arab{font-size:6vw;font-weight:900;color:#00BFFF;direction:rtl;margin:4px 0;text-shadow:0 0 4px #000}
.latin{font-size:3.8vw;color:#00BFFF;font-style:italic;margin:3px 0;font-weight:600;text-shadow:0 0 4px #000}
.indo{font-size:3.5vw;color:#00BFFF;font-weight:800;margin:3px 0;text-shadow:0 0 4px #000}
.arti{font-size:3.2vw;color:#00BFFF;margin:3px 0;font-weight:500;text-shadow:0 0 4px #000}
.counter{font-size:2.8vw;color:#00BFFF;margin-top:6px;text-shadow:0 0 4px #000}
</style>
</head>
<body>
<div id="c"></div>
<script>
const k = [
["بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ","Bismillahirrahmanirrahim","Dengan menyebut nama Allah Yang Maha Pengasih lagi Maha Penyayang","Artinya: Kita memulai segala sesuatu dengan menyebut nama Allah yang memiliki kasih sayang luas kepada semua makhluk."],

["أَشْهَدُ أَنْ لَا إِلَٰهَ إِلَّا اللَّهُ وَأَشْهَدُ أَنَّ مُحَمَّدًا رَسُولُ اللَّهِ","Asyhadu alla ilaha illallah, wa asyhadu anna muhammadar rasulullah","Aku bersaksi bahwa tidak ada tuhan selain Allah, dan aku bersaksi bahwa Muhammad adalah utusan Allah","Artinya: Dua kalimat syahadat sebagai pintu masuk Islam dan bukti keimanan kepada Allah dan Rasul-Nya."],

["اللَّهُمَّ صَلِّ عَلَىٰ سَيِّدِنَا مُحَمَّدٍ وَعَلَىٰ آلِ سَيِّدِنَا مُحَمَّدٍ","Allahumma sholli ala sayyidina muhammad wa ala ali sayyidina muhammad","Ya Allah, limpahkanlah shalawat kepada junjungan kami Nabi Muhammad dan kepada keluarga junjungan kami Nabi Muhammad","Artinya: Doa memohon keberkahan dan kemuliaan untuk Nabi Muhammad SAW beserta keluarganya."],

["سَلَامُ بَتِيرْ بُوَاتْ پِوْنِيْرْ","Salam Petir buat Pioner","Salam Petir buat Pioner","Artinya: Salam semangat klik petir setiap hari untuk para Pioneer Pi Network. Jeger.. jeger.. jegerr.. ⚡"],

["سُدَهْكَهْ كْلِكْ پَتِيْرْ هَرِ اِنِ","Sudahkah klik petir hari ini","Sudahkah klik petir hari ini","Artinya: Pengingat untuk tidak lupa menambang Pi setiap 24 jam sekali."],

["AI TRACKER سِيَاْپْ مَنَمَانِي اَنْدَا هَرِ اِنِ","AI Tracker siap menemani anda hari ini","AI Tracker siap menemani anda hari ini","Artinya: AI Tracker akan membantu menjawab pertanyaan tentang Pi Network dan lainnya."],

["گُوْنَكَنْ كُوْدْ رِفْ Yaasien پَدَ پِ نَتْوَرْكْ","Gunakan kode reff Yaasien pada Pi Network","Gunakan kode reff Yaasien pada Pi Network","Artinya: Masukkan kode undangan 'Yaasien' saat daftar Pi Network untuk saling mendukung."]
];

let i = new URLSearchParams(location.search).get('i');
if(i && i>0 && i<=7){
  let x = k[i-1];
  document.getElementById('c').innerHTML = 
  `<div class="arab">${x[0]}</div><div class="latin">${x[1]}</div><div class="indo">${x[2]}</div><div class="arti">${x[3]}</div><div class="counter">Klik 🎨 untuk lanjut ${i}/7</div>`;
}
</script>
</body>
</html>
