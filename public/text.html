<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Spirit Pioneer</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap');

body { 
  background:transparent; /* TEMBUS */
  color:#fffc00; /* KUNING EMAS */
  display:flex; 
  align-items:center; 
  justify-content:center; 
  height:100vh; 
  text-align:center; 
  font-size:20px; /* DIKECILIN DIKIT BIAR MUAT 2 BARIS */
  font-weight:bold; 
  padding:20px; 
  font-family: 'Orbitron', sans-serif;
  text-shadow: 0 0 10px #000; /* KASIH BAYANGAN BIAR TETAP KEBACA DI ATAS BINTANG */
  margin:0;
}

#nomor{
  position:absolute;
  bottom:100px; /* DIATAS TOMBOL LOGIN */
  font-size:14px;
  color:#ffffff;
  text-shadow: 0 0 5px #000;
}

/* AREA KLIK INVISIBLE PAS DI ATAS TOMBOL PALETTE */
#areaKlik{
  position:fixed;
  bottom:5px;
  left:5px;
  width:65px; 
  height:65px;
  z-index:99999; /* PALING ATAS */
  background:transparent;
  cursor:pointer;
}
</style>
</head>
<body>

<div id="c"></div>
<div id="nomor"></div>

<!-- AREA KLIK INVISIBLE -->
<div id="areaKlik"></div>

<script>
const k = [
"JANGAN MENYERAH PIONEER, PI ADALAH MASA DEPAN",
"KLIK PETIR SETIAP 24 JAM JANGAN LUPA",
"KONSENSUS 314159 HARGA MASA DEPAN",
"AI TRACKER SIAP MEMBANTU SEMUA PIONER",
"GUNAKAN KODE REFF YAASIEN",
"BERSABAR KARENA KEMENANGAN SUDAH DEKAT",
"PI NETWORK ADALAH REVOLUSI KEUANGAN"
];
let nomor = 0; // MULAI KOSONG

function tampil(){
  if(nomor === 0){
    document.getElementById('c').innerText = ""; 
    document.getElementById('nomor').innerText = "";
  } else {
    document.getElementById('c').innerText = k[nomor-1];
    document.getElementById('nomor').innerText = nomor + "/7";
  }
}
tampil(); 

document.getElementById('areaKlik').onclick = function(){ 
  nomor = nomor + 1;
  if(nomor > k.length) nomor = 1; 
  tampil();
}
</script>
</body></html>
