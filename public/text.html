<!DOCTYPE html>
<html>
<head><meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap'); /* FONT ROBOT */

body{
  background:transparent;
  color:#00FFEA; /* BIRU CYAN TEKNOLOGI */
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
  text-align:center;
  font-family: 'Orbitron', sans-serif; /* GAYA ROBOT */
  font-size:5vw; /* RESPONSIVE */
  font-weight:900;
  padding:20px;
  /* text-shadow DIHAPUS BIAR POLOS */
  letter-spacing:2px; /* JARAK HURUF KAYAK AI */
  /* text-transform DIHAPUS BIAR NORMAL */
}
</style>
</head>
<body></body>
<script>
const quotes = [
  "Jangan Menyerah Pioneer, Pi Adalah Masa Depan",
  "Setiap Klik Petir Adalah Investasi Untuk Anak Cucu",
  "Kita Menambang Bukan Hari Ini, Tapi Untuk 10 Tahun Kedepan",
  "GCV 314159 USD Adalah Harga Yang Kita Perjuangkan",
  "Bersabar, Beriman, Dan Terus Menambang",
  "Satu Ekosistem, Satu Komunitas, Satu Tujuan: Sukses",
  "Kamu Bukan Penambang Biasa, Kamu Adalah Pionir"
];

let index = 0;
let total = quotes.length + 1; // 7 + 1 = 8

function changeQuote(){
  if(index < 7){ // 0-6 = tampil 7 kalimat spirit
    document.body.innerText = quotes[index];
  } else { // 7 = KOSONG
    document.body.innerText = ``;
  }
  index++;
  if(index >= total) index = 0; // kalau udah 8 balik ke 0
}

// dengerin perintah dari index.html tombol bintang
window.addEventListener('message', (e) => {
  if(e.data === 'next') changeQuote();
});

changeQuote(); // tampil pertama
</script></html>
