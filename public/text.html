<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<style>
body{margin:0; background:transparent; font-family:Arial; overflow:hidden;}
#ai-popup{
  position:fixed; top:80px; left:50%; transform:translateX(-50%); /* PINDAH KE ATAS */
  background: transparent;
  color: white;
  padding: 0;
  border: none;
  font-weight: bold; 
  font-size: 18px; 
  z-index: 9999;
  opacity: 0; 
  transition: opacity 0.4s;
  text-align: center; 
  max-width: 90%;
  text-shadow: 0 0 8px #000, 0 0 12px #0057d9; /* KASIH GLOW BIAR JELAS */
  pointer-events: none;
}
</style>
</head>
<body>
<div id="ai-popup"></div>

<script>
let piUsername = null;

const greetings = [
  "Hai Pioneer, saya AI Tracker, siap berinteraksi dengan Anda.",
  "Silahkan klik Plus untuk memulai.",
  "Selamat datang Pioneer",
  "Pastikan anda sudah klik petir hari ini.",
  "Mau buat apa hari ini.",
  "AI Tracker siap menemani anda.",
  "Silahkan login dulu dan gunakan reff Yaasien."
];

window.addEventListener('message', function(e){
  if(e.data.type === 'showGreeting'){
    piUsername = e.data.username;
    showGreeting();
  }
});

function showGreeting(){
  const popup = document.getElementById('ai-popup');
  let text = greetings[Math.floor(Math.random()*greetings.length)];
  
  popup.innerText = text;
  popup.style.opacity = 1;
  playSound();
  setTimeout(()=>{ popup.style.opacity = 0; }, 3000); // INI 3 DETIK
}

function playSound() {
  let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const oscillator = audioCtx.createOscillator();
  const gainNode = audioCtx.createGain();
  oscillator.connect(gainNode);
  gainNode.connect(audioCtx.destination);
  oscillator.type = 'sine';
  oscillator.frequency.setValueAtTime(800, audioCtx.currentTime);
  oscillator.frequency.exponentialRampToValueAtTime(300, audioCtx.currentTime + 0.15);
  gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
  gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
  oscillator.start();
  oscillator.stop(audioCtx.currentTime + 0.15);
}
</script>
</body>
</html>
