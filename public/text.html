<!DOCTYPE html>
<html>
<head>
<style>
body { 
  background:transparent; 
  color:#fffc00; 
  display:flex; 
  align-items:center; 
  justify-content:center; 
  height:100vh; 
  text-align:center; 
  font-size:24px; 
  font-weight:bold; 
  padding:20px; 
  text-shadow: 0 0 10px #000; /* KASIH BAYANGAN BIAR TETAP KEBACA DI ATAS BINTANG */
}
</style>
</head>
<body>
<div id="quote">Klik tombol bintang untuk mulai</div>

<script>
const quotes = [
  "Jangan menyerah, Pi Network akan membawa perubahan",
  "Satu Pi, Satu Harapan, Satu Masa Depan",
  "Tetap Menambang, Tetap Percaya",
  "Kesuksesan dimulai dari klik hari ini",
  "Kita adalah Pioneer, kita adalah masa depan",
  "Sabar adalah kunci, Pi adalah hasilnya",
  "Bersama kita bisa, Bersama kita Pi"
];

let index = 0;
function changeQuote(){
  index = (index + 1) % quotes.length;
  document.getElementById('quote').innerText = quotes[index];
}

// Dengerin pesan dari index.html
window.addEventListener('message', (e) => {
  if(e.data === 'next') changeQuote();
});
</script>
</body>
</html>
